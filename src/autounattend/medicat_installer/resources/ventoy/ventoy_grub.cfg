# Custom Menu Entries for MiOS-Cat

menuentry "1. Boot MiOS-Cat Recovery Environment (Mini Windows)" --class windows {
    set vtoy_wimboot_val="1"
    search --set=root --file /Live_Operating_Systems/Mini_Windows/MiOS_PE.wim
    chainloader /Live_Operating_Systems/Mini_Windows/MiOS_PE.wim
}

menuentry "2. Boot SystemRescue (Linux Diagnostic Suite)" --class linux {
    search --set=root --file /Live_Operating_Systems/SystemRescue/SystemRescue.iso
    chainloader /Live_Operating_Systems/SystemRescue/SystemRescue.iso
}

menuentry "3. Deploy MiOS Linux (Automated Kickstart Installation)" --class fedora {
    search --set=root --file /Live_Operating_Systems/Fedora-Server.iso
    chainloader /Live_Operating_Systems/Fedora-Server.iso
}

menuentry "4. Deploy MiOS-Xbox (Automated Wiping & Installation)" --class warning {
    echo "Initializing automated deployment pipeline..."
    search --set=root --file /Live_Operating_Systems/Mini_Windows/MiOS_PE.wim
    set vtoy_wimboot_val="1"
    chainloader /Live_Operating_Systems/Mini_Windows/MiOS_PE.wim
}

menuentry "5. Launch EFI Shell (Advanced Recovery)" --class recovery {
    insmod fat
    insmod chain
    terminal_output console
    chainloader /EFI/shell.efi
}
