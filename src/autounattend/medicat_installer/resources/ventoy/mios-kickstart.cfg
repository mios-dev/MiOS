# MiOS Linux Kickstart Automation Config
text
reboot
url --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=fedora-$releasever&arch=$basearch
keyboard --vckeymap=us --layout=us
timezone UTC
lang en_US.UTF-8

# Disk layout configuration
zerombr
clearpart --all --initlabel
autopart --type=plain --fstype=ext4

# Create user matching MiOS defaults
rootpw --lock
user --name=user --password=user --plaintext --groups=wheel

%packages
@core
git
curl
polkit
%end

%post --log=/var/log/kickstart-mios-post.log
echo "MiOS-Cat Kickstart: Injecting MiOS Linux deployment pathways..."
mkdir -p /opt/mios
git clone https://github.com/mios-dev/mios-bootstrap.git /opt/mios/mios-bootstrap
cd /opt/mios/mios-bootstrap
if [ -f "tools/install.sh" ]; then
    bash tools/install.sh --non-interactive
fi
%end
