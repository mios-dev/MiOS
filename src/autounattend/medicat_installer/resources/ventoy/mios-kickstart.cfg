# MiOS Linux Kickstart Automation Config
text
reboot
url --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=fedora-$releasever&arch=$basearch
keyboard --vckeymap=us --layout=us
timezone UTC
lang en_US.UTF-8

# Disk layout configuration
zerombr
clearpart --all --initlabel
autopart --type=plain --fstype=ext4

# Create user matching MiOS defaults
rootpw --lock
user --name=user --password=user --plaintext --groups=wheel

%packages
@core
git
curl
polkit
%end

%post --log=/var/log/kickstart-mios-post.log
echo "MiOS-Cat Kickstart: Injecting MiOS Linux deployment pathways..."
mkdir -p /opt/mios

# Attempt online clone first
git clone https://github.com/mios-dev/mios-bootstrap.git /opt/mios/mios-bootstrap
if [ $? -eq 0 ]; then
    echo "Cloned latest bootstrap repository online."
else
    echo "Online clone failed. Attempting offline storage fallback..."
    for dev in /dev/sd* /dev/nvme*; do
        if [ -b "$dev" ]; then
            mkdir -p /mnt/usb
            mount -o ro "$dev" /mnt/usb 2>/dev/null
            if [ -d "/mnt/usb/ventoy/repo/mios-bootstrap" ]; then
                echo "Found offline repository staging on $dev"
                cp -r /mnt/usb/ventoy/repo/mios-bootstrap /opt/mios/
                umount /mnt/usb
                break
            elif [ -d "/mnt/usb/mios-bootstrap" ]; then
                echo "Found offline repository staging on $dev (secure partition)"
                cp -r /mnt/usb/mios-bootstrap /opt/mios/
                umount /mnt/usb
                break
            fi
            umount /mnt/usb 2>/dev/null
        fi
    done
fi

cd /opt/mios/mios-bootstrap
if [ -f "tools/install.sh" ]; then
    bash tools/install.sh --non-interactive
fi
%end
