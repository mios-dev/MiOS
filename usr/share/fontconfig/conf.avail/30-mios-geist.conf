<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  /usr/share/fontconfig/conf.avail/30-mios-geist.conf
  Symlinked into /etc/fonts/conf.d/ by usr/lib/tmpfiles.d/mios-fontconfig.conf.

  Three rules:

  1. Make Geist Sans / Geist Mono the system defaults for sans-serif
     and monospace family aliases. Every MiOS-rendered surface
     (Cockpit web UI, GTK apps, terminal emulators that honor
     fontconfig defaults, the configurator HTML when served
     locally, etc.) inherits them automatically.

  2. Add Symbols-Only Nerd Font as the icon-glyph fallback for
     Geist Mono. Vercel's Geist Mono doesn't carry the Powerline /
     Material / Devicon ranges that the Oh-My-Posh prompt theme
     (mios.omp.json) uses; per-glyph fallback through fontconfig
     means terminals render the prompt's ↑/↓/branch/clock glyphs
     correctly while keeping Geist Mono's letterforms for text.

  3. Match the configurator HTML's monospace stack so the
     Configurator's `var(--mono)` family resolves to the same
     installed file every other MiOS surface uses.
-->
<fontconfig>

  <!-- 1a. Default sans-serif: Geist -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Geist</family>
      <family>Geist Sans</family>
      <family>Cantarell</family>
      <family>Noto Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <!-- 1b. Default monospace: Geist Mono -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Geist Mono</family>
      <family>GeistMono</family>
      <family>Symbols Nerd Font Mono</family>
      <family>SymbolsNerdFontMono</family>
      <family>Cascadia Code</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <!-- 2. Per-glyph fallback: when Geist Mono lacks an icon glyph
       (Powerline E0xx, Devicons E7xx, Material F0xxx, etc.) fall
       through to Symbols Nerd Font Mono before any other monospace.
       This keeps Geist Mono's identity for the letterforms while
       the Oh-My-Posh prompt's glyphs still render. -->
  <match target="pattern">
    <test name="family"><string>Geist Mono</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>GeistMono</string></test>
    <edit name="family" mode="append" binding="strong">
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>

  <!-- 3. The configurator HTML's monospace stack (--mono var):
       ui-monospace, "Cascadia Code", "Source Code Pro", Consolas, monospace.
       Pre-pend Geist Mono so the resolved font matches the rest of
       the system. fontconfig handles the alias chain transparently. -->
  <alias>
    <family>ui-monospace</family>
    <prefer>
      <family>Geist Mono</family>
      <family>Symbols Nerd Font Mono</family>
    </prefer>
  </alias>

</fontconfig>
