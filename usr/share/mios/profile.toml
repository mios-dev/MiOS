# /usr/share/mios/profile.toml -- 'MiOS' Profile Defaults (vendor-immutable)
#
# This file ships in mios.git and is baked into every image. It is the
# read-only DEFAULT layer of the three-layer profile resolution:
#
#   1. ~/.config/mios/profile.toml     per-user override   (highest)
#   2. /etc/mios/profile.toml          host/admin override (bootstrap user-edit)
#   3. /usr/share/mios/profile.toml    vendor defaults     (THIS FILE -- lowest)
#
# At install time, mios-bootstrap.git ships /etc/mios/profile.toml as the
# user-edit copy with the same field shape; bootstrap install.sh reads
# defaults here, overlays the user values from /etc/mios/profile.toml,
# and stages a copy to each Linux user's ~/.config/mios/profile.toml from
# /etc/skel/.config/mios/profile.toml.
#
# Edit this file ONLY to change the vendor default for every fresh install.
# For per-host or per-user overrides, edit the respective layer above.
#
# Format: TOML 1.0 -- https://toml.io/en/v1.0.0.

[identity]
username  = "mios"
fullname  = "'MiOS' User"
hostname  = "mios"
shell     = "/bin/bash"
groups    = ["wheel", "libvirt", "kvm", "video", "render", "input", "dialout", "docker"]

[locale]
timezone        = "UTC"
keyboard_layout = "us"
language        = "en_US.UTF-8"

[auth]
ssh_key_type     = "ed25519"
ssh_key_action   = "generate"
existing_ssh_key = ""
password_policy  = "interactive"
password_hash    = ""
luks_passphrase  = ""
github_pat       = ""

[network]
firewalld_default_zone = "drop"
allow_ssh              = true
allow_cockpit          = true
allow_libvirt_bridge   = true

[ai]
endpoint        = "http://localhost:8080/v1"
model           = "qwen2.5-coder:7b"
embed_model     = "nomic-embed-text"
api_key         = ""
enable_ollama   = true
enable_localai  = true
mcp_registry    = "/usr/share/mios/ai/v1/mcp.json"

[desktop]
session       = "gnome"
color_scheme  = "prefer-dark"
flatpaks      = [
    "org.gnome.Epiphany",
    "com.github.tchx84.Flatseal",
    "org.gnome.Software",
    "com.mattjakeman.ExtensionManager",
    "com.vscodium.codium",
]

[image]
ref    = "ghcr.io/mios-dev/mios:latest"
branch = "main"

[bootstrap]
mode             = "auto"
mios_repo        = "https://github.com/mios-dev/mios.git"
bootstrap_repo   = "https://github.com/mios-dev/mios-bootstrap.git"
install_packages = true
reboot_on_finish = true

# Quadlet sidecar enablement.
#
# Defaults policy (project-wide invariant): every flag here defaults to
# true. The system never disables a service via static config -- when a
# service is incompatible with the host (wrong virtualization layer,
# missing required path, missing hardware), systemd `Condition*`
# directives in the Quadlet itself short-circuit it at boot/pre-boot
# and the service silently no-ops. Operators can still override any
# flag in /etc/mios/profile.toml or ~/.config/mios/profile.toml to
# force-disable a service even when it would otherwise run.
[quadlets.enable]
mios-ai            = true
mios-ceph          = true
mios-k3s           = true
mios-forge         = true
mios-cockpit-link  = true   # surfaces host Cockpit (9090) in Podman Desktop UI
crowdsec-dashboard = true
ollama             = true
cloudws-guacamole  = true
cloudws-pxe-hub    = true
guacamole-postgres = true
guacd              = true
