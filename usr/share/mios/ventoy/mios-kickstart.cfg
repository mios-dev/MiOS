# MiOS-Cat -- bare-metal Linux deploy kickstart.
#
# MODEL (operator-confirmed 2026-07-17): install a MINIMAL, MUTABLE Fedora
# "MiOS server" base with just enough to host Linux AND Windows containers/VMs,
# then apply the MiOS FHS overlay ON TOP via build-mios.sh (its Phase-1 clones
# mios.git into / and copies the etc/ usr/ var/ overlays). The box BECOMES a
# mutable MiOS server -- deliberately NOT an immutable bootc install (that is a
# separate deploy mode MiOS-Cat can also offer).
#
# INSTALL SOURCE: MiOS-Cat stages a FULL Fedora Server DVD (offline-capable) onto
# the USB and Ventoy loopback-boots it, so `cdrom` below installs the base
# packages from the DVD with NO network. build-mios.sh's overlay clone can also
# use a locally-staged mios.git (via MIOS_REPO) so the whole install is offline.

text
reboot

keyboard --vckeymap=us --layout=us
timezone --utc UTC
lang en_US.UTF-8
network --bootproto=dhcp --device=link --activate --onboot=on

# Install OFFLINE from the embedded full Fedora Server DVD: its package repo is
# on the boot media, so Anaconda needs no network. (Revert to `url --mirrorlist`
# only if you go back to a netinst ISO.)
cdrom

# Mutable base -- plain ext4, NOT ostree/immutable (that mutability is the point).
zerombr
clearpart --all --initlabel
autopart --type=plain --fstype=ext4

# Bootstrap login only. The REAL MiOS user + groups + password are created by
# build-mios.sh Phase-3 from the SSOT [identity]; this placeholder just gives
# Anaconda a valid account and is superseded before first login.
rootpw --lock
user --name=mios --groups=wheel,libvirt,kvm,qemu,video,render --password=mios --plaintext

# Minimal-but-sufficient host: @core + the virtualization/container stack that
# lets the MiOS server host Linux AND Windows guests (libvirt/KVM/QEMU + podman;
# edk2-ovmf = UEFI firmware needed to boot Windows VMs).
%packages
@core
@virtualization
qemu-kvm
libvirt
virt-install
edk2-ovmf
podman
podman-compose
git
curl
polkit
%end

%post --log=/var/log/kickstart-mios-post.log --erroronfail
set -euo pipefail
echo "[MiOS-Cat] Mutable Fedora base installed. Enabling VM/container hosting + applying MiOS overlay..."

# The hosting capabilities the 'minimal MiOS server' provides (modular + monolithic
# libvirt unit names both tolerated; podman socket for the container plane).
systemctl enable libvirtd.socket virtqemud.socket virtnetworkd.socket podman.socket 2>/dev/null || true

# --- Locate the MiOS payload: prefer OFFLINE staging on the USB, else clone. ---
# MiOS-Cat.bat stages the repos onto the MiOS-Repo partition as 'mios-bootstrap' and
# 'MiOS' (Linux is case-sensitive). We scan BOTH the partition root and a 'repos/' subdir
# (the ADR-0008 MiOS-Repo/repos/ layout) so either staging layout resolves -- no single
# hard-coded path can strand the offline install.
BOOT_DEST=/opt/mios/mios-bootstrap
MIOS_TREE=/opt/mios/mios
mkdir -p /opt/mios
staged=""
for dev in /dev/sd* /dev/nvme* /dev/mmcblk* ; do
    [ -b "$dev" ] || continue
    mkdir -p /mnt/usb
    mount -o ro "$dev" /mnt/usb 2>/dev/null || continue
    for base in /mnt/usb /mnt/usb/repos /mnt/usb/ventoy/repo /mnt/usb/repo ; do
        # Validate the staged bootstrap is COMPLETE (has the entry point) before trusting
        # it -- an incomplete copy would otherwise set staged=1 and skip the net fallback.
        if [ -f "$base/mios-bootstrap/build-mios.sh" ]; then
            cp -a "$base/mios-bootstrap" "$BOOT_DEST"
            # mios.git tree: MiOS-Cat.bat stages it as 'MiOS'; also accept 'mios'.
            for m in MiOS mios ; do
                if [ -d "$base/$m/.git" ] || [ -d "$base/$m/usr/share/mios" ]; then
                    cp -a "$base/$m" "$MIOS_TREE"; break
                fi
            done
            staged=1
        fi
    done
    umount /mnt/usb 2>/dev/null || true
    [ -n "$staged" ] && break
done
if [ -z "$staged" ]; then
    echo "[MiOS-Cat] No offline stage found on removable media; cloning over network..."
    git clone --depth 1 https://github.com/mios-dev/mios-bootstrap.git "$BOOT_DEST"
fi

# --- Apply the MiOS FHS overlay via the canonical entry point, UNATTENDED. ---
# WAS `bash tools/install.sh` -- a path that never existed, so the old kickstart
# failed at the very end of post. The canonical entry point is build-mios.sh in the
# root of mios-bootstrap.git.
#
# Pass -u (unattended / non-interactive), point BOOTSTRAP_REPO at our staged copy
# so phase-1 uses the USB clone instead of fetching from GitHub, point MIOS_REPO
# at the staged mios.git so phase-1 copies the FHS overlay offline, set
# MIOS_FHS_TOTAL_ROOT_MERGE=1 so build-mios.sh copies usr/ and etc/ onto / directly,
# and point MIOS_TOML at the SSOT staged on the USB.
export BOOTSTRAP_REPO="$BOOT_DEST"
if [ -d "$MIOS_TREE" ]; then export MIOS_REPO="$MIOS_TREE"; fi
export MIOS_FHS_TOTAL_ROOT_MERGE=1
for t in /mnt/usb/mios.toml /mnt/usb/repos/mios.toml /mnt/usb/ventoy/repo/mios.toml ; do
    if [ -f "$t" ]; then export MIOS_TOML="$t"; break; fi
done

echo "[MiOS-Cat] Running build-mios.sh -u (offline stage: BOOTSTRAP_REPO=$BOOT_DEST)..."
cd "$BOOT_DEST"
bash build-mios.sh -u

echo "[MiOS-Cat] Kickstart post complete. Rebuilding bootc/FHS base complete."
%end
