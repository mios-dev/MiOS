INCLUDE boot/syslinux/sysresccd_head.cfg

LABEL sysresccd
TEXT HELP
Boot the SystemRescue Arch Linux live medium with auto-SSH enabled.
ENDTEXT
MENU LABEL Boot SystemRescue using default options [SSH Enabled]
LINUX boot/x86_64/vmlinuz
INITRD boot/intel_ucode.img,boot/amd_ucode.img,boot/x86_64/sysresccd.img
APPEND archisobasedir=sysresccd iomem=relaxed rootpass=mios userpass=mios sshd ar_touch=autorun

LABEL sysresccd_copytoram
TEXT HELP
Boot the SystemRescue live medium and copy system to RAM with auto-SSH enabled.
ENDTEXT
MENU LABEL Boot SystemRescue and copy system to RAM (copytoram) [SSH Enabled]
LINUX boot/x86_64/vmlinuz
INITRD boot/intel_ucode.img,boot/amd_ucode.img,boot/x86_64/sysresccd.img
APPEND archisobasedir=sysresccd iomem=relaxed copytoram rootpass=mios userpass=mios sshd ar_touch=autorun

LABEL sysresccd_checksum
TEXT HELP
Boot SystemRescue and verify the integrity of the live medium
ENDTEXT
MENU LABEL Boot SystemRescue and verify integrity of the medium (checksum)
LINUX boot/x86_64/vmlinuz
INITRD boot/intel_ucode.img,boot/amd_ucode.img,boot/x86_64/sysresccd.img
APPEND archisobasedir=sysresccd iomem=relaxed checksum

LABEL sysresccd_nomodeset
TEXT HELP
Boot using basic display drivers to avoid display issues
ENDTEXT
MENU LABEL Boot SystemRescue using basic display drivers (nomodeset) [SSH Enabled]
LINUX boot/x86_64/vmlinuz
INITRD boot/intel_ucode.img,boot/amd_ucode.img,boot/x86_64/sysresccd.img
APPEND archisobasedir=sysresccd iomem=relaxed nomodeset rootpass=mios userpass=mios sshd ar_touch=autorun

LABEL sysresccd_findroot
TEXT HELP
Boot from a Linux operating system installed on the disk
ENDTEXT
MENU LABEL Boot a Linux operating system installed on the disk (findroot)
LINUX boot/x86_64/vmlinuz
INITRD boot/intel_ucode.img,boot/amd_ucode.img,boot/x86_64/sysresccd.img
APPEND archisobasedir=sysresccd iomem=relaxed findroot

LABEL sysresccd_break
TEXT HELP
Stop during the boot process before mounting the root filesystem
ENDTEXT
MENU LABEL Stop during the boot process before mounting the root filesystem
LINUX boot/x86_64/vmlinuz
INITRD boot/intel_ucode.img,boot/amd_ucode.img,boot/x86_64/sysresccd.img
APPEND archisobasedir=sysresccd iomem=relaxed break

