# /etc/aichat/config.yaml (in-container default)
#
# Mirrors /etc/aichat/config.yaml on the host; the host's bind-mount
# wins when present so MiOS-DEV operators get one config that works
# both inside `distrobox enter mios-aichat` and from the host shim.
#
# Client naming: the FIRST client is `mios` -- the unified MiOS AI
# endpoint, mapped to Hermes-Agent on :8642 (the LIVE MiOS agent at
# root). `ollama` remains available as a named alternate for
# operators who want to bypass Hermes and talk directly to the model
# server (e.g. `aichat --model ollama:qwen3.5:2b "..."`).

model: mios:qwen3.5:2b
stream: true
save_session: true
keybindings: emacs

clients:
  - type: openai-compatible
    name: mios
    api_base: http://localhost:8642/v1
    api_key: $MIOS_AI_KEY
    models:
      - name: qwen3.5:2b
        max_input_tokens: 32768
        supports_function_calling: true
      - name: nomic-embed-text
        type: embedding
        max_input_tokens: 8192

  - type: openai-compatible
    name: ollama
    api_base: http://localhost:11434/v1
    api_key: ollama
    models:
      - name: qwen3.5:2b
        max_input_tokens: 32768
        supports_function_calling: true
      - name: nomic-embed-text
        type: embedding
        max_input_tokens: 8192
