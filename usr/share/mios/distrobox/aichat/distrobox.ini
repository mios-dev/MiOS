; /usr/share/mios/distrobox/aichat/distrobox.ini
;
; Operator-facing distrobox-assemble manifest. Reproducible spawn of
; the mios-aichat container via:
;   distrobox-assemble create --file /usr/share/mios/distrobox/aichat/distrobox.ini
;
; The .image + .build Quadlets at /usr/share/containers/systemd/
; mios-aichat.{image,build} populate localhost/mios/aichat:latest in
; podman storage on first daemon-reload; this manifest then enrolls
; that image as a Distrobox container with the aichat + aichat-ng
; binaries exported to the host PATH (default ~/.local/bin/).

[mios-aichat]
image = localhost/mios/aichat:latest
; `home` intentionally omitted -- distrobox-assemble does not shell-
; expand INI values, so a literal `${USER}` would land in the
; container path. Letting distrobox default to the operator's actual
; $HOME bind-mount is correct here: aichat reads ~/.config/aichat/
; from the host home, which is exactly the integration MiOS wants.
init_hooks = mkdir -p "$HOME/.config/aichat"
init = false
nvidia = true
pull = false
root = false
unshare_groups = false
unshare_ipc = false
unshare_netns = false
unshare_process = false

; Bind /etc/mios so the in-container aichat sees the same install.env
; the host does (MIOS_AI_MODEL, MIOS_AI_ENDPOINT, etc.).
additional_volumes = /etc/mios:/etc/mios:ro

; Export the binaries to the host PATH. distrobox-export drops thin
; shim scripts under ~/.local/bin/ that exec into the container, so
; the operator types `aichat` from the host shell and the in-container
; binary handles the request -- the host substrate stays clean.
exported_bins = /usr/local/bin/aichat,/usr/local/bin/aichat-ng

; Application launcher entries (.desktop) in the host menu so the
; container surfaces are also reachable from GNOME Activities.
exported_apps =

; First-run init: regenerate the user's ~/.config/aichat/config.yaml
; from the in-container default if missing, so a brand-new user gets
; a working config without manual setup.
start_now = false
