# /usr/share/mios/hermes/config.yaml
# Hermes-Agent vendor defaults. Copied to /etc/mios/hermes/config.yaml
# on first boot by usr/lib/tmpfiles.d/mios-hermes.conf. Operators
# override under /etc/mios/hermes/config.local.yaml.

backend:
  provider: ollama
  # localhost: dev-VM with Network=host hits ollama in the same netns.
  # Bare-metal bridge deployments override to http://mios-ollama:11434.
  base_url: http://localhost:11434
  model: qwen3.5:2b
  available_models:
    - qwen3.5:2b
    - nomic-embed-text

# Auxiliary LLM for context compression, summarization, and memory
# flush. Points at the same Ollama backend; localhost /v1 accepts
# unauthenticated requests.
auxiliary:
  provider: local/custom
  base_url: http://localhost:11434/v1
  model: qwen3.5:2b
  api_key: ""

api_server:
  # Bind / port / key / cors values come from the EnvironmentFile=
  # /etc/mios/hermes/api.env in the Quadlet. They're listed here as
  # ${VAR} placeholders so a hand-edit of this file makes the resolution
  # path obvious.
  enabled: ${API_SERVER_ENABLED}
  host: ${API_SERVER_HOST}
  key: ${API_SERVER_KEY}
  cors_origins: ${API_SERVER_CORS_ORIGINS}

# Tool surface: SearXNG is reachable as mios-searxng:8080 inside the
# ai-net bridge, so the agent's web_search tool can call it without
# leaving the network. Architectural Law 5 unaffected -- search is not
# AI inference.
tools:
  web_search:
    enabled: true
    provider: searxng
    base_url: http://mios-searxng:8080

logging:
  level: info
  format: json

# Operator overrides: drop a /etc/mios/hermes/config.local.yaml file
# alongside this one to override any of the above. The local file is
# merged on top, so partial overrides (e.g. just `backend.model`) work.
include:
  - /etc/hermes/config.local.yaml
