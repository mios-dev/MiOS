# /usr/share/mios/hermes/config.yaml
# 'MiOS' Hermes-Agent vendor defaults.
#
# Copied into /etc/mios/hermes/config.yaml on first boot by usr/lib/
# tmpfiles.d/mios-hermes.conf (C= line: copy-if-absent). Operators
# override under /etc/mios/hermes/config.local.yaml -- the trailing
# `include` directive picks that up if present, so vendor edits and
# operator edits stay separable.
#
# This file replaces the interactive `setup` wizard that
# deploy-aistack.sh runs on bare-metal first-deploy. Wiring is fully
# declarative: backend = mios-ollama on ai-net, model = MiOS's baked
# default (qwen3.5:2b), API server reads its key from
# /etc/mios/hermes/api.env via EnvironmentFile= in the Quadlet.

backend:
  provider: ollama
  # localhost not bridge-DNS. Hermes-Agent does NOT honor mios.git's
  # custom `include:` directive (it's a YAML hint we never wired into
  # the upstream YAML parser), so config.local.yaml never overrides
  # this value at runtime. Default it to localhost so the dev-VM
  # host-network Quadlet hits ollama on the same netns. Bare-metal
  # bridge deployments override to http://mios-ollama:11434 via
  # /etc/mios/hermes/config.yaml.local-edit -- there is no auto-
  # rewrite, it's a one-line manual fix. Operator-flagged 2026-05-11.
  base_url: http://localhost:11434
  model: qwen3.5:2b
  # Listed alternates so the WebUI's model picker shows what's
  # available. mios-ollama-firstboot bakes qwen3.5:2b and
  # nomic-embed-text by default; operators can pull others post-deploy.
  available_models:
    - qwen3.5:2b
    - nomic-embed-text

# Auxiliary LLM -- Hermes uses this for context compression,
# summarization, and memory flush (separate from the main backend
# that handles the operator-facing chat). Without it Hermes logs:
#     Auxiliary auto-detect: no provider available
#         (tried: openrouter, nous, local/custom, api-key)
# and silently degrades (compression drops middle turns without a
# summary, memory flush no-ops). Operator directive 2026-05-11
# dropped LocalAI (mios-ai) -- redundant 31.9 GB image; Ollama
# already serves the same /v1 surface. Aux now points at Ollama
# too; the same backend handles primary chat AND the compression /
# summarization passes. Empty api_key works because Ollama's /v1
# accepts unauthenticated localhost requests by default.
auxiliary:
  provider: local/custom
  base_url: http://localhost:11434/v1
  model: qwen3.5:2b
  api_key: ""

api_server:
  # Bind / port / key / cors values come from the EnvironmentFile=
  # /etc/mios/hermes/api.env in the Quadlet. They're listed here as
  # ${VAR} placeholders so a hand-edit of this file makes the resolution
  # path obvious.
  enabled: ${API_SERVER_ENABLED}
  host: ${API_SERVER_HOST}
  key: ${API_SERVER_KEY}
  cors_origins: ${API_SERVER_CORS_ORIGINS}

# Tool surface: SearXNG is reachable as mios-searxng:8080 inside the
# ai-net bridge, so the agent's web_search tool can call it without
# leaving the network. Architectural Law 5 unaffected -- search is not
# AI inference.
tools:
  web_search:
    enabled: true
    provider: searxng
    base_url: http://mios-searxng:8080

logging:
  level: info
  format: json

# Operator overrides: drop a /etc/mios/hermes/config.local.yaml file
# alongside this one to override any of the above. The local file is
# merged on top, so partial overrides (e.g. just `backend.model`) work.
include:
  - /etc/hermes/config.local.yaml
