# /usr/share/mios/searxng/settings.yml
# 'MiOS' SearXNG vendor defaults.
#
# This file is copied into /etc/mios/searxng/settings.yml on first boot
# by usr/lib/tmpfiles.d/mios-searxng.conf (C= line: copy-if-absent).
# Once present in /etc, operator edits survive every subsequent boot.
# To restore vendor defaults: rm /etc/mios/searxng/settings.yml +
# `systemctl restart systemd-tmpfiles-setup.service`.
#
# secret_key is left as the placeholder PLACEHOLDER_SECRET_KEY_REGENERATE_ON_FIRST_BOOT;
# the SearXNG entrypoint detects this sentinel and overwrites it with a
# fresh 64-char value on container startup, then never touches it again.

use_default_settings: true

general:
  instance_name: "MiOS Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  base_url: "http://localhost:8888/"
  port: 8080
  bind_address: "0.0.0.0"
  # Filled in at first-boot by SearXNG's entrypoint.
  secret_key: "PLACEHOLDER_SECRET_KEY_REGENERATE_ON_FIRST_BOOT"
  limiter: false
  image_proxy: true
  http_protocol_version: "1.0"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  theme_args:
    simple_style: dark

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json    # required for the agent web_search tool surface

# Outgoing-request resilience (operator 2026-05-22). The default Google /
# DuckDuckGo scrape paths CAPTCHA / 403 / 429 a self-hosted instance
# (SearxEngineTooManyRequests / AccessDenied / CAPTCHA in the logs), which
# zeroed result sets and made the agent fall back to geo-IP'd data. More
# time + one retry keeps a slow engine from emptying the results; the cap
# stops one dead engine stalling the whole query.
outgoing:
  request_timeout: 8.0
  max_request_timeout: 12.0
  pool_connections: 100
  pool_maxsize: 20
  retries: 1

# Engine curation. use_default_settings:true means this list PATCHES the
# upstream defaults by name (it does not replace them). Disable the chronic
# blockers (Google scrape endpoints -- 403 / IndexError / CAPTCHA from a
# self-hosted IP) and lean on engines that serve a self-hosted instance
# reliably WITHOUT an API key. SearXNG auto-suspends any engine that errors,
# so the remaining set fills in; DuckDuckGo is kept (it recovers from its
# transient CAPTCHA) but is no longer load-bearing.
engines:
  - name: google
    disabled: true
  - name: google news
    disabled: true
  - name: google scholar
    disabled: true
  - name: google images
    disabled: true
  - name: brave
    disabled: false
  - name: bing
    disabled: false
  - name: mojeek
    disabled: false
  - name: duckduckgo
    disabled: false
    timeout: 5.0
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false
