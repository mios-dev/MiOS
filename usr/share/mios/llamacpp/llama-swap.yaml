# /usr/share/mios/llamacpp/llama-swap.yaml
# 'MiOS' llama-swap model map (WS-10 ollama -> llama.cpp conversion).
# llama-swap launches/swaps a `llama-server` per requested model behind one
# OpenAI /v1 endpoint, restoring ollama's multi-model auto-swap for llama.cpp.
#
# Each chat model carries --parallel 1 + --slot-save-path so it lands on a single
# deterministic slot and the agent-pipe's _kv_paging (POST /slots/{id}?action=
# save|restore) can checkpoint/restore that conversation's KV to disk -- the
# AIOS Context Manager, fleet-wide (ollama can't). The embed model runs a
# --embedding llama-server so /v1/embeddings replaces the ollama embed lane.
#
# !! TEMPLATE -- VERIFY before enabling (cannot be validated offline):
#   * the ${PORT} substitution + `cmd`/`proxy`/`ttl` keys match your llama-swap
#     version's schema (see github.com/mostlygeek/llama-swap README);
#   * the llama-server binary path inside the image (here /app/llama-server);
#   * the GGUF filenames exist under /models (provisioned by the bake step);
#   * --n-gpu-layers / --ctx-size sized to the shared 4090's free VRAM.
# Model NAMES should match the ollama tags the agent-pipe already dispatches
# (qwen3.5:4b, gemma4:e4b, nomic-embed-text, ...) so the lane is a drop-in.

models:
  # ── chat / reasoning models (KV-pageable; --parallel 1 = one resident slot) ──
  # NOTE 2026-06-04 (live finding): qwen3.5:4b is BLOCKED on mainline llama.cpp --
  # its custom "qwen35" arch fails to load ("key qwen35.rope.dimension_sections
  # has wrong array length; expected 4, got 3"); ollama runs it via a patched
  # fork. Using the standard-arch qwen3:1.7b here proves the llama.cpp + GPU +
  # KV-paging lane works LIVE. Restore a qwen3.5 entry once a llama.cpp build
  # supports the qwen35 arch (or convert the model).
  "qwen3:1.7b":
    cmd: >
      /app/llama-server --model /models/qwen3-1.7b.gguf
      --port ${PORT} --host 127.0.0.1
      --ctx-size 8192 --parallel 1
      --n-gpu-layers 999 --flash-attn auto
      --slot-save-path /var/lib/mios/llamacpp/slots --jinja
    proxy: "http://127.0.0.1:${PORT}"
    ttl: 300

  # gemma4:12b -- the REASONING model (operator 2026-06-05: "wire gemma4:12b as the
  # reasoning model", "EVERYTHING IS LLAMA.CPP, NO OLLAMA"). Standard gemma arch =
  # loads cleanly on mainline llama.cpp (unlike qwen3.5:4b's custom qwen35 arch).
  # GGUF provisioned from the gemma4:12b ollama model-layer blob (7.38 GB). Full
  # dGPU offload (--n-gpu-layers 999) on the 4090; KV-pageable single slot.
  "gemma4:12b":
    # Alias every legacy/role model name the pipeline still emits onto gemma4:12b
    # so llama-swap routes them instead of 400 "no router for requested model".
    # The agent registry / Hermes / planner reference these names; until G7
    # reconciles them in SSOT this makes the whole pipeline resolve to the one
    # served reasoning GGUF on the dGPU (operator 2026-06-05 "EVERYTHING llama.cpp").
    aliases:
      - MiOS-Agent
      - mios-agent
      - mios-agent-cpu
      - mios-hermes
      - mios-hermes-cpu
      - hermes-agent
      - mios-daemon-agent
      - mios-opencode
      - mios-opencode:latest
      - mios-igpu
      - mios-heavy
      - mios-reasoner-cpu
      - mios-planner
      - qwen3.5:4b
      - qwen3.5:9b
      - qwen3.5:2b
      - granite4.1:3b
      - qwen2.5-3b-instruct-4bit
      - qwen2.5-coder:7b
    cmd: >
      /app/llama-server --model /models/gemma4-12b.gguf
      --port ${PORT} --host 127.0.0.1
      --ctx-size 8192 --parallel 1
      --n-gpu-layers 999 --flash-attn auto
      --slot-save-path /var/lib/mios/llamacpp/slots --jinja
    proxy: "http://127.0.0.1:${PORT}"
    ttl: 300

  # ── embeddings (replaces the ollama embed lane; OpenAI /v1/embeddings) ──
  "nomic-embed-text":
    cmd: >
      /app/llama-server --model /models/nomic-embed-text.gguf
      --port ${PORT} --host 127.0.0.1
      --ctx-size 2048 --embedding --n-gpu-layers 999
    proxy: "http://127.0.0.1:${PORT}"
    ttl: 600
