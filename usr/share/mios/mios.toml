[verbs.list_windows]
section    = "Window / app launch"
sig        = ""
desc       = "Enumerate the currently OPEN Windows-desktop windows (titles). Run this BEFORE focus/move/close to confirm the target window exists. NOT the installed-app inventory (use list_installed_apps) and NOT the Linux/Wayland desktop (that is linux_desktop_window_list)."
examples   = ["what windows are open right now?", "list my open windows", "show me the open application windows", "which windows are currently on screen?"]
tier       = "core"
permission = "read"
cmd        = "mios-pc-control window-list --json"
# Fit a busy desktop's whole window list (the grounding for "what's open"). The
# old 1500-char default cut it mid-window so the model FABRICATED the omitted
# windows' PIDs/titles (operator 2026-05-31). _cap_verb_result still flags any
# overflow with a ⟪TRUNCATED⟫ marker the model must not invent past.
max_result_chars = 6000

[verbs.screen_layout]
