# ----------------------------------------------------------------------------
# [bootstrap] -- behavior of mios-bootstrap.git/install.sh during Phase-0.
#   mode: auto | bootc | fhs
#     - auto  : detect host kind, prefer 'bootc switch' when available
#     - bootc : force 'bootc switch' (fail if not bootc-managed)
#     - fhs   : force the Total Root Merge path (clone + overlay)
# Maps to MIOS_BOOTSTRAP_MODE, MIOS_REPO_URL, MIOS_BOOTSTRAP_REPO_URL.
# ----------------------------------------------------------------------------
[bootstrap]
mode             = "auto"
mios_repo        = "C:/MiOS"
bootstrap_repo   = "C:/mios-bootstrap"
branch           = "main"
install_packages = true   # run dnf install on PACKAGES.md after FHS overlay
reboot_on_finish = true   # interactive y/N prompt at end of install

# ----------------------------------------------------------------------------
# [bootstrap.host_storage] -- Windows-side dedicated data partition.
# Get-MiOS.ps1's Initialize-MiosDataDisk shrinks C:\ by `shrink_mb` and
# creates a partition labeled `volume_label` at drive `drive_letter`.
# ALL MiOS install paths redirect onto this disk (M:\MiOS, M:\etc\mios,
# M:\podman\machine, M:\MiOS\repo\mios + mios-bootstrap, BIB output).
#
# Why shrink_mb = 262656 (not 262144)?
#   262144 MB = 256 GiB exactly, but NTFS reserves ~16 MB at the start
#   for boot sector + alignment + initial $MFT extents. The resulting
#   "Capacity" in Windows Explorer falls 16-32 MB shy of the boundary,
#   rounding DOWN to "255 GB". 262656 MB (= 256 GiB + 512 MB buffer)
#   guarantees Explorer shows "256 GB".
# ----------------------------------------------------------------------------
[bootstrap.host_storage]
drive_letter        = "M"
volume_label        = "MIOS-DEV"
shrink_mb           = 262656     # produces "256 GB" in Windows Explorer
display_size_gb     = 256        # what the operator should see (informational)
filesystem          = "NTFS"
allocation_unit     = 4096       # NTFS default cluster size

# ----------------------------------------------------------------------------
# [bootstrap.dev_vm] -- podman-MiOS-DEV machine specifics. The VM that
# IS the builder (per feedback_mios_dev_is_the_builder memory).
# ----------------------------------------------------------------------------
[bootstrap.dev_vm]
machine_name        = "MiOS-DEV"   # podman derives "podman-MiOS-DEV"
wsl_distro          = "MiOS"        # the eventual MiOS WSL distro (built from the OCI image)
base_image          = "quay.io/podman/machine-os:6.0"   # LOCKED base
# Maximalist allocation — the dev VM IS the builder, so it gets every CPU
# core, every GB of RAM, every GB of free disk, and every GPU the host
# offers (minus the host_reserve below). Set to "max" to auto-detect via
# Get-Hardware in build-mios.ps1; pin to a number to cap explicitly.
cpus                = "max"
memory_mb           = "max"
disk_size_gb        = "max"
gpu_passthrough     = "max"      # "max" | "none" | "nvidia" | "amd" | "intel"
# rename_distro: false (default) keeps the WSL distro registered as
# `podman-MiOS-DEV` (the name `podman machine init` creates) so Podman
# Desktop can see and control the machine. true opts back in to the
# legacy export/unregister/import-as-MiOS-DEV cycle which broke Podman
# Desktop visibility (operator-confirmed regression).
# Operator-facing UX continues to read "MiOS-DEV" via the WT profile
# name, Start Menu labels, and the `mios-dev` shell helper regardless.
rename_distro       = false

# ----------------------------------------------------------------------------
# [wsl2] -- pre-Phase-0 WSL utility VM networking + resource knobs.
# Get-MiOS.ps1 reads these and writes %USERPROFILE%\.wslconfig before any
# `wsl.exe` invocation; build-mios.ps1 Phase 4 layers RAM/CPU/swap on top.
# ----------------------------------------------------------------------------
[wsl2]
# networking_mode: "NAT" or "mirrored". NAT + localhost_forwarding=true is
# the safe default. Mirrored mode TRIAL on build 26300.8376 / WSL 2.7.3.0
# reproduced a port-mirror desync (Windows-side svchost relay holds the
# Quadlet ports after WSL services crash → EADDRINUSE death-spiral on
# auto-restart). Re-attempt mirrored after Quadlet migration: host-network
# removal, sshd off the mirrored port range, explicit mirror cleanup on
# service stop. Operator-confirmed.
networking_mode      = "NAT"
localhost_forwarding = true
firewall             = false        # only meaningful under mirrored mode
gui_applications     = true
dns_tunneling        = true
auto_proxy           = true

# ----------------------------------------------------------------------------
# [wsl2.desktop_compat] -- WSLg-specific GUI app behavior knobs. WSLg's
# Wayland compositor lacks xdg_popup reposition support (operator-
# confirmed GTK4 popups detach from parent windows, stay
# visible after minimize, don't follow window moves). Routing GTK / Qt
# / Mozilla apps through Xwayland (X11 semantics work correctly under
# WSLg) is the documented workaround. Switch back to native Wayland via
# mios.html when WSLg's compositor implements the missing protocol.
#
# /etc/profile.d/mios-wslg.sh exports these as GDK_BACKEND /
# MOZ_ENABLE_WAYLAND / QT_QPA_PLATFORM whenever /mnt/wslg is mounted.
# ----------------------------------------------------------------------------
[wsl2.desktop_compat]
gdk_backend     = "x11"     # GTK apps: "x11" (Xwayland) | "wayland"
moz_wayland     = "0"       # Firefox / mozilla: "0" (X11) | "1" (Wayland)
qt_platform     = "xcb"     # Qt apps: "xcb" (X11) | "wayland" | "wayland;xcb"

# ----------------------------------------------------------------------------
# [wsl2.dev_vm] -- Quadlet networking knobs specific to the dev VM
# (podman-MiOS-DEV). The dev VM ships dropins under
# /etc/containers/systemd/<unit>.container.d/ that override the parent
# unit's Network= directive (Network=mios.network) to Network=host.
# This makes container-side `localhost:N` references reach sibling
# services directly without relying on the bridge's container-name DNS.
#
# Under WSL2 networking_mode=NAT the dev VM's loopback is isolated from
# the Windows host's loopback, so Network=host is safe. Under
# networking_mode=mirrored the WSL VM's loopback IS the Windows host's
# loopback, and Network=host produces EADDRINUSE death-spirals
# (operator-confirmed ollama/sshd/hermes etc. all looped
# auto-restart with "address already in use"). Switch to "bridge" when
# migrating to mirrored mode -- the parent units already declare
# mios.network, so the only change is to NOT install the host-network
# dropins. automation/08-system-files-overlay.sh honors this key and
# removes any *-host-network.conf dropin when bridge is selected.
# ----------------------------------------------------------------------------
[wsl2.dev_vm]
quadlet_network_mode = "host"   # "host" (NAT default) | "bridge" (mirrored-safe)

# ----------------------------------------------------------------------------
# [desktop.start_menu] -- explicit Windows Start Menu shortcuts for MiOS
# web services. WSLg's auto-publish heuristic filters out
# Categories=System;Network;Settings; entries and Exec=xdg-open URL
# patterns (operator-confirmed in podman-MiOS-DEV: 10
# mios-svc-*.desktop files present, 0 surfaced as native Windows
# shortcuts). Install-MiOSServiceShortcuts in Get-MiOS.ps1 reads the
# `publish` list below + per-entry label/scheme keys, resolves the port
# from [ports].<port_key>, and writes one .url Internet shortcut per
# entry into %APPDATA%\Microsoft\Windows\Start Menu\Programs\
# podman-MiOS-DEV\. Each shortcut opens scheme://localhost:port/ in the
# default Windows browser. Idempotent.
#
# Add a new service: append its key to `publish` and add three keys
# (<key>_label, <key>_scheme, <key>_port_key). Remove a service by
# dropping it from `publish` (existing .lnk persists until the next
# Pass-0 reap; safe to delete manually).
# ----------------------------------------------------------------------------
[desktop.start_menu]
publish = ["forge", "cockpit", "code_server", "searxng", "hermes_dashboard", "guacamole_web"]

forge_label              = "Forge"
forge_scheme             = "http"
forge_port_key           = "forge_http"

cockpit_label            = "Cockpit"
cockpit_scheme           = "https"
cockpit_port_key         = "cockpit"

code_server_label        = "Code"
code_server_scheme       = "http"
code_server_port_key     = "code_server"

# hermes_workspace shortcut REMOVED -- use the dashboard
# shortcut (already in `publish` list above) at http://localhost:9119/.

searxng_label            = "Search"
searxng_scheme           = "http"
searxng_port_key         = "searxng"

hermes_dashboard_label   = "Dashboard"
hermes_dashboard_scheme  = "http"
hermes_dashboard_port_key = "hermes_dashboard"

guacamole_web_label      = "Guacamole"
guacamole_web_scheme     = "http"
guacamole_web_port_key   = "guacamole_web"

# ----------------------------------------------------------------------------
# [bootstrap.dev_vm.host_reserve] -- headroom kept for the Windows host
# when the values above are "max". The dev VM is the builder, so we err
# heavily toward feeding it; reserves are tuned to keep the Windows
# host responsive (Explorer, browser, IDE) during long builds, not to
# guarantee gaming-class throughput on Windows during a build.
# ----------------------------------------------------------------------------
[bootstrap.dev_vm.host_reserve]
cpu_pct             = 15      # reserve 15% of logical CPUs for Windows host
cpu_min             = 2       # always reserve at least 2 cores
memory_pct          = 15      # reserve 15% of host RAM for Windows host
memory_gb           = 4       # always reserve at least 4 GB
disk_gb             = 32      # always keep 32 GB free on M:\ for Windows-side
                              # artifacts (build outputs, podman cache, etc.)

# ----------------------------------------------------------------------------
# [bootstrap.prereqs] -- Phase 0 auto-install catalog. The irm|iex web
# entry now winget-installs each missing prerequisite instead of
# failing. Operators swap implementations (e.g. an alternative WSL
# package id, a different Podman distribution channel) via mios.html.
# ----------------------------------------------------------------------------
[bootstrap.prereqs]
# Every winget ID + Windows feature the irm|iex bootstrap installs on a
# truly-fresh Win 11 host. Operator-confirmed "MiOS should
# automatically install EVERYTHING needed to install MiOS via irm|iex".
# Scattered hardcoded IDs in Get-MiOS.ps1's Install-MiOS* functions
# should be lifted to these keys (one TOML-first refactor in flight).
#
# winget package IDs (each Install-MiOS* function reads its key here):
git_pkg             = "Git.Git"                         # Git for Windows (Install-* uses for clone)
wsl_pkg             = "Microsoft.WSL"                   # WSL2 substrate (kernel + wsl.exe)
podman_pkg          = "RedHat.Podman-Desktop"           # Podman Desktop GUI + machine
podman_cli_pkg      = "RedHat.Podman"                   # Podman CLI MSI (lays down podman.exe + PATH)
terminal_pkg        = "Microsoft.WindowsTerminal"       # Windows Terminal (Install-MiOSWindowsTerminal)
pwsh_pkg            = "Microsoft.PowerShell"            # pwsh 7+ (Install-MiOSPwsh7)
ohmyposh_pkg        = "JanDeDobbeleer.OhMyPosh"         # oh-my-posh prompt (Install-MiOSOhMyPoshTheme)
fastfetch_pkg       = "fastfetch-cli.fastfetch"         # fastfetch (Install-MiOSFastfetch)
appinstaller_pkg    = "Microsoft.AppInstaller"          # winget itself (bootstrap winget on truly bare Win 11 ≤ 21H2)
# Direct-download URL for the App Installer MSIXBUNDLE. Used by
# Ensure-MiOSWinget when winget is missing AND no source for it exists
# (truly fresh Win 10 21H2 / OOBE-fresh hosts). aka.ms/getwinget redirects
# to the latest stable .msixbundle from microsoft/winget-cli releases.
appinstaller_url    = "https://aka.ms/getwinget"

# Windows optional features (Enable-MiOSWindowsFeatures iterates these).
# label keys are operator-readable strings used in install banners.
[bootstrap.prereqs.features]
wsl                 = "Microsoft-Windows-Subsystem-Linux"   # WSL substrate
vmp                 = "VirtualMachinePlatform"              # WSL2 + Hyper-V hypervisor
hyperv              = "Microsoft-Hyper-V"                   # Hyper-V Manager + VMs (Pro/Ent only)
# reboot_required_features: the ordered list above; if any reports
# RestartNeeded after Enable-WindowsOptionalFeature, Pass-2 must reboot
# and re-enter (operator-flagged: NO mid-install reboots without a
# resume-on-next-boot mechanism). Until that resume mechanism is wired,
# Get-MiOS.ps1 surfaces a "reboot then re-run irm|iex" hint and exits
# Pass-2 cleanly so the operator doesn't watch downstream steps fail.
require_reboot_to_continue = true

# Repo URLs cloned to M:\MiOS\repo\{mios,mios-bootstrap} during Pass-2.
# Branch defaults to main; pin to a tag/SHA for reproducible installs.
[bootstrap.prereqs.repos]
mios_url            = "https://github.com/mios-dev/mios.git"
mios_branch         = "main"
bootstrap_url       = "https://github.com/mios-dev/mios-bootstrap.git"
bootstrap_branch    = "main"
clone_root          = "M:\\MiOS\\repo"

# ----------------------------------------------------------------------------
# [terminal] -- canonical MiOS terminal dimensions. EVERY spawned shell
# (wt.exe new-tab, conhost fallback, wsl.exe into MiOS-DEV, the
# auto-elevated bootstrap window, the native-app launcher, Linux tty0
# console via /etc/profile.d/mios-tty.sh) opens at exactly cols × rows.
#
# EMPIRICAL REALITY: WT chrome on the operator's hardware (Win11 26H1,
# WT Stable, GeistMono Nerd Font Mono 12pt, acrylic 50%, focus mode)
# eats 2-3 cells of buffer beyond what `[Console]::WindowWidth` reports.
# The chrome budget breaks down approximately as:
#   - 1 cell scrollbar gutter (reserved even with scrollbarState=hidden)
#   - 1 cell acrylic blur edge (visible bleed at the right border)
#   - 0-1 cell sub-pixel rounding (when DPI != 100% the cell grid
#     doesn't divide the window pixel width evenly, so the rightmost
#     cell renders as a partial column that WT clips)
#
# Both attempts at zero-slack edge-to-edge wrapped:
# commit 04c228c (margin=0, frame=80, final_space=false,
#     no trailing): doubled-`||` left-border ghost wrap on dashboard
#     rows + 4-cell time-segment wrap (operator screenshot at 18:38)
# commit 47383f0 (margin=1, frame=79, final_space=true,
#     trailing=""): same pattern, slightly less wrap (operator
#     screenshot at 18:39)
#
# Last-known-working config: commit 920af40
#   (margin=2, frame=78, final_space=true, trailing="  "). Operator's
#   17:19 screenshot showed time `17:19 ` ending cleanly with no wrap.
#   Reverting to that as the proven floor. Future operators can drop
#   margin to 0 ONCE WT exposes a knob to drop ALL chrome reservations
#   (no such knob exists in WT 1.x) -- not before.
#
# DEPLOYMENT NOTE: changing these values requires re-running
# `irm https://raw.githubusercontent.com/mios-dev/mios-bootstrap/main/Get-MiOS.ps1 | iex`
# to re-substitute Show-MiosDashboard (which bakes the values into
# `M:\MiOS\powershell\profile.ps1` at install time). Plain install.ps1
# in BootstrapOnly mode does NOT re-substitute -- the live dashboard
# function will keep rendering at whatever values the LAST full Get-
# MiOS.ps1 run baked in.
# ----------------------------------------------------------------------------
[terminal]
cols                = 80
rows                = 20      # 20 = MiOS portal-feel default; 30 for taller "console" feel
scrollback_rows     = 9000
# "ALL dashboards render to the edge of the
# MiOS app window size constraints!!" -- edge-to-edge framing.
# frame_width = cols - 1, right_margin = 1: the rightmost frame
# `│` lands at col 78, leaving exactly 1 cell of safety against
# WT's pseudo-console over-reporting WindowWidth by 1 cell during
# the first paint (before scrollbarState='hidden' applies).
# Tighter than the prior 5-cell margin -- WT 1.18+ with
# launchMode=focus + scrollbarState=hidden + padding=0 reports
# the visible-cell count correctly from FIRST paint, so the
# legacy 5-cell chrome reservation is overkill.  Bump back to 5
# only if powerline wrap returns.
frame_width         = 80      # = cols, edge-to-edge (unified)
frame_height        = 19      # = rows - 1, reserves 1 row for prompt
right_margin        = 0       # 0 = edge-to-edge. Was 1 (slack against WT first-paint
                              # over-report) but on settled WT renders that produced
                              # a visible 1-char gap on the right of the bash dashboard.
                              # Operator-flagged with screenshot. Setting
                              # to 0 matches mios-bootstrap/mios.toml (UNIFIED).

# ----------------------------------------------------------------------------
# [terminal.gui_min] -- minimum size for WSLg-hosted GUI app windows.
# Read by M:\MiOS\bin\mios-gui-watch.ps1 (Windows side). The daemon
# polls msrdc.exe processes and auto-resizes any newly-spawned RDP-RAIL
# window smaller than these dims to exactly these dims, centered on
# the cursor monitor.
#
# GUI apps on WSLg spawn at native X11/GTK
# default sizes (xeyes 129x113, nautilus 942x649, gnome-software
# 714x486) which look invisible on a 4K display against acrylic
# terminals. Vendor default 1600x1000 covers ~55% of a 2926x1646
# work area -- comfortable to read + manage without dominating
# the desktop.
#
# Once a window is auto-adopted (resized once) the operator can
# drag/resize freely; the daemon only touches each window's initial
# spawn frame.
# ----------------------------------------------------------------------------
[terminal.gui_min]
width               = 1600
height              = 1000

# ----------------------------------------------------------------------------
# [terminal.install] -- the BOOTSTRAP window dims (taller so the install
# output / readme / acknowledgements / Pass-1 + Pass-2 logs fit without
# scrolling). The post-install MiOS app uses [terminal] above (80x20
# portal feel). The install conhost uses these dims.
# ----------------------------------------------------------------------------
[terminal.install]
cols                = 80
rows                = 40      # taller for install output + readme

# ----------------------------------------------------------------------------
# [terminal.reading] -- larger centered window mode for outputs that
# don't fit the canonical 80x20 portal (btop, long log tails, code
# review, multi-pane fastfetch, etc). `mios reading` resizes + re-
# centers the CURRENT MiOS window to these dims; `mios portal` flips
# back to [terminal].cols/.rows. btop's launcher invokes
# `mios reading` automatically because btop's hardcoded minimum is
# 80x24 -- WSLg's effective viewport at portal-size 80x20 is 75x18,
# below the minimum, so btop refuses to render.
# ----------------------------------------------------------------------------
[terminal.reading]
cols                = 100
rows                = 50

# ----------------------------------------------------------------------------
# [theme] -- visual styling tokens. The [colors] table above defines
# the palette; this section names the typography, opacity, prompt,
# and per-host theme switches that consumers (WT settings.json patcher,
# oh-my-posh renderer, GTK/Adwaita, KDE Plasma) read.
# ----------------------------------------------------------------------------
[theme]
# GLOBAL MiOS terminal defaults -- per operator: "the MiOS app/terminal
# is acrylic set to on GLOBALLY AND SET TO 50 PERCENT TRANSPARENCY!!!!
# FRAME-LESS/BORDER-LESS/SCROLL-BAR-LESS, ETC--ETC!!! GLOBAL DEFAULTS".
# Every WT MiOS / MiOS-DEV profile + every mios-launch.ps1 invocation
# applies these. Get-MiOS.ps1's Install-MiOSTerminalProfile reads this
# section and stamps the values into settings.json.
mode                = "dark"             # "dark" | "light" (rare; vendor=dark)
acrylic             = true               # WT useAcrylic ON
opacity             = 50                 # WT opacity 0..100 (50 = 50% transparency)
system_backdrop     = "acrylic"          # WT 1.18+ per-profile backdrop
cursor_shape        = "vintage"    # steady half-block; thin "bar" was almost too thin to see on 4K -- "vintage" is the substantial half-block cursor (matches xterm's default visual weight without the full filledBox feel)
scrollbar_state     = "hidden"           # no scrollbar -- frame uses every col
padding             = "0"                # zero padding -- frame flush to edges
suppress_app_title  = true               # WT doesn't override our title
launch_mode         = "focus"            # frame-less / border-less / no-titlebar / no-tab-row -- forces WT to measure the viewport at the actual cell count cols × rows from FIRST PAINT (no titlebar to strip later, no off-by-1/2 cell-count window before scrollbarState='hidden' applies). Required for true edge-to-edge in mios-bootstrap's Install-MiOSTerminalProfile.
disable_animations  = false              # animations ON -- per operator "enable animations and all preview features in the MiOS Windows Terminal profile, full aesthetics! ALSO: can it quickly fade on open and close??". The WT window open/close fade is gated on disableAnimations=false + useAcrylic=true; both are on. If the powerline ever wraps with animations on, raise [terminal].right_margin to 1 as a targeted band-aid -- do NOT flip animations off (operator wants the aesthetics).
enable_preview_features = false          # WT experimental.* knobs bundle (useAtlasEngine GPU renderer, experimental.detectURLs, experimental.input.forceVT, experimental.rendering.forceFullRepaint). DISABLED operator screenshots showed CLI apps (Gemini CLI, Claude Code CLI) rendering TUI frames that extend past the visible cell boundary -- text wrapping that doesn't happen in conhost or non-MiOS WT at the same window size. Strongest hypothesis: experimental.input.forceVT changes how WT's pseudo-console reports buffer dimensions to apps querying [Console]::WindowWidth (which the diagnostic at M:\MiOS\diagnostics\window-width.txt shows reporting 80 even though actual visible cells is ~76). Re-enable once WT exposes a stable knob whose width-reporting is verified correct.

[theme.cursor_windows]
# Windows-side cursor SSOT. Bibata-Modern-Classic ships a Windows release
# whose smallest .cur image variant is 32x32; even that renders visibly
# bigger than typical Aero cursors because the bibata glyph fills more
# of the canvas. Lowering CursorBaseSize forces Windows to downscale.
# Get-MiOS.ps1's Install-MiOSBibataCursor reads this key and writes
# HKCU\Control Panel\Cursors\CursorBaseSize accordingly.
#
# Range: 16..256 (Windows clamps below 16 and above 256). 24 matches
# the operator's visual benchmark of "normal weight, not too large".
base_size           = 24

# ----------------------------------------------------------------------------
# [theme.cursor_linux] -- Linux-side (dev VM + bare-metal MiOS) cursor SSOT.
# Read by:
#   * gsettings org.gnome.desktop.interface.cursor-{theme,size} (mios-firstboot)
#   * /var/lib/flatpak/overrides/global -> XCURSOR_THEME / XCURSOR_SIZE
#     so flatpak sandboxes (Flatseal, Extension Manager, Nautilus,
#     Epiphany, Ptyxis, ChromeDev) inherit the same cursor
#   * /etc/profile.d/mios-cursor.sh -> XCURSOR_THEME / XCURSOR_SIZE
#     for raw X/Wayland clients launched outside flatpak
# Bibata-Modern-Classic ships at /usr/share/icons/Bibata-Modern-Classic
# (RPM: bibata-cursor-themes). Size is DIFFERENT from Windows's
# base_size (24) on purpose: WSLg's Wayland compositor renders Bibata
# SVGs at their literal pixel size, while Windows downscales Bibata's
# 32x32 .cur images via CursorBaseSize. At equal `size` values, the
# Linux cursor renders ~2x larger than the Windows cursor; 16 lines
# them up visually. Operator-flagged.
# ----------------------------------------------------------------------------
[theme.cursor_linux]
theme               = "Bibata-Modern-Classic"
size                = 24   # x11/Xwayland renders cursors at literal px; 16 read SMALLER than the Windows base (24) --. The pre-x11 "16 lines them up" note above is stale (it was a Wayland-era observation).
# Upstream source for the cursor theme. Read by automation/10-gnome.sh
# (build seeds /usr/share/icons) AND mios-cursor-ensure (runtime self-heal
# into ~/.local/share/icons when /usr lacks it -- /usr is RO on bootc).
# archive defaults to "<theme>.tar.xz" off the latest GitHub release tag.
source_repo         = "ful1e5/Bibata_Cursor"

[theme.font]
family              = "GeistMono Nerd Font Mono"
size                = 12
weight              = "normal"
# Source URLs for the three font families MiOS deploys system-wide. All
# three are read by build-mios.ps1's font installer; mios.html exposes
# them so operators can pin to a specific release tag instead of
# "latest". Linux side: automation/09-fonts.sh reads the same keys.
url                 = "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/GeistMono.zip"   # GeistMono Nerd Font (mono + glyphs)
vercel_repo         = "https://github.com/vercel/geist-font.git"                                         # Vercel Geist (sans + mono, no glyphs)
symbols_url         = "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/NerdFontsSymbolsOnly.zip"   # Nerd Symbols Only (icon glyphs the omp theme uses)
# install_scope: "system" forces HKLM + C:\Windows\Fonts (requires admin),
# "user" forces HKCU + %LOCALAPPDATA%\Microsoft\Windows\Fonts, "auto"
# (default) picks system when running elevated, user otherwise. Operator
# can pin via mios.html. Geist is the MiOS GLOBAL font per operator
# "Linux and Windows Font is Geist font (system-wide --
# terminals, apps, UI, etc-etc)" -- system scope is the canonical mode.
install_scope       = "auto"
# Cell metrics at 100% DPI (used to compute window pixel size for
# centering): cell_w * cols + chrome_w, cell_h * rows + chrome_h.
cell_w_px           = 10
cell_h_px           = 20
chrome_w_px         = 20
chrome_h_px         = 12

[theme.terminal]
# Windows Terminal "MiOS" scheme name -- the WT settings.json patcher
# stamps a scheme block whose colors come from the [colors] table above.
# (re-decision): "MiOS app opens direct to the
# local OCI image(s) or podman-MiOS-DEV!!!".  Consolidated: ONE
# user-facing app named "MiOS" that opens straight into MiOS-DEV
# (the canonical MiOS Linux experience).  The Windows-side pwsh
# WT profile keeps the "MiOS-WIN" name (for the post-install
# transition surface and operator-typed `mios <verb>` workflow)
# but it's NOT a Start Menu app -- only "MiOS.lnk" lives in the
# Start Menu, and it launches the MiOS-DEV WT profile directly.
scheme_name         = "MiOS"        # color scheme, project palette
profile_name        = "MiOS-WIN"    # WT pwsh dashboard profile (no .lnk)
dev_profile_name    = "MiOS-DEV"    # WT dev VM profile (the "MiOS.lnk" target)
hub_target_profile  = "MiOS-DEV"    # WT profile launched by the hub .lnk
# Global summon keybinding (toggle MiOS WT window open/close from
# anywhere on the desktop).  The summoned window is the dev VM
# (MiOS-DEV) per the consolidation -- one MiOS, one chord.
summon_keys         = "win+space"
summon_window_name  = "MiOS-DEV"

[theme.prompt]
# oh-my-posh renderer SSOT. mios.toml IS the canonical source for
# every powerline glyph + prompt symbol; mios.omp.json on disk uses
# placeholder strings that the bootstrap substitutes from this
# section at staging time. Operators edit these values via
# mios.html to change the prompt look without touching omp JSON.
#
# DEFAULTS = rounded powerline (`` U+E0B4 + `` U+E0B6). Sharp
# triangles (`` `` U+E0B0/B2) are an operator override; flat
# (` ` `) is another override. The configurator HTML exposes
# all three.
omp_path                = "/usr/share/mios/oh-my-posh/mios.omp.json"

# Powerline separators between segments. Rounded by default.
powerline_right         = ""   #  rounded right (segment ends on right side)
powerline_left          = ""   #  rounded left  (segment ends on left side)
# Soft separator -- light vertical bar between same-color segments.
powerline_right_soft    = ""   #
powerline_left_soft     = ""   #

# Diamond / leading caps (start of leftmost segment, end of rightmost).
leading_diamond         = ""   #  rounded leading diamond
trailing_diamond        = ""   #  rounded trailing diamond

# Prompt cursor symbol (rendered after the last segment).
prompt_symbol           = "❯"   # ❯ heavy right angle (default user)
prompt_symbol_root      = "⚠"   # ⚠  warning (default root)

# ----------------------------------------------------------------------------
# [branding] -- assets the dashboard / fastfetch / splash screens use.
# Paths resolve relative to /usr/share/mios on Linux and to the
# corresponding M:\MiOS\usr\share\mios on Windows.
# ----------------------------------------------------------------------------
[branding]
logo_ascii          = "fastfetch/mios.txt"
logo_image          = "branding/mios-logo.png"
icon_ico            = "branding/mios.ico"
fastfetch_config    = "fastfetch/config.jsonc"
# Distro tagline -- the one-line elevator pitch under the MiOS banner.
# Used by the agreement-gate banner subtitle, the installer banner
# taglines, the .lnk Description fields, the Add/Remove Programs
# DisplayName, and the dashboard footer. Operator rebrands via
# mios.html for a custom downstream (e.g. "MyCo Dev Workstation").
tagline             = "My Personal Operating System"
tagline_long        = "My Personal Operating System  --  Immutable Fedora AI Workstation"
# tagline_app is the one shown in Windows Application registrations
# (Add/Remove Programs DisplayName, .lnk Description tooltips,
# AppX manifest description, agreement gate banner). Operator
# 'the Applications tag/description when installed
# "MiOS - Immutable Fedora AI Workstation" should be defined as
# My Personal Operating System or similar' -- so OS-wide the app
# face says "MiOS - My Personal Operating System" while the
# technical descriptor "Immutable Fedora AI Workstation" lives
# in the dashboard subtitle for context.
tagline_app         = "My Personal Operating System"
living_wallpaper      = true
living_wallpaper_mode = "shader"

[branding.dashboard]
frame_width_cols    = 80
frame_chars         = "╭─╮│╰╯"           # WT-only Unicode box-drawing
frame_color         = "blue"             # ANSI name resolves through [colors]
show_fastfetch      = true
show_logo           = true

# ----------------------------------------------------------------------------
# [theme.fastfetch] -- ANSI-color tags applied to the four fastfetch
# surfaces (ASCII logo, key labels, title line, value output).  These
# resolve through the terminal palette which is sourced from
# mios.toml [colors] -- so the rendered hex always matches MiOS
# palette without per-config hardcoding.  Operators tune via
# mios.html [theme.fastfetch].  build-mios.ps1's Install-MiOSFastfetch
# substitutes these strings into M:\MiOS\fastfetch\config.jsonc at
# install time.
#
# ANSI vs MiOS palette mapping (default):
#   blue   = ansi_4_blue   = accent  (operator blue   #1A407F)
#   yellow = ansi_3_yellow = cursor  (sunset orange   #F35C15)
#   white  = ansi_7_white  = fg      (cream           #E7DFD3)
#   cyan   = ansi_6_cyan   = subtle  (pale blue-grey  #B7C9D7)
#   green  = ansi_2_green  = success (wave green      #3E7765)
#   red    = ansi_1_red    = error   (coral red       #DC271B)
# ----------------------------------------------------------------------------
[theme.fastfetch]
logo_color   = "blue"
keys_color   = "yellow"
title_color  = "white"
output_color = "cyan"

# ----------------------------------------------------------------------------
# [dashboard] -- the framed top-of-terminal banner shown by BOTH the
# Windows-side Show-MiosDashboard (M:\MiOS\powershell\profile.ps1)
# and the Linux-side mios-dashboard (/usr/libexec/mios/mios-dashboard.sh).
# Per "the dash is set GLOBALLY to Windows and
# Linux dashboards!! same settings!!! ... smaller metric can be
# side-by-side in the dash; freeing up more room for the prompt
# field." Both renderers read THIS section so a configurator edit
# re-skins both terminals on the next render.
#
# Default = compact 80x20-friendly: 1 title + 5 metric rows
# (side-by-side) + 1 verb hint + 4 frame rows = 11 rows total,
# leaves 9 rows for the prompt and command output.
# ----------------------------------------------------------------------------
[dashboard]
title           = "MiOS  --  My Personal Operating System"
show_title      = true
show_logo       = false           # 80x20 doesn't fit the 11-row ASCII logo. Set true once rows >= 30.
show_verb_hints = true
# Verb-hint refresh surface the current /usr/bin/mios
# KNOWN_VERBS surface (was stuck on the 7-verb subset from before
# mini / ai / code / summary / user were added). The hint line is
# the operator's quick reference at the bottom of `mios dash` --
# keep it accurate as new verbs ship.
verb_hint       = "build  config  dash  mini  ai  code  dev  summary  user  pull  update  help"

# show_services -- Linux-only.  When true (or MIOS_DASH_SERVICES=1),
# mios-dashboard.sh appends the icon-driven Services / Stack / Tree
# blocks below the metric rows. Default true now that the blocks
# fit in 80x20 (3 service rows + 1 stack-count + 1 tree row).
show_services   = true

# rows: each entry is a list of field-keys.  Multiple keys per row =
# side-by-side rendering with equal column widths within the framed
# inner area.  Available field-keys (built into both renderers; un-
# known keys are silently skipped):
#
#   host_os         "$user@$host -- $os $arch"
#   cpu             "CPU $name $clock GHz ($n c)"
#   gpu_discrete    "GPU $name $vram GiB"     (top discrete GPU only)
#   gpu_integrated  "GPU $name $vram GiB"     (top integrated GPU)
#   ram             "RAM $used / $total GiB ($pct %)"
#   swap            "Swap $used / $total GiB ($pct %)"
#   disk_c          "C: $used / $total GiB ($pct %)"           [Windows]
#   disk_m          "M: $used / $total GiB ($pct %)"
#   disk_root       "/ $used / $total GiB ($pct %)"            [Linux]
#   disk_home       "/home $used / $total GiB ($pct %)"        [Linux]
#   kernel          "Kernel $version"
#   shell           "Shell $name $version"
#   font            "Font $family $size pt"   (from [theme.font])
#   uptime          "Up $days d $hours h $min m"
rows = [
    ["version", "date"],
    ["user", "uptime"],
    ["cpu", "gpu_discrete"],
    ["disk_c", "disk_m"],
    ["ram", "swap"],
    ["kernel", "shell"],
    ["host", "font"],
]

# ----------------------------------------------------------------------------
# [apps] -- Windows native-app surface. Get-MiOS.ps1's
# Install-MiOSNativeApp creates Start Menu + Desktop shortcuts using
# these names + the AumID below.
# ----------------------------------------------------------------------------
[apps]
aumid               = "MiOS.Workstation"
start_menu_folder   = "MiOS"        # umbrella folder name (project)
hub_shortcut_name   = "MiOS"        # the ONE MiOS .lnk -- opens MiOS-DEV
                                    # WT profile directly (operator
                                    # "MiOS app opens direct
                                    # to ... podman-MiOS-DEV").  Per-verb
                                    # shortcuts (MiOS Help / MiOS Config /
                                    # MiOS-DEV / MiOS-WIN) are intentionally
                                    # NOT created -- those are typed verbs
                                    # in the terminal (`mios help`,
                                    # `mios config`, etc.), not separate
                                    # native apps.

[apps.shortcuts]
# Per-verb Start Menu + Desktop shortcuts. The hub "MiOS.lnk" + the
# "Uninstall MiOS.lnk" entry are NOT in this table (they're handled
# separately by Install-MiOSLauncher's hub block + the legacy
# uninstall block). The 3 per-verb apps below are the operator-
# customizable surface; mios.html exposes them as editable fields.
# Each entry: name=display-label, bin=script-in-MiosBinDir,
# icon=ico-name-in-MiosIconsDir, description=tooltip text.
mios_dev    = { name = "MiOS-DEV",    bin = "mios-dev.ps1",    icon = "mios-dev.ico",    description = "Open MiOS-DEV (podman machine) directly to its themed dashboard" }
mios_config = { name = "MiOS Config", bin = "mios-config.ps1", icon = "mios-config.ico", description = "Open mios.html (the HTML configurator) in your default browser to edit mios.toml" }
mios_help   = { name = "MiOS Help",   bin = "mios-help.ps1",   icon = "mios-help.ico",   description = "Full verb + functionality reference (every MiOS command and where things live)" }

# ----------------------------------------------------------------------------
# [preflight] -- minimum host requirements. Get-MiOS.ps1 checks these
# before starting the install; a violation aborts with a clear message
# pointing at which knob the operator can lower (e.g. via mios.html).
# ----------------------------------------------------------------------------
[preflight]
min_windows_build   = 22000      # Windows 11 21H2 minimum
min_disk_free_gb    = 280        # 256 GB partition + headroom
min_ram_gb          = 8
require_virt        = true       # Hyper-V + WSL2 require virtualization
require_admin       = true       # auto-elevation handles this; check is informational

# ----------------------------------------------------------------------------
# [network.retry] -- transient-error retry schedules (seconds). Used by
# anywhere we hit upstream services (quay.io image pulls, GitHub raw
# fetches, winget repository sync, dnf metadata refresh).
# ----------------------------------------------------------------------------
[network.retry]
delays_seconds      = [0, 5, 15, 30]   # 4 attempts: immediate, 5s, 15s, 30s
http_status_retry   = [502, 503, 504]  # only these status codes trigger retry
total_timeout_sec   = 120

# ----------------------------------------------------------------------------
# [profile] -- developer-vs-server-vs-kiosk flavor and feature toggles.
# Maps to MIOS_PROFILE_ROLE, MIOS_PROFILE_FEATURES (comma-joined).
# ----------------------------------------------------------------------------
[profile]
role     = "developer"
features = ["ai", "virtualization", "k3s"]

# ----------------------------------------------------------------------------
# [quadlets.enable] -- per-Quadlet first-boot enablement flags.
# Defaults are all true; the system never disables a service via static
# config. Incompatible deployments are gated via systemd Condition*
# directives in the Quadlet itself. Set a flag to false here only to
# force-disable a service even when it would otherwise run.
# ----------------------------------------------------------------------------
[quadlets.enable]
# AI chain (architecture, operator-directed):
#   ollama (container)         -- LLM + embeddings inference backend.
#                                 OpenAI-compatible /v1 surface on :11434.
#   hermes-agent (DIRECT)      -- installed natively on the root
#                                 filesystem (NOT containerized), runs as
#                                 a host systemd service, uses the ollama
#                                 container (and vllm/llama.cpp when
#                                 present) as its inference backend.
#                                 See automation/38-hermes-agent.sh +
#                                 usr/lib/systemd/system/hermes-agent.service.
#   open-webui (container)     -- rich browser LLM UI on :3033, talks to
#                                 the OpenAI /v1 surface.
#
# mios-hermes + mios-hermes-dashboard CONTAINER Quadlets were REMOVED
# (operator directive). Hermes-Agent is a DIRECT host install
# (automation/38-hermes-agent.sh + hermes-agent.service) -- there is no
# containerized agent path anymore. The agent's dashboard ships inside
# that same install; Open WebUI is the browser LLM UI.
mios-ceph             = true
mios-k3s              = true
mios-forge            = true
mios-cockpit-link     = true
mios-open-webui       = true
mios-code-server      = false
# crowdsec-dashboard: FORCE-DISABLED. This sidecar runs the FULL
# crowdsecurity/crowdsec image against the SHARED host /var/lib/crowdsec volume.
# Its docker_start.sh, on EVERY start, (a) unconditionally plants dangling
# /staging/var/lib/crowdsec/data/* symlinks into that shared volume (the
# `data/trace -> /staging/...` dangling link that fatally broke the host agent's
# trace setup) and (b) re-registers the `localhost` machine, clobbering the host
# agent's LAPI credentials. Result: the host crowdsec agent + firewall-bouncer
# crash-looped for ~6 days (2805 restarts) -> total CrowdSec outage, fixed
#. The container ALSO needs the online hub (version.crowdsec.net) at
# boot, which can't work on offline-by-design MiOS, so it never reaches a
# healthy state anyway. No env-only tune is safe: the corrupting symlink loop
# runs before any DISABLE_* guard. The host crowdsec agent already provides the
# IPS function; this redundant sidecar is retired. See mios_crowdsec_recovery.
mios-crowdsec-dashboard    = false
mios-guacamole        = true
mios-pxe-hub          = true
mios-guacamole-postgres    = true
mios-guacd                 = true
mios-adguard          = true

# ----------------------------------------------------------------------------
# [env] -- free-form environment-variable additions. Keys must match POSIX
# env-var rules ([A-Za-z_][A-Za-z0-9_]*). Anything you put here is exported
# verbatim to every script that sources tools/lib/userenv.sh, so it
# propagates throughout the build / install / runtime chain.
# Examples:
#   MIOS_BUILDER_DISTRO = "MiOS-DEV"
#   MIOS_RECHUNK_MAX_LAYERS = "67"
#   MIOS_AI_GRADER = "qwen2.5-coder:7b"
# ----------------------------------------------------------------------------
[env]
MIOS_URL_TERRA_REPO = "https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo"
MIOS_URL_UBLUE_REPO = "https://copr.fedorainfracloud.org/coprs/ublue-os/packages/repo/fedora-44/ublue-os-packages-fedora-44.repo"
MIOS_URL_TAILSCALE_REPO = "https://pkgs.tailscale.com/stable/fedora/tailscale.repo"
MIOS_URL_CROWDSEC_REPO = "https://packagecloud.io/crowdsec/crowdsec/config_file.repo?os=fedora&dist=44&source=script"
MIOS_URL_BIBATA_API = "https://api.github.com/repos/ful1e5/Bibata_Cursor/releases/latest"
MIOS_URL_BIBATA_DL = "https://github.com/ful1e5/Bibata_Cursor/releases/download/v{}/Bibata-Modern-Classic.tar.xz"
MIOS_URL_BIBATA_SUM = "https://github.com/ful1e5/Bibata_Cursor/releases/download/v{}/sha256-{}.txt"
[finetune]
# Fine-tune subsystem -- distil a strong LOCAL teacher model into a small, fast
# MiOS role model via LoRA/SFT, then ship the adapter as an ollama model. FOSS +
# fully OFFLINE + HARDWARE-AGNOSTIC: the trainer auto-detects the device (NVIDIA
# CUDA / AMD ROCm / Apple MPS / CPU) and only 4-bit-quantises where the hardware
# supports it -- MiOS has the components to train on ANY hardware combination, same
# as it runs inference on any lane. This is an OPERATOR-GATED heavy build (it
# saturates a GPU for a while + the framework install needs a one-time network
# fetch); it is deliberately NOT exposed as an agent verb so no chat turn can kick
# off a multi-hour training run. Everything here is overridable via /etc/mios/ +
# ~/.config/mios/ overlays and the MIOS_FINETUNE_* env (userenv.sh).
enable          = true
target_role     = "refiner"            # MiOS role to fine-tune (refiner = mios-sys-agent)
base_model      = "granite4.1:8b"      # the role's base -- MUST match the Modelfile FROM. Repointed to Granite 4.1 8B (the new light_brain) from qwen3.5:4b (Qwen + qwen35 arch blocked on mainline llama.cpp).
hf_base         = "ibm-granite/granite-4.1-8b"   # HF repo id OR local safetensors dir for the SAME base (Granite 4.1 8B, Apache-2.0, public; matches base_model granite4.1:8b)
                                       # (PEFT/TRL train on HF weights; ollama stores GGUF). One-time
                                       # offline fetch, like the framework install. This is the actual
                                       # production refiner base (qwen3.5:4b == Qwen/Qwen3.5-4B, Apache-2.0,
                                       # public). Override per-install if base_model differs.
output_tag      = "mios-sys-agent-ft"  # ollama tag the adapter is shipped as
device          = "auto"               # auto | cuda | rocm | mps | cpu
load_in_4bit    = "auto"               # auto = 4bit ONLY on CUDA+bitsandbytes; else full/bf16
prefer_unsloth  = true                 # use the Unsloth fast-path when CUDA + unsloth present

# --- LoRA adapter ---
lora_r          = 16
lora_alpha      = 32
lora_dropout    = 0.05
target_modules  = "auto"               # auto = attn+mlp projections for the detected arch

# --- SFT hyperparameters ---
epochs          = 2
learning_rate   = 2.0e-4
batch_size      = 2
grad_accum      = 8
max_seq_len     = 2048
warmup_ratio    = 0.03
grad_checkpointing = true              # saves memory; set false if a custom-op base breaks in backward

# --- Dataset (self-distillation; NO hardcoded English) ---
# Queries are GENERATED by the teacher, seeded by the LIVE capability surface
# (verb catalog from the running pipe + real operator Q+A from the knowledge DB);
# labels are produced by the teacher against the live refine schema + catalog. So
# the corpus tracks the real system, never a hand-written topic list.
teacher_model        = "granite4.1:8b"   # the strongest LOCALLY-SERVED model (mios-llm-light) is now Granite 4.1 8B (the new brain); gemma4:12b is no longer the served reasoning GGUF after the fleet swap. Teacher MUST be a served model. For a STRONGER teacher than the refiner, enable the heavy lane and point this at the served-name mios-heavy (Magistral Small 2509).
teacher_endpoint     = "http://localhost:${MIOS_PORT_LLM_LIGHT}"   # mios-llm-light (ALL llama.cpp)
pipe_url             = "http://127.0.0.1:${MIOS_PORT_AGENT_PIPE}"
seeds_per_capability = 4               # teacher-generated phrasings per catalog verb
include_knowledge    = true            # also mine REAL operator queries from the knowledge table
dataset_path         = "/var/lib/mios/finetune/refiner-sft.jsonl"
min_examples         = 24              # refuse to train on a corpus smaller than this

# --- GGUF export + ollama wiring ---
gguf_convert    = true
gguf_quant      = "q8_0"               # adapter export precision
work_dir        = "/var/lib/mios/finetune"
serve_port      = 11438                # mios-finetune-serve OpenAI+ollama endpoint (opt-in)

# ─── WS-F Tool Consolidation (Phase 1) Merged Verbs ─────────────────────

[verbs.find_file]
section = "Discovery / resolution"
sig = "query, scope"
desc = "Search for files on disk. scope='fast' (cached DB, sub-100ms, use FIRST), 'windows' (NTFS exhaustive search), or 'linux' (exhaustive Linux search). Use 'fast' unless a recent file is missing."
model_name = "find_local_file"
tier = "core"
cmd = "if [ '{scope}' = 'fast' ]; then mios-directory-lookup --json --limit 20 {query}; elif [ '{scope}' = 'windows' ]; then mios-everything --json -n 10 {query}; else mios-locate --json -n 20 {query}; fi"
  [verbs.find_file.params.query]
  type = "string"
  aliases = ["name", "filename", "term"]
  [verbs.find_file.params.scope]
  type = "string"
  enum = ["fast", "windows", "linux"]

[verbs.apps]
section = "Discovery / resolution"
sig = "mode, query?"
desc = "Query applications. mode='list' (inventory of all installed apps), 'semantic' (fuzzy app capability search), or 'resolve' (get exact CLI launch command for an app without launching it)."
tier = "core"
# mios-apps exits non-zero when a sub-scanner is degraded (e.g. the Windows
# es.exe side on WSL) yet still emits a valid inventory on stdout -- tolerate
# that exit (|| true) so a degraded scanner does not fail the whole verb.
cmd = "if [ {mode} = list ]; then mios-apps --json || true; elif [ {mode} = semantic ]; then mios-app-search {query}; else mios-find --json {query}; fi"
  [verbs.apps.params.mode]
  type = "string"
  enum = ["list", "semantic", "resolve"]
  [verbs.apps.params.query]
  type = "string"

[verbs.fetch_page]
section = "Discovery / resolution"
sig = "url, format"
desc = "Fetch ONE web page content. format='text' (lightweight ~4000 char plain text), 'article-md' (clean markdown of a long article via crawl4ai), or 'index-md' (markdown of a news/listing/index page via firecrawl)."
tier = "core"
cmd = "if [ '{format}' = 'text' ]; then mios-web-extract -n 4000 {url}; elif [ '{format}' = 'article-md' ]; then mios-crawl --json --max-chars 20000 {url}; else mios-firecrawl --max-chars 20000 {url}; fi"
  [verbs.fetch_page.params.url]
  type = "string"
  [verbs.fetch_page.params.format]
  type = "string"
  enum = ["text", "article-md", "index-md"]

[verbs.search_store]
section = "Discovery / resolution"
sig = "query, store"
desc = "Search stored information. store='knowledge' (curated OWUI RAG document collections) or 'vault' (the local notes/skills vault)."
sensitive = true   # Rule-of-Two property B: reads private knowledge collections / notes vault
cmd = "if [ '{store}' = 'knowledge' ]; then mios-knowledge-search --json --top-k 5 {query}; else mios-viking find {query}; fi"
  [verbs.search_store.params.query]
  type = "string"
  [verbs.search_store.params.store]
  type = "string"
  enum = ["knowledge", "vault"]

[verbs.vault]
section = "Discovery / resolution"
sig = "op, target?, content?"
desc = "Manage the local second-brain vault. op='list' (ls), 'read' (cat), 'search' (find), or 'ingest' (add local file to vault)."
sensitive = true   # Rule-of-Two property B: reads the private second-brain vault
cmd = "if [ '{op}' = 'list' ]; then mios-viking ls {target=knowledge}; elif [ '{op}' = 'read' ]; then mios-viking cat {target}; elif [ '{op}' = 'search' ]; then mios-viking find {target}; else mios-ingest --file {target}; fi"
  [verbs.vault.params.op]
  type = "string"
  enum = ["list", "read", "search", "ingest"]
  [verbs.vault.params.target]
  type = "string"
  [verbs.vault.params.content]
  type = "string"

[verbs.memory]
section = "Discovery / resolution"
sig = "op, fact?, query?, id?"
desc = "Manage agent's self-directed memories/facts. op='add' (remember a new fact), 'list' (recall matching memories), 'update', or 'forget'."
tier = "core"
permission = "write"
sensitive = true   # Rule-of-Two property B: op=list reads private agent memory (write-tier -> also property C)
cmd = "if [ '{op}' = 'add' ]; then mios-remember add '{fact}'; elif [ '{op}' = 'list' ]; then mios-remember list; elif [ '{op}' = 'update' ]; then mios-remember update --key {id} '{fact}'; else mios-remember forget --key {id}; fi"
  [verbs.memory.params.op]
  type = "string"
  enum = ["add", "list", "update", "forget"]
  [verbs.memory.params.fact]
  type = "string"
  [verbs.memory.params.query]
  type = "string"
  [verbs.memory.params.id]
  type = "string"

[verbs.document]
section = "Messaging"
sig = "op, input, output?"
desc = "Generate or convert documents. op='build' (compile markdown to pdf/docx/etc.) or 'convert' (convert office docs/csv to markdown)."
permission = "write"
cmd = "if [ '{op}' = 'build' ]; then mios-docgen build {input} {output}; else mios-docgen convert {input} {output}; fi"
  [verbs.document.params.op]
  type = "string"
  enum = ["build", "convert"]
  [verbs.document.params.input]
  type = "string"
  [verbs.document.params.output]
  type = "string"

[verbs.agent_route]
section = "Messaging"
sig = "mode, agent, task"
desc = "Cross-agent routing. mode='handoff' (transfer control entirely, ending your turn) or 'delegate' (sub-task an agent and get the result back)."
permission = "write"
cmd = "if [ '{mode}' = 'handoff' ]; then mios-handoff --to {agent} --goal '{task}'; else mios-a2a-delegate --peer {agent} --text '{task}'; fi"
  [verbs.agent_route.params.mode]
  type = "string"
  enum = ["handoff", "delegate"]
  [verbs.agent_route.params.agent]
  type = "string"
  [verbs.agent_route.params.task]
  type = "string"

[verbs.run_code]
section = "Code / shell"
sig = "mode, code, language?"
desc = "Execute code. mode='sandbox' (safe isolated run) or 'orchestrate' (run a script that imports mios_tools to coordinate agentic sub-actions). language defaults to python; set 'bash' for shell."
tier = "core"
permission = "write"
sandbox_profile = "workspace"   # opt-in sandbox confinement (see [dispatch].sandbox_enforce)
# Placeholders are shlex-quoted by the renderer -- do NOT wrap them in literal
# quotes (that double-quotes the value and breaks any code with parens/quotes/
# newlines). Pass code via --code and select the interpreter (default python).
cmd = "if [ {mode} = sandbox ]; then mios-coderun --code {code} --lang {language=python}; else mios-coderun-codemode --code {code}; fi"
  [verbs.run_code.params.mode]
  type = "string"
  enum = ["sandbox", "orchestrate"]
  [verbs.run_code.params.code]
  type = "string"
  [verbs.run_code.params.language]
  type = "string"
  enum = ["python", "bash"]

# ─── WS-F Tool Consolidation (Phase 2) Merged Verbs ─────────────────────

[verbs.window_op]
section = "Window / app launch"
sig = "op, title, width?, height?, x?, y?, position?"
desc = "Perform window operations: op='focus' (bring to front), 'move-region' (snap to left/right/etc via position), 'move-pixel' (set x/y), 'resize' (set width/height), 'min', 'max', 'restore', 'close'."
tier = "core"
permission = "write"
cmd = "mios-window {op} '{title}'"
cmd_positioned = "mios-window {op} '{title}' {position}"
cmd_pixel = "mios-window {op} '{title}' {x} {y}"
cmd_resize = "mios-window {op} '{title}' {width} {height}"
  [verbs.window_op.params.op]
  type = "string"
