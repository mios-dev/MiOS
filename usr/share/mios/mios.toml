  type = "integer"
  [verbs.text_insert.params.content]
  type = "string"
  aliases = ["text", "body"]

# ─── Section: Package management ──────────────────────────────────────
# Unified verb: dispatcher routes by (action, backend) to the underlying
# winget / flatpak shim. Backend "auto" picks winget for Windows-installed
# targets, flatpak for Linux GUI apps. Operator binding 2026-05-19:
# "compact, minimal, efficient -- consolidate redundant".
[verbs.pkg]
section    = "Package management"
sig        = "action, id?, query?, backend=\"auto\"?, limit=10?, scope?"
desc       = "INSTALL / SEARCH / SHOW / UPGRADE / UNINSTALL / LIST software packages BY ID across winget (Windows), flatpak (Linux), or dnf. action=search|show|install|upgrade|uninstall|list|preflight; backend=auto picks the OS. This MANAGES packages; for the question 'what apps/games are installed' use list_installed_apps (the inventory). 'list' here = installed PACKAGES, not the app catalog."
model_name = "manage_packages"
examples   = ["install firefox with winget", "search flatpak for a video editor", "update all my packages", "uninstall the discord package", "is the chrome package available to install"]
# tier=common (operator 2026-06-11, P0): a write/install op, less frequent than the
# mios_apps read inventory. Kept OUT of the always-visible stable core so it no longer
# sits beside mios_apps and makes the 8B flip-flop on "what apps do I have"; it surfaces
# via the per-turn cosine TAIL when a query is actually package-y (install/search pkg).
tier       = "common"
permission = "write"
  [verbs.pkg.params.action]
  type = "string"
  enum = ["search", "list", "show", "install", "upgrade", "uninstall", "preflight"]
  [verbs.pkg.params.id]
  type = "string"
  desc = "Package id (Publisher.AppId for winget, org.app.Foo for flatpak). Required for show/install/upgrade-one/uninstall/preflight."
  aliases = ["package", "name", "ref"]
  [verbs.pkg.params.query]
  type = "string"
  desc = "Search term (action=search only)."
  aliases = ["term", "search"]
  [verbs.pkg.params.backend]
  type = "string"
  enum = ["winget", "flatpak", "auto"]
  default = "auto"
  aliases = ["manager", "source"]
  [verbs.pkg.params.limit]
  type = "integer"
  default = 10
  [verbs.pkg.params.scope]
  type = "string"
  enum = ["system", "user"]
  default = "system"
  desc = "flatpak install scope; ignored for winget."

