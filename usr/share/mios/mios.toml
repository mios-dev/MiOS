desc       = "SEMANTIC search over the installed-app inventory: given a fuzzy natural-language description ('my note-taking app', 'phone settings'), return the top matching installed apps {name, category, launch, score}. Use when you need to FIND which app matches a vague description. For the FULL installed-app+game list use list_installed_apps; to actually launch use launch_app."
