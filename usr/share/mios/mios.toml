  [verbs.app_search.params.limit]
  type = "integer"
  default = 5
  aliases = ["top_k", "k", "n"]

# ─── Section: Verb discovery (progressive disclosure) ────────────────
[verbs.tool_search]
section    = "Verb discovery"
sig        = "query, limit=5?"
