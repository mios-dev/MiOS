# ----------------------------------------------------------------------------
# [packages.glibc-hwcaps-v3] / [packages.glibc-hwcaps-v4]
#
# Optional sections gated by [hwcaps].level. Pulled into the install set by
# automation/lib/packages.sh when [hwcaps].level == "v3" or "v4". Skipped
# (or installed best-effort if --skip-unavailable in dnf) for hosts where
# the matching glibc-hwcaps subpackage isn't shipped in the active Fedora
# release -- Fedora's hwcaps packaging cadence has been uneven, and
# secureblue / x86-64-v3 derivative projects sometimes carry COPR rebuilds
# instead. dnf's --skip-unavailable + --skip-broken handle the gap.
#
# Hardware floor:
#   v3:  Intel Haswell 2013+ / AMD Zen 1+ (most consumer CPUs from the
#        last decade). Recommended for the canonical MiOS image.
#   v4:  Intel Skylake-X / Ice Lake / AMD Zen 4+. Required: AVX-512.
#        Recommended for HCI / compute / inference workloads on Zen 4-5.
#
# Operators enable by editing /etc/mios/mios.toml:
#     [hwcaps]
#     level = "v3"   # or "v4"
#     [packages]
#     sections = [..., "glibc-hwcaps-v3"]   # or "glibc-hwcaps-v4"
# and re-running `just build`.
# ----------------------------------------------------------------------------
[packages.glibc-hwcaps-v3]
enable = true   # default ON; toggle via /configurator.html (configurator.packages.<section>.enable)
pkgs = [
    "glibc-hwcaps-x86-64-v3",
]

[packages.glibc-hwcaps-v4]
enable = true   # default ON; toggle via /configurator.html (configurator.packages.<section>.enable)
pkgs = [
    "glibc-hwcaps-x86-64-v4",
]


# ----------------------------------------------------------------------------
# [colors] -- MiOS unified palette applied to every console / terminal /
# tty surface (bash, zsh, PowerShell, Windows Terminal, Ptyxis, Cockpit,
# the configurator HTML, the oh-my-posh prompt, fastfetch logo color).
# Sourced from:
#   - Operator neutrals: #1A407F deep-blue, #E0E0E0 silver,
#     #B7C9D7 pale blue-grey, #948E8E warm grey, #734F39 brown
#   - Hokusai "The Great Wave off Kanagawa": #3E7765 wave-green,
#     #E7DFD3 foam-cream, #F35C15 sunset-orange, #DC271B coral-red,
#     #282262 deep-indigo
# Combined into one coherent palette where every tone has a role.
# /etc/profile.d/mios-colors.sh emits OSC-4 / OSC-10 / OSC-11 / OSC-12
# escape sequences at every interactive shell start so the operator's
# terminal repaints to MiOS palette regardless of which emulator
# launched it. Ptyxis / GNOME Terminal also read this same TOML via
# the configurator HTML when the operator picks a custom override.
# ----------------------------------------------------------------------------

# ============================================================================
# INFRASTRUCTURE CONSTANTS — migrated from /usr/share/mios/env.defaults
# ============================================================================
# These sections capture every operator-tunable infrastructure constant
# that previously lived in env.defaults. Per the project's TOML-as-
# singular-SSOT directive, mios.toml is now the canonical source for
# ports / sidecar pins / service identities / runtime paths / build
# tunables. tools/lib/userenv.sh emits MIOS_* env vars from these
# sections; consumer scripts source userenv.sh and read the env vars.
#
# Hardcoded values that could live in mios.toml are bugs.
# ============================================================================

# ----------------------------------------------------------------------------
# [ports] -- canonical port allocations. MUST stay in sync with
# automation/25-firewall-ports.sh (firewall-offline-cmd at build time)
# and automation/33-firewall.sh (runtime mios-firewall-init). Both
# consume MIOS_PORT_* env vars synthesized from these slots by
# tools/lib/userenv.sh, so editing here flows through end-to-end.
#
# Service access surface contract: every service binds 0.0.0.0 inside
# its Quadlet and the firewall is what gates LAN reachability. See
# usr/share/mios/ai/INDEX.md §5b.
# ----------------------------------------------------------------------------
[ports]
ssh                = 2222     # host admin sshd. Operator 2026-05-28: "mios-dev ssh should be port 2222" -- hardened off :22, off the prior :49955. firewall opens this; sshd_config Port drop-in lives at /etc/ssh/sshd_config.d/09-mios-ssh-port.conf and must match. Forgejo git-ssh moved to forge_ssh=49922 to vacate 2222.
forge_http         = 3000     # Forgejo HTTP web UI
forge_ssh          = 49922    # Forgejo git+ssh (vacated 2222 for host admin sshd 2026-05-28). Non-22 to coexist with sshd; non-2222 to leave that as the canonical operator-SSH port.
cockpit            = 9090     # host Cockpit web console
cockpit_link       = 19090    # mios-cockpit-link Podman Desktop discovery shim
searxng            = 8888     # local privacy-respecting metasearch
crawl4ai           = 11235    # local crawl engine -- the crawl4ai FastAPI (crawl4ai over Chrome CDP + Camoufox fallback), the crawl4ai member of the mios-webtools pod. LOOPBACK only (127.0.0.1), NOT a published/LAN port.
firecrawl          = 3002     # self-hosted firecrawl api -- the firecrawl-api member of the mios-webtools pod (Hermes's native web backend; FIRECRAWL_API_URL). LOOPBACK only (127.0.0.1), NOT a published/LAN port. (3002 is firecrawl's own default; free on MiOS -- 3000=forge_http, 3030=open_webui.)
hermes             = 8642     # Hermes-Agent (canonical /v1; live MiOS agent at /)
hermes_dashboard   = 9119     # Hermes Dashboard web UI (sessions, skills, stats)
open_webui         = 3030     # Open WebUI (rich LLM interface at http://localhost:3030)
# hermes_workspace REMOVED 2026-05-13 (port 3030 freed) -- use the
# hermes-agent dashboard at port 9119 instead.
code_server        = 8800     # code-server (VS Code in a browser; matches image default)
k3s_api            = 6443     # K3s Kubernetes API
guacamole_web      = 8080     # mios-guacamole browser desktop
ceph_dashboard     = 8443     # Ceph dashboard
rdp                = 3389     # GNOME Remote Desktop / xRDP
pgvector           = 5432     # PostgreSQL + pgvector unified agent DB (WS-9, FOSS; additive alongside surrealdb until cutover)
llm_light          = 11450    # mios-llm-light: the primary llama.cpp multi-model + KV-paging lane (WS-10, FOSS; served via the upstream llama-swap proxy image)
cpu_node           = 11451    # mios-cpu-node: the always-on / gaming-immune CPU llama-server lane (granite brain on -ngl 0). Rendered into mios-cpu-node.container's --port (was a DEAD key -> empty --port -> llama.cpp stoi crash-loop; SSOT-wired 2026-06-18).
agent_pipe         = 8640     # 'MiOS' standalone Agent Pipe (router + refine + critic; fronts hermes for every gateway)
ttyd_bash          = 7681     # ttyd browser pty -- Linux bash session
ttyd_powershell    = 7682     # ttyd browser pty -- Windows-side PowerShell session
adguard_dns        = 53       # AdGuard Home DNS resolver (ad/tracker/malware sinkhole; tailnet-wide global nameserver)
adguard_ui         = 3053     # AdGuard Home web UI + REST API (3000 is forge_http; 3053 is mnemonic for :53)
opencode_gateway   = 8633     # opencode -> OpenAI /v1 gateway shim (mios-opencode-gateway.service); makes [agents.opencode] a REAL /v1 council peer. LOOPBACK only (127.0.0.1).
vllm               = 11440    # vLLM heavy dGPU lane (re-scoped mios-llm-heavy-alt Quadlet; OpenAI /v1, PagedAttention+APC). Off the iGPU's :11436 + finetune-serve :11438. GATED/disabled by default (VRAM). [ai.vllm] + [nodes.local-vllm].
sglang             = 11441    # SGLang heavy dGPU lane (mios-llm-heavy Quadlet; OpenAI /v1, HiCache CPU KV-offload). GATED/disabled by default (VRAM). [ai.sglang] + [nodes.local-sglang]. (operator 2026-06-07)

# ----------------------------------------------------------------------------
# [image.sidecars] -- pinned upstream container references for every
# Quadlet sidecar. version + image (where present) are paired; consumers
# read either via MIOS_<svc>_VERSION / MIOS_<svc>_IMAGE.
# ----------------------------------------------------------------------------
[image.sidecars]
k3s_version        = "v1.32.1-k3s1"
# rancher/k3s lives ONLY on docker.io (no quay.io/ghcr.io mirror). The
# `docker.io/` prefix is mandatory: without it, podman treats the value
# as a short name and refuses to silently resolve to docker.io inside
# the OCI bake step (no TTY -> "short-name resolution enforced but cannot
# prompt without a TTY"), failing the entire `bootc install-to-filesystem`
# stage downstream (operator-confirmed 2026-05-15: every other sidecar
# entry in this section was already fully qualified; k3s was the only
# regression and broke ALL deployment artifacts). Keep the registry prefix.
k3s                = "docker.io/rancher/k3s:v1.32.1-k3s1"
ceph_version       = "v19"
ceph               = "quay.io/ceph/ceph:v19"
forge_version      = "12"
forge              = "codeberg.org/forgejo/forgejo:12"
searxng_version    = "latest"
searxng            = "docker.io/searxng/searxng:latest"
# web-tools POD (operator 2026-05-24: "consolidate containers to share similar
# services together" + "co-locate the real firecrawl stack" + "make it a pod").
# mios-webtools is now a podman POD (usr/share/containers/systemd/
# mios-webtools.pod, Network=host) with FOUR member containers instead of one
# fat supervisord image:
#   * redis            docker.io/redis:7-alpine            (loopback :6379)
#   * firecrawl-api    localhost/mios-firecrawl:v1.0.0     (:3002, Hermes's
#                      native FIRECRAWL_API_URL backend; cmd start:production)
#   * firecrawl-worker SAME firecrawl image                (cmd: pnpm run workers)
#   * crawl4ai         localhost/mios-crawl4ai-slim:latest (:11235, the `crawl`
#                      verb backend, Chrome-CDP primary + camoufox fail-retry)
# It REPLACES the prior single-purpose mios-crawl4ai image AND the abandoned
# fat mios-webtools monolith (the supervisord Containerfile + its quadlet were
# git-rm'd on the pod cutover). Two LOCALLY-BUILT images, no upstream registry
# pin to render here:
#   * firecrawl   built from usr/share/mios/webtools/firecrawl.Containerfile,
#                 which clones + builds firecrawl's OWN apps/api at the PINNED
#                 tag (ARG FIRECRAWL_REF=v1.0.0); quadlets default to
#                 localhost/mios-firecrawl:v1.0.0 via ${MIOS_FIRECRAWL_IMAGE}.
#   * crawl4ai    built from usr/share/mios/crawl4ai/Containerfile; quadlet
#                 defaults to localhost/mios-crawl4ai-slim:latest via
#                 ${MIOS_CRAWL4AI_IMAGE}.
# See [verbs.crawl], [ports].crawl4ai + [ports].firecrawl, and
# [services.webtools] (uid 824) below.
hermes_version     = "latest"
hermes             = "docker.io/nousresearch/hermes-agent:latest"
open_webui_version = "latest"
open_webui         = "ghcr.io/open-webui/open-webui:main"
# hermes_workspace sidecar REMOVED 2026-05-13 -- replaced by the
# hermes-agent's built-in dashboard at port 9119.
code_server_version = "latest"
code_server        = "ghcr.io/coder/code-server:latest"
ollama_version     = "latest"
ollama_cpu_version = "latest"
guacamole_version  = "latest"
guacamole          = "docker.io/guacamole/guacamole:latest"
forge_runner_version = "7"
forge_runner      = "code.forgejo.org/forgejo/runner:7"
crowdsec_version   = "latest"
crowdsec           = "docker.io/crowdsecurity/crowdsec:latest"
postgres_version   = "latest"
postgres           = "docker.io/library/postgres:latest"
guacd_version      = "latest"
guacd              = "docker.io/guacamole/guacd:latest"
pxe_hub_version    = "latest"
pxe_hub            = "quay.io/poseidon/matchbox:latest"
bib_alpine         = "docker.io/library/alpine:latest"
# WS-9 unified agent-plane DB. pgvector/pgvector bundles the `vector` extension
# on upstream postgres (FOSS: PostgreSQL License). pg17 = current stable.
pgvector_version   = "pg17"
pgvector           = "docker.io/pgvector/pgvector:pg17"
# mios-llm-light lane image. The upstream llama-swap proxy (FOSS, MIT) bundles
# llama-server + on-demand model swap. Tag carries the CUDA build; verify version.
llm_light_version  = "cuda"
llm_light          = "ghcr.io/mostlygeek/llama-swap:cuda"
adguard_version    = "latest"
# AdGuard Home -- open-source (GPLv3) DNS sinkhole + recursive resolver. Single
# Go binary container; serves DNS on :53 and the web UI/API on :3053.
adguard            = "docker.io/adguard/adguardhome:latest"

# ----------------------------------------------------------------------------
# [services.<svc>] -- per-service identity (UID / GID / username) baked
# at OVERLAY TIME via /usr/lib/sysusers.d/*.conf + automation/31-user.sh
# + /usr/lib/tmpfiles.d/mios-user.conf. Never propose runtime patches
# to /etc/passwd / /etc/subuid / /etc/subgid in firstboot scripts —
# the principle is "native Fedora user creation at overlay time".
# Numeric UID allocations match /usr/lib/sysusers.d/mios-*.conf.
# ----------------------------------------------------------------------------
[services.forge]
user = "mios-forge"
uid  = 816
gid  = 816

[services.open_webui]
user = "mios-open-webui"
uid  = 817
gid  = 817

[services.searxng]
user = "mios-searxng"
uid  = 818
gid  = 818

[services.ceph]
user = "mios-ceph"
uid  = 819
gid  = 819

[services.hermes]
user = "mios-hermes"
uid  = 820
gid  = 820

[services.surrealdb]
user = "mios-surrealdb"
uid  = 821
gid  = 821

# WS-9 unified agent-plane Postgres+pgvector. AI tier (mios-ai) so agents read it
# like surrealdb; own uid for /var/lib ownership stability. 826 = next free after
# mios-adguard (825) in the 810-829 sidecar range.
[services.pgvector]
user = "mios-pgvector"
uid  = 826
gid  = 826

# WS-10 mios-llm-light llama.cpp lane (upstream llama-swap proxy). AI tier (mios-ai). 827 = next free after
# mios-pgvector (826) in the 810-829 sidecar range.
[services.llamacpp]
user = "mios-llamacpp"
uid  = 827
gid  = 827

[services.agent_pipe]
user = "mios-agent-pipe"
uid  = 822
gid  = 822

[services.ollama_cpu]
user = "mios-ollama-cpu"
uid  = 823
gid  = 823
# Runaway/OOM guard (operator 2026-06-01): the CPU light-lane cold-loaded up to
# 6 models x 8 parallel slots with NO memory cap -> a wide research fan-out
# OOM-wedged the 40GiB VM (kernel OOM killer 3x). Cap loaded models LOW (the
# light-lane only needs a micro-LLM resident) + a hard MemoryMax so a herd dies
# WITHIN this cgroup, not the box. Rendered into mios-ollama-cpu.container.
# 2026-06-01j: dropped 4 -> 2. With 4 concurrent gens each pegging all cores, a
# swarm turn drove load to 387 (the runaway). 2 = at most ONE heavy agent gen
# (now ~512-token capped) + ONE slot free for the fast router/refine micro-LLMs.
num_parallel = 2
max_loaded   = 2
mem_high     = "12G"
mem_max      = "16G"

# [services.webtools] -- the consolidated web-tools container (mios-webtools:
# firecrawl + crawl4ai + camoufox). Renamed from [services.crawl4ai] on the
# 2026-05-24 consolidation. The user/uid is KEPT as mios-crawl4ai/824 to avoid
# churning /usr/lib/sysusers.d/50-mios-services.conf + tmpfiles + the live
# passwd db (the container runs root-in-namespace anyway; this uid owns the
# host-side cache/state dirs /var/{lib,cache}/mios/crawl4ai). Slot map exports
# MIOS_WEBTOOLS_USER/UID/GID (userenv.sh).
[services.webtools]
user = "mios-crawl4ai"
uid  = 824
gid  = 824
# Runtime tunables for the crawl4ai + firecrawl members of the mios-webtools pod.
# SSOT for the ${MIOS_CRAWL_*}/${MIOS_FIRECRAWL_*} placeholders consumed by
# mios-webtools-crawl4ai.container + mios-webtools-firecrawl-{api,worker}.container;
# mapped to env in tools/lib/userenv.sh and rendered via automation/15-render-quadlets.sh.
cdp_url            = "http://127.0.0.1:9222"  # crawl4ai -> existing local Chrome over CDP (PRIMARY engine)
camoufox           = true                     # enable the Camoufox stealth-Firefox fail-retry fallback
min_chars          = 200                      # crawl4ai: minimum extracted chars before a page is considered non-empty
firecrawl_workers  = 2                        # NUM_WORKERS_PER_QUEUE for firecrawl-api + firecrawl-worker
firecrawl_bull_key = "mios"                   # BULL_AUTH_KEY shared between the firecrawl api + worker (loopback-only pod)
firecrawl_log_level = "INFO"                  # LOGGING_LEVEL for the firecrawl stack

# AdGuard Home DNS resolver / ad-blocker. SYSTEM tier (mios-sys), like CrowdSec
# -- network infrastructure, not an AI agent. uid owns /etc/mios/adguard (config)
# + /var/lib/mios/adguard (state/db). Next free UID after mios-crawl4ai (824).
[services.adguard]
user = "mios-adguard"
uid  = 825
gid  = 825

# ----------------------------------------------------------------------------
# [adguard] -- AdGuard Home DNS sinkhole config (SSOT). Rendered into
# /etc/mios/adguard/AdGuardHome.yaml by usr/libexec/mios/mios-adguard-firstboot,
# which ALSO discovers + injects the live Tailscale IP (bind_hosts) and MagicDNS
# suffix (split-DNS) at boot -- host-specific values that can't be baked at image
# build time. Everything here is open-source. Complements CrowdSec: CrowdSec
# firewalls malicious IPs (nftables bouncer), AdGuard sinkholes ad/tracker/
# malware DOMAINS at resolve time.
# ----------------------------------------------------------------------------
[adguard]
# Upstream resolvers -- DoH for privacy (no plaintext :53 to the ISP). The agent
# can add/replace these via the UI; this is the shipped default.
upstreams = [
  "https://dns.quad9.net/dns-query",
  "https://dns.cloudflare.com/dns-query",
]
# Bootstrap resolvers: plain DNS used ONLY to resolve the DoH hostnames above.
bootstrap = ["9.9.9.9", "1.1.1.1"]
# Open-source blocklists (hosts / AdGuard-filter syntax). AdGuard fetches +
# caches them, so blocking keeps working offline on the cached copy; only the
# periodic refresh needs internet.
blocklists = [
  "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts",
  "https://big.oisd.nl",
  "https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt",
]
# Tailscale MagicDNS stub (universal fixed IP). firstboot writes a split-DNS
# rule sending the discovered *.<magicdns-suffix> zone here so the pretty URLs
# keep resolving while everything else goes upstream with ad-blocking.
magicdns_resolver = "100.100.100.100"
# Optional explicit MagicDNS suffix override; empty = firstboot auto-discovers
# it from `tailscale status` so we never hardcode one tailnet's name.
magicdns_suffix = ""
# Cache TTL clamp (seconds).
cache_min_ttl = 60
cache_max_ttl = 86400
# Web UI admin login. Empty admin_password_bcrypt => firstboot AUTO-GENERATES a
# strong random password and drops the plaintext in /etc/mios/adguard/initial-
# admin-password (0600) so the UI is never left no-auth (it controls tailnet DNS
# once it's the global nameserver). Pin your own with a bcrypt hash:
#   htpasswd -nbB admin '<password>' | cut -d: -f2
admin_user = "admin"
admin_password_bcrypt = ""

# ----------------------------------------------------------------------------
# [paths] -- canonical FHS paths for runtime artifacts. Consumed by
# every script that needs to know where AI memory, scratch, journal,
# install env, or first-boot sentinels live.
# ----------------------------------------------------------------------------
[paths]
ai_dir              = "/usr/share/mios/ai"
ai_models_dir       = "/srv/ai/models"
ai_mcp_dir          = "/srv/ai/mcp"
ai_scratch_dir      = "/var/lib/mios/ai/scratch"
ai_memory_dir       = "/var/lib/mios/ai/memory"
ai_journal          = "/var/lib/mios/ai/journal.md"
install_env         = "/etc/mios/install.env"
profile_toml_vendor = "/usr/share/mios/profile.toml"
profile_toml_host   = "/etc/mios/profile.toml"
wsl_firstboot_done  = "/var/lib/mios/.wsl-firstboot-done"
ollama_firstboot_done = "/var/lib/mios/.ollama-firstboot-done"
ollama_seed_dir     = "/usr/share/ollama/models"   # immutable, build-baked
ollama_runtime_dir  = "/var/lib/ollama/models"      # writable, first-boot-seeded
mios_toml           = "/usr/share/mios/mios.toml"   # this file's vendor path

coderun_workspace_root = "/var/home/mios/coderuns"          # podman coderun-sandbox /work bind root (shared by code_mode + coderun-session)
coderun_snapshots_root = "/var/home/mios/.coderun-snapshots" # coderun-session snapshot root
codemode_workspace_root = "/var/lib/mios/codemode"          # WS-2 Code Mode generated-snippet root (uid 828, tmpfiles mios-codemode.conf)

# ──── Windows-side paths consumed by mios-find / mios-windows ────────
# Operator directive 2026-05-16: "I DON'T WANT ANY HARDCODED PATHS OR
# WORDS!!! SKILLS AND TOOLS ARE TEMPLATES FOR ANY VARIABLES!!!". Lifted
# out of mios-find (es.exe probe list) + mios-windows (powershell.exe
# full path). Operators override in /etc/mios/mios.toml [paths] = ...

# Voidtools Everything CLI -- probed in order; first match wins. WSL
# paths so MiOS helpers can exec via interop.
everything_cli = [
    "/mnt/m/Programs/Everything/es.exe",
    "/mnt/c/Program Files/Everything/es.exe",
    "/mnt/c/Program Files (x86)/Everything/es.exe",
    "/mnt/c/Tools/Everything/es.exe",
    "/mnt/c/Users/mios/AppData/Local/Programs/Everything/es.exe",
]

# Windows PowerShell full path -- systemd user services have stripped
# PATH that excludes /mnt/c/Windows/System32 (operator-confirmed
# regression 2026-05-16: bash: line 1: powershell.exe: command not
# found from broker).
powershell_exe = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe"

# CMD prompt full path (same PATH-strip rationale).
cmd_exe = "/mnt/c/Windows/System32/cmd.exe"

# Operator-side launcher broker socket. Cross-user dispatch from agent
# context -> operator's interactive Windows session.
launcher_socket = "/run/mios-launcher/launcher.sock"

# ----------------------------------------------------------------------------
# [flatpak.app_overrides."<app-id>"] -- per-app flatpak env overrides.
#
# Operator directive 2026-05-16: "EVERYTHING IS DICTATED AND UNDERSTOOD
# FROM THE mios.toml/html file(s)". Per-app render / GPU / WebKit envs
# previously lived as standalone files at var/lib/flatpak/overrides/<id>;
# now they live HERE in the SSOT, and mios-flatpak-overrides-apply
# materializes the per-app override files at boot. Operators add or
# tune by editing this section in mios.html or directly in TOML.
#
# Each [flatpak.app_overrides."<app-id>"] sub-table is a flat key=value
# map of environment variables. The apply script writes
#   /var/lib/flatpak/overrides/<app-id>
# with an [Environment] section containing every key in the table.
#
# Add a per-app override ONLY when global flatpak defaults (set by
# mios-flatpak-overrides-apply from [appearance] + WSLg defaults)
# don't work for a specific app. Most apps need no entry here.
# ----------------------------------------------------------------------------

# NOTE: per-app overrides for desktop apps now live in [[desktop.apps]]
# entries (overrides = {...}). The [flatpak.app_overrides."<id>"]
# table below is the legacy / non-desktop-app fallback (services,
# infrastructure flatpaks, anything not in [[desktop.apps]]). The
# apply script reads BOTH sources; [[desktop.apps]] shadows on
# conflict so operator-overlay app entries win cleanly.
#
# (no current entries -- Epiphany overrides moved to [[desktop.apps]])

# ----------------------------------------------------------------------------
# [mios-find.aliases] -- CANONICAL Linux/freedesktop role -> app map.
#
# Operator directive 2026-05-16: "DONT USE HARDCODED KEY WORDS AT
# ALL ANYWHERE!!!! Linux natively tags applications to its
# environments defaults -- linux defaults things to global verbs
# like; web, files, email, documents, etc-etc and are all mapped
# to local applications in Linux environments. THAT is what the
# toml/html dictates and changes -- AGENTS SEE THAT WEB = EPIPHANY
# FLATPAK, FILES = NAUTILUS -- ETC-ETC".
#
# So: ONE entry per Linux global verb (no synonyms, no "a browser"
# / "the browser" / "my browser" bloat). The AGENT is responsible
# for mapping natural language ("open my browser", "fire up chrome",
# "the web app") to the canonical verb ("web") -- that's freedesktop
# / xdg knowledge every LLM already has.
#
# Future: this table will be AUTO-DERIVED from [[desktop.apps]]
# entries where role is set and default = true. For now it's a
# small manually-maintained map of the freedesktop standard roles.
# Operators add per-host overrides at /etc/mios/mios.toml or
# per-user at ~/.config/mios/mios.toml.
#
# Future-future: mios-find itself will query Linux-native default-app
# infrastructure (xdg-settings, xdg-mime, gio mime) at lookup time
# so the SoT is the actual system state, not a duplicate table.
# ----------------------------------------------------------------------------
# App-TYPE defaults (operator 2026-06-15: every application type has a default in
# mios.toml, user-switchable by telling the AI; Linux apps first for most, Windows
# for games/windows-specific, BOTH for system apps; agents discern intent from
# environment context -- NO hardcoded keyword lists). os_pref tells the launcher/
# agent which side to prefer: linux-first | windows | both. `default` = the Linux/
# primary app id (resolved via [mios-find.aliases]/[[desktop.apps]]); windows_default
# = the app when the agent discerns Windows intent ("my browser", a Windows-only app).
# A per-user ~/.config/mios/mios.toml override (written by the app_default verb) wins.
[[desktop.app_types]]
type            = "browser"
os_pref         = "linux-first"
default         = "epiphany"
windows_default = "zen"
description     = "Web browser -- Linux flatpak by default; Zen (the Windows default browser) on Windows / 'my browser' intent."
[[desktop.app_types]]
type        = "files"
os_pref     = "linux-first"
default     = "nautilus"
description = "File manager."
[[desktop.app_types]]
type        = "editor"
os_pref     = "linux-first"
default     = "gedit"
description = "Text editor."
[[desktop.app_types]]
type        = "terminal"
os_pref     = "linux-first"
default     = "ptyxis"
description = "Terminal emulator."
[[desktop.app_types]]
type        = "media"
os_pref     = "linux-first"
default     = "showtime"
description = "Media / video player."
[[desktop.app_types]]
type            = "games"
os_pref         = "windows"
windows_default = "steam"
description     = "Games + game launchers -- the Windows side (Steam/Epic/GOG/Xbox)."
[[desktop.app_types]]
type        = "settings"
os_pref     = "both"
default     = "gnome-control-center"
description = "System settings -- both OSes have one; agent picks by which system the ask targets."
[[desktop.app_types]]
type        = "system"
os_pref     = "both"
description = "System / OS apps -- assume either side; agent discerns from context."

# ----------------------------------------------------------------------------
[mios-find.aliases]
# Canonical Linux/freedesktop role -> app id. ONE word per role.
web        = "epiphany"
files      = "nautilus"
terminal   = "ptyxis"
editor     = "gedit"
code       = "codium"

# Windows-side role aliases. mios-launch's normaliser lowercases +
# collapses whitespace-to-hyphen, so "File Explorer", "FILE-EXPLORER",
# and "file_explorer" all hit the "file-explorer" key. The aliases
# resolve to the bare Windows shortname that mios-launch's step 3
# (Windows GUI builtin allowlist) dispatches via mios-windows.
file-explorer    = "explorer"
windows-explorer = "explorer"
notepad-app      = "notepad"
calculator-win   = "calc"
paint            = "mspaint"
snip             = "snipping-tool"
task-manager     = "taskmgr"
registry-editor  = "regedit"
control-panel    = "control"
command-prompt   = "cmd"
power-shell      = "powershell"
pwsh-shell       = "pwsh"
software   = "gnome-software"
settings   = "gnome-control-center"
mobile-settings      = "mobi.phosh.MobileSettings"
mobile-control-panel = "mobi.phosh.MobileSettings"
calculator = "gnome-calculator"
calendar   = "gnome-calendar"
mail       = "evolution"
photos     = "loupe"
documents  = "papers"
music      = "decibels"
video      = "showtime"
maps       = "gnome-maps"
clock      = "gnome-clocks"
weather    = "gnome-weather"
disks      = "gnome-disks"
extensions = "extension-manager"
help       = "yelp"
games      = "lutris"

# MiOS configurator UI (mios.html). The agent's natural phrasings
# ("open mios.html", "open the configurator", "customize MiOS",
# "open MiOS settings") all need to reach the same launcher:
# /usr/libexec/mios/mios-html -- a shim that resolves the WSL UNC
# path and dispatches Start-Process through mios-windows to the
# operator's default Windows browser. Operator-flagged 2026-05-17:
# agent claimed mios.html "isn't installed" and suggested a fake
# `dnf install MiosGUI` package; the aliases below remove the
# lookup ambiguity so mios-find resolves them to a launch line.
"mios.html"     = "mios-html"
"configurator"  = "mios-html"
"customize"     = "mios-html"
"mios-settings" = "mios-html"
"miosconfig"    = "mios-html"

# Cross-platform installer. Single entry point that fronts winget
# (Windows) + dnf (Fedora RPM) + flatpak (Flathub). Auto-detects the
# right backend from the package-id shape: "Microsoft.PowerToys" ->
# winget, "org.mozilla.firefox" -> flatpak, "vim" -> dnf. Operator
# directive 2026-05-17: "mios-installer should be able to use windows
# CMD and Linux BASH for installing applications on their respective
# platforms (using winget install, winget search, etc-etc)".
"install"      = "mios-installer"
"installer"    = "mios-installer"
"package"      = "mios-installer"
"winget"       = "mios-installer"

# Screenshot — every "take a screenshot" / "snap a window" / "screen
# capture" / "save the screen" intent flows through mios-screenshot.
# That shim writes a PNG to the operator's Windows Pictures/Screenshots
# folder via mios-pc-control screenshot (System.Drawing.Bitmap +
# CopyFromScreen on the Windows side). Operator-flagged 2026-05-17:
# agent burned 6 minutes trying `screencapture.exe`, `Invoke-
# Screenshot`, broken PowerShell pipelines and gave up with "Windows
# screenshot tools aren't available in this WSL environment". The
# tools WERE available; mios-screenshot makes the surface obvious.
"screenshot"    = "mios-screenshot"
"screencap"     = "mios-screenshot"
"screen-capture" = "mios-screenshot"
"snap"          = "mios-screenshot"
"prtscr"        = "mios-screenshot"

# Window-manipulation verbs. mios-window resolves a title-pattern to a
# hwnd via window-list, then dispatches mios-pc-control window-*.
# Launches already auto-center via mios-windows launch's URI/.exe
# branches; post-launch move/center/focus/resize/min/max/restore flow
# through this shim. Operator directive 2026-05-17: "make sure window
# moving is active/functional and can launch things centered by
# default and that it can be told to move the windows".
"window"        = "mios-window"
"windows-mgr"   = "mios-window"
"move-window"   = "mios-window"
"center-window" = "mios-window"
"focus-window"  = "mios-window"

# SteamCMD wrapper. ONE verb for any Steam-side operation: install /
# uninstall / update / validate / status / info / login / list /
# search / path. Two install routes: `uri` (operator-friendly,
# steam://install/<appid> -> Steam GUI prompt -- works for any owned
# game), and `cmd` (headless SteamCMD, auto-installs Valve.SteamCMD
# via winget if missing, works for free + dedicated-server content
# under anonymous login). Operator directive 2026-05-17: "make a
# steamCMD a native tool for handling steam CMD commands GLOBALLY".
"steamcmd"      = "mios-steamcmd"
"steam-cmd"     = "mios-steamcmd"
"steam-game"    = "mios-steamcmd"
"steam-install" = "mios-steamcmd"

# Markdown editor + live preview window. Self-hosted viewer at
# /usr/share/mios/markdown/index.html (vendored snarkdown, no CDN);
# mios-md opens it via Start-Process in the operator's default
# browser, optionally pre-loaded with a file or inline text.
# Complements OWUI's inline markdown rendering -- this is the
# standalone surface for ad-hoc note editing + previewing.
# Operator directive 2026-05-17: "react windows for markdown to
# markup text in OWUI also".
"md"          = "mios-md"
"markdown"    = "mios-md"
"preview-md"  = "mios-md"
"render-md"   = "mios-md"
"notes"       = "mios-md"

