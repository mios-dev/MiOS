[verbs.web_search]
section    = "Discovery / resolution"
sig        = "query, limit=5?"
desc       = "WEB search via the LOCAL self-hosted SearXNG (offline-first metasearch, no cloud dependency). USE THIS for anything from the internet or the current world: weather, news, current events, event dates/times/locations, prices, products, people, places, scores, facts, general knowledge -- ANY question whose answer is not a file on this machine. Returns real fetched {title, url, content} plus instant answers/infoboxes for citation. This is NOT file search: windows_file_search/linux_file_search/find_file_fast ONLY find files on disk and return nothing useful for a knowledge/current-events question. When a question needs a live fact you don't already have, call THIS and ground on the result -- never invent the answer, never default to remembered facts. RECENCY: when the answer must be CURRENT (today/latest/trending/breaking/recent/this week/this month), set time_range='day' (or 'week'/'month') so SearXNG returns fresh dated results instead of evergreen encyclopedia or year-overview pages; you may also set category='news' for breaking headlines. Leave time_range and category empty (null) for timeless facts."
examples   = ["what's the weather in Seattle tomorrow", "latest news about the Mars sample return mission", "who won the F1 race this weekend", "current price of an RTX 5090", "what's trending globally today (time_range=day)"]
tier       = "core"
max_result_chars = 15000
cmd        = "mios-web-search -n {limit=5} --fanout {fanout=$MIOS_WEB_FANOUT:2}{time_range?--time-range}{category?--category} {query}"
  [verbs.web_search.params.query]
  type    = "string"
  aliases = ["q", "term", "text", "search"]
  [verbs.web_search.params.limit]
  type    = "integer"
  default = 5
  aliases = ["n", "top_k", "count"]
  [verbs.web_search.params.fanout]
  type    = "integer"
  default = 3
  aliases = ["expand", "queries", "k"]
  # Recency / category levers ("research trending" gap): the binary
  # already supports SearXNG --time-range + --category; exposing them as OPTIONAL nullable
  # params lets the MODEL request fresh/news results for time-sensitive asks. {arg?FLAG}
  # emits nothing when null -> default = today's untimed general search (zero regression).
  [verbs.web_search.params.time_range]
  type    = "string"
  default = ""
  enum    = ["", "day", "week", "month", "year"]
  aliases = ["recency", "freshness", "since"]
  [verbs.web_search.params.category]
  type    = "string"
  default = ""
  enum    = ["", "news", "general"]
  aliases = ["topic", "source"]

