[verbs.coderun]
section    = "OS shell verbs"
sig        = "code, lang=bash?, net?, timeout=60?"
desc       = "Run a SHORT one-off code snippet / command in an isolated sandbox (bubblewrap: read-only system, writable scratch only, NO network by default, resource caps + timeout). lang: bash (default) | python. Pass net=true only if it must reach the network. Use to compute/test something safely WITHOUT touching the host -- not to orchestrate MiOS verbs (run_python_tool_script) or to run Windows PowerShell (powershell_run)."
model_name = "run_sandboxed_code"
examples   = ["run this bash one-liner safely", "test this python snippet in a sandbox", "compute a quick calculation without touching the host", "calculate the exact value of a math expression", "do this arithmetic / numeric / date computation precisely", "execute this shell command in isolation"]
# COMMON tier (operator 2026-06-19, REVERTED from a brief 'core' experiment): the math
# path does NOT need coderun on the model's surface -- the native-loop COMPUTE PREFETCH
# runs it PIPE-SIDE (a generative _needs_compute judge -> dispatch_mios_verb -> inject the
# verified result), so the model gets correct math WITHOUT seeing coderun. Making it 'core'
# (always-ambient) caused a small 8B to SPURIOUSLY fire run_sandboxed_code on non-compute
# turns -- esp. in the client-tools merged surface (Hermes desktop), spinning the loop on
# MiOS verbs and returning EMPTY. Keep it 'common' (reaches the model only when the turn is
# genuinely code-relevant via the cosine tail / a code domain); the prefetch covers math.
tier       = "common"
permission = "interactive"
cmd        = "mios-coderun --code {code!} {lang?--lang} --timeout {timeout=60}"
  [verbs.coderun.params.code]
  type    = "string"
  desc    = "The source/command to run in the sandbox."
  aliases = ["source", "script", "command", "snippet"]
  [verbs.coderun.params.lang]
  type    = "string"
  enum    = ["bash", "sh", "python"]
  default = "bash"
  desc    = "Interpreter for the snippet."
  aliases = ["language", "interpreter"]
  [verbs.coderun.params.net]
  type    = "boolean"
  desc    = "Allow network egress (default false = offline jail)."
  aliases = ["network", "allow_net"]
  [verbs.coderun.params.timeout]
  type    = "integer"
  default = 60
  aliases = ["timeout_s", "max_seconds"]

