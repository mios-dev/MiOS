examples   = ["what's my monitor layout?", "what resolution are my screens?", "how many monitors do I have and where are they?", "which display is my primary monitor?"]
tier       = "common"
permission = "read"
cmd        = "mios-pc-control screen-layout"

[verbs.open_url]
