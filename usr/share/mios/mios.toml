    "keydb",
    # ttyd -- C/libuv pty-over-WebSocket bridge backing the MiOS Portal's
    # inline browser terminals (mios-ttyd-bash :7681 / -powershell :7682; see
    # [ttyd] above). Was configured + unit-enabled but NEVER in any package
