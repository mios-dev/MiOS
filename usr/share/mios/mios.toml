sig        = "action, title"
desc       = "Change the STATE of an OPEN Windows window (by title): minimize (hide to taskbar), maximize (fill its monitor), restore (back to normal size), or close (graceful WM_CLOSE so the app saves state). Run list_windows first to confirm the title. This is state only -- to bring a window to the front use focus_window, to relocate use move_window_to_region / place_window_at_pixel, to change size use resize_window."
examples   = ["minimize the Firefox window", "maximize Spotify", "restore the Notepad window", "close the Discord window", "send Slack to the taskbar"]
tier       = "common"
permission = "write"
cmd        = "mios-window {action} {title}"
  [verbs.window_state.params.action]
  type = "string"
  enum = ["minimize", "maximize", "restore", "close"]
  desc = "The window-state change to apply."
  aliases = ["op", "state"]
  [verbs.window_state.params.title]
