[containers.mios-cpu-node.Container]
ContainerName = "mios-cpu-node"
Entrypoint = "/app/llama-server"
Environment = "HOME=/var/lib/mios/llamacpp"
# Health gate: the upstream llama-swap:cuda image bakes `curl localhost:8080/` as its
# HEALTHCHECK, which never matches our SSOT listen port -> the lane reports Unhealthy
# forever even while it serves 200 on ${MIOS_PORT_CPU_NODE}. Override the baked check
# against the real runtime port's llama-server /health (200 ready / 503 loading).
# NO-HARDCODE: same ${MIOS_PORT_CPU_NODE} runtime var the Exec resolves via systemd.
HealthCmd = "curl -fsS http://localhost:${MIOS_PORT_CPU_NODE}/health || exit 1"
HealthInterval = "30s"
HealthTimeout = "10s"
HealthStartPeriod = "120s"
HealthRetries = "3"
# ctx-size: 32768 (was 131072). CPU-only (n-gpu-layers 0) granite-8b with a 128k KV
# ring is the Unhealthy-on-boot bloat (huge RAM KV even at q4_0); 32768 matches the
# light lane + the VRAM/KV co-fit finding. Raise once CPU RAM headroom is proven.
Exec = "--model /models/granite-4.1-8b.gguf --host 0.0.0.0 --port ${MIOS_PORT_CPU_NODE:-11451} --ctx-size 32768 --flash-attn on --cache-type-k q4_0 --cache-type-v q4_0 --parallel 1 --threads ${MIOS_CPU_NODE_THREADS:-14} --n-gpu-layers 0 --jinja --alias mios-cpu --slot-save-path ${MIOS_LLAMACPP_SLOT_DIR:-/var/lib/mios/llamacpp/slots}"
Group = "${MIOS_LLAMACPP_GID:-827}"
Image = "${MIOS_LLM_LIGHT_IMAGE:-ghcr.io/mostlygeek/llama-swap:cuda}"
Label = "org.opencontainers.image.title=mios-cpu-node"
Pod = "mios-ai.pod"
User = "${MIOS_LLAMACPP_UID:-827}"
Volume = [
  "/usr/share/mios/llamacpp/models:/models:ro,Z",
  "${MIOS_LLAMACPP_SLOT_DIR:-/var/lib/mios/llamacpp/slots}:${MIOS_LLAMACPP_SLOT_DIR:-/var/lib/mios/llamacpp/slots}:Z"
]

[containers.mios-cpu-node.Install]
WantedBy = "multi-user.target default.target"

[containers.mios-cpu-node.Service]
Delegate = "yes"
EnvironmentFile = "/etc/mios/install.env"
Restart = "on-failure"
RestartSec = "10s"
TimeoutStartSec = "300s"

[containers.mios-cpu-node.Unit]
After = "network-online.target"
ConditionPathExists = "/usr/share/mios/llamacpp/models/granite-4.1-8b.gguf"
Description = "'MiOS' CPU inference node (always-on / gaming-immune last-resort lane)"
Wants = "network-online.target"

