desc       = "Fetch ONE web page you already have the URL for and return its FULL content as clean, LLM-ready MARKDOWN via the LOCAL crawl4ai engine (headless Chrome over CDP, with a Camoufox stealth-Firefox fail-retry; offline-first, no cloud). The default reader for a single long ARTICLE or DOC page (~20000 chars). Does NOT fetch_url_markdown multiple pages / a whole site. For news/article INDEX pages use fetch_index_markdown; for quick short plain text use fetch_url_text."
model_name = "fetch_url_markdown"
examples   = ["fetch this documentation page as markdown so you can read the whole thing", "get the full markdown of this article URL", "read this long blog post end to end and give me the markdown", "open this URL and convert the page to clean markdown"]
