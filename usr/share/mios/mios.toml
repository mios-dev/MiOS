examples   = ["what's the weather in Seattle tomorrow", "latest news about the Mars sample return mission", "who won the F1 race this weekend", "current price of an RTX 5090", "what's trending globally today (time_range=day)"]
tier       = "core"
permission = "read"
cmd        = "mios-web-search -n {limit=5} --fanout {fanout=$MIOS_WEB_FANOUT:2}{time_range?--time-range}{category?--category} {query}"
