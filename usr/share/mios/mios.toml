# ─── Section: Automation / scheduling ─────────────────────────────────
[verbs.schedule]
section    = "Automation / scheduling"
sig        = "prompt, every"
desc       = "Schedule a RECURRING/standing task: run <prompt> through the agent on a repeating interval and post each result to the operator's Discord. Use for ANY 'do X every N minutes/hours', 'each day', 'keep me updated on ...', 'check ... regularly' request -- a STANDING job, NOT one-shot research."
examples   = ["check the news every morning and post to discord", "every 30 minutes summarize new logs", "keep me updated on GPU temps each hour", "run this report daily"]
tier       = "core"
permission = "write"
cmd        = "mios-cron-schedule add --prompt {prompt} --every {every}"
  [verbs.schedule.params.prompt]
  type    = "string"
  aliases = ["task", "query", "do", "what"]
  desc    = "The task/question to run each interval (e.g. 'research the cheapest Toronto to Japan flights')."
  [verbs.schedule.params.every]
  type    = "string"
  aliases = ["interval", "frequency", "cadence", "cron"]
  desc    = "Interval: '30 minutes' / 'hourly' / 'daily' / 'weekly', or a raw 5-field cron. Default daily."

# ─── Section: Discovery / resolution ──────────────────────────────────
[verbs.mios_find]
section    = "Discovery / resolution"
sig        = "name"
desc       = "Resolve an app/program NAME to the exact runnable launch command WITHOUT launching it -- returns the cmd line only; the agent then decides whether to run it (e.g. via launch_windows_app/launch_app). This is NOT a file search (use find_file_fast / windows_file_search / linux_file_search to locate files) and does NOT open anything. Use it to get the precise command before launching, or to check how something would be started."
model_name = "resolve_launch_command"
examples   = ["what's the exact command to launch Blender", "how would I start Discord from the command line", "give me the launch command for VS Code without opening it", "resolve the run command for steam but don't launch it"]
tier       = "common"
permission = "read"
cmd        = "mios-find --json {name}"
  [verbs.mios_find.params.name]
  type    = "string"
  aliases = ["query", "app", "target"]

[verbs.mios_apps]
section    = "Discovery / resolution"
sig        = "filter?"
desc       = "Full INVENTORY of installed apps AND games across every surface (flatpak/rpm/winget/store/steam/epic/xbox/gog/cli/service). THE verb for 'what apps/games are installed', 'list my programs', 'detect my installed games'. Optional substring filter. NOT a web search, NOT list_windows (open windows only); for fuzzy 'which app does X' use app_search."
model_name = "list_installed_apps"
examples   = ["what apps do I have installed?", "list all my installed games", "show me my installed programs", "detect my Steam and Epic games"]
tier       = "core"
permission = "read"
cmd        = "mios-apps --json{filter?--filter}"
# The full inventory (apps + games across every surface) is ~27KB; the default
# 1500-char enrich cap truncated it BEFORE the windows-game section, so "list
# ALL my games" surfaced only 2 of 11 (operator 2026-05-27). Keep the whole
# inventory so every game/app reaches the agent.
max_result_chars = 30000
  [verbs.mios_apps.params.filter]
  type    = "string"
  desc    = "Case-insensitive substring filter; empty = all."
  aliases = ["query", "search", "name"]

[verbs.everything_search]
section    = "Discovery / resolution"
sig        = "query, limit=10?, ext?"
desc       = "Search for files on the WINDOWS side of this machine via the Voidtools Everything NTFS index (exhaustive, name/extension match). Finds FILES that already exist on Windows drives (C:, etc.) -- NOT a web or knowledge search, and NOT the Linux filesystem (use linux_file_search for that). Good for 'where is X.exe' on Windows; use find_file_fast first for a quick cached hit."
model_name = "windows_file_search"
examples   = ["find game.exe on my Windows drive", "where is the installer .msi on C drive", "search Windows for all my .pdf invoices", "locate steam.exe on Windows"]
tier       = "core"
permission = "read"
cmd        = "mios-everything --json -n {limit=10} {query}{ext?-ext}"
  [verbs.everything_search.params.query]
  type    = "string"
  aliases = ["name", "filename", "term"]
  [verbs.everything_search.params.limit]
  type    = "integer"
  default = 10
  [verbs.everything_search.params.ext]
