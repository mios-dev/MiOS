# ----------------------------------------------------------------------------
# [bootstrap] -- behavior of mios-bootstrap.git/install.sh during Phase-0.
#   mode: auto | bootc | fhs
#     - auto  : detect host kind, prefer 'bootc switch' when available
#     - bootc : force 'bootc switch' (fail if not bootc-managed)
#     - fhs   : force the Total Root Merge path (clone + overlay)
# Maps to MIOS_BOOTSTRAP_MODE, MIOS_REPO_URL, MIOS_BOOTSTRAP_REPO_URL.
# ----------------------------------------------------------------------------
[bootstrap]
mode             = "auto"
mios_repo        = "https://github.com/mios-dev/MiOS.git"
bootstrap_repo   = "https://github.com/mios-dev/mios-bootstrap.git"
branch           = "main"
install_packages = true   # run dnf install on PACKAGES.md after FHS overlay
reboot_on_finish = true   # interactive y/N prompt at end of install

# ----------------------------------------------------------------------------
# [bootstrap.host_storage] -- Windows-side dedicated data partition.
# Get-MiOS.ps1's Initialize-MiosDataDisk shrinks C:\ by `shrink_mb` and
# creates a partition labeled `volume_label` at drive `drive_letter`.
# ALL MiOS install paths redirect onto this disk (M:\MiOS, M:\etc\mios,
# M:\podman\machine, M:\MiOS\repo\mios + mios-bootstrap, BIB output).
#
# Why shrink_mb = 262656 (not 262144)?
#   262144 MB = 256 GiB exactly, but NTFS reserves ~16 MB at the start
#   for boot sector + alignment + initial $MFT extents. The resulting
#   "Capacity" in Windows Explorer falls 16-32 MB shy of the boundary,
#   rounding DOWN to "255 GB". 262656 MB (= 256 GiB + 512 MB buffer)
#   guarantees Explorer shows "256 GB".
# ----------------------------------------------------------------------------
[bootstrap.host_storage]
drive_letter        = "M"
volume_label        = "MIOS-DEV"
shrink_mb           = 262656     # produces "256 GB" in Windows Explorer
display_size_gb     = 256        # what the operator should see (informational)
filesystem          = "NTFS"
allocation_unit     = 4096       # NTFS default cluster size

# ----------------------------------------------------------------------------
# [bootstrap.dev_vm] -- podman-MiOS-DEV machine specifics. The VM that
# IS the builder (per feedback_mios_dev_is_the_builder memory).
# ----------------------------------------------------------------------------
[bootstrap.dev_vm]
machine_name        = "MiOS-DEV"   # podman derives "podman-MiOS-DEV"
wsl_distro          = "MiOS"        # the eventual MiOS WSL distro (built from the OCI image)
base_image          = "quay.io/podman/machine-os:6.0"   # LOCKED base
# Maximalist allocation — the dev VM IS the builder, so it gets every CPU
# core, every GB of RAM, every GB of free disk, and every GPU the host
# offers (minus the host_reserve below). Set to "max" to auto-detect via
# Get-Hardware in build-mios.ps1; pin to a number to cap explicitly.
cpus                = "max"
memory_mb           = "max"
disk_size_gb        = "max"
gpu_passthrough     = "max"      # "max" | "none" | "nvidia" | "amd" | "intel"

# ----------------------------------------------------------------------------
# [bootstrap.dev_vm.host_reserve] -- headroom kept for the Windows host
# when the values above are "max". The dev VM is the builder, so we err
# heavily toward feeding it; reserves are tuned to keep the Windows
# host responsive (Explorer, browser, IDE) during long builds, not to
# guarantee gaming-class throughput on Windows during a build.
# ----------------------------------------------------------------------------
[bootstrap.dev_vm.host_reserve]
cpu_pct             = 15      # reserve 15% of logical CPUs for Windows host
cpu_min             = 2       # always reserve at least 2 cores
memory_pct          = 15      # reserve 15% of host RAM for Windows host
memory_gb           = 4       # always reserve at least 4 GB
disk_gb             = 32      # always keep 32 GB free on M:\ for Windows-side
                              # artifacts (build outputs, podman cache, etc.)

# ----------------------------------------------------------------------------
# [bootstrap.prereqs] -- Phase 0 auto-install catalog. The irm|iex web
# entry now winget-installs each missing prerequisite instead of
# failing. Operators swap implementations (e.g. an alternative WSL
# package id, a different Podman distribution channel) via mios.html.
# ----------------------------------------------------------------------------
[bootstrap.prereqs]
git_pkg             = "Git.Git"
wsl_pkg             = "Microsoft.WSL"
podman_pkg          = "RedHat.Podman-Desktop"

# ----------------------------------------------------------------------------
# [terminal] -- canonical MiOS terminal dimensions. EVERY spawned shell
# (wt.exe new-tab, conhost fallback, wsl.exe into MiOS-DEV, the
# auto-elevated bootstrap window, the native-app launcher, Linux tty0
# console via /etc/profile.d/mios-tty.sh) opens at exactly cols × rows.
#
# EMPIRICAL REALITY: WT chrome on the operator's hardware (Win11 26H1,
# WT Stable, GeistMono Nerd Font Mono 12pt, acrylic 50%, focus mode)
# eats 2-3 cells of buffer beyond what `[Console]::WindowWidth` reports.
# The chrome budget breaks down approximately as:
#   - 1 cell scrollbar gutter (reserved even with scrollbarState=hidden)
#   - 1 cell acrylic blur edge (visible bleed at the right border)
#   - 0-1 cell sub-pixel rounding (when DPI != 100% the cell grid
#     doesn't divide the window pixel width evenly, so the rightmost
#     cell renders as a partial column that WT clips)
#
# Both attempts at zero-slack edge-to-edge wrapped:
#   - 2026-05-08 commit 04c228c (margin=0, frame=80, final_space=false,
#     no trailing): doubled-`||` left-border ghost wrap on dashboard
#     rows + 4-cell time-segment wrap (operator screenshot at 18:38)
#   - 2026-05-08 commit 47383f0 (margin=1, frame=79, final_space=true,
#     trailing=""): same pattern, slightly less wrap (operator
#     screenshot at 18:39)
#
# Last-known-working config: 2026-05-08 commit 920af40
#   (margin=2, frame=78, final_space=true, trailing="  "). Operator's
#   17:19 screenshot showed time `17:19 ` ending cleanly with no wrap.
#   Reverting to that as the proven floor. Future operators can drop
#   margin to 0 ONCE WT exposes a knob to drop ALL chrome reservations
#   (no such knob exists in WT 1.x) -- not before.
#
# DEPLOYMENT NOTE: changing these values requires re-running
# `irm https://raw.githubusercontent.com/mios-dev/mios-bootstrap/main/Get-MiOS.ps1 | iex`
# to re-substitute Show-MiosDashboard (which bakes the values into
# `M:\MiOS\powershell\profile.ps1` at install time). Plain install.ps1
# in BootstrapOnly mode does NOT re-substitute -- the live dashboard
# function will keep rendering at whatever values the LAST full Get-
# MiOS.ps1 run baked in.
# ----------------------------------------------------------------------------
[terminal]
cols                = 80
rows                = 20      # 20 = MiOS portal-feel default; 30 for taller "console" feel
scrollback_rows     = 9000
frame_width         = 75      # = cols - 5. Diagnostic root cause of the 5-hour wrap loop: Write-Host CRLF auto-wrap, NOT chrome reservation alone. When Write-Host emits a string EQUAL to display width N, cursor hits col N (phantom rightmost), auto-wraps to col 0 of next line, then CRLF advances one MORE line -- producing the orphan `|` row between every content row in operator screenshots at 18:38 / 20:26 / 20:38. The 20:48 screenshot at margin=4 / frame=76 stopped the orphan rows BUT the right `│` border landed exactly on the visible edge (col 75 in display=76) and was invisible/clipped. Bumping to margin=5 / frame=75 puts the right `│` at col 74 with 1 visible cell of clear slack to the right edge. Install-MiOSPowerShellProfile writes [Console]::WindowWidth to M:\MiOS\diagnostics\window-width.txt at profile load so the actual cell count is recorded -- if WindowWidth != 80, recompute right_margin = cols - WindowWidth + 2.
frame_height        = 19      # = rows - 1. Reserves 1 row for the prompt under the dashboard.
right_margin        = 5       # 5 cells of slack: 3 for WT chrome over-report (scrollbar gutter + acrylic blur + sub-pixel rounding) + 1 for Write-Host CRLF auto-wrap protection + 1 for the right `│` border to render visibly INSIDE the display edge (not on it). mios.omp.json mirrors with final_space=true (1) + trailing-spacer "      " (6) = 7 cells from rightmost; oh-my-posh aligns via ANSI cursor positioning rather than character-by-character output, so it needs +1 over the toml margin to prevent the powerline time chars from hitting the same edge that auto-wraps Write-Host.

# ----------------------------------------------------------------------------
# [terminal.install] -- the BOOTSTRAP window dims (taller so the install
# output / readme / acknowledgements / Pass-1 + Pass-2 logs fit without
# scrolling). The post-install MiOS app uses [terminal] above (80x20
# portal feel). The install conhost uses these dims.
# ----------------------------------------------------------------------------
[terminal.install]
cols                = 80
rows                = 40      # taller for install output + readme

# ----------------------------------------------------------------------------
# [theme] -- visual styling tokens. The [colors] table above defines
# the palette; this section names the typography, opacity, prompt,
# and per-host theme switches that consumers (WT settings.json patcher,
# oh-my-posh renderer, GTK/Adwaita, KDE Plasma) read.
# ----------------------------------------------------------------------------
[theme]
# GLOBAL MiOS terminal defaults -- per operator: "the MiOS app/terminal
# is acrylic set to on GLOBALLY AND SET TO 50 PERCENT TRANSPARENCY!!!!
# FRAME-LESS/BORDER-LESS/SCROLL-BAR-LESS, ETC--ETC!!! GLOBAL DEFAULTS".
# Every WT MiOS / MiOS-DEV profile + every mios-launch.ps1 invocation
# applies these. Get-MiOS.ps1's Install-MiOSTerminalProfile reads this
# section and stamps the values into settings.json.
mode                = "dark"             # "dark" | "light" (rare; vendor=dark)
acrylic             = true               # WT useAcrylic ON
opacity             = 50                 # WT opacity 0..100 (50 = 50% transparency)
system_backdrop     = "acrylic"          # WT 1.18+ per-profile backdrop
cursor_shape        = "filledBox"        # block-style cursor mimics Linux terminal default (gnome-terminal / xterm / konsole steady block)
scrollbar_state     = "hidden"           # no scrollbar -- frame uses every col
padding             = "0"                # zero padding -- frame flush to edges
suppress_app_title  = true               # WT doesn't override our title
launch_mode         = "focus"            # frame-less / border-less / no-titlebar / no-tab-row -- forces WT to measure the viewport at the actual cell count cols × rows from FIRST PAINT (no titlebar to strip later, no off-by-1/2 cell-count window before scrollbarState='hidden' applies). Required for true edge-to-edge in mios-bootstrap's Install-MiOSTerminalProfile.
disable_animations  = false              # animations ON -- per operator "enable animations and all preview features in the MiOS Windows Terminal profile, full aesthetics! ALSO: can it quickly fade on open and close??". The WT window open/close fade is gated on disableAnimations=false + useAcrylic=true; both are on. If the powerline ever wraps with animations on, raise [terminal].right_margin to 1 as a targeted band-aid -- do NOT flip animations off (operator wants the aesthetics).
enable_preview_features = false          # WT experimental.* knobs bundle (useAtlasEngine GPU renderer, experimental.detectURLs, experimental.input.forceVT, experimental.rendering.forceFullRepaint). DISABLED 2026-05-08: operator screenshots showed CLI apps (Gemini CLI, Claude Code CLI) rendering TUI frames that extend past the visible cell boundary -- text wrapping that doesn't happen in conhost or non-MiOS WT at the same window size. Strongest hypothesis: experimental.input.forceVT changes how WT's pseudo-console reports buffer dimensions to apps querying [Console]::WindowWidth (which the diagnostic at M:\MiOS\diagnostics\window-width.txt shows reporting 80 even though actual visible cells is ~76). Re-enable once WT exposes a stable knob whose width-reporting is verified correct.

[theme.font]
family              = "GeistMono Nerd Font Mono"
size                = 12
weight              = "normal"
url                 = "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/GeistMono.zip"
# Cell metrics at 100% DPI (used to compute window pixel size for
# centering): cell_w * cols + chrome_w, cell_h * rows + chrome_h.
cell_w_px           = 10
cell_h_px           = 20
chrome_w_px         = 20
chrome_h_px         = 12

[theme.terminal]
# Windows Terminal "MiOS" scheme name -- the WT settings.json patcher
# stamps a scheme block whose colors come from the [colors] table above.
scheme_name         = "MiOS"
profile_name        = "MiOS"
dev_profile_name    = "MiOS-DEV"
# Global summon keybinding (toggle MiOS WT window open/close from
# anywhere on the desktop). Uses WT's globalSummon action targeting
# the named window. Operator: "MiOS app should be invokable via a
# chord/keycombo like winkey + Spacebar to open and close the
# window at will". Override here to change the chord (e.g.
# "ctrl+shift+space", "win+grave_accent" for the classic quake
# pattern, "ctrl+win+m" for a more MiOS-flavored chord).
summon_keys         = "win+space"
summon_window_name  = "MiOS"

[theme.prompt]
# oh-my-posh renderer SSOT. mios.toml IS the canonical source for
# every powerline glyph + prompt symbol; mios.omp.json on disk uses
# placeholder strings that the bootstrap substitutes from this
# section at staging time. Operators edit these values via
# mios.html to change the prompt look without touching omp JSON.
#
# DEFAULTS = rounded powerline (`` U+E0B4 + `` U+E0B6). Sharp
# triangles (`` `` U+E0B0/B2) are an operator override; flat
# (` ` `) is another override. The configurator HTML exposes
# all three.
omp_path                = "/usr/share/mios/oh-my-posh/mios.omp.json"

# Powerline separators between segments. Rounded by default.
powerline_right         = ""   #  rounded right (segment ends on right side)
powerline_left          = ""   #  rounded left  (segment ends on left side)
# Soft separator -- light vertical bar between same-color segments.
powerline_right_soft    = ""   #
powerline_left_soft     = ""   #

# Diamond / leading caps (start of leftmost segment, end of rightmost).
leading_diamond         = ""   #  rounded leading diamond
trailing_diamond        = ""   #  rounded trailing diamond

# Prompt cursor symbol (rendered after the last segment).
prompt_symbol           = "❯"   # ❯ heavy right angle (default user)
prompt_symbol_root      = "⚠"   # ⚠  warning (default root)

# ----------------------------------------------------------------------------
# [branding] -- assets the dashboard / fastfetch / splash screens use.
# Paths resolve relative to /usr/share/mios on Linux and to the
# corresponding M:\MiOS\usr\share\mios on Windows.
# ----------------------------------------------------------------------------
[branding]
logo_ascii          = "fastfetch/mios.txt"
logo_image          = "branding/mios-logo.png"
icon_ico            = "branding/mios.ico"
fastfetch_config    = "fastfetch/config.jsonc"
# Distro tagline -- the one-line elevator pitch under the MiOS banner.
# Used by the agreement-gate banner subtitle, the installer banner
# taglines, the .lnk Description fields, the Add/Remove Programs
# DisplayName, and the dashboard footer. Operator rebrands via
# mios.html for a custom downstream (e.g. "MyCo Dev Workstation").
tagline             = "My Personal Operating System"
tagline_long        = "My Personal Operating System  --  Immutable Fedora AI Workstation"
# tagline_app is the one shown in Windows Application registrations
# (Add/Remove Programs DisplayName, .lnk Description tooltips,
# AppX manifest description, agreement gate banner). Operator
# 2026-05-09: 'the Applications tag/description when installed
# "MiOS - Immutable Fedora AI Workstation" should be defined as
# My Personal Operating System or similar' -- so OS-wide the app
# face says "MiOS - My Personal Operating System" while the
# technical descriptor "Immutable Fedora AI Workstation" lives
# in the dashboard subtitle for context.
tagline_app         = "My Personal Operating System"

[branding.dashboard]
frame_width_cols    = 80
frame_chars         = "╭─╮│╰╯"           # WT-only Unicode box-drawing
frame_color         = "blue"             # ANSI name resolves through [colors]
show_fastfetch      = true
show_logo           = true

# ----------------------------------------------------------------------------
# [theme.fastfetch] -- ANSI-color tags applied to the four fastfetch
# surfaces (ASCII logo, key labels, title line, value output).  These
# resolve through the terminal palette which is sourced from
# mios.toml [colors] -- so the rendered hex always matches MiOS
# palette without per-config hardcoding.  Operators tune via
# mios.html [theme.fastfetch].  build-mios.ps1's Install-MiOSFastfetch
# substitutes these strings into M:\MiOS\fastfetch\config.jsonc at
# install time.
#
# ANSI vs MiOS palette mapping (default):
#   blue   = ansi_4_blue   = accent  (operator blue   #1A407F)
#   yellow = ansi_3_yellow = cursor  (sunset orange   #F35C15)
#   white  = ansi_7_white  = fg      (cream           #E7DFD3)
#   cyan   = ansi_6_cyan   = subtle  (pale blue-grey  #B7C9D7)
#   green  = ansi_2_green  = success (wave green      #3E7765)
#   red    = ansi_1_red    = error   (coral red       #DC271B)
# ----------------------------------------------------------------------------
[theme.fastfetch]
logo_color   = "blue"
keys_color   = "yellow"
title_color  = "white"
output_color = "cyan"

# ----------------------------------------------------------------------------
# [dashboard] -- the framed top-of-terminal banner shown by BOTH the
# Windows-side Show-MiosDashboard (M:\MiOS\powershell\profile.ps1)
# and the Linux-side mios-dashboard (/usr/libexec/mios/mios-dashboard.sh).
# Per operator 2026-05-09: "the dash is set GLOBALLY to Windows and
# Linux dashboards!! same settings!!! ... smaller metric can be
# side-by-side in the dash; freeing up more room for the prompt
# field." Both renderers read THIS section so a configurator edit
# re-skins both terminals on the next render.
#
# Default = compact 80x20-friendly: 1 title + 5 metric rows
# (side-by-side) + 1 verb hint + 4 frame rows = 11 rows total,
# leaves 9 rows for the prompt and command output.
# ----------------------------------------------------------------------------
[dashboard]
title           = "MiOS  --  My Personal Operating System"
show_title      = true
show_logo       = false           # 80x20 doesn't fit the 11-row ASCII logo. Set true once rows >= 30.
show_verb_hints = true
verb_hint       = "build  config  dash  dev  pull  update  help"

# show_services -- Linux-only.  When true (or MIOS_DASH_SERVICES=1),
# mios-dashboard.sh appends the framed Self-replication-loop /
# Quadlet-services / Working-tree blocks below the metric rows.
# Default false so the dashboard stays at ~11 rows in 80x20.  No
# effect on the Windows-side dashboard (those services don't apply).
show_services   = false

# rows: each entry is a list of field-keys.  Multiple keys per row =
# side-by-side rendering with equal column widths within the framed
# inner area.  Available field-keys (built into both renderers; un-
# known keys are silently skipped):
#
#   host_os         "$user@$host -- $os $arch"
#   cpu             "CPU $name $clock GHz ($n c)"
#   gpu_discrete    "GPU $name $vram GiB"     (top discrete GPU only)
#   gpu_integrated  "GPU $name $vram GiB"     (top integrated GPU)
#   ram             "RAM $used / $total GiB ($pct %)"
#   swap            "Swap $used / $total GiB ($pct %)"
#   disk_c          "C: $used / $total GiB ($pct %)"           [Windows]
#   disk_m          "M: $used / $total GiB ($pct %)"
#   disk_root       "/ $used / $total GiB ($pct %)"            [Linux]
#   disk_home       "/home $used / $total GiB ($pct %)"        [Linux]
#   kernel          "Kernel $version"
#   shell           "Shell $name $version"
#   font            "Font $family $size pt"   (from [theme.font])
#   uptime          "Up $days d $hours h $min m"
rows = [
    ["host_os"],
    ["cpu", "gpu_discrete"],
    ["ram", "swap"],
    ["disk_c", "disk_m"],
    ["kernel", "shell", "font"],
]

# ----------------------------------------------------------------------------
# [apps] -- Windows native-app surface. Get-MiOS.ps1's
# Install-MiOSNativeApp creates Start Menu + Desktop shortcuts using
# these names + the AumID below.
# ----------------------------------------------------------------------------
[apps]
aumid               = "MiOS.Workstation"
start_menu_folder   = "MiOS"
hub_shortcut_name   = "MiOS"

[apps.shortcuts]
# Per-verb Start Menu + Desktop shortcuts. The hub "MiOS.lnk" + the
# "Uninstall MiOS.lnk" entry are NOT in this table (they're handled
# separately by Install-MiOSLauncher's hub block + the legacy
# uninstall block). The 3 per-verb apps below are the operator-
# customizable surface; mios.html exposes them as editable fields.
# Each entry: name=display-label, bin=script-in-MiosBinDir,
# icon=ico-name-in-MiosIconsDir, description=tooltip text.
mios_dev    = { name = "MiOS-DEV",    bin = "mios-dev.ps1",    icon = "mios-dev.ico",    description = "Open MiOS-DEV (podman machine) directly to its themed dashboard" }
mios_config = { name = "MiOS Config", bin = "mios-config.ps1", icon = "mios-config.ico", description = "Open mios.html (the HTML configurator) in your default browser to edit mios.toml" }
mios_help   = { name = "MiOS Help",   bin = "mios-help.ps1",   icon = "mios-help.ico",   description = "Full verb + functionality reference (every MiOS command and where things live)" }

# ----------------------------------------------------------------------------
# [preflight] -- minimum host requirements. Get-MiOS.ps1 checks these
# before starting the install; a violation aborts with a clear message
# pointing at which knob the operator can lower (e.g. via mios.html).
# ----------------------------------------------------------------------------
[preflight]
min_windows_build   = 22000      # Windows 11 21H2 minimum
min_disk_free_gb    = 280        # 256 GB partition + headroom
min_ram_gb          = 8
require_virt        = true       # Hyper-V + WSL2 require virtualization
require_admin       = true       # auto-elevation handles this; check is informational

# ----------------------------------------------------------------------------
# [network.retry] -- transient-error retry schedules (seconds). Used by
# anywhere we hit upstream services (quay.io image pulls, GitHub raw
# fetches, winget repository sync, dnf metadata refresh).
# ----------------------------------------------------------------------------
[network.retry]
delays_seconds      = [0, 5, 15, 30]   # 4 attempts: immediate, 5s, 15s, 30s
http_status_retry   = [502, 503, 504]  # only these status codes trigger retry
total_timeout_sec   = 120

# ----------------------------------------------------------------------------
# [profile] -- developer-vs-server-vs-kiosk flavor and feature toggles.
# Maps to MIOS_PROFILE_ROLE, MIOS_PROFILE_FEATURES (comma-joined).
# ----------------------------------------------------------------------------
[profile]
role     = "developer"
features = ["ai", "virtualization", "k3s"]

# ----------------------------------------------------------------------------
# [quadlets.enable] -- per-Quadlet first-boot enablement flags.
# Defaults are all true; the system never disables a service via static
# config. Incompatible deployments are gated via systemd Condition*
# directives in the Quadlet itself. Set a flag to false here only to
# force-disable a service even when it would otherwise run.
# ----------------------------------------------------------------------------
[quadlets.enable]
mios-ai            = true
mios-ceph          = true
mios-k3s           = true
mios-forge         = true
mios-cockpit-link  = true   # surfaces host Cockpit (9090) in Podman Desktop UI
crowdsec-dashboard = true
ollama             = true
cloudws-guacamole  = true
cloudws-pxe-hub    = true
guacamole-postgres = true
guacd              = true

# ----------------------------------------------------------------------------
# [env] -- free-form environment-variable additions. Keys must match POSIX
# env-var rules ([A-Za-z_][A-Za-z0-9_]*). Anything you put here is exported
# verbatim to every script that sources tools/lib/userenv.sh, so it
# propagates throughout the build / install / runtime chain.
# Examples:
#   MIOS_BUILDER_DISTRO = "MiOS-DEV"
#   MIOS_RECHUNK_MAX_LAYERS = "67"
#   MIOS_AI_GRADER = "qwen2.5-coder:7b"
# ----------------------------------------------------------------------------
[env]
