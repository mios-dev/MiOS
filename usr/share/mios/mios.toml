# ----------------------------------------------------------------------------
# [owui.system_prompt] -- MiOS-Agent (MiOS AI) system prompt.
# Concise SYSTEM MAP + PURPOSE in `template`; operator-overridable
# `user_section_path` for personal addenda the installer appends at
# the bottom. Operator binding 2026-05-19: "OWUI'S MiOS-Agent's SYSTEM
# PROMPT SHOULD BE A CONCISE SYSTEM MAP/PURPOSE AND A USER DEFINED
# SECTION TOO--VERY CONCISE AND EFFICIENT".
#
# SSOT here -- mios-owui-install-pipe reads this block; no English
# paragraph is hardcoded in Python anymore.
# ----------------------------------------------------------------------------
[owui.system_prompt]
# Path to an operator-editable markdown file the installer reads + appends
# under "## OPERATOR PROFILE" if the file exists. Empty / missing file = no
# user section.
user_section_path = "~/.config/mios/system-prompt-user.md"

# Concise system map. Token-efficient -- the deeper operating manual lives
# in /usr/share/mios/ai/hermes-soul.md inside Hermes; OWUI's MiOS-Agent is
# just the front door. Edit this block in mios.toml + re-run
# mios-owui-install-pipe to push.
# The template may use Open WebUI's system-prompt variables. OWUI
# substitutes most of them server-side (apply_system_prompt_to_body ->
# prompt_template) BEFORE the pipe runs: {{USER_NAME}} {{USER_EMAIL}}
# {{USER_LOCATION}} {{CURRENT_DATE}} {{CURRENT_DATETIME}} {{CURRENT_TIME}}
# {{CURRENT_WEEKDAY}} {{USER_GROUPS}}. But {{USER_LANGUAGE}} and
# {{CURRENT_TIMEZONE}} are FRONTEND-only variables -- they resolve ONLY
# when the browser sends them in form_data['variables'] (verified against
# OWUI utils/task.py: prompt_template has no case for either). To stop
# either leaking as a literal token, the pipe (_resolve_env_vars) backfills
# any unresolved {{...}} from the host clock + __user__ + metadata.variables
# and then STRIPS whatever it cannot resolve. {{USER_LOCATION}} needs HTTPS
# + Settings>Interface>"location access"; absent it OWUI renders "None"/
# "Unknown" -- the wording above treats those as not-provided. CRITICAL
# (operator 2026-05-22): the browser locale ({{USER_LANGUAGE}}) is NOT the
# reply-language directive -- pinning replies to it while the operator wrote
# in another language was the dual-language bug. Reply language now mirrors
# the operator's own input only; the locale vars drive formatting/units.
# The PERSONA line is composed per-user by the pipe from its UserValves
# (operator-set fields in the OWUI UI); empty fields drop out cleanly.
template = """
# MiOS AI
Front door of MiOS, a local-first agentic OS. You refine intent, plan,
delegate to sub-agents, and shape the final answer. Live facts (services,
GPU, models, paths, what's installed) come from TOOLS at call-time --
never this prompt.

ENVIRONMENT (authoritative facts -- use them, do not assume; treat
"Unknown", "None", or blank as NOT PROVIDED): operator name is
{{USER_NAME}}; now is {{CURRENT_WEEKDAY}} {{CURRENT_DATE}} {{CURRENT_TIME}}
({{CURRENT_TIMEZONE}}); browser locale is {{USER_LANGUAGE}}; location is
{{USER_LOCATION}}. Address the operator only by the name given here -- never
invent one; if it is not provided, use no name.

RESPONSE LANGUAGE (decisive): reply in ENGLISH by default. Use another
language ONLY when the operator's LAST message is itself clearly written in
that language, and then reply in that ONE language only -- never add a
translation, never echo a second language, never switch mid-reply. The
operator's own wording is the ONLY signal for this; the browser locale above
is NOT a language instruction (it can differ from how they write to you), so
never let it pull the reply toward another language.

ENVIRONMENT USE (apply EVERY detected fact above, on EVERY turn -- they are
the operator's real session, not optional):
- TIMEZONE + DATE/TIME -> resolve all temporal references (today, tonight,
  this weekend, "now") against the current date in the operator's timezone,
  and render every date/time in that zone.
- LOCATION -> for ANY place-dependent lookup (weather, places, restaurants,
  events, traffic, "nearby"), localise to it and put it INTO the search query;
  never localise to the server's network location or to a default.
- BROWSER LOCALE -> use it for number, date, and unit conventions (metric vs
  imperial, date order, decimal mark); never to choose the reply language (see
  RESPONSE LANGUAGE), and never to silently convert a figure a tool returned.
- NAME -> address the operator by it; use no name if it is not provided.
A fact marked Unknown / None / blank is simply NOT PROVIDED -- never guess it.

LOOP every request: REASON (what's asked + is it one ask or several?)
-> PLAN (break into steps; for any open/find/install/use X, FAN OUT in
parallel across the inventory + search verbs first; decide local-file
vs web by intent) -> DELEGATE (fire parallel, merge, act on the
highest-confidence result; answer EACH part of a multi-part ask).

RULES: tool stdout is ground truth -- never invent paths/IDs/statuses/
versions/prices/news/weather. Cite real source links from tool results
verbatim; never invent a URL. Never say "X isn't installed" without a
zero-hit fan-out. Native tools are tool_calls, not bash lines. "Process
alive" is not "launched" (check the active window). Greetings: 1-2
sentences, no tools. Never tail with "would you like me to" / "feel free
to" / "let me know".
"""

# ----------------------------------------------------------------------------
# [recipes.<name>] -- OS-shell RECIPES. Each recipe is a templated
# command sequence the agent can compose with operator-supplied params,
# dispatched by `mios-os-recipe <name> key=val key=val...` (or the
# `os_recipe` verb). The recipe declares per-OS templates (linux /
# windows) so the SAME named recipe works in both shells -- agent picks
# OS-aware behaviour without an `if uname...` block in code.
#
# HARDENING:
#   * Only recipes declared in this table are runnable -- the dispatcher
#     refuses unknown names (no arbitrary shell pass-through).
#   * Only `args` keys are accepted from the caller; unknown kwargs are
#     dropped before template expansion.
#   * Every {placeholder} substitution is shell-quoted (shlex on Linux,
#     wsh-quote on Windows) -- no command injection via params.
#   * `permission` = "read" (default, runs as agent) | "write" (needs
#     MIOS_OS_RECIPE_WRITE=1) | "interactive" (operator confirmation).
#   * `wsl_paths` lists arg names whose values get converted via
#     wslpath when the chosen template is `windows` (Linux path ->
#     Windows path so File Explorer / Notepad / etc. accept them).
#
# Operator binding 2026-05-18: "mios-os-control should have more OS
# Specific Shell controls/Commands for BOTH Linux + Windows + part of
# launch params tools/skills" + "RECIPES" + "NO HARDCODES ANYWHERE".
# SSOT here; mios-os-recipe is the generic executor.
# ----------------------------------------------------------------------------
# Windows templates use ABSOLUTE PATHS. The MiOS WSL distro sets
# `appendWindowsPath=false` in /etc/wsl.conf (operator preference: keep
# the Linux PATH clean of Windows-side binaries), so bare `explorer.exe`
# / `powershell.exe` don't resolve via PATH lookup. WSL's binfmt_misc
# still handles .exe execution when the FULL PATH is given -- so
# templates name the binary explicitly. Operator-confirmed 2026-05-19.
[recipes.open-folder]
description = "Open a folder in the OS file manager (Files / Explorer)."
args        = ["path"]
permission  = "read"
wsl_paths   = ["path"]
linux       = "xdg-open {path}"
windows     = "/mnt/c/Windows/explorer.exe {path}"

[recipes.open-shell-folder]
description = "Open a Windows Shell special folder by name (Desktop, Downloads, RecycleBinFolder, AppsFolder, Startup, SendTo, Fonts, ...)."
args        = ["folder"]
permission  = "read"
windows     = "/mnt/c/Windows/explorer.exe shell:{folder}"

[recipes.reveal-in-folder]
description = "Reveal a single file in its containing folder, selected."
args        = ["path"]
permission  = "read"
wsl_paths   = ["path"]
linux       = "xdg-open $(dirname {path})"
windows     = "/mnt/c/Windows/explorer.exe /select,{path}"

[recipes.open-control-panel]
description = "Open a Windows Control Panel page by canonical name (powercfg.cpl, ncpa.cpl, appwiz.cpl, sysdm.cpl, mmsys.cpl, timedate.cpl, ...)."
args        = ["panel"]
permission  = "read"
windows     = "/mnt/c/Windows/System32/control.exe {panel}"

[recipes.open-settings-uri]
description = "Open a Windows Settings page by ms-settings: URI (display, sound, network, system, privacy-microphone, gaming-gamebar, ...)."
args        = ["page"]
permission  = "read"
windows     = "/mnt/c/Windows/System32/cmd.exe /c start ms-settings:{page}"

[recipes.run-powershell]
description = "Run a PowerShell command and return stdout (READ-ONLY by default; the agent should only emit read commands like Get-* / Test-* / Resolve-* / Measure-*)."
args        = ["cmd"]
permission  = "read"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -NonInteractive -Command {cmd}"

[recipes.run-bash]
description = "Run a bash command and return stdout (READ-ONLY)."
args        = ["cmd"]
permission  = "read"
linux       = "bash -lc {cmd}"

[recipes.shutdown]
description = "Shutdown the host (WRITE -- requires MIOS_OS_RECIPE_WRITE=1)."
args        = ["delay_sec"]
permission  = "write"
linux       = "shutdown -h +{delay_sec}"
windows     = "/mnt/c/Windows/System32/shutdown.exe /s /t {delay_sec}"

[recipes.reboot]
description = "Reboot the host (WRITE)."
args        = ["delay_sec"]
permission  = "write"
linux       = "shutdown -r +{delay_sec}"
windows     = "/mnt/c/Windows/System32/shutdown.exe /r /t {delay_sec}"

[recipes.lock-screen]
description = "Lock the workstation."
args        = []
permission  = "read"
linux       = "loginctl lock-session"
windows     = "/mnt/c/Windows/System32/rundll32.exe user32.dll,LockWorkStation"

[recipes.list-drives]
description = "List mounted drives / volumes."
args        = []
permission  = "read"
linux       = "lsblk -o NAME,SIZE,TYPE,MOUNTPOINT,FSTYPE -J"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command 'Get-Volume | ConvertTo-Json'"

[recipes.show-network]
description = "Show active network adapters + IPs."
args        = []
permission  = "read"
linux       = "ip -j addr"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command 'Get-NetIPConfiguration | ConvertTo-Json'"

[recipes.show-process]
description = "Show top processes by CPU / memory."
args        = ["sort"]
permission  = "read"
linux       = "ps -eo pid,pcpu,pmem,comm --sort=-{sort} | head -20"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command 'Get-Process | Sort-Object -Descending -Property {sort} | Select-Object -First 20 Id,CPU,WorkingSet64,ProcessName | ConvertTo-Json'"

[recipes.disk-usage]
description = "What's using disk space: filesystem fill (df) plus the largest top-level directories under / (du), ranked. Use for 'what's taking up space / disk full / largest folders'."
args        = []
permission  = "read"
linux       = "df -h -x tmpfs -x devtmpfs -x overlay; echo '== largest dirs under / =='; du -h -x --max-depth=1 / 2>/dev/null | sort -rh | head -20"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command 'Get-PSDrive -PSProvider FileSystem | Format-Table Name,Used,Free -Auto'"

[recipes.service-status]
description = "systemctl is-active + status snapshot for a Linux service (READ). Pass the unit name as `service`."
args        = ["service"]
permission  = "read"
linux       = "echo '=== is-active ==='; systemctl is-active {service}; echo; echo '=== status ==='; systemctl --no-pager status {service} | head -20"

[recipes.copy-to-clipboard]
description = "Copy a literal string to the system clipboard."
args        = ["text"]
permission  = "read"
linux       = "printf %s {text} | wl-copy"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command Set-Clipboard -Value {text}"

[recipes.read-clipboard]
description = "Read the current clipboard contents."
args        = []
permission  = "read"
linux       = "wl-paste"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command Get-Clipboard"

[recipes.toast]
description = "Show a notification toast."
args        = ["title", "message"]
permission  = "read"
linux       = "notify-send {title} {message}"
windows     = "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command New-BurntToastNotification -Text {title},{message}"

[skills]
# Phase C.2 of the AgentOS roadmap: Sequential Pattern Mining + the
# cross-agent skill catalog. The miner (mios-skills mine) scans
# SurrealDB.tool_call history for repeating (tool, args-shape)
# N-grams and emits skill rows tagged status=candidate. Promoted
# skills become first-class verbs every agent in the stack (agent-
# pipe, MiOS-Hermes, MiOS-OpenCode) can invoke by name via the
# shared SurrealDB row + agent-pipe's /skills/* REST surface.
#
# All knobs SSOT-routed through userenv.sh + the configurator HTML.
# Operator can tighten or loosen mining behaviour without touching
# Python -- tools/skills are "global templates that can be self-
# improved upon".
enable                  = true
# Minimum sequence length the miner considers (N-gram length floor).
# 2 = the smallest pair worth codifying (open_app -> focus_window).
min_length              = 2
# Maximum sequence length the miner emits as a candidate skill.
# Past ~8 verbs the pattern is usually a unique session, not a
# repeatable skill.
max_length              = 8
# Minimum number of times a sequence must appear in the lookback
# window before the miner promotes it to a candidate row. Lower =
# more candidates + more noise; raise for high-traffic deployments.
min_support             = 3
# Lookback window (hours) for the miner. Skills age out of the
# candidate pool when their last occurrence falls outside this
# window. 168h = 1 week of operator behaviour.
window_hours            = 168
# Auto-promote a candidate when confidence (support / unique-session
# count) crosses this threshold. Below the threshold, candidates
# wait for explicit `mios-skills promote <name>` from the operator
# OR via the configurator HTML. 0.0 = manual-only.
auto_promote_threshold  = 0.85
# How often the background miner runs (minutes). The mios-skills-
# miner systemd timer reads this. 0 = disabled (operator runs miner
# on-demand via `mios-skills mine`).
mine_interval_minutes   = 60
# Where /usr/share/mios/skills/ template skills live -- the seed
# library the configurator HTML lists in the "Import" picker.
# These are shipped with the bootc image (read-only); operator-
# authored skills land in /var/lib/mios/skills/ (mutable).
seed_catalog_dir        = "/usr/share/mios/skills"
local_catalog_dir       = "/var/lib/mios/skills"

[agent_pipe]
# 'MiOS' standalone Agent Pipe -- the router / refine / critic chain
# extracted out of the OWUI pipe class into a gateway-agnostic FastAPI
# service. Every gateway (OWUI, Hermes Discord, future Slack/Telegram/
# MCP) points at this service for chat completions; it routes the
# request through the full agentic chain and forwards the heavy
# inference to Hermes-Agent at [hermes].endpoint.
#
# Architecture per operator directive 2026-05-18: "mios discord chats
# not going through MiOS-Agent(OWUI) paths when contacting through
# discord (uses only MiOS-Hermes and doesn't have the same tool
# understanding and environments details now!!!!)" -- centralizing the
# pipe so all gateways get the same tool surface + critic + SurrealDB
# state writes.
endpoint       = "http://localhost:8640/v1"
backend        = "http://localhost:8642/v1"   # hermes-agent OpenAI gateway
backend_model  = "hermes-agent"               # the model id hermes-agent advertises
enable         = true

[surrealdb]
url            = "http://localhost:8000"
user           = "root"
pass           = "root"
namespace      = "mios"
database       = "mios"
data_dir       = "/var/lib/mios/surrealdb"
backend        = "surrealkv:///var/lib/mios/surrealdb/mios.skv"
schema_init    = "/usr/share/mios/surrealdb/schema-init.surql"
embed_model    = "nomic-embed-text"   # OWUI/Ollama-compat embeddings (768-dim)
enable         = true

# ----------------------------------------------------------------------------
# [enhanced_session] -- alternate launch path: full GNOME desktop inside
# the dev VM, exposed via xrdp on `port`, connected to from Windows via
# mstsc.exe (the same Hyper-V Enhanced Session client). Complements the
# WSLg per-window launch path (which keeps working). Operator picks per
# session: per-window for native-Windows-window feel, Enhanced Session
# for libadwaita-consistent theming + rounded corners + Bibata cursor
# (because the full session renders inside the VM and only the final
# pixmap is RDP'd to Windows -- no WSLg-per-window decoration drift).
#
# Driven by:
#   * automation/35-xrdp-enhanced-session.sh installs xrdp + gnome-session
#     and binds the port at install time.
#   * Update-MiOSStartMenuShortcuts.ps1 writes a `MiOS Full Desktop` .lnk
#     pointing at mstsc.exe /v:localhost:<port> /f.
#   * RDP creds = [identity].default_password (same source the keyring
#     auto-unlock service uses).
# ----------------------------------------------------------------------------
[enhanced_session]
enabled    = true
# Port 13389 (NOT the standard 3389). Windows blocks RDP via loopback
# on the canonical 3389 with error 0x708 "console session in progress"
# as a security measure -- mstsc /v:localhost:3389 short-circuits to
# the local console RDP check and refuses to connect even though the
# target is xrdp inside the dev VM. Port 13389 bypasses that check:
# loopback detection only triggers on the standard port.
# Operator-flagged 2026-05-12: mstsc 0x708 error.
port       = 13389
user       = ""                    # empty = inherits [identity].username
resolution = "auto"                # "auto" lets mstsc pick from Windows display; otherwise WxH (e.g. "1920x1080")

# ----------------------------------------------------------------------------
# [appearance] -- system-wide visual identity. Applied to:
#   * Operator's GNOME session (gsettings)
#   * Flatpak runtime overrides (via /usr/libexec/mios/mios-flatpak-init)
#   * Per-user gtk-3.0 + gtk-4.0 settings.ini (via /etc/skel/.config/...)
#   * Bibata cursor + dark Adwaita variants
#
# Lifted out of automation/30-locale-theme.sh + mios-flatpak-init so the
# operator can override in /etc/mios/mios.toml [appearance] without
# patching scripts. Operator directive 2026-05-15: theme drift between
# bake-time and firstboot was leaving Nautilus + others rendered in
# default light Adwaita instead of the operator's preferred dark
# variant.
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# [flatpak] -- channel + remote preferences for all flatpak operations.
# Operator binding 2026-05-19: "target betas for all flatpaks" -- prefer
# the flathub-beta remote where an app publishes there; fall back to
# stable flathub otherwise. Picks up fresher upstreams (newer GNOME
# runtime / GTK4 versions etc.) without manually tracking each app.
# ----------------------------------------------------------------------------
[flatpak]
prefer_beta      = true       # check flathub-beta first; fall back to flathub
default_remote   = "flathub"  # tail-fallback remote when no beta available
default_scope    = "system"   # system | user
noninteractive   = true       # all install/update operations are headless

[appearance]
gtk_theme        = "adw-gtk3-dark"              # GTK3 + libadwaita color-scheme target
adw_color_scheme = "prefer-dark"                # ADW_DEBUG_COLOR_SCHEME for libadwaita apps
cursor_theme     = "Bibata-Modern-Classic"      # XCURSOR_THEME (matches /usr/share/icons/)
cursor_size      = 24                           # XCURSOR_SIZE. 24 matches the Windows-side CursorBaseSize -- operator 2026-05-19: 16px read SMALLER than Windows Bibata under x11/Xwayland. Mirrors [theme.cursor_linux].size.

# ----------------------------------------------------------------------------
# [graphics] -- WSLg-aware GTK4 render-path overrides applied globally
# to ALL flatpaks via mios-flatpak-overrides-apply.
# Operator binding 2026-05-19: "ALL Windowed Linux applications have
# outdated and broken Windowing... out of date GLOBALLY". Root cause is
# WSLg's Weston compositor + dxgkrnl GPU passthrough being mismatched
# with modern GTK4 / libadwaita / Vulkan + dmabuf expectations. The
# stable render path on WSLg is:
#   * GTK4 renderer  -> cairo (CPU compositing; no GL path)
#   * Mesa GL        -> llvmpipe (LIBGL_ALWAYS_SOFTWARE=1)
#   * Vulkan         -> disabled (no dzn passthrough)
# Setting all three forces every flatpak GUI through the path that
# actually works on this compositor -- trades render perf for stability
# + correct rendering of headerbars, scrolling, decorations.
# ----------------------------------------------------------------------------
[graphics]
gsk_renderer       = "cairo"      # GTK4 software renderer
force_software_gl  = true         # LIBGL_ALWAYS_SOFTWARE=1
disable_vulkan     = true         # GDK_VULKAN_DISABLE=1 + DISABLE_LAYERS
gdk_backend        = "x11"        # x11 = route flatpak GTK through XWayland.
                                  # WSLg's Weston Wayland trips Gdk Error 71
                                  # (Protocol error) in WebKit/GTK4 AND lacks
                                  # xdg_popup reposition. Flatpaks DON'T inherit
                                  # the shell's GDK_BACKEND across the sandbox
                                  # boundary, so the override MUST set it here.
                                  # Mirrors [wsl2.desktop_compat].gdk_backend="x11".
# Search path for cursor + icon themes. ~/.local/share/icons LEADS because
# /usr is read-only on bootc (Bibata can't be added there at runtime) and
# flatpaks already bind-mount ~/.local/share/icons via xdg-data/icons:ro --
# so installing Bibata there reaches BOTH host shells and every sandbox.
xcursor_path = "~/.local/share/icons:~/.icons:/usr/share/icons:/usr/share/pixmaps"

[ai]
# Canonical agent surface. Hermes-Agent (the live MiOS agent at /) is a
# DIRECT host install as of 2026-05-13 (automation/38-hermes-agent.sh +
# hermes-agent.service -- NOT the shelved mios-hermes container Quadlet).
# AI chain: ollama container (:11434, raw inference) -> Hermes-Agent
# (:8642/v1, OpenAI gateway + agent layer) -> Open WebUI (:3030, browser
# UI). Open WebUI's OPENAI_API_BASE_URL points at Hermes (:8642/v1), so
# the agent -- not raw ollama -- is the model Open WebUI serves.
endpoint            = "http://localhost:8642/v1"
# Direct-install source for automation/38-hermes-agent.sh. Operators
# pin a tag/SHA for reproducible images via mios.html.
hermes_agent_repo   = "https://github.com/NousResearch/hermes-agent.git"
hermes_agent_ref    = "main"

# opencode (https://opencode.ai) -- code-specialist agent CLI installed
# directly onto the host by automation/39-opencode.sh. NOT a separate
# API server; spawned per-task by Hermes via ACP (Agent Coordination
# Protocol) when a delegate_task entry sets acp_command="opencode".
# This is the cascade pattern: Hermes-Agent is the planner, opencode
# is the code specialist, qwen3:1.7b is the general fan-out worker.
#
# To enable opencode as a global delegation target, set in
# /etc/mios/hermes/config.yaml:
#   delegation:
#     acp_command: opencode
#     acp_args: ["--acp", "--stdio"]
# OR scope per-task by passing acp_command in delegate_task(tasks=[...])
# entries that match code-tagged goals (recommended; keeps the default
# delegate path on qwen3:1.7b for non-code work).
opencode_install_url = "https://opencode.ai/install"
opencode_version    = "latest"           # or pin to a tag
# Inference backend Hermes-Agent forwards to. The ollama container's
# OpenAI-compatible surface; swap to vllm / llama.cpp by editing this.
hermes_backend_url  = "http://localhost:11434/v1"
# SSOT for the default chat model. Stays small (granite4.1:3b, ~3 GB
# resident) so 12 GB / 8-core hosts are still usable out of the box.
# build-mios.ps1's auto-pick in [ai.host_thresholds] below promotes
# this to gpt-oss:20b / granite4.1:30b on hosts with enough RAM by
# writing the picked value into the per-host mios.toml overlay at
# /etc/mios/mios.toml. mios-hermes-firstboot reads the resolved
# value through the layered overlay chain (~/.config -> /etc ->
# /usr/share). mios.html exposes [[ai.catalog]] in the dropdown.
model               = "granite4.1:3b"
embed_model         = "nomic-embed-text"
api_key             = ""
enable_ollama       = true
mcp_registry        = "/usr/share/mios/ai/v1/mcp.json"
system_prompt_file  = ""                # optional override; empty = use canonical
# Bash prompt shortcut: type `@how do I X` (no space after the char)
# and the shell forwards the rest to /usr/bin/mios (-> Hermes /v1).
# Implemented via command_not_found_handle in /etc/profile.d/mios-verbs.sh.
# Operator may override the prefix glyph here -- pick any char bash leaves
# alone at command-position. Avoid: ~ ! ? : # > < & | ; ' " (all reserved
# by the shell parser at command-start). Safe choices: @ , %
prompt_shortcut     = "@"
# Build-time model bake list. Comma-separated; consumed by
# automation/37-ollama-prep.sh as MIOS_OLLAMA_BAKE_MODELS. Empty disables
# baking (image stays small; first-boot pulls instead).
#
# Operator directive 2026-05-15: "models should be embedded in MiOS
# images and be present on Live MiOS deployments via quadlets and
# build pipelines". So we bake the FULL working set into the OCI
# image -- a fresh boot is immediately usable without runtime pulls,
# and bound-images.d picks them up via the additionalimagestores
# under /usr/lib/containers/storage:
#   * granite4.1:3b      -- low-RAM fallback (~2.5 GB)
#   * qwen3:1.7b         -- delegate + auxiliary lanes (~1 GB)
#   * qwen3.5:2b         -- mid-tier chat fallback (~2.6 GB)
#   * qwen3-coder:30b    -- the big tool-calling MoE (~17 GB)
#   * nomic-embed-text   -- embeddings (~0.3 GB)
# Total: ~23 GB baked. Big OCI image, but the OS is "instant-on" --
# fresh deployments don't have to wait for a 17 GB pull on first chat
# (operator-confirmed regression: post-reinstall, only granite4.1:3b +
# nomic-embed-text were present, and the auto-pick fell back to a
# tiny qwen3.5:2b that was barely useful for the agent surface).
#
# Operators on bandwidth-constrained networks can shrink the bake list
# in /etc/mios/mios.toml (operator overlay) -- the OCI image rebuilds
# without the missing models, then runtime pulls them on demand.
# gpt-oss:20b is the BASE for gpt-oss-tools:20b (derived via Modelfile
# template strip in automation/37-ollama-prep.sh from
# /usr/share/mios/ollama/Modelfiles/gpt-oss-tools.Modelfile).
# Listing both: the BASE pull is needed before `ollama create` can
# derive the tools variant. Operator can skip the base post-derive
# (they share blob layers under /var/lib/ollama/models).
# gemma4:e4b (8.9 GB) baked for the delegate-model eval (operator
# directive 2026-05-15). Verdict: ~4x slower per-token + 7x larger
# than qwen3:1.7b, but ~22x more concise on structured-JSON output
# (11 vs 250 tokens emitted). Kept in bake for opt-in use in
# auxiliary lanes that benefit from conciseness; not the default
# delegation.model -- qwen3:1.7b's throughput is decisive for the
# fan-out workload at depth 2 with up to 6 children.
# Operator-approved expansion 2026-05-16 (SOTA model survey):
# ADDED:
#   qwen3.5:4b           -- new Hermes small (small_ram_model)
#   qwen3.5:9b           -- new Hermes mid (mid_ram_model)
#   qwen2.5-coder:7b     -- new opencode small (delegate_task acp_command="opencode")
#   qwen2.5-coder:14b    -- new opencode mid
#   llama3.2-vision:11b  -- new vision_grounding_model (was qwen3-vl:4b)
# KEPT (operator directive "add new + keep old" for fallback compat):
#   granite4.1:3b, gemma4:e4b, qwen3-vl:4b -- previous tier picks remain
#   in the catalog so existing fallback chains + per-host overrides
#   still work and operators can swap back via mios.html.
bake_models         = "qwen3.5:4b,qwen3.5:9b,qwen2.5-coder:7b,qwen2.5-coder:14b,llama3.2-vision:11b,granite4.1:3b,qwen3:1.7b,qwen3.5:2b,qwen3-coder:30b,gpt-oss:20b,nomic-embed-text,qwen3-vl:4b,qwen3:0.6b,qwen3:0.6b-cpu,mios-sys-agent"
# Recommended floor for the default model. granite4.1:3b is a dense
# 3 B model at q4_K_M (~2.5 GB on disk, ~4 GB resident). Sits inside
# the 8 GB usable budget on a 12 GB / 8-core box. Auto-pick promotes
# beyond this on hosts with more headroom.
ram_floor_gb        = 8
# Where ollama reads/writes models at runtime. Both paths are wired in
# the Quadlet via Volume= directives; OLLAMA_MODELS points at the
# writable one.
seed_dir            = "/usr/share/ollama/models"     # immutable, build-baked
runtime_dir         = "/var/lib/ollama/models"        # writable, first-boot-seeded

