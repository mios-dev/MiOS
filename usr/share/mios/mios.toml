[containers.mios-llm-light.Container]
AddDevice = "${MIOS_GPU_DEVICE:-nvidia.com/gpu=all}"
ContainerName = "mios-llm-light"
Entrypoint = "/app/llama-swap"
Environment = [
  "HOME=/var/lib/mios/llamacpp",
  "LD_LIBRARY_PATH=/usr/lib/wsl/lib:/usr/local/cuda/lib64"
]
EnvironmentFile = "/etc/mios/install.env"
# Health gate: same upstream llama-swap:cuda baked `curl localhost:8080/` port mismatch
# as the cpu-node lane -> perpetual Unhealthy while it serves 200 on ${MIOS_PORT_LLM_LIGHT}.
# Override against the real port. Probes /v1/models (not /health): llama-swap answers it
# from config.yaml WITHOUT forcing a model load, so the proxy reads healthy while idle
# instead of flapping on lazy model swap. NO-HARDCODE: port from ${MIOS_PORT_LLM_LIGHT}.
HealthCmd = "curl -fsS http://localhost:${MIOS_PORT_LLM_LIGHT}/v1/models || exit 1"
HealthInterval = "30s"
HealthTimeout = "10s"
HealthStartPeriod = "60s"
HealthRetries = "3"
Exec = "--config /app/config.yaml --listen 0.0.0.0:${MIOS_PORT_LLM_LIGHT:-11450}"
Group = "${MIOS_LLAMACPP_GID:-827}"
Image = "${MIOS_LLM_LIGHT_IMAGE:-ghcr.io/mostlygeek/llama-swap:cuda}"
Label = [
  "org.opencontainers.image.title=mios-llm-light",
  "org.opencontainers.image.documentation=https://github.com/mostlygeek/llama-swap"
]
Pod = "mios-ai.pod"
User = "${MIOS_LLAMACPP_UID:-827}"
Volume = [
  "/usr/share/mios/llamacpp/models:/models:ro,Z",
  "/usr/share/mios/llamacpp/mios-llm-light.yaml:/app/config.yaml:ro,Z",
  "${MIOS_LLAMACPP_SLOT_DIR:-/var/lib/mios/llamacpp/slots}:${MIOS_LLAMACPP_SLOT_DIR:-/var/lib/mios/llamacpp/slots}:Z"
]

[containers.mios-llm-light.Install]
WantedBy = "multi-user.target default.target"

[containers.mios-llm-light.Service]
Delegate = "yes"
EnvironmentFile = "/etc/mios/install.env"
Restart = "on-failure"
RestartSec = "10s"
TimeoutStartSec = "180s"

