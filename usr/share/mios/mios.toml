# ─── Section: System ──────────────────────────────────────────────────
[verbs.system_status]
section    = "System"
sig        = ""
desc       = "Live LOCAL machine health dashboard (JSON): OS (Linux distro + kernel + whether this is WSL2 + the WINDOWS HOST OS caption/version when on WSL2), GPU/VRAM, RAM, disk usage, running services, loaded ollama models. THE verb for 'system status', 'system health', 'what OS / Windows version am I on', 'is the GPU/memory/disk ok'. Local state only -- NEVER a web search, and NEVER answer the OS/host from training data: read it HERE (the `os` field). Single source of truth for these live numbers."
examples   = ["what OS / Windows version am I actually running", "how's my system doing right now", "check GPU and VRAM usage", "is my disk getting full"]
tier       = "core"
permission = "read"
cmd        = "mios-system-status"
max_result_chars = 5000   # the full dashboard JSON (GPU/RAM/disk/services/models) > the 1500 default; fit it whole so the model never invents missing values

[verbs.sys_env]
section    = "System"
sig        = ""
desc       = "READ the cached system/environment inventory (shared store): identity, the host OS + whether this is WSL2 + the Windows host, host hardware, which MiOS stack services are up/down, loaded ollama models, and the installed launchable-app inventory by category. Read this to know the ENVIRONMENT and WHAT IS INSTALLED/RUNNING instead of guessing the OS or the apps. Cached (may be slightly stale -> sys_env_refresh). Read-only."
model_name = "sys_env_snapshot"
examples   = ["what OS / environment am I running on", "what's installed and running on this box", "list the MiOS services and loaded models", "give me the environment inventory"]
tier       = "core"
permission = "read"
cmd        = "mios-sys-env get --json"

[verbs.sys_env_refresh]
section    = "System"
sig        = ""
desc       = "WRITE/UPDATE the cached environment inventory: re-probe apps + services + models + host and overwrite the shared sys_env_snapshot database. Call when you suspect the sys_env_snapshot cache is stale (e.g. just installed/removed an app or started a service). This is the refresh half; sys_env_snapshot is the read half."
examples   = ["refresh the system environment cache", "re-probe installed apps and services", "the inventory is stale, update it", "rescan what's installed after this install"]
tier       = "common"
permission = "write"
cmd        = "mios-sys-env refresh"

[verbs.system_logs]
section    = "System"
sig        = 'unit?, since="10m"?, lines=50?, level?'
desc       = "Read recent LOG / journal entries from systemd. Filter by unit (mios-agent-pipe / hermes-agent / mios-open-webui / ...) or level (err / warning / info). Default: 50 lines from the last 10 minutes. Use to debug what a service printed -- NOT for live health numbers (system_status) or service up/down state (service_status)."
examples   = ["show me the agent-pipe error logs", "what did open-webui log in the last hour", "any warnings in the journal recently", "tail the hermes service logs"]
tier       = "core"
permission = "read"
cmd        = "mios-sysview logs --since {since=10m} --lines {lines=50}{unit?--unit}{level?--level}"
  [verbs.system_logs.params.unit]
  type = "string"
  desc = "systemd unit name; empty = all"
  aliases = ["service", "name"]
  [verbs.system_logs.params.since]
  type = "string"
  desc = "journalctl --since spec ('10m', '1h', '2026-05-19', ...)"
  default = "10m"
  aliases = ["from", "window"]
  [verbs.system_logs.params.lines]
  type = "integer"
  default = 50
  aliases = ["n", "limit"]
  [verbs.system_logs.params.level]
  type = "string"
  enum = ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
  desc = "Minimum severity (journalctl -p)"

[verbs.service_status]
section    = "System"
sig        = "name"
desc       = "Check ONE Linux systemd SERVICE: is-active state + a status snapshot for the named unit (e.g. mios-agent-pipe, hermes-agent). For systemd services -- NOT podman CONTAINERS (use container_status) and NOT whole-machine health (use system_status). Read-only."
examples   = ["is the agent-pipe service running", "status of the hermes systemd unit", "check if mios-open-webui is active", "is the cron-director service up"]
tier       = "common"
permission = "read"
cmd        = "mios-os-recipe service-status service={name}"
  [verbs.service_status.params.name]
  type = "string"
  aliases = ["service", "unit"]

[verbs.service_restart]
section    = "System"
sig        = "name"
desc       = "Gracefully RESTART ONE Linux systemd SERVICE by unit name. For systemd services -- NOT podman containers (use container_restart). Note: for MiOS-owned services prefer the mios-restart recipe which preserves state. Write-class."
examples   = ["restart the agent-pipe service", "bounce the hermes systemd unit", "reload the cron-director service", "restart mios-open-webui"]
tier       = "common"
permission = "write"
cmd        = "mios-restart {name}"
  [verbs.service_restart.params.name]
  type = "string"
  aliases = ["service", "unit"]

[verbs.process_list]
section    = "System"
sig        = 'filter?, sort="rss"?, limit=20?'
desc       = "List running OS PROCESSES, optionally filtered by name; sorted by rss (memory) / cpu / pid. Use to see which processes are running and what they consume. For container/service state use container_status / service_status instead."
examples   = ["what's using the most memory", "list processes named ollama", "show top CPU processes", "is python still running"]
tier       = "common"
permission = "read"
cmd        = "mios-sysview proc --sort {sort=rss} --limit {limit=20}{filter?--filter}"
max_result_chars = 6000   # fit the default 20-process list whole (1500 cut it mid-process -> fabricated entries)
  [verbs.process_list.params.filter]
  type = "string"
  aliases = ["name", "query"]
  [verbs.process_list.params.sort]
  type = "string"
  enum = ["rss", "cpu", "pid"]
  default = "rss"
  [verbs.process_list.params.limit]
  type = "integer"
  default = 20

# disk-usage is NOT a verb -- it's a [recipes.disk-usage] recipe (the
# df/du command lives in the recipe SSOT below, not hardcoded in
# agent-pipe's dispatch). Run it via os_recipe(name="disk-usage").
# Operator binding 2026-05-21: "NO hardcodes ... should all be native
# OpenAI tools/skills/recipes ... unless baked in the modelfile or docs".

[verbs.container_status]
section    = "System"
sig        = "name?"
desc       = "Check podman/quadlet CONTAINER status. Empty name = all containers. For podman CONTAINERS -- NOT systemd services (use service_status) and NOT whole-machine health (system_status). Read-only."
examples   = ["are my podman containers running", "status of the searxng container", "list all container states", "is the adguard container up"]
tier       = "common"
permission = "read"
cmd        = "mios-sysview containers{name?--name}"
max_result_chars = 4000   # fit the full container list whole (avoids a mid-row cut the model would complete from imagination)
  [verbs.container_status.params.name]
  type = "string"
  aliases = ["container", "unit"]

[verbs.container_restart]
section    = "System"
sig        = "name"
desc       = "RESTART ONE podman/quadlet CONTAINER by name. For podman CONTAINERS -- NOT systemd services (use service_restart). Write-class."
examples   = ["restart the searxng container", "bounce the adguard podman container", "restart my open-webui container", "recycle the firecrawl container"]
tier       = "common"
permission = "write"
cmd        = "mios-sysview container-restart --name {name}"
  [verbs.container_restart.params.name]
  type = "string"
  aliases = ["container", "unit"]

# ─── Section: OS shell verbs (mios.toml-driven recipes) ───────────────
# ─── Section: Semantic app discovery ──────────────────────────────────
[verbs.app_search]
section    = "Discovery / resolution"
