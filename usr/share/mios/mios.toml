Restart = "on-failure"
RestartSec = "10s"
TimeoutStartSec = "180s"

[containers.mios-webtools-firecrawl-worker.Unit]
After = "mios-webtools-redis.service"
Description = "'MiOS' web-tools firecrawl worker (Bull queue processor)"
Wants = "mios-webtools-redis.service"

[containers.mios-webtools-redis.Container]
AutoUpdate = "registry"
ContainerName = "mios-webtools-redis"
Exec = "redis-server --bind 127.0.0.1 --port 6380 --appendonly no"
Group = "0"
Image = "docker.io/redis:7-alpine"
Label = "org.opencontainers.image.title=mios-webtools-redis"
Pod = "mios-webtools.pod"
User = "0"

[containers.mios-webtools-redis.Install]
WantedBy = "multi-user.target default.target"

[containers.mios-webtools-redis.Service]
Delegate = "yes"
Restart = "on-failure"
RestartSec = "10s"
TimeoutStartSec = "60s"

[containers.mios-webtools-redis.Unit]
Description = "'MiOS' web-tools redis (firecrawl queue + ratelimit store)"

[containers.mios-otelcol.Container]
ContainerName = "mios-otelcol"
Group = "${MIOS_OTELCOL_GID:-829}"
Image = "docker.io/jaegertracing/all-in-one:latest@sha256:ab6f1a1f0fb49ea08bcd19f6b84f6081d0d44b364b6de148e1798eb5816bacac"
Environment = [
  "COLLECTOR_OTLP_ENABLED=true"
]
Label = [
  "org.opencontainers.image.title=mios-otelcol",
  "org.opencontainers.image.url=http://localhost:16686/",
  "io.podman_desktop.openInBrowser=http://localhost:16686/"
]
Pod = "mios-webtools.pod"
User = "${MIOS_OTELCOL_UID:-829}"

[containers.mios-otelcol.Install]
WantedBy = "multi-user.target default.target"

[containers.mios-otelcol.Service]
Delegate = "yes"
Restart = "on-failure"
RestartSec = "10s"
TimeoutStartSec = "300s"

[containers.mios-otelcol.Unit]
After = "network-online.target"
Description = "'MiOS' OpenTelemetry Collector and Jaeger Trace Viewer"
Wants = "network-online.target"


# ─── Editions Matrix ─────────────────────────────────────────────────────────
# Defines the different flavors/editions of MiOS that can be built by the
# pipeline (T-146). The build scripts can load an edition profile to override
# the default autounattend and branding keys from a single SSOT.
[editions.mios]
autounattend.uup_channel     = "retail"
autounattend.uup_arch        = "amd64"
autounattend.posture         = "B"
autounattend.debloat_profile  = "minimal"
autounattend.xbox.enable     = "false"
colors.accent                = "#1A407F"
branding.living_wallpaper    = "false"

[editions.mios-xbox]
autounattend.uup_channel     = "dev"
autounattend.uup_arch        = "amd64"
autounattend.posture         = "C"
autounattend.debloat_profile  = "gaming"
autounattend.xbox.enable     = "true"
colors.accent                = "#282262"
branding.living_wallpaper    = "true"

[editions.mios-xbox-arm]
autounattend.uup_channel     = "dev"
autounattend.uup_arch        = "arm64"
autounattend.posture         = "C"
autounattend.debloat_profile  = "gaming"
autounattend.xbox.enable     = "true"
colors.accent                = "#4B105C"
branding.living_wallpaper    = "true"
