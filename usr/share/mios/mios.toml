[verbs.file_edit]
section = "File edits"
sig = "op, path, content?, find?, replace?, line?"
desc = "Edit text files on disk. op='create' (write new file), 'replace' (replace matching text), 'insert' (insert text at line N, default prepend)."
tier = "core"
permission = "write"
sandbox_profile = "workspace"   # opt-in sandbox confinement (see [dispatch].sandbox_enforce)
# Backed by the real mios-text-edit primitive (create/str_replace/insert).
# Placeholders are shlex-quoted by the renderer -- do NOT wrap them in literal
# quotes. For large/multi-line content prefer the dedicated create_file /
# replace_file_text / insert_file_lines verbs (they stream content via stdin).
cmd = "if [ {op} = create ]; then mios-text-edit create {path} --content {content}; elif [ {op} = replace ]; then mios-text-edit str_replace {path} --old {find} --new {replace}; else mios-text-edit insert {path} --line {line=0} --content {content}; fi"
  [verbs.file_edit.params.op]
  type = "string"
  enum = ["create", "replace", "insert"]
