examples   = ["open youtube.com in my browser", "pull up the GitHub repo page on screen", "show me this link in Chrome", "open my bank's website"]
tier       = "core"
permission = "write"
cmd        = "mios-open-url {url}{browser?}"
  [verbs.open_url.params.url]
  type    = "string"
