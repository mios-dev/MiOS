enable = true   # default ON; toggle via /configurator.html (configurator.packages.<section>.enable)
pkgs = [
    "gnome-shell",
    "gdm",
    "podman",
    "bootc",
    "libvirt",
    "kernel-core",
    "firewalld",
    "cockpit",
    "NetworkManager",
    "pipewire",
    "tuned",
    "chrony",
    "openssh-server",
]
[packages.bloat]
enable = false  # opt-in only; gnome-tour / PackageKit / malcontent — bloat by design, default OFF
pkgs = [
    "malcontent-control",
    "malcontent-pam",
    "malcontent-tools",
    "gnome-tour",
    "gnome-initial-setup",
    "PackageKit",
    "PackageKit-command-not-found",
]

[packages.nut]
enable = true   # default ON; toggle via /configurator.html (configurator.packages.<section>.enable)
