desc = "Query system status: query='status' (overall), 'env' (environment variables), 'env-refresh' (reload shell env), 'logs' (system logs for target service), 'service-status' (systemd status), 'processes' (top), 'containers' (podman ps)."
tier = "core"
cmd = "if [ {query} = status ]; then mios-system-status; elif [ {query} = logs ]; then journalctl -u {target} -n 50 --no-pager; elif [ {query} = service-status ]; then systemctl status {target} --no-pager; elif [ {query} = processes ]; then ps aux --sort=-%cpu | head -n 20; elif [ {query} = containers ]; then podman ps; else mios-system-status; fi"
  [verbs.system.params.query]
