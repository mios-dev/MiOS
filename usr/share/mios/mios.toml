# ─── Section: System ──────────────────────────────────────────────────
[verbs.system_status]
hidden = true
section    = "System"
sig        = ""
desc       = "Live LOCAL machine health dashboard (JSON): OS (Linux distro + kernel + whether this is WSL2 + the WINDOWS HOST OS caption/version when on WSL2), GPU/VRAM, RAM, disk usage, running services, loaded ollama models. THE verb for 'system status', 'system health', 'what OS / Windows version am I on', 'is the GPU/memory/disk ok'. Local state only -- NEVER a web search, and NEVER answer the OS/host from training data: read it HERE (the `os` field). Single source of truth for these live numbers."
examples   = ["what OS / Windows version am I actually running", "how's my system doing right now", "check GPU and VRAM usage", "is my disk getting full"]
tier = "rare"
cmd        = "mios-system-status"
max_result_chars = 5000   # the full dashboard JSON (GPU/RAM/disk/services/models) > the 1500 default; fit it whole so the model never invents missing values

[verbs.sys_env]
hidden = true
section    = "System"
sig        = ""
desc       = "READ the cached system/environment inventory (shared store): identity, the host OS + whether this is WSL2 + the Windows host, host hardware, which MiOS stack services are up/down, loaded ollama models, and the installed launchable-app inventory by category. Read this to know the ENVIRONMENT and WHAT IS INSTALLED/RUNNING instead of guessing the OS or the apps. Cached (may be slightly stale -> sys_env_refresh). Read-only."
model_name = "sys_env_snapshot"
examples   = ["what OS / environment am I running on", "what's installed and running on this box", "list the MiOS services and loaded models", "give me the environment inventory"]
tier = "rare"
cmd        = "mios-sys-env get --json"

[verbs.sys_env_refresh]
hidden = true
section    = "System"
sig        = ""
desc       = "WRITE/UPDATE the cached environment inventory: re-probe apps + services + models + host and overwrite the shared sys_env_snapshot database. Call when you suspect the sys_env_snapshot cache is stale (e.g. just installed/removed an app or started a service). This is the refresh half; sys_env_snapshot is the read half."
examples   = ["refresh the system environment cache", "re-probe installed apps and services", "the inventory is stale, update it", "rescan what's installed after this install"]
tier = "rare"
permission = "write"
cmd        = "mios-sys-env refresh"

[verbs.system_logs]
hidden = true
section    = "System"
sig        = 'unit?, since="10m"?, lines=50?, level?'
desc       = "Read recent LOG / journal entries from systemd. Filter by unit (mios-agent-pipe / hermes-agent / mios-open-webui / ...) or level (err / warning / info). Default: 50 lines from the last 10 minutes. Use to debug what a service printed -- NOT for live health numbers (system_status) or service up/down state (service_status)."
examples   = ["show me the agent-pipe error logs", "what did open-webui log in the last hour", "any warnings in the journal recently", "tail the hermes service logs"]
tier = "rare"
cmd        = "mios-sysview logs --since {since=10m} --lines {lines=50}{unit?--unit}{level?--level}"
# Logs are bulky: a DEFAULT 50-line slice of a busy unit (e.g. mios-open-webui)
# measures ~10 KB, but without an explicit cap this verb inherits the global
# READ_TOOL_ENRICH_CHARS default (1500) and gets head-tail-truncated to ~19% of
# what the model asked for. 12000 fits the worst-case default-50 slice whole
# while still bounding a pathological large-`lines` request. (Siblings
# system_status / service_status / process_list set their own caps similarly.)
max_result_chars = 12000
  [verbs.system_logs.params.unit]
  type = "string"
  desc = "systemd unit name; empty = all"
  aliases = ["service", "name"]
  [verbs.system_logs.params.since]
  type = "string"
  desc = "journalctl --since spec ('10m', '1h', '2026-05-19', ...)"
  default = "10m"
  aliases = ["from", "window"]
  [verbs.system_logs.params.lines]
  type = "integer"
  default = 50
  aliases = ["n", "limit"]
  [verbs.system_logs.params.level]
  type = "string"
  enum = ["emerg", "alert", "crit", "err", "warning", "notice", "info", "debug"]
  desc = "Minimum severity (journalctl -p)"

[verbs.service_status]
hidden = true
section    = "System"
sig        = "name"
desc       = "Check ONE Linux systemd SERVICE: is-active state + a status snapshot for the named unit (e.g. mios-agent-pipe, hermes-agent). For systemd services -- NOT podman CONTAINERS (use container_status) and NOT whole-machine health (use system_status). Read-only."
examples   = ["is the agent-pipe service running", "status of the hermes systemd unit", "check if mios-open-webui is active", "is the cron-director service up"]
tier = "rare"
cmd        = "mios-os-recipe service-status service={name}"
  [verbs.service_status.params.name]
  type = "string"
  aliases = ["service", "unit"]

[verbs.service_restart]
section    = "System"
sig        = "name"
desc       = "Gracefully RESTART ONE Linux systemd SERVICE by unit name. For systemd services -- NOT podman containers (use container_restart). Note: for MiOS-owned services prefer the mios-restart recipe which preserves state. Write-class."
examples   = ["restart the agent-pipe service", "bounce the hermes systemd unit", "reload the cron-director service", "restart mios-open-webui"]
permission = "write"
cmd        = "mios-restart {name}"
  [verbs.service_restart.params.name]
  type = "string"
  aliases = ["service", "unit"]

[verbs.process_list]
hidden = true
section    = "System"
sig        = 'filter?, sort="rss"?, limit=20?'
desc       = "List running OS PROCESSES, optionally filtered by name; sorted by rss (memory) / cpu / pid. Use to see which processes are running and what they consume. For container/service state use container_status / service_status instead."
examples   = ["what's using the most memory", "list processes named ollama", "show top CPU processes", "is python still running"]
tier = "rare"
cmd        = "mios-sysview proc --sort {sort=rss} --limit {limit=20}{filter?--filter}"
max_result_chars = 6000   # fit the default 20-process list whole (1500 cut it mid-process -> fabricated entries)
  [verbs.process_list.params.filter]
  type = "string"
  aliases = ["name", "query"]
  [verbs.process_list.params.sort]
  type = "string"
  enum = ["rss", "cpu", "pid"]
  default = "rss"
  [verbs.process_list.params.limit]
  type = "integer"
  default = 20

# disk-usage is NOT a verb -- it's a [recipes.disk-usage] recipe (the
# df/du command lives in the recipe SSOT below, not hardcoded in
# agent-pipe's dispatch). Run it via os_recipe(name="disk-usage").
# Operator binding "NO hardcodes... should all be native
# OpenAI tools/skills/recipes ... unless baked in the modelfile or docs".

[verbs.container_status]
hidden = true
section    = "System"
sig        = "name?"
desc       = "Check podman/quadlet CONTAINER status. Empty name = all containers. For podman CONTAINERS -- NOT systemd services (use service_status) and NOT whole-machine health (system_status). Read-only."
examples   = ["are my podman containers running", "status of the searxng container", "list all container states", "is the adguard container up"]
tier = "rare"
cmd        = "mios-sysview containers{name?--name}"
max_result_chars = 4000   # fit the full container list whole (avoids a mid-row cut the model would complete from imagination)
  [verbs.container_status.params.name]
  type = "string"
  aliases = ["container", "unit"]

[verbs.container_restart]
section    = "System"
sig        = "name"
desc       = "RESTART ONE podman/quadlet CONTAINER by name. For podman CONTAINERS -- NOT systemd services (use service_restart). Write-class."
examples   = ["restart the searxng container", "bounce the adguard podman container", "restart my open-webui container", "recycle the firecrawl container"]
permission = "write"
tier       = "destructive"
cmd        = "mios-sysview container-restart --name {name}"
  [verbs.container_restart.params.name]
  type = "string"
  aliases = ["container", "unit"]

# ─── Section: OS shell verbs (mios.toml-driven recipes) ───────────────
# ─── Section: Semantic app discovery ──────────────────────────────────
[verbs.app_search]
hidden = true
section    = "Discovery / resolution"
sig        = "query, limit=5?"
desc       = "SEMANTIC search over the installed-app inventory: given a fuzzy natural-language description ('my note-taking app', 'phone settings'), return the top matching installed apps {name, category, launch, score}. Use when you need to FIND which app matches a vague description. For the FULL installed-app+game list use list_installed_apps; to actually launch use launch_app."
examples   = ["what's my note-taking app called?", "find the app I use for video calls", "which installed app handles photo editing?", "search my apps for a music player"]
tier = "rare"
cmd        = "mios-app-search --json --limit {limit=5} {query!}"
  [verbs.app_search.params.query]
  type = "string"
  desc = "Natural-language description of what app the user means."
  aliases = ["q", "search", "term"]
  [verbs.app_search.params.limit]
  type = "integer"
  default = 5
  aliases = ["top_k", "k", "n"]

# ─── Section: Verb discovery (progressive disclosure) ────────────────
[verbs.tool_search]
section    = "Verb discovery"
sig        = "query, limit=5?"
desc       = "Find VERBS/TOOLS in the catalog by natural-language query when no listed verb obviously fits the user's ask. Returns top-k {name, sig, desc, score} via embedding search over verb name+description. Use to DISCOVER a capability you don't see; not for searching the web (web_search) or local files (windows_file_search)."
examples   = ["is there a verb for resizing images", "find a tool that can do screen capture", "what tool handles pdf conversion", "search the verb catalog for a calendar capability"]
tier       = "core"
cmd        = "mios-tool-search --json --limit {limit=5} {query!}"
  [verbs.tool_search.params.query]
  type = "string"
  desc = "Natural-language description of what you want to do."
  aliases = ["q", "search", "term"]
  [verbs.tool_search.params.limit]
  type = "integer"
  default = 5
  aliases = ["top_k", "k", "n"]

[verbs.handoff]
hidden = true
section    = "Agent collaboration"
sig        = "to?, skill?, context_id, goal?, from?"
desc       = "TRANSFER (take-over) the live session to ANOTHER agent: the target inherits the shared session state via the A2A contextId and CONTINUES the workflow in your place. Use when a DIFFERENT model should TAKE OVER from here (e.g. hand a heavy task down to a lightweight CPU agent). This passes control away; to get a sub-answer back while staying in control use delegate_subtask_to_peer_agent."
model_name = "transfer_session_to_agent"
examples   = ["hand this conversation over to the CPU agent", "transfer control to a lighter model to continue", "let another agent take over from here", "pass the session to the daemon agent"]
tier = "rare"
cmd        = "mios-handoff {to?--to} {skill?--skill} --context-id {context_id!} {goal?--goal} {from?--from}"
  [verbs.handoff.params.to]
  type    = "string"
  desc    = "Target peer id (from the federated A2A roster). Exclusive with skill."
  aliases = ["target", "peer", "peer_id", "agent"]
  [verbs.handoff.params.skill]
  type    = "string"
  desc    = "Route by declared skill name (first ready peer wins). Exclusive with to."
  aliases = ["capability", "tag"]
  [verbs.handoff.params.context_id]
  type    = "string"
  desc    = "A2A contextId carrying the session state the target inherits. REQUIRED."
  aliases = ["contextId", "ctx", "thread"]
  [verbs.handoff.params.goal]
  type    = "string"
  desc    = "Take-over directive (what the target should do next)."
  aliases = ["directive", "next", "task"]
  [verbs.handoff.params.from]
  type    = "string"
  desc    = "Originating agent name; surfaced to the target so it knows who handed off."
  aliases = ["source", "src", "from_agent"]

[verbs.a2a_delegate]
hidden = true
section    = "Agent collaboration"
sig        = "peer?, skill?, text, context_id?"
desc       = "Hand a SUB-TASK to another registered agent and GET ITS ANSWER BACK so YOU fold it into your own reasoning (you stay in control; this is NOT a final user reply and NOT a take-over). Pick a peer by id (mios-a2a-delegate --list-peers) or by skill name (--list-skills). Use when you want a second agent's result; to PASS THE SESSION to another agent use transfer_session_to_agent."
model_name = "delegate_subtask_to_peer_agent"
examples   = ["ask the code agent to handle this part and return it", "delegate this sub-question to a peer agent", "get a specialist agent's answer to fold in", "have another agent solve this piece for me"]
tier = "rare"
cmd        = "mios-a2a-delegate {peer?--peer} {skill?--skill} {context_id?--context-id} --text {text!}"
  [verbs.a2a_delegate.params.peer]
  type    = "string"
  desc    = "Peer id from the federated A2A roster."
  aliases = ["peer_id", "agent", "target", "to"]
  [verbs.a2a_delegate.params.skill]
  type    = "string"
  desc    = "Skill name; routes to the first ready peer that advertises it."
  aliases = ["capability", "tag"]
  [verbs.a2a_delegate.params.text]
  type    = "string"
  desc    = "The sub-task prompt to forward to the peer."
  aliases = ["prompt", "q", "query", "message", "msg"]
  [verbs.a2a_delegate.params.context_id]
  type    = "string"
  desc    = "A2A contextId to share the inter-agent conversation thread."
  aliases = ["contextId", "ctx", "thread"]

[verbs.summarize]
section    = "Discovery / resolution"
sig        = "text?, file?, tiers=l0,l1?"
desc       = "TIERED summarisation of a document/text (the L0/L1/L2 gating primitive): L0 = one-sentence ~100-token abstract, L1 = ~2k-token structured overview (sections + key points), L2 = the raw text (returned as a char count, fetched on demand). Pass `text` or a `file` path. Runs on the CPU light lane. This CONDENSES content you supply -- it does NOT search or store anything (use notes_vault_ingest to persist)."
examples   = ["summarize this document into a short abstract", "give me an L1 overview of this file", "condense this text into tiered summaries", "make a one-sentence summary of this article"]
cmd        = "mios-summarize --json {text?--text} {file?--file} {tiers?--tiers}"
  [verbs.summarize.params.text]
  type    = "string"
  desc    = "Inline text to summarise (or use file)."
