press_enter_close  = "  Press Enter to close this elevated bootstrap window..."
# In-line success transition (operator 2026-05-09: "spawn too many
# powershell windows ... should be performed in-line in one
# promoted Powershell window after bootstrap").  After install
# completes, this conhost dot-sources the MiOS profile so the
# operator stays in the same window and types `mios <verb>` here.
success_transition  = "  [+] Bootstrap complete. Loading MiOS terminal in this window..."
profile_load_failed = "  [!] MiOS profile load failed: "
profile_load_hint   = "      Open a fresh MiOS shortcut to retry."
profile_missing     = "  [!] M:\\MiOS\\powershell\\profile.ps1 not found -- open the MiOS shortcut to launch the app window."

# ----------------------------------------------------------------------------
# [messages.steps] -- Set-Step descriptions emitted during the install
# pipeline.  These are the per-line yellow-bracket prefix strings the
# operator sees during Phase 3 (data disk, mios.git overlay,
# mios-bootstrap shadow, MiOS-DEV provisioning, etc.).  Operators
# rebrand the install narrative via mios.html [messages.steps] without
# touching any PowerShell.
# ----------------------------------------------------------------------------
[messages.steps]
disk_sizing_template       = "Sizing MiOS data disk ({mb} MB on {drive}:)..."
disk_already_template      = "MiOS data disk already on {drive}: ({size_gb} GB, NTFS)"
mios_git_init              = "Initializing mios.git as the M:\\ working tree"
mios_git_update            = "Updating mios.git (fetch + hard reset @ M:\\)"
mios_git_overlaid          = "mios.git overlaid at M:\\"
mios_bootstrap_clone       = "Cloning mios-bootstrap.git -> shadow M:\\MiOS\\bootstrap-shadow"
mios_bootstrap_update      = "Updating mios-bootstrap.git shadow (fetch + hard reset)"
mios_bootstrap_overlay     = "Overlaying mios-bootstrap files onto M:\\"
entry_scripts_staged       = "Entry scripts staged at M:\\MiOS\\bin"
miosdev_init_template      = "Initializing MiOS-DEV ({cpus} CPUs / {ram_gb}GB / {disk_gb}GB disk)"
# Smoke-test labels (post-Phase-3 dev VM health check).  Operator
# sees these whenever Test-MiosDevDistroHealthy runs.  All 4 are
# templates with {name} = the resolved distro (podman-MiOS-DEV or
# MiOS-DEV depending on whether Rename-PodmanDevDistro fired).
smoke_header_template      = "Smoke-testing {distro} before rename..."
smoke_responsive_template  = "smoke 1/4: {name} is responsive"
smoke_systemd_template     = "smoke 2/4: systemd state '{state}' in {name}"
smoke_overlay_template     = "smoke 3/4: /usr/share/mios overlay present in {name}"
smoke_podman_api_template  = "smoke 4/4: podman API server v{version}"

# ----------------------------------------------------------------------------
# [messages.install_complete] -- end-of-bootstrap operator-facing
# summary banner.  Title + bullets are operator-tunable; verb hints
# render from [verbs] (already SSOT).  Operators rebrand via mios.html.
# ----------------------------------------------------------------------------
[messages.install_complete]
title          = "MiOS Windows-side install complete"
installed_lead = "    Installed ..............................................................."
next_steps     = "    What's next? Type any of these in the MiOS terminal:"
hub_hint       = "    The MiOS hub shortcut is in your Start Menu / Desktop / Win+Search."
# Bullets accept {disk_gb} substitution at render time so the
# storage-size value stays current per host.
bullets = [
    "M:\\ partition ({disk_gb} GB NTFS, label MIOS-DEV)",
    "Podman Desktop + podman-MiOS-DEV machine",
    "mios.git + mios-bootstrap overlaid at M:\\",
    "MiOS terminal essentials layered into MiOS-DEV",
    "Native Windows app: Start Menu + Desktop + per-verb shortcuts",
    "MiOS PowerShell profile (oh-my-posh, dashboard, mios <verb>)",
]

[search]
# Local privacy-respecting metasearch (SearXNG). Always-on Quadlet at
# etc/containers/systemd/mios-searxng.container; the agent surface
# (usr/share/mios/ai/v1/tools.json) can plug into this as a localhost
# `web_search` tool target without breaking Architectural Law 5 -- a
# search proxy is not a model, so no UNIFIED-AI-REDIRECTS exception
# is required.
endpoint = "http://localhost:8888/"
enable   = true

[hermes]
# Hermes-Agent: OpenAI-compatible gateway and the live MiOS agent at /.
# Fronts Ollama (mios-ollama:11434). API key generated at first boot
# into /etc/mios/hermes/api.env. Mirrors [ai].model -- this key is
# kept for back-compat with older callers; the SSOT default is [ai].model.
endpoint = "http://localhost:8642/v1"
backend  = "http://localhost:11450"   # mios-llm-light (ALL llama.cpp; ollama retired G5)
# Back-compat default only; the SSOT default is [ai].model. Repointed to the
# 4-model-set reasoning base 2026-06-01 (was granite4.1:3b, dropped from fleet).
# 2026-06-19: realigned to the live [ai].model head (was "qwen3:1.7b", which was
# retired from the fleet AND dropped from bake_models -- a stale ref that named an
# un-served model). Mirrors [ai].model; vestigial back-compat key (no runtime
# consumer reads it -- agents resolve MIOS_AI_MODEL), kept so older callers parse.
model    = "granite4.1:8b"
enable   = true

# [hermes_workspace] -- REMOVED 2026-05-13. The hermes-agent's own
# dashboard at port 9119 is the canonical web UI (Sessions, Skills,
# MCP, Plugins, Kanban -- the kanban API is /api/plugins/kanban/* on
# port 9119 backed by /var/lib/mios/hermes/kanban.db). The separate
# outsourc-e/hermes-workspace project at port 3030 was a redundant
# chat front-end whose Tasks/Kanban panels haven't completed the
# upstream migration to the agent's kanban API (Issue #311). Use
# http://localhost:9119/ -- the agent dashboard auto-injects its
# session token into its own HTML, so /api/plugins/kanban/* calls
# authenticate from the in-page JS without external token wiring.

# ----------------------------------------------------------------------------
# [surrealdb] -- shared cross-cutting agent state (the "context layer
# for AI agents" per upstream framing). Hosts tables that OWUI doesn't
# natively own: agent, session, tool_call, event, kanban_shadow,
# scratch, agent_metric. OWUI's webui.db remains source of truth for
# memory/knowledge/files/tools/functions/models; SurrealDB stores the
# cross-agent state that needs to be queried in lockstep across
# mios-agent-pipe + hermes + mios-daemon.
#
# Engine: SurrealDB 3.0+ with the embedded `surrealkv://` KV store
# (the legacy `file://` scheme was dropped in 3.0; on-disk durability
# in a single file under data_dir/mios.skv).
#
# Bind: 0.0.0.0:<port> so host (operator + pipe + mios-daemon) AND
# the mios.network bridge (containers, future agents) reach the same
# endpoint. Host networking is configured in the Quadlet itself
# (matching ollama's pattern; bridge + PublishPort hit a podman-WSL
# port-forwarder quirk).
#
# Credentials default to root:root because this is a LOCAL service on
# loopback; lock down by overriding `user`/`pass` in
# /etc/mios/mios.toml or via /etc/containers/systemd/
# mios-surrealdb.container.d/<name>.conf if exposing beyond loopback.
# ----------------------------------------------------------------------------
[security]
# Phase B.3 of the AgentOS roadmap: TOML-driven Semantic Firewall
# allowlist. Hosts in this list are TRUSTED -- open_url to one of
# these does NOT taint the session. Anything outside this list +
# the compiled-in *.local / *.lan / single-label heuristic is
# treated as external and contributes session taint, which gates
# subsequent high-privilege verbs (in `firewall_high_privilege_verbs`
# below). Operator can extend per deployment (LAN hosts, internal
# SaaS, etc.) without touching code. CSV-form in the env (the
# userenv.sh slot map flattens these lists).
allowlist_hosts = [
    "localhost",
    "127.0.0.1",
    "::1",
    "host.containers.internal",
    "mios-llm-light",
    "mios-open-webui",
    "mios-hermes",
    "mios-pgvector",
    "mios-forge",
    "mios-searxng",
    "mios-crawl4ai",
    "mios-code-server",
]

# AIOS gap8: also taint EXTERNAL web fetches (web_search/web_extract/crawl/
# web_scrape) so untrusted web content gates subsequent high-privilege verbs
# (research-then-act) via the firewall below. DEFAULT FALSE -- gating reduces
# autonomous function, so the operator opts in. LOCAL rag/recall are NOT tainted
# (RAG runs every turn -> tainting it would block all OS-control).
provenance_taint = false

# Verbs whose dispatch is REFUSED when the session is tainted
# (Phase A.3 / B.3 Semantic Firewall). These cause visible system
# effects -- restarting services, injecting input into Win32 GUI
# windows, restarting containers -- so the firewall blocks them
# when an upstream tool_call in the same session was tainted.
# Operator can add custom verbs to this list (e.g. when shipping
# a new privileged shim) without touching agent-pipe code.
firewall_high_privilege_verbs = [
    "service_restart",
    "container_restart",
    "pc_type",
    "pc_key",
    "pc_click",
    # Native text-editor write verbs -- tainted sessions can't
    # craft them to drop payloads onto operator paths.
    "text_create",
    "text_str_replace",
    "text_insert",
    # Single most dangerous verb in the catalog: arbitrary
    # Windows-side script execution. Always firewall-gated.
    "powershell_run",
    # Window-state verbs (D.3 PC-control template) -- tainted
    # sessions moving / hiding operator windows is the kind of
    # thing the firewall should refuse pre-clear.
    "minimize_window",
    "maximize_window",
    "restore_window",
    "resize_window",
    "position_window",
    # Package management WRITE verbs (D.4). Either platform's
    # install path can land arbitrary code on the operator's
    # machine -- tainted sessions are refused.
    "winget_install",
    "winget_upgrade",
    "winget_uninstall",
    "flatpak_install",
    "flatpak_upgrade",
    "flatpak_uninstall",
]

# Composefs security mode -- moved here 2026-05-18 to dedupe
# the second [security] section (strict TOML parsers reject
# duplicate sections).
composefs_mode = "verity"
# When composefs is in verity mode, automation/40-composefs-verity.sh
# also masks systemd-remount-fs.service (known-broken with composefs on
# Fedora 42+). Set to false to skip the mask if the base image's
# systemd-remount-fs has been patched. No effect when composefs_mode is
# "yes" or "off".
mask_systemd_remount_fs = true

# WS-7 (AIOS immutable-host hardening): fapolicyd PERMISSIVE/observe rollout.
# DEFAULT-OFF. When true, the gated build step (automation/lib/
# ws7-uki-fapolicyd-build.sh) installs the permissive (observe-only) fapolicyd
# config + the sandboxed-codegen exec carve-out over the live /etc copy.
# fapolicyd then LOGS would-be denials and BLOCKS NOTHING. Enforce-mode is a
# separate, documented, rollback-tested operator step (enforce on an
# incomplete whitelist BRICKS BOOT) -- see concepts/ws7-uki-fapolicyd.md.
[security.fapolicyd_observe]
enable = false

# ----------------------------------------------------------------------------
# [security.egress] -- #54 zero-trust OUTBOUND firewall for the AGENT process.
# Constrains the agent-pipe user's external egress at the OS layer (nftables) so a
# compromised/misled agent cannot exfiltrate to arbitrary internet hosts. It is
# UID-scoped, so it does NOT touch other users: web_search still works (the agent
# reaches searxng over loopback, and searxng -- a different uid -- reaches the
# internet). Generated to usr/share/mios/security/egress.nft by
# tools/generate-egress-firewall.sh; the OPERATOR applies it (`nft -f ...`), like
# the k3s manifests -- nothing here is auto-applied.
#   mode: off (default) -- generator emits an informational, NO-OP ruleset.
#         audit         -- LOG would-be-blocked agent egress; block nothing.
#         enforce       -- LOG + DROP the agent's non-allowed external egress.
# allow: extra destination CIDRs/IPs the agent may reach, BEYOND the always-
# allowed loopback, tailnet (100.64.0.0/10) and local WSL gateway (172.16.0.0/12).
# ----------------------------------------------------------------------------
[security.egress]
mode  = "off"
allow = []

# ----------------------------------------------------------------------------
# [security.mtls] -- #54 zero-trust TRANSPORT (mutual TLS) PKI. Provision with
# tools/provision-agent-mtls.py -> a self-signed local CA + an agent cert/key
# (clientAuth + serverAuth) so A2A peers can mutually authenticate. The actual
# mTLS is terminated at the reverse proxy that fronts the A2A endpoint (MiOS's
# TLS-at-the-proxy pattern); `enable` is advisory for that deployment. Override
# the *_file paths to use an existing org CA instead of the self-signed default.
# Certs are SECRETS (per-host, time-stamped) -> written under `dir`, NOT committed.
# ----------------------------------------------------------------------------
[security.mtls]
enable        = false
dir           = "/etc/mios/mtls"
common_name   = ""          # empty -> hostname
validity_days = 825
# ca_file   = "/etc/mios/mtls/ca.crt"     # set these to use an org PKI instead
# cert_file = "/etc/mios/mtls/agent.crt"
# key_file  = "/etc/mios/mtls/agent.key"

# ----------------------------------------------------------------------------
# [uki] -- WS-7 verity-rooted Unified Kernel Image build (DEFAULT-OFF).
# When verity_uki_build = true the gated build step runs `ukify build`
# measuring the composefs fs-verity digest into a UKI ARTIFACT at
# /usr/lib/modules/<kver>/mios-verity.efi. The artifact is NOT signed, NOT
# installed, and NOT the active boot entry -- signing (enrolled MOK) + install
# + rollback-tested boot are operator promotion steps. A mis-signed/required
# UKI BRICKS BOOT; see concepts/ws7-uki-fapolicyd.md. [packages.uki] already
# provides systemd-ukify.
# ----------------------------------------------------------------------------
[uki]
verity_uki_build = false

[fs_watcher]
# Phase A.2 of the AgentOS roadmap: directories the mios-daemon
# fs-watcher thread tails via inotify, emitting SurrealDB event
# rows (source=fs-watcher, kind=fs_change) on every mutation.
# Other agents subscribe via SQL instead of polling these dirs
# individually. Operator can add per-deployment watch points
# (e.g. /var/lib/mios/<custom-agent>/) without code edits.
watch_dirs = [
    "/var/lib/mios/hermes-tail",
    "/var/lib/mios/delegation-prefilter",
    "/var/lib/mios/log-watcher",
    "/var/lib/mios/daemon",
    "/var/lib/mios/scratch",
    "/var/lib/mios/agent-nudger",
    "/var/lib/mios/cron-director",
    "/var/lib/mios/ai/scratch",
]

[pkg]
# Phase C.1 of the AgentOS roadmap: Personal Knowledge Graph
# tunables. `bootstrap_per_source_cap` caps app_install rows per
# inventory source so a pathological catalog can't flood the
# graph. `lookup_max_alias_results` caps the alias fuzzy-match
# step in kg_lookup. Operator can raise both per-deployment.
bootstrap_per_source_cap   = 200
lookup_max_alias_results   = 3

[ttyd]
# Phase D.2 of the AgentOS roadmap: browser-accessible terminals.
# ttyd is a C/libuv pty-over-WebSocket bridge -- the operator's
# 2026-05-18 research note flagged it as the lightest option for
# accessing local shells from a browser. MiOS ships TWO instances:
#
#   mios-ttyd-bash       :7681  -> ttyd bash       (Linux side)
#   mios-ttyd-powershell :7682  -> ttyd <pwsh.exe> (Windows side)
#
# Both bind 127.0.0.1 by default; the operator hits them from a
# local browser at http://localhost:7681 / :7682. For LAN access,
# flip `bind` to "0.0.0.0" AND set `auth_user`/`auth_pass` (ttyd
# refuses to start exposed without auth credentials if `require_auth`
# is true). SSL cert + key paths optional for HTTPS termination.
enable             = true
bind               = "127.0.0.1"
# Mobile (#82): expose the loopback bash terminal to the TAILNET (phones) over
# tailnet-only HTTPS via `tailscale serve` (NOT the public internet). When true,
# the mios-ttyd-expose.service oneshot publishes it on boot; off by default so a
# fresh install never opens a shell unprompted. Toggle here or in mios.html.
# The login is the SSOT [identity] credential (mios/mios) -- never unauth'd.
tailnet_expose     = false
# Master auth toggle: when bind != "127.0.0.1" + require_auth = true
# + auth_user/pass empty, the service refuses to start (prevents
# accidental open-network exposure).
require_auth       = true
# auth_user/auth_pass: empty = INHERIT the global [identity] login (username /
# default_password, default mios/mios) -- same as Portal/Cockpit/Forge. Set per
# instance only to override the one global credential.
auth_user          = ""
auth_pass          = ""
# Optional TLS termination -- when both paths exist, ttyd serves
# https + wss instead of http + ws. /etc/ssl/mios/ is the canonical
# MiOS cert dir; operator drops a wildcard cert there or generates
# a self-signed pair via mios-doctor.
ssl_cert           = ""
ssl_key            = ""
# Per-instance shell overrides. Empty = use the per-service default
# (mios-ttyd-bash -> /bin/bash; mios-ttyd-powershell ->
# /usr/libexec/mios/mios-powershell --shell which resolves pwsh.exe).
bash_shell         = ""
powershell_shell   = ""
# Read-write terminal (operator can type). Set to false for a
# view-only session shared with a collaborator -- handy for paired
# debugging without granting input.
writable           = true
# Max active client sessions per instance (ttyd defaults to 1 +
# rejects further). Raise for collaborative read-only sessions.
max_clients        = 0
# xterm font size (px). The MiOS Portal sizes its inline terminal embed to a
# fixed 80x20 pixel box assuming this; raising it makes the embed show fewer
# columns/rows in that box (and vice-versa).
font_size          = 14

[agents]
# Phase D.5 of the AgentOS roadmap: sub-agent registry. Operator
# directive 2026-05-18 "Hermes isn't the only sub-agent on the
# system" -- agent-pipe is the always-first orchestrator;
# Hermes, OpenCode, future MCP clients are sub-agents it
# delegates to based on the refined intent.
#
# Every entry under [agents.<name>] is an addressable sub-agent.
# `endpoint` is the OpenAI-compat /v1 URL; `role` informs the
# refine pass which one to pick; `model` is the canonical model
# id to advertise upstream; `default` (boolean) flags the
# fallback when refine can't match a role.
#
# Refine pass picks by role-match first, then default=true,
# then the first registered agent.

[agents.hermes]
# WS-10b (operator 2026-06-06): the Hermes SERVICE now runs ON llama.cpp (its
# config repointed :11434->:11450, model granite4.1:3b aliased to gemma4). Route
# BACK to the real Hermes service (:8642) so it keeps its native browser_*/CDP +
# terminal + tool loop -- bare gemma4@:11450 had no browser tools, so CDP browse
# (operator's "cdp web browse in hermes") needs the real Hermes. Verified: Hermes
# answers on the dGPU at 100% util (prompt ~25k tokens -> gemma4 ctx bumped to 32k).
# WORKER-DISPATCH endpoint (operator 2026-06-19 RUNAWAY FIX): the :8642 gateway is
# a THIN :8640 client now (see the unify note below), so dispatching a swarm/DAG/
# reroute WORKER facet to :8642 made it RELAY BACK to :8640 -> swarm -> :8642 -> ...
# UNBOUNDED RECURSION (the outage-reroute bypassed fanout=false; hermes spawned 30+
# conversation loops pegging the dGPU). A worker MUST hit a REAL model lane, never a
# thin gateway that loops to the orchestrator. The :11441-bare stopgap fixed the loop
# but LOST hermes's native tools (bare model = no browser_*/CDP/terminal/skills loop).
# P1 (operator 2026-06-19) restores hermes as a REAL WORKER: a SECOND non-thin Hermes
# gateway on :8643 (hermes-worker.service, HERMES_HOME=/var/lib/mios/hermes-worker)
# that runs its OWN native browser/CDP/terminal/skills tool loop AND does its OWN
# inference on the SAME heavy lane (:11441 mios-heavy) -- so worker dispatch now hits
# :8643 (real tools) instead of :11441 (bare model). LOOP-SAFE: the worker does its
# OWN :11441 inference and has the MCP relay (MIOS_AGENT_PIPE_URL=:8640) DISABLED, so
# it never relays back to :8640; the P0 hop-budget/Via guard (_HOP_HEADER/_VIA_HEADER)
# is the backstop. The :8642 gateway service stays thin for INCOMING Discord/CLI ->
# :8640 (unification preserved; :8643 worker is a distinct instance, Discord OFF).
# hermes stays a first-class dispatched agent (job/strengths surface via the pipe loop).
endpoint = "http://localhost:8643/v1"
model    = "mios-heavy"
role     = "general"
# WS-2 per-agent RBAC (optional; default = NO restriction = unchanged behaviour):
# cap THIS agent's tool surface to what its role should touch, enforced by
# _agent_rbac_filter at dispatch. denied_verbs drops the named verbs; allowed_verbs
# (when set) keeps ONLY those verbs (non-verb tools/recipes/skills always pass).
# Examples (left unset for the general orchestrator, which needs the full surface):
#   denied_verbs  = ["pkg", "shutdown", "reboot"]
#   allowed_verbs = ["web_search", "fetch_url_markdown", "recall", "summarize"]
# #55 per-tool capability/risk gate: max_permission caps the RISK TIER this agent
# may call, using the same permission vocabulary verbs declare (read < write <
# interactive; lattice tunable via [ai].permission_tiers). Verbs whose tier
# outranks the ceiling drop from the surface. Unset = no ceiling. A coarse,
# one-key complement to allow/deny lists -- e.g. a read-only research worker:
#   max_permission = "read"     # only read-tier verbs (web/search/inspect); no writes
#   max_permission = "write"    # read + write verbs; blocks interactive-tier
# #60 WS-6 per-USER authz (the per-USER axis, complementing the per-AGENT keys
# above): a top-level [users.<name>] table caps the tool surface by WHO is asking,
# matched to the principal the chat surface forwards (user_name / email). Same
# denied_verbs / allowed_verbs / max_permission semantics + risk lattice. Unset /
# no matching [users.*] entry => NO restriction (single-user MiOS unaffected).
# NOTE: keys on the surface-CLAIMED identity; cryptographic signed-principal
# verification is the remaining half of #60. Example:
#   [users.guest]
#   max_permission = "read"           # a guest principal: read-only surface
#   denied_verbs   = ["pkg", "shutdown", "reboot"]
#   # email = "guest@example.com"     # optional: also match by forwarded email
# job (operator 2026-05-24 "no fixed roles -- MiOS-Agents are modelfiles for
# jobs and tools/skills/recipes"): the one-line CAPABILITY the swarm planner
# routes a sub-task by. Tools/recipes/skills are GLOBAL to every agent, so this
# describes what the agent is BEST at -- not what it can access.
job      = "General orchestration of multi-step, tool-driven tasks -- decide local-vs-web, search, inspect and operate the system, launch apps, then fan out and synthesise."
# 2026-06-18 (operator "UNIFY THE WHOLE MIOS AI"): the Hermes gateway (:8642) is now
# a THIN :8640 client (its model -> MiOS-Agent on the orchestrator) so Discord + every
# gateway platform get the orchestrator's polished/grounded output. That makes :8642
# point BACK at :8640, so the orchestrator must NOT call :8642 as a council peer or it
# recurses (Discord->:8642->:8640->council->:8642->...; the W0-T3 recursion bound is
# process-local and does NOT cross the HTTP hop). fanout=false opts it out of the
# council/swarm (_opted_out, server.py:3565) and default=false drops it as the refine
# fallback pick -- the orchestrator's own primary is :11450 (MIOS_AGENT_PIPE_BACKEND),
# so nothing else needs :8642. Block kept for role-matched-only routing + as docs.
fanout   = false
default  = false
# Inference lane (operator 2026-05-21: "self-delegate to CPU concurrently
# to pending/future GPU operations"). gpu = the heavy dGPU lane (:11434);
# cpu = the light iGPU/CPU lane. The fan-out pairs a GPU primary with a
# CPU secondary so both lanes work in parallel -- and so Hermes is never
# the ONLY dispatched agent.
lane     = "gpu"
# CPU-compute twin (operator 2026-05-22: "all MiOS AI Agents/Sub-Agents
# have a relevant MiOS Modelfile(s) for both CPU and GPU compute"). When
# Hermes is dispatched as a concurrent fan-out SECONDARY, agent-pipe runs
# this twin on the light iGPU/CPU lane (:11435) instead of the dGPU
# endpoint above -- so the dGPU stays free for whichever agent holds the
# primary stream. Backed by mios-hermes-cpu.Modelfile (the CPU half of the
# pair; `model` above -> mios-hermes is the GPU half). Omit cpu_* to keep
# an agent single-lane.
# Operator 2026-06-12 "ALL AGENTS USE SGLANG": Hermes-as-fan-out-SECONDARY
# dispatches to the SGLang heavy lane too (was the mios-llm-light CPU twin). The
# Hermes PRIMARY stays on its :8642 gateway (endpoint above) because it needs
# its 64k tool-use context + native browser/CDP/terminal loop, which the 16k
# SGLang lane can't host; moving the workers OFF mios-llm-light already relieves the
# contention that was timing the Hermes primary out.
cpu_endpoint = "http://localhost:11441/v1"
cpu_model    = "mios-heavy"
# Tools Hermes is good at -- the refine pass surfaces these
# as hint_tools when the intent matches.
strengths = ["kanban", "web_search", "skill_invocation",
             "multi_step_reasoning", "tool_use"]

[agents.opencode]
endpoint = "http://localhost:8633/v1"
# ONE canonical model id (must match [ai].opencode_model + opencode.json + the
# ollama Modelfile build name:tag). Was "opencode"; unified to the real tag the
# gateway advertises and ollama serves.
model    = "mios-opencode:latest"
role     = "coding"
job      = "Software engineering -- read, edit, review, test and commit code, configs, scripts, systemd units, Containerfiles and TOML in this repo/system."
# default=false (operator 2026-06-01): opencode's `run` mode HANGS — even with
# mios-opencode:latest resident + a 240s budget, `opencode run` returns ZERO
# output and times out (the model answers in <1s directly; the CLI itself is
# stuck in non-interactive mode). With default=true opencode was pulled into
# EVERY council/swarm turn, so each one waited up to the gateway timeout for its
# 💤 — the dominant latency in a normal chat. Make it NON-default so it only
# engages when a turn is genuinely code-focused (role-matched), not every turn.
# Re-enable once `opencode run` headless invocation is fixed (flags/output-mode).
default  = false
# fanout=false (operator 2026-06-01 concurrent-swarm fix): opencode was pulled
# into EVERY swarm/council turn despite default=false, where its `run` HANGS (->
# 90s timeout + dumps its whole prompt into the stream) AND its qwen2.5-coder:7b
# @ num_ctx=32768 holds ~23GB = MONOPOLISES the shared 4090, blocking co-loading
# so real work spills to CPU. Exclude it from automatic fan-out; it engages only
# when a turn is explicitly code-routed. Re-enable once `opencode run` is fixed.
fanout   = false
lane     = "gpu"
strengths = ["file_edit", "code_review", "git", "test_running",
             "refactor"]
# P3.2 SPOF removal: when opencode's :8633 backend is down, route to hermes
# (the orchestrator can still write code well enough as a fallback). Visible
# in /v1/cluster/health.chain so an operator/A2A peer knows the fallback exists.
failover_agents = ["hermes"]

[agents.mios-daemon-agent]
# Operator 2026-05-18: "mios-daemon also has a mios-daemon-agent that lives on
# cores always running (reads all SYSTEM(S) logs, journal, etc) and keeps them
# in the loop for followups/redirections". Operator 2026-05-24: "mios-daemon-
# agent = mios-cpu/reasoner! CONSOLIDATE" -- so this ONE always-on CPU process
# on a loopback port is BOTH the global log/journal monitor AND the council's
# CPU reasoning lane. It runs LIGHT in the background (~2c/4t) and BURSTS to
# 8c/16t when it joins a foreground pipeline turn.
# WS-10: repoint off the daemon-agent's ollama-cpu backend (:11435 dead) to
# mios-llm-light; model 'mios-daemon-agent' is aliased to gemma4:12b. Was :8644/v1.
# Operator 2026-06-12 "ALL AGENTS USE SGLANG": the council CPU-reasoner now
# dispatches to the SGLang heavy lane (:11441, mios-heavy) like every other
# agent, instead of the contended mios-llm-light :11450. (The always-on background
# log/telemetry loop on :8644 is unchanged; this is only its FAN-OUT dispatch.)
endpoint = "http://localhost:11441/v1"
model    = "mios-heavy"
# REASONING now (was "telemetry"): a real CPU second opinion, grounded in --
# not limited to -- system telemetry.
role     = "reasoning"
job      = "CPU reasoning grounded in live system state -- second opinions, summaries, planning, and answers grounded in the global journal/log telemetry it continuously collects."
default  = false
# fanout=true (was false): the OLD telemetry-only DUMP flooded unrelated answers
# with crowdsec/CDP digests ("fail across the board", operator 2026-05-22), so
# it was muted. Now it REASONS and folds telemetry in ONLY when the request
# concerns the system (see _daemon_agent_reply's system prompt), so it is safe
# to fan out CONCURRENTLY on every substantive turn -- exactly the operator's
# "daemon-agent runs in the pipeline concurrently during GPU + iGPU compute".
# Foreground turns burst to 8c/16t (MIOS_DAEMON_AGENT_THREADS); the always-on
# background loop stays light at ~2c/4t.
fanout   = true
# health_gate (merged from mios-reasoner-cpu): engage only when :8644 answers,
# drop fast otherwise -- the always-on daemon normally always passes.
health_gate = true
# CPU lane: runs off the dGPU, so the fan-out self-delegates to it CONCURRENTLY
# with a GPU primary at zero VRAM cost -- lane-diverse councils (CPU+GPU+iGPU).
lane     = "cpu"
# MERGED strengths: general CPU reasoning (from the consolidated mios-reasoner-
# cpu) PLUS the telemetry/log specialism (the daemon's core job). NOT topic-
# gated (council mode ignores relevance); these inform the A2A skill tags + the
# relevance-mode fallback. _daemon_agent_reply's system prompt -- not a strength
# deny-list -- keeps telemetry out of unrelated answers.
strengths = ["reasoning", "second_opinion", "summarize", "planning",
             "journalctl_tail", "log_search", "event_query",
             "system_followup", "what_just_happened"]
# P3.2 SPOF removal: when the always-on :8644 reasoner is down, hermes can
# stand in for the reasoning role (loses the live-telemetry grounding but
# preserves the second-opinion capability). The cpu-twin already covers the
# lane fallback; this lets the cluster health show a NAMED failover too.
failover_agents = ["hermes"]

# [agents.mios-reasoner-cpu] was CONSOLIDATED into [agents.mios-daemon-agent]
# above (operator 2026-05-24 "mios-daemon-agent = mios-cpu/reasoner!"). It
# pointed at the SAME CPU ollama (:11435) running the SAME small qwen3:1.7b, so
# the always-on daemon-agent simply ABSORBED the reasoning role rather than
# running a duplicate light-lane. To run a CPU/iGPU reasoner on OTHER hardware
# (e.g. the AMD iGPU served natively on the Windows host via llama.cpp+Vulkan
# :11436), add a DISTINCTLY-NAMED node in /etc/mios/mios.toml so the tailnet IP
# stays out of the public repo -- e.g. [agents.mios-igpu], already wired in the
# host overlay (same auto-join/auto-drop health_gate pattern as ai-local).

# Operator can add more agents here -- e.g.:
#   [agents.aichat]
#   endpoint = "http://localhost:8765/v1"
#   role     = "chat"
#   ...
# No code edits required; refine_intent reads this list at
# request time via the userenv.sh slot map.

# ----------------------------------------------------------------------------
# ANY AGENT ON ANY ENGINE / NODE (operator 2026-05-24: "make sure any Agent(s)
# can be in any AI Engine/Compute Pipeline -- CPU, dGPU, iGPU, Accelerator" +
# "any Agent/Sub-Agent can run on any node/endpoint -- iPhone, Android, other
# MiOS nodes/clusters"). An agent is a JOB (a Modelfile); a BINDING is an
# endpoint+model that serves it. Beyond the single `endpoint`/`model` (the
# agent's home lane) + the legacy `cpu_endpoint`/`cpu_model` twin, declare extra
# bindings under `engines` (local compute lanes) and/or `nodes` (remote devices/
# hosts) -- the label is free-form; the endpoint decides WHERE it runs. agent-
# pipe folds them all into one binding map: the fan-out offloads a concurrent
# secondary to the first light engine it finds (cpu -> igpu -> accelerator), and
# any binding can be a planner agent-task target. Example (put PERSONAL tailnet
# endpoints in /etc/mios, NOT this public vendor file):
#   [agents.hermes.engines.igpu]
#   endpoint = "http://<igpu-host-tailnet>:11436/v1"    # llama.cpp + Vulkan
#   model    = "mios-hermes-igpu"
#   [agents.hermes.nodes.iphone]
#   endpoint = "http://<iphone-tailnet>:11434/v1"       # AI.Local on the phone
#   model    = "qwen2.5-3b-instruct-4bit"
# The target engine/node must actually SERVE that model; health_gate=true makes
# a come-and-go node (phone/cluster) auto-join when up + drop when gone.
# ----------------------------------------------------------------------------
# CLIENT-HOSTED SWARM NODES (operator 2026-05-22 "AI.Local iphone app hosts
# its own endpoint on Tailscale ... added to the swarm as a node capable of
# local mobile models"). A client device running an OpenAI-compatible local-
# model server on the tailnet becomes a swarm agent here. health_gate=true
# means it only engages when REACHABLE (phone awake + serving) and drops fast
# when asleep/absent -- auto-join-when-up, auto-drop-when-gone.
#
# REACH PATH: Tailscale runs INSIDE the WSL VM (node "mios-dev", installed
# 2026-05-22), so agent-pipe reaches tailnet peers DIRECTLY by their 100.x
# IP -- no reverse portproxy. (mirrored/"host" WSL networking stays OFF -- it
# death-spirals the Quadlet stack per .wslconfig; tailscaled in the VM is the
# safe alternative. --accept-dns=false so MagicDNS doesn't disturb the VM's
# resolver, so peers are addressed by tailnet IP, not name.)

[agents.ai-local]
# A phone / mobile device running AI.Local -- an ollama-compatible local-model
# server on :11434 -- reached over Tailscale. Open the AI.Local app to host;
# closing it drops the node from the swarm (health_gate). OPERATOR-SPECIFIC +
# PRIVACY: vendor ships `endpoint` EMPTY so no personal device name / tailnet
# IP is baked into the public repo; set it to your own device's tailnet
# endpoint in your /etc/mios or ~/.config/mios overlay. Empty = inert node.
endpoint    = ""
model       = "qwen2.5-3b-instruct-4bit"
role        = "mobile"
job         = "On-device mobile second opinion -- a lightweight local model on the operator's phone (AI.Local over the tailnet) for an extra perspective when it is serving."
default     = false
lane        = "mobile"
health_gate = true
strengths   = ["mobile_local_model", "on_device", "offline_edge"]

# ----------------------------------------------------------------------------
# CANONICAL WORKER + NODE POOL (operator 2026-06-01: "don't have separate CPU
# 1,2,3 / dGPU 1,2,3 replicas -- there should just be a MiOS Modelfile dispatched
# as many times as needed to ANY node(s)"). This REPLACES the 12 hand-partitioned
# raw-base research replicas (research-dgpu-1/2/3, research-cpu-1/2, research-
# potato-gpu/cpu-*, potato-gpu, ...) that lived in the /etc/mios overlay and
# BYPASSED the MiOS Modelfiles -- they cold-loaded raw 2-4B bases per endpoint
# (one landed a 4B model on the CPU-only :11435 lane -> the 2026-06-01 runaway).
#
# THE MODEL: ONE canonical MiOS worker brain -- the mios-agent Modelfile (the
# qwen3.5:4b brain with the baked MiOS-discipline SYSTEM block) on GPU lanes, its
# mios-agent-cpu twin (qwen3:1.7b, num_gpu 0) on CPU/light lanes. NOT a raw base.
#
# THE DISPATCH: agent-pipe's _load_node_pool() reads [nodes.*] below and SYNTHE-
# SISES one research-worker registry agent PER NODE -- `node:<name>` = {endpoint,
# model(the node's CANONICAL Modelfile tag), lane, research_only, fanout,
# engines} -- mirroring the a2a:<peer> injection. So the EXISTING capacity-aware
# fan-out / swarm-DAG logic (_pick_fanout_agents / _agent_dag_from_tasks, bounded
# by the P1 admission controller + per-lane/-endpoint semaphores) dispatches the
# ONE worker brain across the node pool BY CAPACITY -- "as many times as needed
# to any node(s)" -- instead of 12 bespoke replica entries. research_only=true on
# every node keeps them OUT of everyday council/chat turns (they join only on a
# research/deep turn), so the runaway-fix admission stays intact. The CPU-lane
# model backstop (_cap_cpu_lane_model) still force-caps any light-lane dispatch
# to the micro model -- belt + suspenders (the cpu node already declares the
# micro twin). Degrade-open: if [nodes.*] is ABSENT, behaviour is unchanged.
#
# A `node` declares WHERE compute lives + WHAT canonical Modelfile it serves; the
# `model` MUST be a Modelfile tag (mios-agent / mios-agent-cpu / mios-igpu), NOT a
# raw base. Vendor ships the LOCAL nodes + the SHAPE; put REMOTE nodes (potato,
# phone, cluster) -- with their tailnet endpoints -- in your /etc/mios overlay so
# no personal node name / IP is baked into the public repo. `lane` picks the
# semaphore/diversity bucket; `health_gate=true` makes a come-and-go remote node
# auto-join when reachable + drop when gone (local nodes omit it = always live).
# The target endpoint MUST actually serve that Modelfile tag.
# ALL LLAMA.CPP (operator binding: "EVERYTHING IS LLAMA.CPP, NO OLLAMA"). The GPU +
# light lanes point to mios-llm-light (:11450) -- the retired ollama endpoints
# (:11434/:11435, G5) are GONE. api=llamacpp -> KV-paging + no tool_choice=required.
# health_gate=true -> a lane is probed + skipped if mios-llm-light is momentarily down
# (never a false "All connection attempts failed" fan-out; operator 2026-06-07 e2e).
# Operator 2026-06-12 "ALL AGENTS USE SGLANG": every swarm worker dispatches to
# the SGLang heavy lane (:11441, mios-heavy = Qwen2.5-14B-AWQ) instead of the
# mios-llm-light multi-model lane. SGLang does CONTINUOUS BATCHING, so N concurrent
# research facets are served in parallel on ONE backend -- whereas mios-llm-light
# loads one model at a time and THRASHED when these nodes requested different
# models (gemma4:12b + qwen3:1.7b + ...) concurrently, the root cause of the
# 75s/150s node timeouts on the "global trending tech" research turn. All worker
# nodes now share the sglang endpoint+model so the fan-out is real concurrency.
[nodes.local-dgpu]
endpoint = "http://localhost:11441/v1"
model    = "mios-heavy"        # SGLang heavy lane (Qwen2.5-14B-AWQ, continuous batching)
lane     = "gpu"
api      = "openai"            # SGLang speaks /v1 + honours tool_choice=required
health_gate = true
[nodes.local-cpu]
endpoint = "http://localhost:11441/v1"
model    = "mios-heavy"        # SGLang heavy lane (ALL AGENTS USE SGLANG)
lane     = "gpu"
api      = "openai"
health_gate = true
# Local iGPU lane -- ships endpoint EMPTY (privacy: the real iGPU is served
# NATIVELY on the Windows host via llama.cpp+Vulkan at a tailnet IP, set in the
# /etc/mios overlay). Empty endpoint = inert node, skipped by _load_node_pool.
[nodes.local-igpu]
endpoint = ""                  # set to http://<igpu-host-tailnet>:11436/v1 in /etc/mios
model    = "mios-igpu"         # llama.cpp + Vulkan alias served on the host
lane     = "igpu"
# Declared protocol (operator no-hardcode 2026-06-01): llama.cpp -> the pipe
# does /slots KV-paging here (_kv_paging) + skips tool_choice=required, driven by
# THIS field instead of a port-substring match (so it's correct even if the
# operator serves it on a non-11436 port).
api      = "llamacpp"
# Local vLLM HEAVY lane (Phase 2) -- the re-scoped mios-llm-heavy-alt Quadlet on the dGPU
# (PagedAttention + APC; see [ai.vllm]). health_gate=true means it AUTO-JOINS the
# swarm only when actually reachable: it is DISABLED + VRAM-gated by default, so
# it stays inert with ZERO risk until the operator bakes weights + enables the
# service on a dGPU with headroom, then it joins research/deep fan-outs. api=openai
# (vLLM speaks /v1 natively + honours tool_choice=required, unlike the iGPU).
[nodes.local-vllm]
endpoint    = "http://localhost:11440/v1"
model       = "mios-heavy"     # = [ai.vllm].served_name; the heavy reasoner vLLM serves
lane        = "gpu"            # shares the dGPU lane semaphore (VRAM-admission governs co-load with ollama)
api         = "openai"
health_gate = true             # inert until the gated mios-llm-heavy-alt.service is enabled + reachable
# Local SGLang heavy lane (operator 2026-06-07 "continue with SGLang") -- the
# mios-llm-heavy.container on :11441 (see [ai.sglang]). HiCache spills inactive KV to
# CPU RAM. health_gate=true => AUTO-JOINS only when reachable; gated off until a
# model is baked + the service enabled. api=openai (SGLang speaks /v1 + honours
# tool_choice=required). Mutually exclusive with local-vllm (both serve "mios-heavy").
[nodes.local-sglang]
endpoint    = "http://localhost:11441/v1"
model       = "mios-heavy"     # = [ai.sglang].served_name; the heavy reasoner SGLang serves
lane        = "gpu"            # shares the dGPU lane semaphore (VRAM-admission governs co-load)
api         = "openai"
health_gate = true             # inert until the gated mios-llm-heavy.service is enabled + reachable
# Local mios-llm-light lane (WS-10) -- the llama.cpp multi-model + KV-paging lane
# (mios-llm-light.container on :11450; see [llamacpp]). health_gate=true =>
# AUTO-JOINS only when reachable, and the quadlet is gated off until GGUFs are
# provisioned (models/.ready), so this stays inert with ZERO risk until the
# operator bakes GGUFs + enables the lane. api=llamacpp => the pipe does /slots
# KV-paging here (_kv_paging) + skips tool_choice=required -> fleet-wide KV-cache.
[nodes.local-llamaswap]
endpoint    = "http://localhost:11441/v1"   # ALL AGENTS USE SGLANG (was :11450 mios-llm-light)
model       = "mios-heavy"     # SGLang heavy lane (Qwen2.5-14B-AWQ, continuous batching)
lane        = "gpu"            # shares the dGPU lane semaphore
api         = "openai"         # SGLang speaks /v1 natively + honours tool_choice=required
health_gate = true             # inert until mios-llm-heavy is up + reachable
# REMOTE nodes (operator overlay only -- keep tailnet names/IPs out of the public
# repo). Each is the SAME consolidation: one canonical MiOS Modelfile tag served
# on that node, dispatched by capacity -- NOT a hand-numbered replica. Example
# shape (put in /etc/mios/mios.toml):
#   [nodes.potato-dgpu]
#   endpoint    = "http://<potato-tailnet>:11434/v1"
#   model       = "mios-agent"          # the GPU brain on the potato node
#   lane        = "gpu"
#   health_gate = true                  # auto-join when reachable, drop when gone
#   [nodes.potato-cpu]
#   endpoint    = "http://<potato-tailnet>:11435/v1"
#   model       = "mios-agent-cpu"      # the CPU twin on the potato node
#   lane        = "cpu"
#   health_gate = true
#   [nodes.phone]
#   endpoint    = "http://<phone-tailnet>:11434/v1"
#   model       = "mios-agent-cpu"      # or the phone's own small local model tag
#   lane        = "mobile"
#   health_gate = true
#
# A PLAIN remote box that serves a stock Ollama (not the MiOS Modelfiles) joins
# the SAME way -- declare api="ollama" and the model's REAL served tag (qwen3.5:4b
# etc.); the pipe then runs its own grounding tool-loop (web_search ...) + strips
# qwen3 <think> tags + posts to the box's /v1/chat/completions. A remote CPU node
# whose port happens to be 11435/11436 KEEPS its declared tag (the cpu-lane model
# cap is LOCAL-only -- a remote box serves its own catalog, not the local micro
# tag). Example (operator's second machine, CPU+GPU; put the real tailnet IP in
# /etc/mios/mios.toml, NOT the public vendor file):
#   [nodes.remote-gpu]
#   endpoint     = "http://<host-tailnet>:11434/v1"
#   model        = "qwen3.5:4b"          # the remote's best tool-capable served tag
#   lane         = "gpu"
#   api          = "ollama"
#   health_gate  = true
#   tool_capable = true
#   [nodes.remote-cpu]
#   endpoint     = "http://<host-tailnet>:11435/v1"
#   model        = "qwen3:1.7b"          # lighter tag for the slower CPU lane
#   lane         = "cpu"
#   api          = "ollama"
#   health_gate  = true
#   tool_capable = true

# ----------------------------------------------------------------------------
# [dispatch] -- multi-agent CONCURRENT fan-out (operator 2026-05-21: "the
# MiOS mechanism should dispatch to multiple agents at a time -- not ALL
# agents, but a couple at least"). agent-pipe picks ONE primary agent
# (refine target_agent / registry default) AND up to fanout_max-1 relevant
# SECONDARY agents -- scored by role/strengths overlap with the refined
# intent (NO hardcoded topic map) -- runs them concurrently, surfaces each
# in the reasoning dropdown, and merges their answers in the polish step.
# Dead endpoints (e.g. opencode :8633 when not served as /v1) drop out.
# fanout_max = 1 restores exact single-agent behaviour.
# ----------------------------------------------------------------------------
[dispatch]
enable     = true
# Selection mode (operator 2026-05-22 "weigh every agent equally + dispatch
# multiple concurrently"):
#   council   = EQUAL WEIGHT. Every chat-eligible agent (every [agents.*]
#               without fanout=false, minus the primary) runs CONCURRENTLY
#               each turn, up to fanout_max, regardless of tag relevance --
#               no Hermes monopoly. Lane-diverse so CPU + GPU agents run in
#               parallel. This is the active policy.
#   relevance = legacy: engage only OTHER agents whose A2A skill tags match
#               the refined plan (top matches).
mode       = "council"
# COUNCIL BY DEFAULT (operator 2026-06-12 "force council shouldn't be FORCED but a
# default option ENABLED"): true -> SUBSTANTIVE turns (intent agent/multi_task, or
# chat >= decompose_min_words) engage the full multi-agent council BY DEFAULT, no
# force toggle -- breadth + live thinking/emitters by default. The OWUI
# force_council toggle still overrides (explicit on/off). Trivial chat stays single.
# Bounded by council_max + admission + lane/sub-lane semaphores. false -> the old
# native-loop-default (council only when force-toggled).
council_default = true
# Floor on engaged agents when relevant matches exist (relevance mode only).
fanout_min = 1
# Hard cap on TOTAL concurrent agents (primary + secondaries). Each extra
# agent is a full concurrent inference on the local lanes, so size it to the
# roster + the box's headroom. 3 = primary + up to 2 council members; raise
# as more [agents.*] are added (and a tool-capable box can carry them).
fanout_max = 3
# ── REAL SOURCE CITATIONS (operator 2026-06-18 "sources ... should be A2A or
# metadata"): every web_search this turn (native loop, council/DAG facets, the
# parent's harvest of each sub-agent's answer) records its REAL result URLs; the
# final answer attaches a numbered **Sources:** list + structured `mios_sources`
# metadata. max_sources caps how many appear; registry_cap bounds the per-turn
# cross-agent collector (most-recent N turns). agent-pipe reads these via _dispatch_num.
max_sources          = 8
sources_registry_cap = 64
# When a swarm/DAG turn grounds NOTHING (research+nodes both empty) and the answer
# is empty/punt OR it was a web/news turn, RE-ANSWER via the always-up light-lane
# native loop (real grounding + real citations) instead of shipping blank or
# fabricated text -- the failure mode when leaf agents are down (operator 2026-06-19).
# false = prior behaviour (ship the empty/fabricated synthesis). Degrade-open.
dag_empty_native_fallback = true
# Trust the planner's atomic verdict (operator 2026-06-19 "research native patterns"):
# when _plan_swarm self-gates to [] (focused/atomic ask) AND no breadth signal fires
# (refine deep/deep_research/multi_task/_multi_step or an operator toggle), do NOT
# force-seed a synthetic swarm -> answer via the single-agent path (faster, on-topic).
# Genuinely broad asks still fan out to ALL live nodes. false = prior always-seed.
swarm_trust_atomic = true
# ── NATIVE-LOOP GROUNDING / HYGIENE (operator 2026-06-19 "OWUI LITERALLY CARRIES
# ENVIRONMENT DETAILS EVERY TURN" + fix the "list N recent X" wrong-year fabrication).
# agent-pipe reads these from here via _DISPATCH_TOML (runtime override via the matching
# MIOS_NATIVE_LOOP_* env). All default-on; each behaviour degrades open on any error.
#   query_reformulate: ALWAYS reformulate the web_search query via the generative micro-
#     LLM (_formulate_web_query) -- not just hybrid turns -- so a verbose imperative
#     ("Give me a briefing on X this week") becomes a clean entity+date query instead of
#     the leading word "give" anchoring a dictionary result. (no hardcoded stopword list)
#   date_in_query: fold the resolved current date (YYYY-MM) into time-sensitive web_search
#     queries at the dispatch choke-point (covers the model's own in-loop calls too).
#   date_anchor: emit a HARD CURRENT_DATE line in the native-loop model context right
#     before the user question, so "today/this week/recent/latest" resolve to the present
#     (the soft env-grounding prose is overridden by an 8B on strong-prior topics).
#   math_hint: instruct the native loop to route non-trivial computation to the sandboxed
#     Python executor (run_sandboxed_code / run_python_tool_script), not in-head math.
native_loop_query_reformulate = true
native_loop_date_in_query     = true
native_loop_date_anchor       = true
native_loop_math_hint         = true
# ── SWARM-NODE COMPUTE BUDGET + DEEPEN (operator 2026-05-26 "every node computes
# ... loop until satisfied"; SSOT'd 2026-05-31 after "HARDCODES!!!"). agent-pipe
# reads these from here via _dispatch_toml(); runtime override via the matching
# MIOS_* env (MIOS_DAG_NODE_MAX_TOKENS / _SLOW_MAX_TOKENS / _RETRY,
# MIOS_SWARM_DEEPEN / _ITERS / _DEADLINE_S / _WEB_S).
# Per-node answer token budget: fast lanes (dGPU/CPU) full, slow lanes (iGPU/
# phone) trimmed so they finish within the read timeout instead of timing out.
dag_node_max_tokens      = 800
dag_node_slow_max_tokens = 350
dag_node_retry           = 1     # empty-result retries (read-only -> safe); 0 = none
# PER-NODE WALL-CLOCK DEADLINE (runaway/slowness fix 2026-06-02): the turn used to
# wait for the SLOWEST node (potato-cpu ~600s) -> blew every client timeout. Each
# agent node's dispatch+retries is bounded here; a node that doesn't answer in time
# is abandoned (empty) and the synthesiser proceeds on who DID answer.
dag_node_deadline_s      = 140   # seconds; runaway backstop for a FAST-lane node. Raised 75->140 (operator 2026-06-12 "ALL AGENTS USE SGLANG"): with every agent on the ONE SGLang lane (lane_concurrency_gpu=2, the VRAM-safe ceiling), nodes past the 2nd QUEUE for a slot, so the per-node deadline (measured from DISPATCH, not from slot-acquire) must absorb that queue wait + the node's own web-research+gen, or back-of-queue nodes get guillotined at 0 chars (grounded_nodes=0). 140 = ~queue + ~40s research + gen.
# NODE/ENDPOINT-AWARE deadline (operator 2026-06-02 "LOCAL CPU IS NEEDED ... ALL NODES PLAY A PART ... planning isn't taking into account the nodes and endpoints"): a SLOW lane (CPU/iGPU/phone) gets a longer deadline. It is now SIZED to its hardware -- it REASONS over the grounding the fast lanes fetched this turn (no 16K-ctx own tool-loop) -- so its single pass finishes well inside this and is never abandoned just for being slow. The fast lanes deepen while it finishes (everything concurrent, all sources every turn).
dag_node_deadline_slow_s = 150   # seconds; slow-lane (cpu/igpu/mobile) per-node deadline
# WORK-STEAL (deepen) LANES: only these FAST lanes do extra coverage passes until the barrier; a slow lane does its ONE grounded pass and waits (it can't afford a second). CSV of lane categories.
deepen_lanes         = "gpu,accelerator"
# SLOW-lane tool-surface floor: a slow lane with no explicit lane_tool_cap entry gets this many tools (NOT the full 71-tool surface a CPU daemon can't prefill). Only used when a slow node has no injected grounding to reason over. 0 = full surface (opt out).
slow_lane_tool_cap   = 12
# P0 STABLE TOOL PREFIX (operator 2026-06-11 "a lot of tools but optimized"): when true,
# the native loop emits a BYTE-IDENTICAL core tool block first (every turn, same order)
# so SGLang RadixAttention caches the system+tools prefix across turns instead of re-
# prefilling it on every intent change. The per-turn relevance signal moves OFF the
# tools[] array (which must stay stable) and onto a short "likely-relevant tools" TEXT
# hint placed next to the user's question + a small cosine-ranked TAIL after the core.
# false = legacy behaviour (intent-ordered out[:cap], a fresh prefix every turn). Ship
# OFF, measure the prefix-hit-rate, then flip ON. Degrade-open: OFF == byte-for-byte
# the prior pipeline. See usr/share/mios/doc/concepts/mcp-tools-optimization.md (P0).
# ENABLED 2026-06-11 after verification: core==23 (tier `core` only) -> ~33 tools visible
# (near the working legacy 36); 33/33 byte-identical tool prefix across unrelated intents
# (RadixAttention-cacheable); zero accuracy regression on the 7 AIOS capabilities (apps
# -> mios_apps, recall -> the saved fact); cap-safe for slow-lane nodes (core truncated to
# their cap). Exact hit-rate % not metered (SGLang --enable-metrics off) but the prefill
# reduction is deterministic given the proven byte-stability. Flip false to revert.
stable_tool_prefix   = true
# How many cosine-ranked NON-core tools to append AFTER the stable core block (the only
# part of tools[] that varies per turn). Small = a longer stable cached prefix; large =
# more per-turn tool coverage at the cost of a shorter cache hit. Only used when
# stable_tool_prefix = true.
stable_prefix_tail   = 10
# Inject a user-adjacent "likely-relevant tools" TEXT hint (the relevance signal that
# can't ride the now-byte-stable tools[] order). DEFAULT false: it nudges the 8B toward
# tool-hunting + regressed memory-recall in testing (the cosine TAIL already signals
# relevance inside tools[]). A future logit-mask experiment knob -- leave off until it
# demonstrably helps. Only used when stable_tool_prefix = true.
stable_prefix_hint   = false
# P2 TOOL RERANK (operator 2026-06-11 "a lot of tools but optimized"): a pure-compute
# stage-2 over the per-turn cosine TAIL selection -- RRF-fuse the cosine rank with an
# in-process BM25 lexical arm (over the same name+desc+examples corpus the embeddings use),
# then greedy MMR diversify so two confusable near-duplicates don't both crowd the tail.
# No model, ~+2-6ms, degrades-open to plain cosine. Default ON (strictly dominates cosine).
tool_rerank          = true
rerank_fanout        = 3     # over-fetch window K = max(fanout*N, rerank_min_k)
rerank_min_k         = 24    # floor on the rerank window so a small tail still has room
rerank_rrf_k         = 60    # reciprocal-rank-fusion constant (same value mios-web-search uses)
rerank_mmr_lambda    = 0.8   # MMR relevance(1.0) vs diversity(0.0) balance, clamped [0,1]; 0.8 held recall (no regression) + kept the rank-1 gain in the offline eval
rerank_skip_margin   = 0.08  # if the cosine cut at the N-th slot is this separated, skip stage-2 (confident, no confusable cluster)
# (P2 follow-up, operator-gated + default OFF: a bge-reranker-v2-m3 cross-encoder stage-2c
# behind a `rerank_xenc` flag -- needs a downloaded GGUF + a mios-llm-light --reranking lane +
# VRAM headroom on the shared 4090. Inert until the operator deploys it; the pure-compute
# RRF+MMR above is the shipping default. See the P2 doc for the wiring.)
# DEEPEN: after its primary answer a swarm node loops extra web-research + re-
# answer passes UNTIL the judge is satisfied, hard-bounded by these. A satisfied
# node exits at once; the deadline only bites a stubborn facet.
deepen_enabled       = true
# SATURATION SCHEDULER (operator 2026-06-01 "nothing in the pipeline is idle until
# synthesis"). true -> DAG runs as a CONTINUOUS READY-QUEUE (a node dispatches the
# moment its deps finish, bounded by the global/endpoint/lane semaphores) instead
# of barrier'd topological levels (fast lanes idle waiting for the slowest node in
# a level). Deepen still loops finished nodes until the GLOBAL barrier. false ->
# the proven level-barrier fallback. Read by SWARM_SATURATE (env MIOS_SWARM_SATURATE).
swarm_saturate       = true
deepen_iters         = 12     # RUNAWAY backstop on extra passes (the deadline is the real bound)
deepen_deadline_s    = 60     # HARD per-node deepen cap for DEEP turns (casual queries no longer deepen via the complexity gate). 60s/facet is the post-runaway deep budget.
deepen_web_timeout_s = 20     # per-iter web-research cap so one pass can't overshoot
# DETAIL-FILL (operator 2026-06-02 "also can loop to gather data in detail-fill passes"): a fast work-stealing node FETCHES new web data each deepen pass (bounded by deepen_web_timeout_s) and appends fresh stories to the shared grounding -> the loop enriches the FACTS, not just re-reasons them. Self-gates to web/news turns (a node carrying a web-capable refined plan). false = reason-only deepen (no new fetches).
deepen_fetch         = true
# ── PER-LANE / GLOBAL CONCURRENCY (SSOT'd 2026-05-31 after "HARDCODES!!!").
# agent_concurrency = default per-lane cap; lane_concurrency_<lane> overrides ONE
# lane. The LOCAL gpu/cpu lanes (the single SHARED 4090 + in-VM CPU) are capped
# to 2 so a wide research fan-out can't oversubscribe them (live test: it
# thrashed the VM + WSL). REMOTE lanes (potato-gpu/cpu, igpu) keep the default --
# separate hardware. Read via _dispatch_toml; override MIOS_AGENT_CONCURRENCY /
# MIOS_AGENT_LANE_CONCURRENCY[_<LANE>].
agent_concurrency    = 3      # global default per-lane concurrent-agent cap
lane_concurrency     = 3      # default per lane (each distinct hw = its own semaphore)
# dGPU lane/endpoint caps RAISED to a BACKSTOP ceiling (operator 2026-06-01:
# "multiple medium/small models dispatch concurrently to dGPUs ... until
# satisfied"). The real governor is now VRAM-AWARE ADMISSION (_admit gates a
# cold model on measured free VRAM + VRAM_COLOAD_RESERVE_MB; see [dispatch].
# admit_* + the VRAM_COLOAD_* env), so the dGPU packs several small models by
# real headroom. These semaphores are the HARD OOM backstop if the VRAM probe
# is wrong (the 4090 is shared with Windows). 4 = the big primary + up to 3
# small co-loaded workers; lower if the host steals more VRAM.
lane_concurrency_gpu = 2      # P7 swarm-safety (operator 2026-06-11 "finish! I authorize you"): reverted 4->2, the known-safe ceiling. A broad dispatch_to_nodes swarm at 4 piled concurrent 8B generations onto the single SGLang :11441 -> OOM/cycle; 2 makes excess nodes QUEUE (degrade = slower, never crash). No VRAM change. Raise again only after per-engine spreading (route some agents off the gpu lane) frees headroom -- that needs the operator's model-placement decisions.
lane_concurrency_cpu = 2      # in-VM CPU -- cap low to avoid thrash (CPU has no VRAM elasticity)
# ── SWARM Phase-0/2/3 (operator 2026-06-12 "delegate a swarm to many small models
# concurrently across CPU+dGPU+nodes"). gpu_profile selects the dGPU topology:
#   "orchestrator" (default, safe) = the single SGLang heavy lane (mios-heavy).
#   "swarm"        = arm N single-model llama-server workers (mios-llm-worker@)
#                    so 3-4 small models generate CONCURRENTLY on the dGPU. Flip to
#                    "swarm" + provision GGUFs + define [nodes.*] serve workers, then
#                    mios-swarm-pack-firstboot arms them (Phase-3, VRAM-RISKY).
gpu_profile     = "orchestrator"
vram_budget_mb  = 11000       # agent-lane VRAM ceiling on the shared 4090; the pack firstboot REFUSES to arm if Sigma(worker vram_mb) exceeds this (hard OOM-cascade guard)
lane_concurrency_gpu0 = 4     # per-SUB-LANE cap for the 'gpu0' small-model pack (each worker is its OWN server, so they don't pile on one daemon -- the lane=4 OOM mode is gone). Inert until workers set sub_lane="gpu0".
# Inert worker example (uncomment + adjust + set gpu_profile="swarm" to arm). Each
# is ONE concurrent llama-server on the dGPU; vram_mb feeds the budget guard +
# per-endpoint admission; sub_lane gives it an independent concurrency semaphore.
#   [nodes.swarm-dgpu-a]
#   endpoint = "http://localhost:11461/v1"   # its own server instance
#   model    = "qwen3:1.7b"                  # the alias it serves (= --alias)
#   lane = "gpu"; sub_lane = "gpu0"; vram_mb = 2200; api = "llamacpp"; health_gate = true
#   serve = true; gguf = "qwen3-1.7b-q4_k_m.gguf"; ngl = 99; ctx = 8192
#   [nodes.swarm-dgpu-b]  # ...11462, another small model, sub_lane="gpu0" ...
#   [nodes.swarm-cpu-a]   # lane="cpu"; sub_lane="cpu"; ngl=0; ram_mb=2500; ...
# GLOBAL host in-flight cap (operator 2026-06-01 load-361 fix; research-endorsed).
# Per-lane caps bound each lane, but with all-nodes-eligible the SUM of lanes can
# swamp the host -> ONE process-wide cap on TOTAL running dispatches. Sized
# ~cores-reserve so normal multi-lane concurrency is unaffected; only an extreme
# wide fan-out is bounded ("saturate to capacity, never over"). 0/unset -> code
# default max(8, cpu_count-4). Read by _GLOBAL_DISPATCH_SEM.
global_concurrency   = 16     # max concurrently-running agent dispatches across ALL lanes
# ── Runaway / abandoned-turn bounds (operator 2026-06-01 cancellation fix). ollama
# does NOT stop generating on client disconnect, so a hard num_predict cap is the
# only real bound on an abandoned turn; the turn deadline is a wall-clock backstop
# (per-node deepen caps don't bound the whole turn). The disconnect/supersede
# cancellation lives in _execute_dag_emitting + _execute_dag_saturated.
ollama_num_predict_cap = 2048   # hard per-generation token ceiling on AGENT ollama dispatches (fast/dGPU lanes)
# PER-LANE cap (runaway fix 2026-06-01j): a CPU/iGPU lane gens ~5 tok/s, so 2048
# tokens = ~400s of pegged cores per gen; ollama can't be aborted on disconnect,
# so stacked slow-lane gens drove loadavg to 387. Give the SLOW lanes a short
# ceiling (~512 ≈ ~100s) so each self-clears fast; the dGPU keeps the full 2048.
ollama_num_predict_cap_cpu = 512   # token ceiling on CPU/iGPU (:11435/:11436) dispatches
turn_deadline_s        = 600    # wall-clock backstop per turn (s); generous so deep research still finishes
runaway_reap           = true   # on a BLOWN deadline (not supersede), unload CPU-lane models (keep_alive:0) -- the only real release for ollama's un-abortable gens
# ── COUNCIL ROSTER WIDTH + PER-ENDPOINT CAP (runaway fix 2026-06-01). The
# council previously fanned EVERY non-trivial turn out to ALL live agents
# (MIOS_COUNCIL_MAX defaulted to 0 = uncapped) AND pulled in the research_only
# replicas on non-research turns -> a trivial prompt cold-loaded 11 models at
# once -> ollama thundering herd -> loadavg 128 -> VM wedge (terminated twice).
# council_max bounds the SECONDARY roster size (0 = uncapped, explicit opt-in);
# research_only replicas now join ONLY on a web/news/deep turn. endpoint_
# concurrency caps concurrent calls to ONE inference daemon (host:port) so a
# wide fan-out can't cold-load N models on the same ollama simultaneously --
# distinct from the per-LANE cap (hardware category). Override via
# MIOS_COUNCIL_MAX / MIOS_AGENT_ENDPOINT_CONCURRENCY.
council_max          = 4      # max council SECONDARIES per turn (0 = all; was uncapped)
# SWARM/DAG width cap (operator 2026-06-01 "16-agent explosion"): the swarm/DAG
# fan-out had NO cap (council_max only bounds the council path). Bound the swarm
# to at most this many DISTINCT (endpoint,model) targets AFTER de-dup. 0=uncapped.
swarm_max_width      = 3      # operator 2026-06-12 "ALL AGENTS USE SGLANG": every agent now targets the ONE SGLang heavy lane, whose VRAM only safely runs lane_concurrency_gpu=2 concurrent 14B gens. Fanning out 8 nodes onto a 2-wide lane just QUEUES 6 of them past their deadline -> all time out (grounded_nodes=0). Size the fan-out to the REAL concurrency: 3 facets (2 run immediately + 1 short queue), each grounded, finishing inside dag_node_deadline_s. Work-steal/deepen still loops the 2-3 live nodes across extra coverage facets until the barrier, so coverage stays broad without a wide cold fan-out. Raise again only when SGLang gets more concurrency headroom (more VRAM / a 2nd engine).
# SLOW-LANE fan-out CEILING (runaway fix 2026-06-01j): GPU/fast nodes fan out
# unbounded, but CPU/iGPU lanes are where stacked ~100s gens pile up. Cap how many
# slow-lane nodes a DAG BACKFILLS (primary facets never dropped). Default 2 = the
# live CPU node count (local-cpu + potato-cpu) = no-op today, but bounds a deep/
# research turn that would otherwise multiply CPU replicas across the lanes.
swarm_max_cpu_nodes  = 2      # max CPU/iGPU slow-lane nodes backfilled into one DAG (0 = uncapped)
# endpoint_concurrency RAISED 2->4 (operator 2026-06-01 dGPU co-load): backstop
# ceiling for concurrent calls to one daemon; VRAM-aware admission (admit_* +
# VRAM_COLOAD_*) is the real per-turn governor on the dGPU. The CPU lane stays
# protected by its own MemoryMax + the _cap_cpu_lane_model micro-only guard.
endpoint_concurrency = 4      # was 2; backstop, VRAM-admission governs dGPU co-load
# VRAM-aware co-load (operator 2026-06-01): admit another concurrent model onto a
# dGPU endpoint only when measured free VRAM fits it + reserve. SHARED-4090 guard:
# reserve leaves margin for the Windows host's VRAM co-tenancy (the VM can't see
# host-side usage). Read by _admit via the MIOS_VRAM_COLOAD_* env defaults.
vram_coload_reserve_mb = 3000   # MB left free for host co-tenancy + spikes
vram_coload_est_mb     = 5000   # assumed cold-model VRAM until /api/ps knows its size
# ── Admission controller (P1, operator 2026-06-01). NOW ON by default: it is the
# AIOS-correct SAFETY layer + the PRECONDITION for "all nodes enabled by default"
# (research 2026-06-01: eligibility is universal, safety lives in admission, never
# by disabling nodes). Degrade-open + bounded-wait everywhere -> never deadlocks.
# _disp_num reads these from here directly.
admit_enable         = true   # master switch (ON: the gate for the wide all-nodes roster; was false)
admit_load_ceil      = 56     # 1-min loadavg ceiling (cpu*2 on the 28-core dev VM); over -> backpressure
admit_mem_pct        = 92     # mem% ceiling; over -> backpressure
admit_max_wait       = 8.0    # max seconds a dispatch waits at the gate before admitting anyway (no deadlock)
# ── All-nodes-enabled-by-default scheduling (operator 2026-06-01 "all nodes are
# enabled by default ... concurrently dispatched ... nothing idle until synthesis").
# Made safe by admit_enable=true above + COUNCIL_MAX + per-endpoint/lane semaphores.
nodes_research_only  = false  # [nodes.*] default research_only: FALSE = every node eligible on EVERY turn (per-node override wins)
# Lane -> admission PRIORITY (1..9; higher = admitted first / shorter backoff).
# Fast LOCAL lanes high; slow/remote/research lanes low so under host pressure they
# wait out admit_max_wait + self-shed -> the wide roster degrades, never stampedes.
lane_priority        = "gpu:8,cpu:7,accelerator:6,igpu:3,mobile:2,_default:5"
# ── WS-1 priority scheduler queue (AIOS Agent Scheduler reordering, 2026-06-04).
# When ON, the next freed GLOBAL dispatch slot goes to the HIGHEST-PRIORITY
# waiter (turn priority via _sched_priority + lane priority above, FIFO tie-break)
# instead of arrival order -- this makes _sched_priority/_dispatch_priority ACTIVE
# rather than advisory. Anti-starvation aging serves any waiter older than
# priority_starvation_ms ahead of priority so slow lanes never indefinitely
# starve. DEFAULT OFF + degrade-open: a pure no-op until enabled; any error falls
# back to the proven plain FIFO global cap. Observe /v1/scheduler.priority_gate
# first, then flip on via an /etc drop-in. _disp_num reads these directly.
priority_queue_enable  = true   # ON (operator 2026-06-04 'everything on' for live MiOS-DEV); degrade-open to plain FIFO on any error
priority_starvation_ms = 4000   # a queued dispatch older than this is served ahead of priority (anti-starvation)
# T21 request-cancellation (2026-06-04): cancel a NON-STREAMING turn's swarm the
# moment the client disconnects, instead of churning DAG+deepen to turn_deadline_s.
# The streaming path already self-bounds on disconnect. Default ON; degrade-open
# (request=None / disabled -> deadline-only, unchanged). _disp_num reads these.
request_cancel_enable  = 1      # 1=cancel non-streaming turns on client disconnect; 0=deadline-only
request_cancel_poll_s  = 2.0    # disconnect-watcher poll interval (seconds)
# Proactively evict an IDLE resident model (refcount 0, non-kept) to free VRAM for
# a cold model a turn NEEDS -- "clear RAM/VRAM for idle agents to be loaded so
# nothing in the pipeline is idle". ollama lanes (/api/ps + keep_alive:0); the hard
# semaphores stay the OOM backstop. llama.cpp KV is paged separately (kv_paging_*).
vram_reclaim_idle    = false  # DISABLED 2026-06-01: proactive evict->reload of multi-GB model files thrashed disk (~2GB/s). De-dup + swarm_max_width cut the model churn at the source; let ollama's own LRU manage residency.
# CPU-offload of fan-out secondaries: OFF (operator 2026-06-01 "concurrent true
# swarm / unfired nodes"). ON funneled EVERY secondary onto the single CPU lane
# (:11435) -> 35-conn wedge while dGPU/potato/iGPU sat idle. OFF = each distinct
# node runs on its OWN hardware concurrently (dGPU co-loads multiple models).
offload_cpu          = false
# ── Tool-surface shaping (operator 2026-06-01). Per-lane tool CAP (weak lanes
# like the iGPU llama.cpp time out grammar-constraining all 71 verbs; they get a
# capped REAL subset, never zero) + endpoints that 400 on tool_choice=required.
lane_tool_cap        = "igpu:15,mobile:15"   # lane:cap CSV; per-lane override (0 = full surface for that lane)
default_tool_cap     = 24                    # per-turn visible-tool cap for any other lane; cosine picks the N + tool_search reaches the rest (0 = uncapped)
no_tool_choice_hints = "11436"               # host:port substrings whose llama.cpp rejects tool_choice=required
parallel_tools_hints = "11441"               # host:port substrings whose model reliably emits PARALLEL tool calls -> OpenAI-default parallel_tool_calls=True (capable heavy lane); everything else stays sequential (small models malform parallel calls). MIOS_PARALLEL_TOOLS_HINTS overrides.
worker_mcp_tools     = true                  # surface external MCP client tools to fan-out workers
# ── KV-cache paging (AIOS context-manager prototype, operator 2026-06-01 "VRAM
# can compress or write to disk ... clean state when agents/models load/unload").
# On a llama.cpp endpoint (launched with --slot-save-path) the agent-pipe
# demand-pages each conversation's KV to/from DISK: page OUT the resident conv
# (save) + page IN this one (restore) only on a conversation SWITCH (no per-turn
# disk thrash). ollama can't do this; vLLM+LMCache is the Phase-2/3 scale-up.
# Read by the agent-pipe (_kv_paging / _endpoint_is_llamacpp); env overrides
# MIOS_KV_PAGING / MIOS_KV_PAGING_HINTS / MIOS_KV_PAGING_SLOT / _TIMEOUT.
kv_paging_enable  = true     # master switch; only ACTS on llama.cpp /slots endpoints
kv_paging_hints   = "11436"  # host:port substrings that speak llama.cpp /slots (default the iGPU lane)
kv_paging_slot    = 0        # llama-server slot id the light lane pages (single resident frame)
kv_paging_timeout = 12.0     # seconds for one save/restore POST (best-effort; never fails the turn)
# ── KV-cache FORK (WS-8) — branch a parent conversation's saved KV into a NEW
# child file so a swarm can fan out parallel cognitive paths from a SHARED PREFIX
# (RadixAttention-style prefix-sharing on the disk-file prototype). A fork =
# restore(parent)->save(child) over the existing /slots primitive, under the per-
# slot lock. DEFAULT-OFF + degrade-open: when disabled (or on any slot error) the
# child just starts cold. Read by the agent-pipe (kv_fork / mios_kvfork); env
# overrides MIOS_KV_FORK / MIOS_KV_FORK_MAX_BRANCHES.
kv_fork_enable       = false  # master switch (only ACTS when kv_paging is on AND the endpoint speaks llama.cpp /slots)
kv_fork_max_branches = 4      # runaway guard: max child KV files one fork request may spawn
# ── Concurrency / timeouts / per-lane trimming (agent-pipe env knobs; code
# defaults shown, same ${MIOS_*:-default} pattern). Operator 2026-05-24: "iGPU
# fires WITH CPU ... any engine/node" + "add per-lane context trimming".
#   MIOS_AGENT_LANE_CONCURRENCY        = 3   -- concurrent agents PER LANE. Each
#       compute lane/engine/node (dGPU, CPU, iGPU, accelerator, each remote node)
#       gets its OWN semaphore, so distinct hardware ALL fires concurrently; only
#       agents SHARING one lane queue. Per-lane override
#       MIOS_AGENT_LANE_CONCURRENCY_<LANE> (e.g. _GPU=2 to protect 4090 VRAM).
#   MIOS_AGENT_HEALTHGATE_CONNECT_S    = 2.5 -- connect timeout for a health-gated
#       (remote/slow) node -> an ABSENT node (phone asleep) drops fast.
#   MIOS_AGENT_HEALTHGATE_READ_S       = 120 -- read timeout for a health-gated
#       node -> a PRESENT-but-SLOW node (the iGPU, ~13 tok/s Vulkan) FINISHES
#       instead of being abandoned mid-compute (was a flat 45s).
#   MIOS_SLOW_LANES            = igpu,mobile,accelerator -- lanes that get a
#       TRIMMED system prefix (slow prefill); gpu + cpu keep the full context.
#   MIOS_SLOW_LANE_BLOCK_CHARS = 1500 -- per-block cap for a slow lane, so the
#       ~7K web-research context doesn't blow its prefill (the gist survives).
#   MIOS_NODE_LIVENESS_TTL_S  = 45  -- OUTAGE resilience (operator 2026-05-25
#       "iGPU is down"): TTL of the cached node-liveness probe. A health_gate
#       client/Tailscale node (the iGPU :11436, a phone) that is DOWN is pruned
#       from the swarm roster so the planner never assigns it a facet + any DAG
#       facet already on a dead node RE-ROUTES to a live engine -- swarm width is
#       preserved under an outage instead of a facet vanishing into a dead node.
#       Only health_gate nodes are probed (local lanes are always treated live);
#       a down node isn't re-probed every turn and rejoins within the TTL once
#       back up. 0 effectively disables caching (probe every turn).
#   MIOS_NODE_LIVENESS_CONNECT_S = 1.5 -- connect timeout of that liveness probe.

# ── CLOSED-LOOP + ACTION-VERIFY bounds (agent-pipe env knobs; code defaults shown,
# same ${MIOS_*:-default} pattern). Operator 2026-06-16 "loop anything not
# successful or fully fulfilled". All bounded + verdict-driven + degrade-open so a
# robust turn never spins; they only re-engage on a CONFIRMED failure signal.
#   MIOS_SECONDARY_REPLAN_MAX  = 1   -- supervisory re-engages in BOTH shared
#       tool-loops (_v1_/_ollama_secondary_tool_loop): when the model stops calling
#       tools but a verb THIS loop ran reported a genuine FAILURE
#       (_tmsgs_indicate_failure), re-engage once with a fix-it nudge.
#   MIOS_DAG_REPLAN_MAX        = 1   -- multi-node DAG re-dispatch of UNFULFILLED
#       facets in _synthesise; adopt-only-if-strictly-more-facets-satisfied.
#   MIOS_TYPE_RETRY_MAX        = 2   -- per-action typing re-focus+re-type when
#       pc_type's STRICT read-back reports the text did NOT land (compound chain).
#   MIOS_DAEMON_DIAGNOSE       = 1   -- on a re-engage, a FRESH monitor-LLM pass
#       (MIOS_DAEMON_DIAGNOSE_MODEL/_ENDPOINT) explains WHY the step failed +
#       proposes a DIFFERENT action, injected into the retry nudge (guided retry).
#   MIOS_KNOWLEDGE_STORE_GATE_UNSATISFIED = 1 -- skip persisting a turn's Q+A to the
#       knowledge table when its satisfaction verdict is False (no recall poison;
#       None still stores, degrade-open).
#   MIOS_PC_INPUT_SECTION = "PC input" -- catalog section folded into the fire-one-
#       verb fast-path set so a standalone "type X" dispatches pc_type (not the
#       wrong-platform cu_type) and surfaces in the refine prompt.
#   MIOS_LAST_WINDOW_CAP  = 256 -- bound on the per-CONVERSATION last-opened-window
#       map that lets a standalone "type X into it" focus the right window first.

# ── WEB-RESEARCH loop bounds (SSOT'd 2026-05-31). The pipeline's per-facet
# web-research loop (search -> fetch/extract -> judge -> re-search) is the
# dominant research-turn LATENCY driver. MODERATE-cut values (operator
# 2026-05-31 live test: research turns exceeded 5.5min): fewer judge-gated
# attempts + drill passes, and a much shorter crawl-fallback timeout (the deep
# crawl is a fallback now that the miosfetch extract works). agent-pipe reads
# these via _toml_section("web_research"); runtime override MIOS_WEB_RESEARCH_*.
# (Only these 3 latency keys are SSOT-wired today; the rest of the web-research
# knobs remain env-overridable -- a noted follow-up sweep.)
[web_research]
max_attempts    = 3    # judge-gated re-search attempts (was 5)
passes          = 3    # search->judge->re-search drill passes (was 4)
crawl_timeout_s = 18   # deep crawl4ai/Camoufox fallback per-page cap, seconds (was 45)

# ── Knowledge / tiered semantic memory (P2, operator 2026-06-01) ──────────────
# The agent-pipe persists every finished Q+A to the SurrealDB `knowledge` table
# + recalls by embedding cosine. P2 added tiering: recall blends cosine with
# outcome (was the prior turn satisfied), tier (hot/warm/cold), and access
# frequency. Rank weights default near-zero -> recall == pure recency+cosine
# until tuned. Read directly via _toml_section("knowledge") / _cfg_num.
[knowledge]
recall_strict_score = 0.82   # above this cosine a recall is trusted without a shared-topic-anchor token
recall_pref_min_score = 0.50 # lower recall floor for SELF-REFERENTIAL asks (a possessive pronoun present): a "what is MY favorite X" template cosines below the stored statement; set == recall_min_score to disable
rank_outcome        = 0.05   # weight: + if the recalled answer's turn was satisfied, - if unsatisfied
rank_hot            = 0.03   # weight: + if the row is tier=hot (frequently paged in)
rank_access         = 0.02   # weight: * log1p(access_count)
rank_age            = 0.0    # weight: - age in days (inert by default)
hot_threshold       = 5      # access_count at which a recalled row is promoted to tier=hot
# ── WS-3 eviction (P2.1, 2026-06-04). The knowledge table appends one row per
# finished turn -> unbounded. This bounded K-LRU + TTL sweep removes only STALE,
# never-recalled, neutral-outcome rows; it NEVER deletes a hot / satisfied /
# pinned row (mios-remember facts live in a SEPARATE store and are untouched).
# ON by default (operator 2026-06-04 'everything on' for live MiOS-DEV). The
# sweep DELETES only stale (>ttl) never-recalled neutral rows -- effectively a
# no-op on a recent table until rows age past evict_ttl_days. To observe instead
# of delete, set evict_enable=false + evict_dryrun=true (log-only). BACK UP the
# knowledge table if it holds valuable rows older than evict_ttl_days.
evict_enable        = true   # ON (operator 2026-06-04 'everything on'); DELETES only >ttl never-recalled neutral rows (hot/satisfied/pinned always kept, batch-capped)
evict_dryrun        = false  # inert when evict_enable=true; set true WITH evict_enable=false for log-only observation
evict_interval_s    = 3600   # seconds between sweeps
evict_ttl_days      = 90     # evict evictable rows not accessed within this many days
evict_max_rows      = 50000  # hard row cap; overflow (lowest-value first) is evicted
evict_min_access    = 1      # only evict rows recalled FEWER than this many times (1 = never recalled)
evict_batch         = 500    # max rows removed per sweep (blast-radius bound)

# ── WS-6 runtime HITL approval gate (2026-06-04). 'enable' on by default; 'mode'
# = 'log' (NON-BLOCKING: record + emit a hitl_request event then proceed -- the
# autonomous swarm never deadlocks) or 'gate' (BLOCKING: a scoped verb is refused
# until approved via POST /v1/hitl/approve, then the agent retry passes). 'verbs'
# overrides the gated set (CSV); blank = the built-in high-privilege verb set.
[hitl]
enable = true
mode   = "log"     # log = non-blocking + observable (default); gate = block-until-approved
verbs  = ""        # CSV override of gated verbs; blank = _HIGH_PRIVILEGE_VERBS

# ── WS-6 replayable DAG run-templates (2026-06-04). Capture every planned DAG to
# the run_template table (GET /v1/run-templates) keyed by a structural class hash
# -- the determinism foundation. Replay-reuse is a follow-up; capture is additive
# + fire-and-forget so it can never affect a live run.
[run_template]
enable = true

# ── WS-5 Agent-Computer Interface output normalizer (2026-06-04). Head-TAIL
# truncation of tool/terminal results (keep the start + the end, elide the
# middle with an anti-fabrication marker) so the tail's error/exit/result
# survives. Read directly by the agent-pipe (_cap_verb_result).
[aci]
max_lines = 160    # cap lines per tool result (head+tail kept, middle elided); 0 = no line cap
head_frac = 0.6    # fraction of the char/line budget kept as head; the rest is tail

# ── WS-2 Code Mode (2026-06-04). The agent writes CODE that calls a local tool
# API inside the rootless podman coderun-sandbox instead of loading ~71 function
# schemas into context (the AIOS Tool-Manager token win). DEFAULT-OFF + degrade-
# CLOSED: code execution only runs when enable=true AND the sandbox is present.
# Read directly by the agent-pipe + mios-coderun-codemode via [code_mode].
[code_mode]
enable           = false   # master gate -- code execution is OFF until an /etc drop-in flips this
heavy_lane_only  = true    # P5: code_mode (model authors orchestration python) runs ONLY in the heavy native-loop orchestrator, never a light swarm worker (worker emitting code_mode is refused). MIOS_CODE_MODE_HEAVY_ONLY overrides.
allow_net        = false   # even if a snippet requests net, deploy must also allow it (AND of the two)
max_output_chars = 8000    # cap on snippet stdout/stderr fed back to the model
uid              = 828     # mios-codemode service uid (50-mios-services.conf); pins workspace ownership
gid              = 828
# workspace_root = "/var/lib/mios/codemode"   # default; falls back to [paths].coderun_workspace_root if unset

[refine]
# Phase D.5 quick-refine pass settings. ALWAYS runs before any
# delegation. INPUT prompt-enhancement half of the "polish mechanism".
# Operator 2026-05-22 consolidation: refine + polish + plan all share
# the ONE light MiOS brain (mios-agent, FROM qwen3.5:4b) instead of a
# bare base model -- so prompt-enhancement carries the MiOS operating
# principles + ENGLISH-default language, and the model count stays
# minimal. dGPU lane (:11434); shares mios-hermes's base blob (no extra
# resident weights).
enable           = true
model            = "mios-agent"
endpoint         = "http://localhost:11450"   # mios-llm-light (ALL llama.cpp; ollama :11434 retired G5)
# Timeout headroom: on bare-metal Fedora-bootc with real ROCm/
# CUDA, qwen3:1.7b emits a 400-token JSON in <1s. On WSL2 dev
# (CPU only -- /dev/kfd isn't exposed for ROCm) it takes 15-30s
# for the same call. 45s is generous for either deployment;
# the bypass path still keeps trivial input fast.
timeout_seconds  = 45
# Token budget for the refine JSON answer. qwen3 reasoning models
# can consume ~200 tokens on chain-of-thought even with /no_think
# in the prompt; 1200 leaves plenty of room for both. On a non-
# reasoning model this could drop to ~300.
max_tokens       = 1200
# Trivial-input shortcut: when the user message is shorter than
# this many chars AND matches one of the bypass patterns
# (greetings, single-word commands), skip refine and emit a
# minimal plan inline. Pure-bash latency on the fast path.
bypass_chars     = 24

[polish]
# Phase D.5 polish pass settings. Runs ONCE on the final answer before
# returning to the gateway -- OUTPUT-shaping half of the "polish
# mechanism": removes leakage, matches intended_outcome format, applies
# the operator PERSONA + the ENGLISH-default language anchor (operator's
# original message). Skipped for dispatch / chat / DAG fast paths (those
# produce final-shape content already). Operator 2026-05-22: shares the
# ONE light MiOS brain (mios-agent, FROM qwen3.5:4b) with refine + plan
# on the dGPU lane -- the final answer is shaped by the MiOS brain, not a
# bare base model.
enable           = true
model            = "mios-agent"
endpoint         = "http://localhost:11450"   # mios-llm-light (ALL llama.cpp; ollama :11434 retired G5)
# Same CPU-vs-GPU headroom rationale as [refine].timeout_seconds.
timeout_seconds  = 45
max_tokens       = 800

[passport]
# Phase C.3 of the AgentOS roadmap: Agent Passports (signed
# identity tokens). Every agent in the stack gets an Ed25519
# keypair at provisioning -- agent-pipe, MiOS-Hermes, MiOS-
# OpenCode, future MCP clients. Security-relevant SurrealDB
# writes (tool_call, skill_invocation, firewall_block events)
# carry a passport envelope that binds the signature to the
# exact data via SHA-256(table || canonical-json(fields-minus-
# passport)). Verification is OFFLINE: any agent reads the
# public key from /var/lib/mios/agent-passports/<agent>/
# public.key (world-readable) and validates without an external
# KMS or CA. Private keys are 0600 owned by the agent's sysuser.
#
# Agents the operator can register out-of-the-box (provisioning
# is idempotent -- re-running just keeps existing keys). Add to
# this list to enroll a new agent without code edits.
enable           = true
algo             = "ed25519"
key_dir          = "/var/lib/mios/agent-passports"
# How many days before a key is auto-flagged for rotation by the
# next provisioning run. 0 = never (operator triggers rotation
# manually via `mios-passport rotate <agent>`).
rotate_days      = 365
# Whether agent-pipe's read paths VERIFY passports when surfacing
# data to operators (slows reads but catches tamper attempts).
# Default false in v1 -- writes are signed but reads are trust-
# the-DB. Operator can flip to true for a hardened deployment.
verify_on_read   = false
# The agent identities mios-passport-provision.service enrolls at
# firstboot. Order matters only for log readability; the actual
# enrollment is parallel-idempotent.
agents = [
    "agent-pipe",
    "hermes",
    "mios-daemon",
    "opencode",
    "cron-director",
]

# ----------------------------------------------------------------------------
# [daemon] -- top-level mios-daemon autonomy / back-pressure governor (Wave 0).
# Bare keys here MUST precede any [daemon.*] sub-table (TOML ordering). These
# are PURE-PYTHON-READ knobs consumed by mios-daemon / mios-daemon-agent /
# the cron-director via the agent-pipe _toml_section("daemon") helper -- they
# need NO userenv.sh slot or 15-render-quadlets.sh allowlist entry.
#
# Back-pressure GOVERNOR: when the box is hot (load or GPU util above the
# ceilings below) the daemon's *autonomous* (self-initiated) work calms down
# so it never starves an interactive turn. Degrade-open: pressure_skip=false
# ships the governor in OBSERVE/ACTIVE mode but the ceilings are generous; set
# pressure_skip=true to bypass the governor entirely (always run autonomous
# work, legacy behaviour). A probe error never crashes the hot path -- on any
# read/probe failure the daemon treats pressure as ABSENT (proceeds).
# ----------------------------------------------------------------------------
[daemon]
# 1-minute load-average ceiling. Above this, autonomous daemon work is held
# until load drops back under the ceiling. Sized GENEROUSLY (per-core ~1.0 is
# "busy but fine"); raise on a many-core box. Float allowed.
pressure_load_ceil      = 8.0
# GPU utilisation ceiling (percent 0-100). Above this, autonomous work that
# would touch a local inference lane is deferred so it doesn't queue behind a
# live interactive generation on the shared 4090. 90 = leave headroom for one
# in-flight turn.
pressure_gpu_util_ceil  = 90
# Master bypass for the whole back-pressure governor. false (default) = the
# governor is ACTIVE (autonomous work respects the ceilings above). true =
# legacy behaviour, autonomous work always runs regardless of load/GPU. Ships
# false but the generous ceilings keep normal use unaffected.
pressure_skip           = false
# De-dup window (seconds) for the daemon's micro-LLM "is this worth acting on?"
# classifier: an identical/near-identical trigger seen again within this window
# is skipped instead of re-classified + re-acted. 600 = 10 min; stops a noisy
# log line from spawning repeated autonomous runs.
classify_dedup_s        = 600
# Hard cap on CONCURRENT cron-director-launched autonomous jobs. 1 = serialize
# scheduled autonomous work (one recurring task at a time) so a backlog can't
# fan out into a thundering herd of mios-ai runs. Raise only on a box with
# spare lanes.
cron_max_concurrent     = 1
# CALM-loop max tick (seconds): upper bound on a single autonomous daemon
# tick's wall-clock before it yields back to the scheduler, so one long
# autonomous unit can't monopolise the daemon. Generous so normal ticks finish
# naturally; this is a runaway backstop.
calm_max_tick_s         = 300
# Quiescence window (minutes): the daemon only initiates *new* autonomous,
# self-directed work after the system has been interactively idle for this
# long, so autonomy happens in the quiet gaps, not mid-conversation. Reactive
# (log-follow / followup) work is NOT gated by this -- only self-initiated.
quiescence_window_min   = 10
# Escalation cooldown (seconds): minimum gap between two escalations of the
# SAME concern (e.g. re-notifying / re-acting on a persistent condition) so a
# stuck state can't spam. 1800 = 30 min.
escalation_cooldown_s   = 1800
# Max escalation attempts for one concern before the daemon gives up and just
# logs (no infinite retry loop). After this many attempts within the cooldown
# cadence the concern is parked.
escalation_max_attempts = 3

# ----------------------------------------------------------------------------
# [budget] -- token / in-flight budget ceilings (Wave 0). PURE-PYTHON-READ by
# agent-pipe (_toml_section("budget")). Generous defaults so normal interactive
# use is never throttled; these exist to bound RUNAWAY autonomous fan-out, not
# to limit a human's conversation. Degrade-open: a turn that would exceed a
# ceiling is trimmed/deferred, never hard-errored on the interactive path.
# ----------------------------------------------------------------------------
[budget]
# Per-conversation cumulative token ceiling (prompt+completion across the whole
# turn's fan-out). Generous -- a deep council turn with web grounding stays
# well under this; it only catches a pathological loop. 0 = unlimited (off).
conversation_token_ceil = 2000000
# Per-AUTONOMOUS-run token ceiling (a daemon/cron self-initiated unit). Tighter
# than the conversation ceiling because autonomous work is unattended. 0 = off.
autonomous_token_ceil   = 400000
# Max concurrent AUTONOMOUS (self-initiated) inference runs in flight at once,
# across the whole daemon/cron plane. Bounds unattended fan-out so it can't
# saturate the lanes; interactive turns are NOT counted against this. 1 = fully
# serialized autonomy.
autonomous_max_inflight = 1
# Rolling window (seconds) over which the budget ceilings above are measured /
# reset. 3600 = per-hour accounting.
window_s                = 3600

# ----------------------------------------------------------------------------
# [dispatch.autonomy] -- Wave-0 autonomous-dispatch knobs. NOTE: the primary
# [dispatch] table (council/fanout/rerank/...) lives earlier in this file; a
# bare key cannot be appended after sub-tables, so these autonomy knobs live in
# their own [dispatch.autonomy] sub-table. PURE-PYTHON-READ by agent-pipe
# (_toml_section("dispatch.autonomy") / the dispatch loader). The task spec
# named [dispatch].autonomous_priority + [dispatch].max_dispatch_depth; they
# are scoped here as autonomy.* to keep the SSOT TOML-valid.
# ----------------------------------------------------------------------------
[dispatch.autonomy]
# Scheduling priority class for AUTONOMOUS (self-initiated) dispatches: "low"
# (default) lets interactive turns jump ahead; "normal"/"high" raise it. Low
# keeps unattended work out of the operator's way.
autonomous_priority = "low"
# Max recursion depth for dispatch -> sub-dispatch chains (an agent dispatching
# to a peer that dispatches again). 2 = primary -> sub-agent -> one more hop,
# then no further nesting. Bounds runaway delegation fan-out.
max_dispatch_depth  = 2

# ----------------------------------------------------------------------------
# [daemon.index] -- directory-map indexer in mios-daemon.
# Walks the configured roots on `interval_min` cadence, upserts entries
# into SurrealDB's directory_entry table. Agents query via the
# `directory_lookup` verb (sub-100ms DB hit vs ~60ms+ live mios-find).
# Each root has a label + filesystem path + optional include/exclude
# globs. Summaries are extracted for text-shaped files (.md/.toml/
# .yaml/.json/.txt) up to `summary_max_bytes`.
# ----------------------------------------------------------------------------
[daemon.index]
enable           = true
interval_min     = 15
max_depth        = 6      # how deep to descend per root
max_entries      = 50000  # safety cap across all roots
summary_max_bytes = 240   # first N bytes of text files = summary

# Each entry: label (operator-friendly tag), path (filesystem),
# optional excludes (glob list -- skips matching basenames).
[[daemon.index.roots]]
label    = "mios-vendor"
path     = "/usr/share/mios"
excludes = ["__pycache__", "*.pyc"]

[[daemon.index.roots]]
label    = "mios-vendor-bin"
path     = "/usr/libexec/mios"

[[daemon.index.roots]]
label    = "mios-config"
path     = "/etc/mios"

[[daemon.index.roots]]
label    = "mios-state"
path     = "/var/lib/mios"
excludes = ["sessions", "vector_db", "models", "*.db", "*.db-*",
            "__pycache__", "cache"]

[[daemon.index.roots]]
label    = "operator-home"
path     = "/var/home"     # walks /var/home/$MIOS_USER and below
excludes = [".cache", ".local/share/Trash", "node_modules",
            ".git", "__pycache__"]

[[daemon.index.roots]]
label    = "windows-home"
path     = "/mnt/c/Users"   # walks Windows user homes
max_depth = 4               # shallow on Windows side
excludes = ["AppData", ".cache", "node_modules", ".git",
            "OneDrive*", "Cookies"]

# ============================================================================
# [verbs.<name>] -- AGENT-PIPE VERB CATALOG (SSOT)
#
# Every verb the planner can emit lives here. agent-pipe reads this block
# at boot + RENDERS the planner's "Available verbs" catalog from it (no
# more hand-typed English in _PLANNER_SYSTEM). Each verb declares:
#
#   section     -- group heading in the catalog (string)
#   sig         -- arg signature shown in catalog ("name, position?")
#   desc        -- one-line description for the catalog
#   tier        -- core | common | rare (drives progressive disclosure --
#                  only `core` is loaded into the planner prompt by default
#                  once tier-based gating ships)
#   permission  -- read | write | interactive
#   [verbs.<name>.params.<argname>]
#     type     -- string | integer | boolean | array | object
#     desc     -- argument description
#     aliases  -- list of synonyms the planner LLM might emit instead of
#                 the canonical argname. Dispatcher accepts any.
#     enum     -- (optional) closed set of allowed values
#     default  -- (optional) default if omitted
#
# Operator binding: "EVERYTHING SOURCED FROM THE MIOS.TOML/HTML" +
# "NO HARDCODES ANYWHERE" -- new verb = one TOML block edit, no Python
# touched (dispatch wiring in agent-pipe is a separate concern; this
# block owns the LLM-facing surface).
# ============================================================================

# ─── OS-control window-placement defaults (SSOT) ──────────────────────
# Where freshly-launched windows land + how mios-os-control / mios-launch
# behave when a verb's `position` arg is "default". Every value is operator-
# tunable here (and via the mios.toml -> userenv.sh slot); NOTHING in code
# hardcodes a placement. Consumed by `mios-os-control window-defaults`, the
# open_app/focus_window position resolver, and the launch preflight.
[os_control]
default_position    = "center"   # placement for position="default" launches
default_monitor     = 0          # 0 = primary monitor
tile_gap_px         = 8          # gap between tiled / side-by-side windows
edge_margin_px      = 0          # inset from screen edges for edge placements
restore_if_running  = true       # preflight: focus an existing instance instead of relaunching
focus_after_launch  = true       # raise + foreground a window after a successful launch
# Resolution priority (best -> worst) when a launch name matches apps in MORE than
# one category (mios-launch section-7 inventory fallback). SSOT for the launcher's
# category ranking (formerly hardcoded in code; now tunable per the code's own TODO).
# Default = Linux-native-first (the historical, proven-stable order).
# NOTE (operator 2026-06-07): a Windows-host operator wants "open notepad" -> Windows
# Notepad, which means moving the windows-* entries up. BUT do it carefully + verify
# VISUALLY: the "windows-app" (Microsoft Store / AppX) inventory entries can be flaky
# AutoGenerated GUIDs whose interop `Start-Process` HANGS. Prefer putting "windows-gui"
# (routes via the in-session executor -- the path that launched Windows Notepad cleanly
# in testing) AHEAD of "windows-app", e.g.:
#   ["windows-gui", "linux-flatpak", "linux-rpm-gui", "linux-cli", "windows-app"]
# Unknown categories sort last.
launch_category_priority = ["linux-flatpak", "linux-rpm-gui", "linux-cli", "windows-app", "windows-gui"]

# Interactive-desktop OS-control executor for THIS host's own windows
# (operator 2026-05-26). When set, mios-pc-control routes window enumeration +
# ops (list / close / focus / move / resize) to this URL instead of the
# WSL-interop PowerShell path -- because PowerShell spawned through WSL interop
# from a user-systemd service is NOT on WinSta0\Default, so EnumWindows is BLIND
# (returns count:0) and close/focus can't find a real window. The executor
# (usr/share/mios/windows/mios-oscontrol-server.ps1, a scheduled task running in
# the interactive session on the Windows host) CAN enumerate + act, reached over
# the tailnet. EMPTY in vendor (no personal tailnet IP in the public repo + the
# blind interop path stays the default); set the real URL in your /etc/mios
# overlay. Unreachable when set => honest error, never a blind fall-back.
executor_endpoint   = ""         # e.g. in /etc/mios: "http://100.x.y.z:11437"

# ─── OS-control NODES (4B: launch + verify on a SEPARATE machine's desktop) ──
# operator 2026-05-25 "iGPU SHOULD FIRE MIOS OS CONTROL COMMANDS ... across all
# nodes". `launch_verified app=X node=<name>` makes the mios-daemon-agent fire
# the launch to that node's mios-oscontrol-server (the Windows HttpListener
# executor in usr/share/mios/windows/mios-oscontrol-server.ps1), which launches
# on THAT node's OWN desktop + polls its window verifier and returns the verdict.
# Default (no node) stays on THIS host via the broker.
#
# PRIVACY / SSOT: the vendor file ships every `endpoint` EMPTY so no personal
# device name / tailnet IP is baked into the public repo. Set the real tailnet
# endpoint in your /etc/mios (or ~/.config/mios) overlay -- it merges + WINS over
# this. An empty endpoint = inert node: launch_verified node=<that> returns an
# honest "not configured" error, NEVER a fabricated success.
  [os_control.nodes.igpu]
  endpoint = ""    # e.g. in /etc/mios: endpoint = "http://100.x.y.z:11437"
  desc     = "iGPU Windows host -- launch + verify on its own desktop over the tailnet (also runs mios-igpu-server.ps1 for inference)."

# ─── Computer-use (Linux/Wayland desktop control) ─────────────────────
# The Linux/Wayland peer of the Windows pc-control lane. Drives THIS host's
# graphical session via /usr/libexec/mios/mios-computer-use (RemoteDesktop
# portal + Screenshot/ScreenCast portal + AT-SPI; self-written evdev/uinput
# fallback -- NO ydotool/AGPL). The cu_* verbs dispatch to it, so they inherit
# the three-projection surface automatically: MCP tool (/v1/verbs), OpenAI tool
# (the agent loop), and A2A skill (the agent card).
#
# ENVIRONMENT-ADAPTIVE (MiOS is ONE bootc image for any hardware): the executor
# routes by environment -- a reachable executor_endpoint (federation: drive
# ANOTHER machine's desktop) wins; else the local Wayland session; else WSL2
# delegates to mios-pc-control. ONE verb surface for bare-metal GNOME, WSLg, and
# remote nodes.
[computer_use]
# Federation: when set + reachable, every cu_* op routes to this remote desktop's
# mios-computer-use-server (same HTTP contract as the Windows mios-oscontrol-
# server.ps1). EMPTY in vendor (no personal tailnet host in the public repo);
# set the real tailnet URL in your /etc/mios overlay. Configured-but-down =>
# honest error, NEVER a blind local fall-back.
executor_endpoint  = ""          # e.g. in /etc/mios: "http://100.x.y.z:11438"
input_backend      = "auto"      # auto | portal (GNOME/KDE, sandboxable) | uinput (compositor-agnostic)
capture_backend    = "auto"      # auto | portal | grim | gnome | spectacle
restore_token_path = ""          # default: $XDG_STATE_HOME/mios/cu-restore-token (skips the portal consent dialog on re-use)
grounding_model    = ""          # vision grounding tag; empty => mios-pc-vision default (qwen3-vl:4b on Ollama) or the vLLM mios-grounding lane
require_approval   = true        # write-class ops (click/type/key) go through the DoD/approval gate; read-class (screenshot/window-list/ground) auto
# mios-computer-use-server (the dual MCP+A2A node server) bind. Loopback-only in
# vendor; set bind_address to the tailnet IP in your /etc overlay + firewall the
# port to the tailnet to let the central pipe consume this desktop remotely.
enable             = true        # documents intent; the systemd --user unit + graphical-session.target are the real gate
server_port        = 11438       # MCP /mcp + A2A /.well-known/agent-card.json + /a2a + executor /input/* all on this one port
bind_address       = "127.0.0.1" # "" disables the server; set the tailnet IP for federation

# ─── Doc-gen (WS-4 P0): FOSS offline document generation (Pandoc + LibreOffice) ──
# Read by mios-docgen (usr/libexec/mios/mios-docgen) via this layered [computer_use]
# section, overridable by MIOS_DOCGEN_* env. DEFAULT-OFF master gate: when
# docgen_enable=false every mios-docgen subcommand returns {"ok":false,...} and
# exits 0 (degrade-open). NO new daemon/quadlet -- the binaries run synchronously
# through the operator broker like the other libexec tools. Needs LibreOffice +
# Pandoc in the image ([packages.docgen]); a missing binary also degrades-open.
docgen_enable      = true        # MASTER GATE for mios-docgen (operator 2026-06-04: pandoc+libreoffice installed + verified live; everything-on)
docgen_pandoc      = "pandoc"    # pandoc binary or absolute path (markdown <-> docx/pptx/html/pdf)
docgen_soffice     = "soffice"   # LibreOffice headless binary or path (office-binary + csv->xlsx + pdf)
docgen_pdf_engine  = ""           # pandoc --pdf-engine; empty => route PDF through LibreOffice (no LaTeX needed)
docgen_timeout_s   = 120         # per-conversion timeout (LibreOffice cold start can be slow)
docgen_max_bytes   = 20000000    # refuse inputs/content larger than this (DoS guard)

# ─── Computer-use NODES (drive a SEPARATE machine's Linux/Wayland desktop) ──
# Mirror of [os_control.nodes.*]: each entry is a remote desktop running
# mios-computer-use-server, reached over the tailnet. ALSO register the node as
# an MCP server (/etc/mios/ai/v1/mcp.json) + A2A peer (/etc/mios/ai/v1/
# a2a-peers.json) so the agent-pipe CONSUMES it (full MCP + A2A). Vendor ships
# every endpoint EMPTY (privacy/SSOT); set real URLs in the operator overlay.
  [computer_use.nodes.workstation]
  endpoint = ""    # e.g. in /etc/mios: endpoint = "http://100.x.y.z:11438"
  desc     = "A second MiOS/Linux desktop -- screenshot + click + type + verify on its own Wayland session over the tailnet."

# ─── A2A fleet discovery (cross-node delegation) ──────────────────────
# mios-a2a-discover probes these candidates + the local self for a live MiOS
# AgentCard and writes the responders to /etc/mios/ai/v1/a2a-peers.json -- the
# runtime peer list the agent-pipe delegates across when an AIOS-native agent
# decomposes a multi-faceted request (see agent-contract.md "Decompose + span
# the fleet"). Every MiOS node ships the A2A server, so a live card == a
# delegable node. NO hardcoded endpoints: declare your fleet here (operator
# overlay) or set a CIDR to auto-sweep. Tailscale is OFF by policy -> use
# LAN/local IPs (172.x WSL gateway / 192.168.x), NOT tailnet (100.x).
[a2a]
nodes = []          # e.g. in /etc/mios: nodes = ["http://172.20.0.5:8640", "http://192.168.1.40:8640"]
discover_cidr = ""  # e.g. "192.168.1.0/24" -> auto-sweep a LAN segment (bounded to 256 hosts)
# SWARM Phase-4 (operator 2026-06-12): opt discovered A2A peers INTO the concurrent
# swarm fan-out so remote MiOS nodes do individual subtasks in parallel. Default
# false = peers stay explicit-delegation-only (no self-loop overhead). self_id is
# the local pipe's own peer id, ALWAYS excluded from fan-out so it never calls itself.
council = false
self_id = "local-mios"

# ─── Section: Window / app launch ─────────────────────────────────────
# ============================================================================
# [routing] -- 2-stage domain router (operator 2026-06-07: fix 82-tool mis-routing
# WITHOUT english prose rules; per OpenAI/llama.cpp research). Stage-1 classifies
# the query into ONE domain via a constrained enum (response_format json_schema,
# thinking-OFF -- llama.cpp #20345); Stage-2 shows the planner ONLY that domain's
# verbs (<20). FAIL-SAFE: unknown/empty/low-confidence -> FULL surface, so NO
# capability is ever lost (swarm/council/DAG unchanged). SSOT for the taxonomy +
# the per-domain "use-when" descriptions the Stage-1 classifier consumes. Every
# verb is mapped exactly once; a verb absent here falls to the full surface.
# kind=tool today; recipes/skills fold in as their own rows (research follow-up).
[routing]
router_enable = true   # master switch; false = legacy full-surface behaviour

# Trailing courtesy/location phrases the agent-pipe fast-path (_deterministic_action_
# route) STRIPS from a launch target so the app name is clean and the launch stays
# deterministic: "open notepad for me" -> open_app(name="notepad"); "open spotify on
# my desktop" -> name="spotify". SSOT (no hardcoded English in code); stripped
# longest-match-first from the END of the target. Add phrases your launches pick up.
launch_filler_phrases = [
  "for me please", "on my desktop", "on the desktop", "right now", "real quick",
  "thank you", "for me", "please", "thanks", "now",
]

# Leading determiners/possessives dropped from a deterministic launch target so
# "open the calculator" -> name="calculator", "open my settings" -> name="settings"
# (operator 2026-06-07 e2e: "Open the Windows Calculator app on my desktop." fell
# to the LLM router, which then chose hermes's built-in `terminal` tool -> exit
# 126, instead of open_app). SSOT (no hardcoded English in code); single words,
# stripped from the START while the leading word matches.
launch_target_lead_phrases = ["the", "a", "an", "my"]

# Trailing generic nouns dropped from a launch target so "open the calculator app"
# -> name="calculator", "open the photos application" -> name="photos". Single
# words, stripped from the END while the trailing word matches (word-boundary, so
# "whatsapp" is never truncated). Add nouns your phrasings pick up.
launch_target_trail_phrases = ["application", "program", "app", "window"]

# Deterministic PRE-ROUTE trigger phrases (operator 2026-06-12 "NO hardcodes!!!"):
# these externalise the remember + web_search refine pre-router keywords that were
# hardcoded English literals in code (server.py refine post-processing). SSOT data,
# same pattern as the launch pre-router above. FAIL-SAFE: empty list -> that
# deterministic route is OFF -> the model self-classifies (no capability lost).
# remember: "<phrase> [that] <fact>" -> dispatch remember(fact) (catalog-guarded).
remember_trigger_phrases = ["remember", "note", "save", "keep in mind", "don't forget", "make a note"]
# web_search: a TRIGGER verb phrase co-occurring (within ~40 chars) with a WEB
# CONTEXT phrase -> set web=true (e.g. "search ... online", "look up ... on the web").
web_search_trigger_phrases = ["search", "look up", "google", "find", "search the web", "search online"]
web_search_trigger_contexts = ["web", "internet", "online"]
# browser_action: a URL + a READ/browse verb -> force the CDP browse path (real DOM)
# over the launch-only open_url fast-path. SSOT (operator 2026-06-16 "NOTHING
# HARDCODED"): was a hardcoded regex in refine. EMPTY this list -> the force is skipped
# and the model's own browser_action decision stands (degrade-open, fully generative).
browser_action_verbs = ["quote", "read", "tell", "summarise", "summarize", "what is", "what does", "what say", "what says", "first sentence", "the content", "browse", "extract", "scrape", "headline", "article", "say"]
# compound-launch fast-lane vocab ("open X and type Y"): conjunctions joining the launch
# to a follow-up action, and the action verbs. SSOT (operator 2026-06-16 "NOTHING
# HARDCODED"). EMPTY either list -> the deterministic compound fast-lane declines and the
# LLM planner decomposes the compound (degrade-open; the planner is the authority).
compound_conjunctions = ["and", "then"]
compound_actions = ["type", "write", "enter", "input", "paste", "put"]

# Launch FOLLOW-UP / RETRY phrases (operator 2026-06-14, BUG B/C: the `mios`/`@`
# CLI deterministic launch route only matched the INITIAL "open/launch X"; a
# follow-up like "epiphany didn't launch for me" or "attempt to launch and
# verify" fell through to free-form Hermes which NARRATED advice + asked
# permission instead of re-running the launch+verify path). These phrase lists
# let the CLI recognise a launch follow-up and re-run the launch (now via the
# VERIFY path) against the LAST-launched app it persisted with the session id.
# SSOT (no hardcoded English in the .py/.sh); matched case-insensitively as
# substrings. FAIL-SAFE: empty list -> that follow-up detection is OFF (no
# capability lost; the turn just falls through to chat).
#
# launch_followup_phrases -> a complaint/observation that the prior launch did
# not work ("X didn't launch", "it didn't open", "nothing happened", "no
# window"). Re-fires the launch+verify against the persisted last-launched app.
launch_followup_phrases = [
  "didn't launch", "did not launch", "didn't open", "did not open",
  "didn't start", "did not start", "didn't come up", "did not come up",
  "didn't work", "did not work", "wouldn't open", "would not open",
  "no window", "nothing happened", "nothing opened", "never opened",
  "never launched", "not opening", "not launching", "isn't open",
  "is not open", "isn't running", "is not running", "won't open",
  "won't launch", "doesn't open", "does not open", "failed to open",
  "failed to launch",
]
# launch_retry_phrases -> an explicit ask to try again / launch+verify ("try
# again", "attempt to launch and verify", "launch and verify", "open it
# again", "retry"). Re-fires the launch+verify against the persisted last app.
launch_retry_phrases = [
  "attempt to launch and verify", "launch and verify", "launch it and verify",
  "try to launch and verify", "open and verify", "open it and verify",
  "try launching it again", "try launching again", "try opening it again",
  "try opening again", "launch it again", "open it again", "start it again",
  "run it again", "try again", "attempt again", "retry", "relaunch",
  "re-launch", "reopen", "re-open", "try once more", "one more time",
  "attempt to launch", "attempt the launch", "verify the launch",
  "launch and confirm", "open and confirm",
]

[routing.domains.web]
desc  = "LOOK UP INFORMATION on the internet: current events, news, trending topics, weather, prices, world facts. NOT for performing an action in an app, sending/posting/sharing a message, or controlling the screen."
verbs = ["web_search", "web_scrape", "crawl", "web_extract"]

[routing.domains.files]
desc  = "find, read, or edit LOCAL files on this machine"
# REAL file-search verbs lead (everything_search=Windows NTFS index, fs_search=Linux
# plocate). mios_find was MISCATEGORISED here -- its own desc says it is NOT a file
# search (it resolves an app NAME to a launch command), and leading the hint with it
# made a live "find the mios.toml file on this system" answer a guessed path from
# memory instead of searching; moved to apps_windows where app-resolution belongs.
verbs = ["everything_search", "fs_search", "directory_lookup", "viking_find", "viking_ls", "viking_cat", "text_view", "text_create", "text_str_replace", "text_insert"]

[routing.domains.system]
desc  = "this machine's OS / version / kernel / whether WSL2 / the Windows host, plus state, services, processes, containers, logs, environment"
verbs = ["system_status", "sys_env", "sys_env_refresh", "system_logs", "service_status", "service_restart", "process_list", "container_status", "container_restart"]

[routing.domains.apps_windows]
desc  = "list or launch applications and manage on-screen windows"
verbs = ["open_app", "open_url", "verify_launch", "window_state", "focus_window", "move_window", "position_window", "resize_window", "list_windows", "screen_layout", "mios_apps", "app_search", "mios_find"]

[routing.domains.packages]
desc  = "install, update, remove, or query software packages (dnf/winget/flatpak)"
verbs = ["pkg", "winget_search", "winget_list", "winget_show", "winget_install", "winget_upgrade", "winget_uninstall", "flatpak_search", "flatpak_list", "flatpak_show", "flatpak_install", "flatpak_upgrade", "flatpak_uninstall", "flatpak_preflight"]

[routing.domains.memory]
desc  = "recall or store the agent's own memory / knowledge / summaries"
verbs = ["knowledge_search", "remember", "recall", "ingest", "summarize"]

[routing.domains.computer_use]
desc  = "GUI pixel/element control of the screen via mouse and keyboard"
verbs = ["cu_screenshot", "cu_ground", "cu_atspi_query", "cu_window_list", "cu_click", "cu_type", "cu_key", "cu_key_combo", "pc_screenshot", "pc_type", "pc_key", "pc_click", "pc_find_element", "pc_click_element", "pc_list_elements"]

[routing.domains.code_shell]
desc  = "run code, shell, or PowerShell commands (incl. explaining what a script/code does)"
verbs = ["coderun", "code_mode", "os_recipe", "powershell_run"]

[routing.domains.agents_comms]
desc  = "PERFORM a communication or automation ACTION: send / post / share / DM a message (to a chat, channel, or person), delegate or hand a sub-task to another agent, schedule a recurring task, or generate a document"
verbs = ["handoff", "a2a_delegate", "discord_send", "schedule", "docgen_build", "docgen_convert", "tool_search"]

[verbs.open_app]
section    = "Window / app launch"
sig        = 'name, position="default"?, args?, monitor=0?'
desc       = "LAUNCH any app/program by name (resolves Windows AND Linux/flatpak apps) and optionally place its window (position center/left/right/top-left..., monitor index) or pass CLI args. THE one launch verb -- use for any 'open / launch / start / run X'. After launching, confirm with verify_launch."
model_name = "launch_windows_app"
hidden_aliases = ["launch_app", "launch_verified", "launch_and_verify_app"]  # consolidated INTO open_app; resolve here, never re-shown on the model surface
examples   = ["open Firefox on my second monitor", "launch Spotify on the left half of the screen", "start Notepad with this file and put it top-left", "run Discord maximized on monitor 1"]
tier       = "core"
permission = "write"
cmd        = "MIOS_LAUNCH_POSITION={position=default} mios-launch {name!}"
cmd_args   = "MIOS_LAUNCH_POSITION={position=default} mios-windows launch {name!}{args*}"
  [verbs.open_app.params.name]
  type    = "string"
  desc    = "App display name OR full path. Paths get basename-extracted before launch."
  aliases = ["query", "title", "app", "target", "program", "path", "file", "binary", "exe"]
  [verbs.open_app.params.position]
  type    = "string"
  desc    = "Semantic placement after launch."
  enum    = ["default", "as-is", "center", "left", "right", "top", "bottom", "top-left", "top-right", "bottom-left", "bottom-right", "maximize"]
  default = "default"
  [verbs.open_app.params.args]
  type    = "array"
  desc    = "Extra positional args passed to the launcher target."
  [verbs.open_app.params.monitor]
  type    = "integer"
  desc    = "Monitor index (0=primary)."
  default = 0

[verbs.verify_launch]
section    = "Window / app launch"
sig        = "app"
desc       = "CHECK whether an app/window ACTUALLY launched, read-only, in-turn (delegates to the daemon-agent's Definition-of-Done window check). Call with the SAME name AFTER you fired launch_app / launch_windows_app / focus_window to confirm before claiming success. This only CHECKS -- it does NOT launch; to launch and confirm in one go use launch_and_verify_app."
examples   = ["did Firefox actually open?", "check whether Spotify launched", "confirm the Discord window came up", "is the app I just started actually running?"]
tier       = "core"
permission = "read"
cmd        = "mios-verify-launch {app}"
  [verbs.verify_launch.params.app]
  type    = "string"
  desc    = "App/window name that was supposedly launched (use the SAME name you passed to open_app)."
  aliases = ["name", "query", "title", "target", "program", "window", "path", "exe"]

[verbs.focus_window]
section    = "Window / app launch"
sig        = 'title, position="default"?'
desc       = "Raise an already-OPEN Windows window to the FRONT (by title) and optionally re-position it (same placement enum as launch_windows_app). Use to switch to / bring forward / activate a window that already exists -- it does NOT launch anything. Run list_windows first to confirm the title."
examples   = ["bring Firefox to the front", "switch to the Spotify window", "focus the Discord window and move it to the left", "activate the Notepad window"]
tier       = "common"
permission = "write"
cmd            = "mios-window focus {title}"
cmd_positioned = "mios-window focus {title} && MIOS_LAUNCH_POSITION={position} mios-window {position} {title}"
  [verbs.focus_window.params.title]
  type    = "string"
  desc    = "Window title pattern (substring match)."
  aliases = ["name", "window", "app"]
  [verbs.focus_window.params.position]
  type    = "string"
  enum    = ["default", "as-is", "center", "left", "right", "top", "bottom", "top-left", "top-right", "bottom-left", "bottom-right", "maximize"]
  default = "default"

[verbs.move_window]
section    = "Window / app launch"
sig        = "title, position, monitor=0?"
desc       = "Move an OPEN Windows window to a SEMANTIC region: center / left / right / top-left / top-right / etc., optionally on a chosen monitor. Use when the operator names a place ('to the left', 'center it') rather than exact coordinates. For literal pixel (x,y) use place_window_at_pixel; to change size use resize_window."
model_name = "move_window_to_region"
examples   = ["move Firefox to the right half of the screen", "center the Spotify window", "put Notepad in the top-left corner", "snap Discord to the left on monitor 2"]
tier       = "common"
permission = "write"
cmd        = "mios-window {position=center} {title} {monitor?--monitor}"
  [verbs.move_window.params.title]
  type = "string"
  aliases = ["name", "window"]
  [verbs.move_window.params.position]
  type = "string"
  enum = ["center", "left", "right", "top", "bottom", "top-left", "top-right", "bottom-left", "bottom-right"]
  [verbs.move_window.params.monitor]
  type = "integer"
  default = 0

[verbs.position_window]
section    = "Window / app launch"
sig        = "title, x, y"
desc       = "Move an OPEN Windows window to LITERAL pixel coordinates (x, y). Use only when you have exact coords -- call screen_layout first to learn monitor geometry/resolution. For named regions (center/left/right) use move_window_to_region; to change size use resize_window."
model_name = "place_window_at_pixel"
examples   = ["move the window to pixel 100, 200", "position Firefox at coordinates 0,0", "place the window at x=1920 y=0 on the second monitor", "put Notepad exactly at 500, 300"]
tier       = "common"
permission = "write"
cmd        = "mios-window move {title} {x=0} {y=0}"
  [verbs.position_window.params.title]
  type = "string"
  aliases = ["name", "window"]
  [verbs.position_window.params.x]
  type = "integer"
  [verbs.position_window.params.y]
  type = "integer"

[verbs.resize_window]
section    = "Window / app launch"
sig        = "title, width, height"
desc       = "Resize an OPEN Windows window to a literal pixel size (width x height). This ONLY changes size -- it does NOT move the window. To relocate use move_window_to_region (named region) or place_window_at_pixel (exact x,y); to fill the monitor use maximize_window."
examples   = ["resize Firefox to 1280 by 720", "make the Notepad window 800x600", "set the Spotify window width to 1000 and height to 700", "shrink the Discord window to 640 by 480"]
tier       = "common"
permission = "write"
cmd        = "mios-window resize {title} {width} {height}"
  [verbs.resize_window.params.title]
  type = "string"
  aliases = ["name", "window"]
  [verbs.resize_window.params.width]
  type = "integer"
  aliases = ["w"]
  [verbs.resize_window.params.height]
  type = "integer"
  aliases = ["h"]

[verbs.minimize_window]
section    = "Window / app launch"
