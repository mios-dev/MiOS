[build]
rechunk_max_layers = 67   # hhd-dev/rechunk: max OCI layer count post-rechunk
ai_ram_floor_gb    = 12   # informational; logged by postcheck

# ----------------------------------------------------------------------------
# [network.quadlet] -- internal podman bridge for sidecar containers.
