model_name = "replace_file_text"
examples   = ["change the port from 8642 to 8765 in config.toml", "rename the function foo to bar in utils.py", "fix the typo 'recieve' to 'receive' in README.md", "update the version string in pyproject.toml to 2.0.0"]
