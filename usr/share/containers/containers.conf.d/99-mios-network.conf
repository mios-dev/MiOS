# AI-hint: Configures the default container network subnet to 172.28.0.0/16 to avoid 10.88.0.0/16 collisions with WSL2 eth0, ensuring stable host networking and localhost forwarding for containerized services.
[network]
# Avoid 10.88.0.0/16 (Podman historical default) which collides with WSL2 eth0
# assignments, breaking WSL2 host networking and localhost forwarding.
default_subnet = "172.28.0.0/16"
