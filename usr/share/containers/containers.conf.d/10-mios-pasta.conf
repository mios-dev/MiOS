# /usr/share/containers/containers.conf.d/10-mios-pasta.conf
#
# Switch the rootless-podman default network engine from slirp4netns to pasta.
#
# Why: slirp4netns reads /dev/net/tun. Inside WSL2 distros and nested
# containers /dev/net/tun is not always created -- the tun module is loaded
# (systemd-modules-load runs successfully) but the device node may be missing
# because no PAM/logind session ran to mknod it. Quadlets then fail with:
#
#     mios-forge[N]: time="..." level=error msg="Preparing container ...:
#         rootless netns: start slirp4netns: /usr/bin/slirp4netns failed:
#         \"open(\\\"/dev/net/tun\\\"): No such file or directory\"
#
# pasta (passt-pasta) implements the same NAT/forwarding contract as
# slirp4netns but uses sockets only -- no tun device, no CAP_NET_ADMIN, and
# in benchmarks ~3x faster on TCP throughput. Upstream-canonical default
# since podman 4.7 (the official recommendation since 5.0). Both binaries
# remain available; this drop-in just changes the default the rootless
# network engine picks when a Quadlet doesn't override it explicitly.

[network]
default_rootless_network_cmd = "pasta"
