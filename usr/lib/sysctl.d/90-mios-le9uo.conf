# MiOS-OS Kernel Tuning: le9uo patch & BORE Scheduler
# Protects active file cache from being evicted during spikes in anonymous memory.
# Enforces fluid responsiveness for 1000Hz ticks and AMD P-State Preferred Core optimizations.

# Prevent page thrashing under extreme Zram/Zstd pressure
vm.watermark_scale_factor = 200
vm.watermark_boost_factor = 15000
vm.min_free_kbytes = 1048576

# Tuning specifically for interactive workloads (BORE scheduler synergy).
# These keys only exist on BORE / le9uo-patched kernels; on vanilla and WSL2
# kernels they don't and systemd-sysctl logs noise. Prefix with "-" so a
# missing key is silently ignored. See sysctl.d(5).
-kernel.sched_cfs_bandwidth_slice_us = 3000
-kernel.sched_latency_ns = 3000000
-kernel.sched_min_granularity_ns = 300000
-kernel.sched_wakeup_granularity_ns = 500000
-kernel.sched_migration_cost_ns = 250000
