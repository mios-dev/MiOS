# MiOS selective hardening
# Upstream: secureblue/secureblue, filtered to NOT break NVIDIA/CUDA/Steam/libvirt

# Kernel pointer and dmesg restriction
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1

# Ptrace scope (allow parent-child only)
kernel.yama.ptrace_scope = 2

# Unprivileged userns - keep enabled; required by rootless Podman, Waydroid, Steam sandboxes
kernel.unprivileged_userns_clone = 1

# TCP/IP hardening
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# File system protections
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
fs.suid_dumpable = 0

# Core dumps off for set-uid (keep on for normal processes - CUDA crashes need cores)
# kernel.core_pattern left untouched to preserve systemd-coredump integration

# BPF hardening (Fedora 44 defaults, applied ahead of distro rollout)
# net.core.bpf_jit_harden=2: Harden JIT-compiled BPF against spray attacks
# (rootless Podman / K3s / CrowdSec use BPF as root; unprivileged_bpf_disabled
#  blocks only *unprivileged* BPF load -- leaves all our workloads unaffected)
net.core.bpf_jit_harden = 2
kernel.unprivileged_bpf_disabled = 1

# Suppress SysRq on production deployments (physical console attack vector)
kernel.sysrq = 0

# Suppress kernel messages from leaking to the physical console
# (audit/journal still receives everything; this only mutes /dev/console)
kernel.printk = 3 3 3 3