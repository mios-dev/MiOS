# MiOS-OS Kernel Tuning: OverlayFS & systemd-sysext
#
# v0.2.0: Mitigation for kernel stacking depth and virtualization performance.

# --- systemd-sysext / OverlayFS Stacking --------------------------------------
# Note: Upstream hard limit is 2. MiOS-OS uses OSTree + verity.
# Repackaging multiple small .sysext images into a single large one is 
# handled via the 'mios-sysext-pack' helper (Planned).

# --- Performance & Memory Retention ------------------------------------------
# Optimized for workstation fluidity under heavy virtualization/container loads.
vm.swappiness = 10
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 1024

# --- Network Stability for dense container clusters --------------------------
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096
