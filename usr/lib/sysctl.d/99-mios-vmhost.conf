# AI-hint: Configures kernel parameters for VM hosting, including memory management (swappiness, overcommit), networking (IP/IPv6 forwarding, bridge iptables integration), and high-capacity inotify limits for container/filesystem monitoring.
vm.swappiness = 10
vm.overcommit_memory = 1
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5
net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1
net.ipv6.conf.all.forwarding = 1
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 8192
