# MiOS v0.2.0 -- Static system user/group definitions
# Prevents UID/GID drift across image rebuilds.
# These override dynamic allocation so /var ownership stays stable.
#
# Format: u USER UID GROUP GECOS HOME SHELL
#         g GROUP GID

# MiOS service accounts (stable IDs in 800-899 range)
g mios-virt 800
u mios-virt 800:mios-virt "MiOS Virtualization Service" /var/empty /usr/sbin/nologin