# MiOS System Users
# CRITICAL: 'mios' is a LOGIN user. UID must be >= UID_MIN (1000 default).
# When UID is '-', systemd-sysusers allocates from the SYSTEM range (<1000),
# which makes systemd-logind skip XDG_RUNTIME_DIR creation, so dbus/dconf/
# Wayland session services break. Pin to 1000 explicitly to keep ownership
# stable across image rebuilds AND keep mios in the regular-user range.
g kvm 36 -
g video 39 -
g render 105 -
g libvirt - -
g input - -
g dialout - -
g docker - -

u mios 1000:1000 "MiOS User" /var/home/mios /bin/bash
m mios wheel
m mios libvirt
m mios kvm
m mios video
m mios render
m mios input
m mios dialout
m mios docker
