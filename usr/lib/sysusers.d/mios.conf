# /usr/lib/sysusers.d/mios.conf
# Declare the `mios` system user/group required by:
#   - /var/lib/mios state ownership
#   - /srv/ai group-writable mount semantics
#   - bootc container lint sysusers warning (file presence is required even if
#     the base image already declares the user)
u mios   - "MiOS service user" /var/lib/mios -
g mios   - -
m mios   render
m mios   video
