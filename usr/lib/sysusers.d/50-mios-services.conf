# AI-hint: Defines pinned UIDs/GIDs for MiOS system and AI service accounts, establishing the 810-829 range for stable filesystem ownership and the 850/860 bucket groups for cross-service state sharing.
# AI-related: /usr/lib/mios/crawl4ai/.venv, /etc/mios/adguard, /etc/mios/hermes/api.env, mios-ai, mios-sys, mios-virt, mios-hermes, mios-agent-pipe, mios-daemon, mios-mcp
# 'MiOS' sidecar service accounts -- pinned IDs in the 810-829 range to keep
# /var/lib ownership stable across image rebuilds.
# Format: u USER UID:GROUP "GECOS" HOME SHELL
#
# ──── USER / SYSTEM / AI separation (operator directive 2026-05-18) ────
#
# MiOS uses a three-tier permission model:
#
#   USER tier   -- the login operator (`mios` 1000) in 10-mios.conf.
#                  Member of `wheel` (sudo), `mios-ai` (read AI shared
#                  state without sudo), `mios-sys` (read SYSTEM shared
#                  state without sudo), and the hardware groups.
#
#   SYSTEM tier -- infra services (Guacamole stack, PXE hub, CrowdSec,
#                  Forgejo VCS, libvirt/mios-virt). Per-service UIDs
#                  remain for /var/lib ownership stability; all share
#                  the `mios-sys` GROUP so files chgrp'd to mios-sys
#                  are readable by every infra service without per-
#                  service ACL surgery.
#
#   AI tier     -- AI agents (Ollama, Open WebUI, Hermes, SurrealDB,
#                  agent-pipe, ollama-cpu, SearXNG). Same shape: per-
#                  service UIDs for fs ownership, shared `mios-ai`
#                  group for cross-agent reads (skill catalog, passport
#                  public keys, shared scratch, kanban shadow, ...).
#
# The two bucket groups (mios-ai, mios-sys) are the ONLY new ACL
# surfaces. Existing per-user groups stay -- they own their service's
# state dir so a compromised agent can't smash another agent's state.
# Cross-agent reads happen through `chgrp mios-ai` + `0640` on the
# specific files that need to be shared, not by collapsing user IDs.
#
# Bucket group GIDs are pinned at 850 (mios-ai) + 860 (mios-sys) --
# above the per-service 810-829 range so they don't collide on a host
# where systemd-sysusers auto-allocates.
g mios-ai  850
g mios-sys 860
# ──── CORE AI-AGENT USER (operator 2026-05-23: "consolidate MiOS system users
# to fewer combined/core users"). The agent/code PLANE now RUNS as this single
# user instead of 4 (mios-hermes, mios-agent-pipe, root, mios): agent-pipe,
# hermes-agent, delegation-prefilter, hermes-browser, mios-daemon, mios-mcp,
# skills-miner. One owner for /var/lib/mios state -> no cross-user perms walls
# (the class behind the container/snapshot visibility bugs). Per-container
# DATA-plane users (ollama, open-webui, searxng, surrealdb, forge, ...) stay
# ISOLATED. uid 850 == the mios-ai bucket gid; HOME=/var/lib/mios/hermes keeps
# opencode's ~/.local + $HERMES_HOME working. journal+adm groups give the
# consolidated daemon RO log/journal access (it previously ran as root).
# Legacy mios-hermes (820) + mios-agent-pipe (822) accounts are RETAINED inert
# for `sudo -u`/chown reference-compat; nothing runs as them now.
u mios-ai 850:mios-ai "'MiOS' core AI-agent user" /var/lib/mios/hermes /usr/sbin/nologin
m mios-ai systemd-journal
m mios-ai adm
m mios-ai mios-hermes
g mios-guacamole 810
u mios-guacamole 810:mios-guacamole "'MiOS' Guacamole web" /var/empty /usr/sbin/nologin
g mios-guacd 811
u mios-guacd 811:mios-guacd "'MiOS' Guacamole daemon" /var/empty /usr/sbin/nologin
g mios-postgres 812
u mios-postgres 812:mios-postgres "'MiOS' Guacamole Postgres" /var/empty /usr/sbin/nologin
g mios-pxe-hub 813
u mios-pxe-hub 813:mios-pxe-hub "'MiOS' PXE hub" /var/empty /usr/sbin/nologin
g mios-crowdsec 814
u mios-crowdsec 814:mios-crowdsec "'MiOS' CrowdSec dashboard" /var/empty /usr/sbin/nologin
g mios-ollama 815
u mios-ollama 815:mios-ollama "'MiOS' Ollama" /var/empty /usr/sbin/nologin
g mios-forge 816
# Container-only service (Quadlet at /etc/containers/systemd/
# mios-forge.container). The sysuser exists for /var/lib/mios/forge
# ownership stability across rebuilds; HOME=/var/empty is correct
# because the container has its own internal HOME -- this UID/GID
# is never logged into directly. Consolidation note 2026-05-15.
u mios-forge 816:mios-forge "'MiOS' Forge (Forgejo)" /var/empty /usr/sbin/nologin
g mios-open-webui 817
u mios-open-webui 817:mios-open-webui "'MiOS' Open WebUI" /var/empty /usr/sbin/nologin
g mios-searxng 818
u mios-searxng 818:mios-searxng "'MiOS' SearXNG metasearch" /var/empty /usr/sbin/nologin
# 819 is reserved for mios-ceph in globals.{sh,ps1}; leave it alone here.
g mios-hermes 820
# Home is /var/lib/mios/hermes -- the Hermes service unit's
# $HERMES_HOME and the writable area sub-tools (opencode, the
# self-improvement skill clones, browser profile, kanban.db, etc.)
# need a real writable home for. Setting this in passwd lets
# `sudo -u mios-hermes -H ...`, opencode's ~/.local/<name>
# bootstrap, and any other "use $HOME" pattern Just Work.
# Operator-confirmed regression 2026-05-15: opencode failed with
# "EACCES: permission denied, mkdir '/var/empty/.local'" when
# invoked as mios-hermes because the prior /var/empty home left
# ~/.local unwritable.
u mios-hermes 820:mios-hermes "'MiOS' Hermes-Agent gateway" /var/lib/mios/hermes /usr/sbin/nologin
# Supplementary groups so the gateway can read journals + system logs
# without a sudo escalation: systemd-journal grants RO journal access;
# adm grants RO /var/log/* access. Both are read-only -- the gateway
# can SEE everything but only WRITES go through the existing capability
# surface (Bash tool + sudo policy). Lets the log-watcher daemon's
# state ALSO be visible to the agent's "what happened recently?" path
# even if it ever moves off world-readable 0644 mode.
m mios-hermes systemd-journal
m mios-hermes adm
# SurrealDB shared-state container (Quadlet at /etc/containers/systemd/
# mios-surrealdb.container). HOME=/var/lib/mios/surrealdb is the data
# dir; same chown via /usr/lib/tmpfiles.d/mios-surrealdb.conf at boot.
# Operator directive 2026-05-18: "unify all AI Surfaces" -- this is
# the cross-cutting agent state DB (agent/session/tool_call/event/
# kanban_shadow/scratch/agent_metric). OWUI native tables remain the
# source of truth for memory/knowledge/skills/functions/tools.
g mios-surrealdb 821
u mios-surrealdb 821:mios-surrealdb "'MiOS' SurrealDB shared agent state" /var/lib/mios/surrealdb /usr/sbin/nologin
# 'MiOS' standalone Agent Pipe (router + refine + critic FastAPI;
# fronts hermes-agent for every gateway: OWUI, Discord, future
# Slack/Telegram/MCP). Operator directive 2026-05-18: centralize the
# pipe so all gateways get the same tool surface + critic + SurrealDB
# state writes. HOME=/var/lib/mios/agent-pipe is the data + state dir
# (chown via /usr/lib/tmpfiles.d/mios-agent-pipe.conf at boot).
g mios-agent-pipe 822
u mios-agent-pipe 822:mios-agent-pipe "'MiOS' Agent Pipe (router + refine + critic FastAPI)" /var/lib/mios/agent-pipe /usr/sbin/nologin
# 'MiOS' Ollama in-VM CPU light-lane (router/classifier + verb
# embeddings + micro-LLMs). Sibling to mios-ollama (uid 815) which
# keeps the dGPU + CUDA for big-model inference. Historically named
# "mios-ollama-igpu" on the theory that ollama:rocm would reach the
# AMD iGPU via wsl2-amd.yaml CDI -- it never did (ROCm can't reach
# /dev/kfd inside WSL2), so this instance has always run on CPU.
# The real AMD iGPU now runs natively on the Windows host
# (mios-igpu-server.ps1, served to the swarm as mios-reasoner-cpu).
g mios-ollama-cpu 823
u mios-ollama-cpu 823:mios-ollama-cpu "'MiOS' Ollama in-VM CPU light-lane (micro-LLM lane)" /var/lib/ollama-cpu /usr/sbin/nologin
# 'MiOS' crawl engine user (operator 2026-05-24: the unclecode/crawl4ai
# CONTAINER was scrapped). Now owns the venv FastAPI service
# (mios-crawl4ai.service): the venv at /usr/lib/mios/crawl4ai/.venv and the
# cache at /var/cache/mios/crawl4ai (camoufox's patched Firefox + crawl4ai
# cache), chowned via /usr/lib/tmpfiles.d/mios-crawl4ai.conf + the
# mios-crawl4ai-setup script. HOME=/var/empty (the service points
# XDG_CACHE_HOME at the cache dir). Next free UID after mios-ollama-cpu (823)
# in the 810-829 sidecar range.
g mios-crawl4ai 824
u mios-crawl4ai 824:mios-crawl4ai "'MiOS' crawl4ai web crawler (fetch -> markdown)" /var/empty /usr/sbin/nologin
# 'MiOS' AdGuard Home DNS resolver / ad-blocker. SYSTEM tier (network infra,
# like CrowdSec) -- joins mios-sys below. uid owns /etc/mios/adguard (config)
# + /var/lib/mios/adguard (AdGuard work dir: query log, stats db, filter cache).
# Container runs as this uid with CAP_NET_BIND_SERVICE to bind :53. HOME=/var/
# empty. Next free UID after mios-crawl4ai (824) in the 810-829 sidecar range.
g mios-adguard 825
u mios-adguard 825:mios-adguard "'MiOS' AdGuard Home DNS resolver" /var/empty /usr/sbin/nologin
# WS-9 unified agent-plane Postgres+pgvector container (Quadlet
# usr/share/containers/systemd/mios-pgvector.container). AI tier: own uid for
# /var/lib/mios/pgvector ownership, shared mios-ai group for cross-agent reads
# (like mios-surrealdb). HOME=/var/lib/mios/pgvector (the PGDATA parent). 826 =
# next free after mios-adguard (825) in the 810-829 sidecar range.
g mios-pgvector 826
u mios-pgvector 826:mios-pgvector "'MiOS' PostgreSQL+pgvector unified agent DB" /var/lib/mios/pgvector /usr/sbin/nologin
# WS-10 llama.cpp multi-model lane (llama-swap; Quadlet
# usr/share/containers/systemd/mios-llama-swap.container). AI tier: own uid for
# /var/lib/mios/llamacpp (KV slot-save dir) ownership, shared mios-ai group.
# HOME=/var/lib/mios/llamacpp. 827 = next free after mios-pgvector (826).
g mios-llamacpp 827
u mios-llamacpp 827:mios-llamacpp "'MiOS' llama.cpp / llama-swap lane" /var/lib/mios/llamacpp /usr/sbin/nologin
# WS-2 Code Mode sandbox-workspace owner. AI tier: own uid for /var/lib/mios/
# codemode (generated-snippet root, bind-mounted into the rootless podman
# coderun-sandbox as /work) ownership, shared mios-ai group. HOME=/var/empty
# (no login; the agent plane writes via the broker). 828 = next free after
# mios-llamacpp (827) in the 810-829 sidecar range.
g mios-codemode 828
u mios-codemode 828:mios-codemode "'MiOS' Code Mode sandbox workspace" /var/empty /usr/sbin/nologin
# Supplementary groups: agent-pipe needs read access to /var/lib/mios/
# scratch and the hermes session JSONs for the critic / structured-
# tool-history features.
m mios-agent-pipe systemd-journal
m mios-agent-pipe adm
# Phase D.5: agent-pipe forwards to Hermes-Agent and other sub-
# agents. /etc/mios/hermes/api.env (0640 mios-hermes:mios-hermes)
# carries the API_SERVER_KEY agent-pipe injects as Bearer when
# the upstream caller didn't supply one (curl, MCP clients,
# Discord). Adding agent-pipe to the hermes group is narrower
# than world-readable + cleaner than copying the key.
m mios-agent-pipe mios-hermes

# ──── Bucket-group memberships (USER/SYSTEM/AI separation) ────
#
# AI tier -- every agent in mios-ai. Shared read of skill catalog,
# passport public keys, scratch, kanban shadow, ...
m mios-ollama       mios-ai
m mios-open-webui   mios-ai
m mios-hermes       mios-ai
m mios-surrealdb    mios-ai
m mios-agent-pipe   mios-ai
m mios-ollama-cpu   mios-ai
m mios-searxng      mios-ai
m mios-crawl4ai     mios-ai
m mios-pgvector     mios-ai
m mios-llamacpp     mios-ai
m mios-codemode     mios-ai

# SYSTEM tier -- infra services in mios-sys.
m mios-guacamole    mios-sys
m mios-guacd        mios-sys
m mios-postgres     mios-sys
m mios-pxe-hub      mios-sys
m mios-crowdsec     mios-sys
m mios-forge        mios-sys
m mios-adguard      mios-sys
