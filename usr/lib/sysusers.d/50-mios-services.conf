# MiOS sidecar service accounts -- pinned IDs in the 810-829 range to keep
# /var/lib ownership stable across image rebuilds.
# Format: u USER UID:GROUP "GECOS" HOME SHELL
g mios-guacamole 810
u mios-guacamole 810:mios-guacamole "MiOS Guacamole web" /var/empty /usr/sbin/nologin
g mios-guacd 811
u mios-guacd 811:mios-guacd "MiOS Guacamole daemon" /var/empty /usr/sbin/nologin
g mios-postgres 812
u mios-postgres 812:mios-postgres "MiOS Guacamole Postgres" /var/empty /usr/sbin/nologin
g mios-pxe-hub 813
u mios-pxe-hub 813:mios-pxe-hub "MiOS PXE hub" /var/empty /usr/sbin/nologin
g mios-crowdsec 814
u mios-crowdsec 814:mios-crowdsec "MiOS CrowdSec dashboard" /var/empty /usr/sbin/nologin
g mios-ollama 815
u mios-ollama 815:mios-ollama "MiOS Ollama" /var/empty /usr/sbin/nologin
