# /usr/lib/sysusers.d/50-mios-cockpit.conf
# 'MiOS' static users for cockpit's dynamic-user references.
#
# Newer cockpit-ws (300+) ships several units that use DynamicUser=yes
# to create transient users at start time. Our drop-ins at
# /usr/lib/systemd/system/cockpit*.service.d/10-mios-container.conf
# neutralize DynamicUser=yes (along with PrivateTmp / ProtectSystem /
# RestrictNamespaces / etc.) so the units can boot under WSL2's
# unprivileged-namespace constraints. Without DynamicUser= the User= /
# Group= refs are looked up STATICALLY in /etc/passwd and /etc/group,
# and on a fresh image those entries are empty -- yielding the per-boot
# failure chain:
#
#   cockpit-wsinstance-socket-user.service: Failed to determine
#       credentials for user 'cockpit-wsinstance-socket': Unknown user
#   cockpit-wsinstance-socket-user.service: Failed at step USER
#       spawning /bin/true: Invalid argument (status=217/USER)
#   cockpit.service: Dependency failed (recursive cascade)
#   cockpit.socket: Trigger limit hit, refusing further activation.
#
# Operator-flagged 2026-05-10: cockpit web at https://localhost:9090
# was supposed to "just work" out of the box but every boot left the
# socket in failed/trigger-limit-hit state.
#
# Pinning all the dynamic-user names here closes the gap. UIDs/GIDs
# are in the system range (<1000) and chosen to NOT collide with:
#   - MiOS service slots (810-829)
#   - Fedora reservations (<200, 81 dbus, 999 polkitd, 990 systemd-resolve)
#   - existing cockpit-systemd-service (977 — pre-existing entry below)
#
# All users have /sbin/nologin and /var/empty so they cannot be used
# for interactive login. Idempotent: systemd-sysusers skips users that
# already exist with the same UID.

# Existing entry (kept verbatim).
g cockpit-systemd-service 977
u cockpit-systemd-service 977:cockpit-systemd-service "'MiOS' Cockpit systemd-service helper" /var/empty /sbin/nologin

# Group used by cockpit.service's static Group= (cockpit-wsinstance-socket)
# and cockpit-wsinstance-socket-user.service's static User= / Group=.
g cockpit-wsinstance-socket 976
u cockpit-wsinstance-socket 976:cockpit-wsinstance-socket "'MiOS' Cockpit wsinstance socket helper" /var/empty /sbin/nologin

# cockpit-wsinstance-http.service: User=cockpit-wsinstance-http,
# Group=cockpit-session-socket. Add both.
g cockpit-wsinstance-http 975
u cockpit-wsinstance-http 975:cockpit-wsinstance-http "'MiOS' Cockpit wsinstance http worker" /var/empty /sbin/nologin

g cockpit-session-socket 974
u cockpit-session-socket 974:cockpit-session-socket "'MiOS' Cockpit session socket helper" /var/empty /sbin/nologin

# cockpit-wsinstance-https.service: User=cockpit-wsinstance-https.
g cockpit-wsinstance-https 973
u cockpit-wsinstance-https 973:cockpit-wsinstance-https "'MiOS' Cockpit wsinstance https worker" /var/empty /sbin/nologin

# Upstream cockpit.service traditionally uses 'cockpit-ws' as the main
# socket user; some sub-units still reference that name even when our
# drop-ins point cockpit.service itself at cockpit-systemd-service.
# The 2026-05-10 journal showed cockpit-wsinstance-socket-user.service
# failing with "Failed to determine credentials for user 'cockpit-ws'"
# specifically, so the static name must exist regardless of which unit
# is the immediate caller.
g cockpit-ws 972
u cockpit-ws 972:cockpit-ws "'MiOS' Cockpit web service primary user" /var/empty /sbin/nologin

# Group memberships -- cockpit-tls (which runs as cockpit-ws) needs to
# connect to /run/cockpit/wsinstance/https-factory.sock, which is owned
# by group cockpit-wsinstance-socket. Without this membership cockpit-tls
# fails every HTTPS request with:
#     cockpit-tls: connect(https-factory.sock) failed: Permission denied
# and the browser sees "connection reset by peer" after the TLS handshake.
m cockpit-ws cockpit-wsinstance-socket
