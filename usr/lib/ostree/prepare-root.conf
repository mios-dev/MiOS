[composefs]
enabled = verity
# verity: require fsverity signatures on all files in /usr. Tamper-evident root.
# Requires ext4 or btrfs at install time (xfs does not support fsverity).
# The ucore-hci base image is built with fsverity digests; enabling verity here
# makes the OS refuse to boot a composefs image whose digests don't match the
# expected manifest - the core tenet of image-mode integrity.
#
# If first boot fails with "composefs: verity mismatch" on a target filesystem,
# either (a) install onto ext4/btrfs, or (b) drop back to `enabled = yes` for a
# release while the filesystem is investigated. We do NOT drop back here; the
# upgrade path is to stay on the signed image.

[sysroot]
readonly = true

[etc]
# transient = yes would make /etc tmpfs-backed and forgotten on reboot - too
# aggressive for a workstation (breaks persistent SSH configs, NM keyfiles,
# user preferences). Left persistent.
