# AI-hint: Configures systemd-journald to disable Audit, ReadKMsg, and ForwardToSyslog to ensure stability and compatibility on WSL2 environments where these features cause crashes or startup races.
[Journal]
# Audit=yes crashes journald on WSL2 (no audit netlink socket).
Audit=no
# ReadKMsg=yes crashes journald on WSL2 kernel 6.6+ (EPERM on /dev/kmsg).
ReadKMsg=no
# Avoid syslog socket dependency that races with journald startup in WSL2.
ForwardToSyslog=no
