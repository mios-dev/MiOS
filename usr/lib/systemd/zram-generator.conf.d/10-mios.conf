# AI-hint: Configures zram0 parameters for MiOS, setting a dynamic size capped at 32GB and using zstd compression to optimize memory availability for virtualization payloads.
[zram0]
# MiOS-OS Zram tuning
# Pinned at 50% of available physical RAM to maximize virtualization payloads.
# Hard cap strictly at 32GB to avoid extreme compression CPU overheads.
zram-size = min(ram / 2, 32768)
compression-algorithm = zstd
