# AI-hint: Configures NetworkManager to skip execution within OCI containers via ConditionVirtualization=!container to prevent port conflicts and service overlap in containerized environments.
[Unit]
# 'MiOS': Redundant in OCI nested containers (handled by Podman/Docker), but active in WSL host VM
ConditionVirtualization=
ConditionVirtualization=|!container
ConditionVirtualization=|wsl
