# AI-hint: Restricts systemd-localed from modifying X11 keyboard configurations by setting /etc/X11/xorg.conf.d/ to read-only, ensuring locale changes do not overwrite X11 keyboard mappings.
[Service]
# systemd-localed will try to write to /etc/X11/xorg.conf.d/00-keyboard.conf
# if it can, but we don't use it. Make the path read-only so that it skips it.
ReadOnlyPaths=-/etc/X11/xorg.conf.d/
