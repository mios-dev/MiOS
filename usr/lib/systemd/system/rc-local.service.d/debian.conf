# AI-hint: Configures the rc-local.service unit to ensure it waits for network-online.target and redirects stdout/stderr to both journal and console for boot-time script execution.
# AI-related: rc-local.service, network-online.target
[Unit]
# not specified by LSB, but has been behaving that way in Debian under SysV
# init and upstart
After=network-online.target

# Often contains status messages which users expect to see on the console
# during boot
[Service]
StandardOutput=journal+console
StandardError=journal+console
