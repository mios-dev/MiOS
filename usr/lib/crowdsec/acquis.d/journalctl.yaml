# AI-hint: CrowdSec configuration defining journalctl source filters for specific systemd units (sshd, nginx, k3s, etc.) to identify and log security events for the CrowdSec intrusion detection engine.
# AI-related: sshd.service, nginx.service, httpd.service, cockpit.service, gnome-remote-desktop.service, libvirtd.service, k3s.service
source: journalctl
journalctl_filter:
  - "_SYSTEMD_UNIT=sshd.service"
  - "_SYSTEMD_UNIT=nginx.service"
  - "_SYSTEMD_UNIT=httpd.service"
  - "_SYSTEMD_UNIT=cockpit.service"
  - "_SYSTEMD_UNIT=gnome-remote-desktop.service"
  - "_SYSTEMD_UNIT=libvirtd.service"
  - "_SYSTEMD_UNIT=k3s.service"
labels:
  type: syslog
