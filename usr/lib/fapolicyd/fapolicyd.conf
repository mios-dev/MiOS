# AI-hint: Configuration file for the fapolicyd daemon defining security policies, filesystem monitoring, and RPM database paths to enforce integrity and execution restrictions on the MiOS immutable filesystem.
# /etc/fapolicyd/fapolicyd.conf
# Custom configuration for 'MiOS' (immutable OS).
# The RPM database is located at /usr/share/rpm on bootc systems.
permissive = 0
nice_val = 14
q_size = 1024
uid = fapolicyd
gid = fapolicyd
do_stat_report = 1
detailed_report = 1
db_max_size = 50
filter_default = 0
watch_fs = ext2,ext3,ext4,tmpfs,xfs,vfat,iso9660,btrfs,overlay
allow_filesystem_mark = 1
trust = file,rpmdb
integrity = none
syslog_format = rule,dec,perm,uid,pid,exe,dir,ftype,fpath,fsha256
rpmdb_path = /usr/share/rpm
