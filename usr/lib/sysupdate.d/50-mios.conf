# systemd-sysupdate declarative config for MiOS
# This prepares the system for atomic A/B updates in UKI/SecureBoot environments.

[Transfer]
Verify=yes

[Source]
Type=url-file
Path=https://ghcr.io/mios-dev/updates/
MatchPattern=mios-@v.root-x86-64.verity

[Target]
Type=partition
Path=auto
# Matches the Discoverable Partitions Spec (DPS)
MatchPattern=root-x86-64
Mode=0444
ReadOnly=yes
