# AI-hint: Configures kernel arguments for NVIDIA GPU support, enabling unsupported hardware, DRM modesetting, and framebuffer support for x86_64 systems.
# 'MiOS' v0.3.0 -- NVIDIA kernel module overrides
match-architectures = ["x86_64"]
kargs = [
    "nvidia.NVreg_OpenRmEnableUnsupportedGpus=1",
    "nvidia-drm.modeset=1",
    "nvidia-drm.fbdev=1"
]
