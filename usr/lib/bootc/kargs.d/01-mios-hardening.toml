# 'MiOS' -- SecureBlue-adapted kernel hardening (upstream April 2026 pass)
kargs = [
    "slab_nomerge",
    # "init_on_alloc=1",
    # "init_on_free=1",
    # "page_alloc.shuffle=1",
    "randomize_kstack_offset=on",
    "pti=on",
    "vsyscall=none",
    # lockdown= set in 30-security.toml as `integrity` (NVIDIA-safe; allows
    # MOK-enrolled signed modules to load). Do not duplicate here -- bootc
    # kargs.d is additive across files; setting both `confidentiality` here
    # and `integrity` in 30-security.toml puts ambiguous values on the
    # kernel command line.
    "spectre_v2=on",
    "spectre_bhi=on",
    "spec_store_bypass_disable=on",
    "l1tf=full,force",
    "gather_data_sampling=force",
    "tsx=off",
    "kvm.nx_huge_pages=force"
]
match-architectures = ["x86_64"]
