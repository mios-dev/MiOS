# AI-hint: Configures kernel arguments for GPU hardware compatibility, specifically disabling AMD GPU power management libraries and enabling Intel GUC for x86_64 systems to ensure stable graphics drivers.
# 'MiOS' v0.3.0 -- Silicon-specific GPU workarounds
match-architectures = ["x86_64"]
kargs = [
    "amdgpu.pplib=0",
    "i915.enable_guc=3"
]
