# AI-hint: Configures kernel arguments for IOMMU activation and VFIO PCI passthrough support to enable hardware device passthrough to virtual machines on x86_64 systems.
# 'MiOS' v0.3.0 -- VFIO / PCI Passthrough generic hooks
match-architectures = ["x86_64"]
kargs = [
    "intel_iommu=on",
    "kvm.ignore_msrs=1",
    "vfio_pci.ids="
]
