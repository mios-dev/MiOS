# /usr/lib/tmpfiles.d/mios-launcher.conf
#
# Pre-create /run/mios as a world-traversable directory so the
# operator-side mios-launcher.service can bind /run/mios/launcher.sock
# AND any service-user process (notably mios-hermes, the agent gateway)
# can connect to it.
#
# Why /run instead of /tmp: hermes-agent.service has PrivateTmp=true,
# which gives the agent's terminal-tool subprocess its own private
# /tmp -- so a socket at /tmp/mios-launcher.sock is invisible from
# inside the agent. /run is NOT affected by PrivateTmp; the same
# /run/mios/launcher.sock is reachable from EVERY uid + namespace on
# the host.
#
# Mode 0755 on the dir = world-readable + traversable (so connect()
# can resolve the path), only mios writable. Socket file itself
# carries mode 0666 (set by the daemon at bind time).
# Z = adjust mode AND walk subtree to fix recursively if it's drifted.
# Mode 1777 (sticky world-rwx like /tmp) so mios CAN write + chmod
# can re-apply without owner/group conflicts. Some /tmp + /run dirs
# on this host silently revert to 0666 (no execute) which makes
# them un-traversable; the Z operator re-asserts on every tmpfiles
# pass (boot + on-demand systemd-tmpfiles --create runs).
Z /run/mios 1777 mios mios - -
