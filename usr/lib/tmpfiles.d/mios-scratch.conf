# /usr/lib/tmpfiles.d/mios-scratch.conf
#
# Global scratchpad shared by every MiOS agent. Operator directive
# 2026-05-16: "ALL AGENTS SHARE A SCRATCH PAD--GLOBAL SCRATCH PAD AT
# ROOT--or correct bootc compatible mutable locations".
#
# Bootc compliance: / is composefs read-only, so a true "/scratch"
# directory at filesystem root would be baked into the OCI image
# (Containerfile RUN ln -sf /var/lib/mios/scratch /scratch). The
# CANONICAL path -- the one all the agents read+write -- is
# /var/lib/mios/scratch under /var (writable, persistent).
#
# Mode 1777 (sticky world-rwx) so every MiOS service user can write
# without crossing group walls:
#   * mios-hermes (uid 820)  -- big agent's scratch notes
#   * mios          (uid 992) -- operator + sys-agent's CLI runs
#   * root                    -- log-watcher / cron-director / nudger
#   * mios-open-webui (817)   -- OWUI's RAG / pipe state when needed
#   * any future service user
#
# Convention (documented in mios-sys-agent SYSTEM prompt + the
# mios-environment skill):
#   /var/lib/mios/scratch/<purpose>.md       short notes
#   /var/lib/mios/scratch/<purpose>.json     structured handoffs
#   /var/lib/mios/scratch/sessions/<id>/     per-conversation drop dir
#
# Agents write to it freely; cleanup is operator-driven (it's
# scratch, not state). Periodic gc could be added later via a
# tmpfiles.d "e" line + age cutoff.

d /var/lib/mios/scratch 1777 root root - -
# Sub-dirs that show up commonly enough to pre-create:
d /var/lib/mios/scratch/sessions 1777 root root - -
d /var/lib/mios/scratch/handoffs 1777 root root - -
d /var/lib/mios/scratch/notes    1777 root root - -
