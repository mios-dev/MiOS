# MiOS — Infrastructure & Virtualization runtime skeletons
# Ensures services starting before persistent /var is ready have necessary dirs.

# ── Cockpit ──────────────────────────────────────────────────────────────────
d /var/lib/cockpit            0775 root cockpit -
d /var/lib/cockpit/motd.d     0775 root cockpit -
d /etc/cockpit/cockpit.conf.d 0755 root root -

# ── Libvirt / QEMU ──────────────────────────────────────────────────────────
d /var/lib/libvirt            0755 root root -
d /var/lib/libvirt/images     0755 root root -
d /var/lib/libvirt/qemu       0751 root root -
d /var/lib/libvirt/qemu/dump  0750 root root -
d /var/lib/libvirt/qemu/save  0750 root root -

# ── Logging Skeletons (v259+ journal compatibility) ─────────────────────────
d /var/log/journal            0755 root systemd-journal -

# ── K3s Kubernetes ──────────────────────────────────────────────────────────
d /var/lib/rancher            0755 root root -
d /var/lib/rancher/k3s        0755 root root -
d /var/lib/rancher/k3s/server 0700 root root -
d /etc/rancher/k3s            0755 root root -

# ── Ceph Storage ─────────────────────────────────────────────────────────────
d /var/lib/ceph               0750 root root -
d /var/log/ceph               0750 root root -
d /etc/ceph                   0755 root root -

# ── MiOS Component Skeletons ──────────────────────────────────────────────
d /etc/mios                0755 root root -
# Seed role.conf from the image-baked example if admin has not overridden it
C /etc/mios/role.conf      0644 root root - /usr/share/mios/role.conf.example

# ── Hostname (LAW 4: /etc is Day-2 only) ────────────────────────────────────
# Copy the image-baked default to /etc/hostname on first boot only if absent.
# mios-init overwrites it with the unique mios-XXXXX derived from machine-id.
C /etc/hostname             0644 root root - /usr/lib/mios/hostname.default
d /var/opt                    0755 root root -
d /var/tmp                    1777 root root -
d /var/lib/mios            0755 root root -
d /var/lib/mios/backups    0700 root root -
d /var/lib/mios/mcp        0755 mios mios -
d /var/lib/waydroid           0755 root root -
d /var/lib/waydroid/images    0755 root root -
d /var/lib/swtpm-localca      0755 root root -
d /var/log/mios            0755 root root -
d /var/log/mios/mcp        0755 mios mios -
d /var/usrlocal               0755 root root -

# ── Containers & Cosign ──────────────────────────────────────────────────────
d /etc/pki/containers         0755 root root -
d /etc/containers/registries.d 0755 root root -
d /etc/nvidia-container-toolkit 0755 root root -
d /etc/cdi                    0755 root root -

# ── Boot & Greenboot ─────────────────────────────────────────────────────────
d /etc/greenboot              0755 root root -

# ── PAM & Auth ───────────────────────────────────────────────────────────────
d /etc/pam.d                  0755 root root -
d /etc/sudoers.d              0750 root root -

# ── Cloud-Init & Multipath ───────────────────────────────────────────────────
d /etc/cloud                  0755 root root -
d /etc/cloud/cloud.cfg.d      0755 root root -
d /etc/multipath              0700 root root -

# ── GNOME & X11 ──────────────────────────────────────────────────────────────
d /etc/xdg                    0755 root root -
d /etc/xdg/autostart          0755 root root -
d /etc/environment.d          0755 root root -
d /usr/share/icons/default    0755 root root -
d /usr/share/X11/icons/default 0755 root root -
d /etc/X11                    0755 root root -
d /etc/fastfetch              0755 root root -

# ── Hardware & Modprobe ──────────────────────────────────────────────────────
d /usr/lib/modprobe.d         0755 root root -
d /etc/modprobe.d             0755 root root -

# ── Virtualization & Security ───────────────────────────────────────────────
d /etc/crowdsec               0755 root root -
d /etc/crowdsec/acquis.d      0755 root root -
d /etc/polkit-1/rules.d       0750 polkitd polkitd -

# ── Systemd Drop-ins ─────────────────────────────────────────────────────────
d /usr/lib/systemd/system/polkit.service.d 0755 root root -
d /usr/lib/systemd/system/NetworkManager-wait-online.service.d 0755 root root -
