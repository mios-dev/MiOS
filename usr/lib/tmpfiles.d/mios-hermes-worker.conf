# AI-hint: Declares the Hermes WORKER (:8643) runtime directory and its dedicated CDP browser profile, owned by the mios-ai service user, so the second isolated gateway instance has its own HERMES_HOME (separate pid/lock/state/DBs/config) and its own browser profile (separate cookies) without sharing the primary :8642 tree.
# AI-related: /var/lib/mios/hermes-worker, /var/lib/mios/hermes-browser/profile-w2, hermes-worker.service, mios-hermes-browser-worker.service, mios-ai
# /usr/lib/tmpfiles.d/mios-hermes-worker.conf
# 'MiOS' Hermes-WORKER runtime directories (P1, operator 2026-06-19).
#
# SEPARATE HERMES_HOME from the :8642 gateway -- its own gateway.pid /
# gateway.lock / gateway_state.json / state.db / kanban.db / config.yaml /
# auth.json. NO-MKDIR-IN-VAR (Law 2): declare here, never mkdir at build time.
d /var/lib/mios/hermes-worker          0700 mios-ai mios-ai -
d /var/lib/mios/hermes-worker/cron     0700 mios-ai mios-ai -
d /var/lib/mios/hermes-worker/sessions 0700 mios-ai mios-ai -
d /var/lib/mios/hermes-worker/scratch  0700 mios-ai mios-ai -
d /var/lib/mios/hermes-worker/memory   0700 mios-ai mios-ai -
# Dedicated CDP browser profile for the worker (:9223) -- isolated cookies /
# session from the primary :9222 profile.
d /var/lib/mios/hermes-browser/profile-w2 0700 mios-ai mios-ai -
# Vendor worker config copy-if-absent into the worker HERMES_HOME. Once present,
# operator edits survive every boot. mios-hermes-firstboot NEVER touches this
# path (it only re-thins /var/lib/mios/hermes/config.yaml), so the non-thin
# worker config is durable. To restore vendor defaults: delete the file and
# restart systemd-tmpfiles-setup.
C /var/lib/mios/hermes-worker/config.yaml 0640 mios-ai mios-ai - /usr/share/mios/hermes/config-worker.yaml
