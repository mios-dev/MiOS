# 'MiOS' v0.2.4: Create K3s directory structure at boot
# These directories live in /var (persistent state). Manifests are shipped
# in /usr/share/mios/k3s-manifests/ and copied on first boot by k3s.service.
d /var/lib/rancher 0755 root root - -
d /var/lib/rancher/k3s 0755 root root - -
d /var/lib/rancher/k3s/server 0755 root root - -
d /var/lib/rancher/k3s/server/manifests 0755 root root - -
# Copy bundled manifests on first boot (C = copy if not exists)
C /var/lib/rancher/k3s/server/manifests/ceph-csi-cephfs.yaml 0644 root root - /usr/share/mios/k3s-manifests/ceph-csi-cephfs.yaml
