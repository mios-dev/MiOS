# AI-hint: Defines systemd-tmpfiles permissions and ownership for AdGuard Home configuration and runtime data directories to ensure the containerized service (UID 825) can access its config and database.
# AI-related: /etc/mios/adguard, mios-adguard, mios-services, mios-adguard-firstboot, mios-adguard.container
# /usr/lib/tmpfiles.d/mios-adguard.conf
# 'MiOS' AdGuard Home DNS resolver / ad-blocker -- runtime directories.
#
# /etc/mios/adguard       config dir (AdGuardHome.yaml, generated at first boot)
# /var/lib/mios/adguard   AdGuard work dir (query log, statistics db, filter
#                         list cache, session db)
#
# UID 825 is pinned in /usr/lib/sysusers.d/50-mios-services.conf and referenced
# by etc/containers/systemd/mios-adguard.container's User=825/Group=825. Both
# directories must be chowned 825:825 before the Quadlet starts so the container
# (running as 825 + CAP_NET_BIND_SERVICE) can read its config and write its work
# dir. The config file itself is GENERATED by usr/libexec/mios/
# mios-adguard-firstboot (it needs the live Tailscale IP + MagicDNS suffix, which
# aren't knowable at image build time), so there is no vendor C= copy here.

d /etc/mios/adguard       0750 mios-adguard mios-adguard -
d /var/lib/mios/adguard   0750 mios-adguard mios-adguard -
