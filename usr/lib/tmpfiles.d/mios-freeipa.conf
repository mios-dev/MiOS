# 'MiOS' -- FreeIPA/SSSD runtime directory skeletons.
# ipa-client and certmonger expect these dirs at runtime.
# On immutable images, rpm postinst can't create them, so tmpfiles does it.
# bz 2332433: /var/lib/ipa-client/sysrestore/ missing causes ipa-client-install to fail.

# -- certmonger ---------------------------------------------------------------
d /var/lib/certmonger          0755 root root -
d /var/lib/certmonger/requests 0755 root root -
d /var/lib/certmonger/cas      0755 root root -
d /var/lib/certmonger/local    0755 root root -

# -- ipa-client ---------------------------------------------------------------
d /var/lib/ipa-client            0755 root root -
d /var/lib/ipa-client/sysrestore 0755 root root -
d /var/lib/ipa-client/pki        0755 root root -

# -- sssd runtime dirs --------------------------------------------------------
d /var/lib/sss                 0755 root root -
d /var/lib/sss/db              0700 sssd sssd -
d /var/lib/sss/mc              0755 root root -
d /var/lib/sss/pipes           0755 root root -
d /var/lib/sss/pipes/private   0750 root root -
d /var/lib/sss/pubconf         0755 root root -

# -- mios enrollment marker dir --------------------------------------------
d /var/lib/mios             0755 root root -

# -- sssd conf.d -- enforce 0600 root:root (required by libini) ----------------
z /etc/sssd/conf.d             0750 root root -
z /etc/sssd/conf.d/10-mios.conf 0600 root root -
z /etc/sssd/conf.d/20-mios-domain.conf 0600 root root -

# -- mios config dir -------------------------------------------------------
d /etc/mios                 0750 root root -
