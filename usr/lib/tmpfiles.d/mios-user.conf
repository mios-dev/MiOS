# /usr/lib/tmpfiles.d/mios-user.conf
#
# Declarative materialization of the 'mios' user's runtime state at
# first boot. Replaces the imperative `useradd`/`mkdir`/`cp -a`/
# `loginctl enable-linger` block that was previously in
# /usr/libexec/mios/wsl-firstboot. The user account itself is created
# at IMAGE BUILD TIME via /usr/lib/sysusers.d/10-mios.conf and
# automation/31-user.sh -- this file only handles the few pieces
# that genuinely require the persistent /var subvolume to be mounted
# (which on bootc / WSL is only true at boot, not at build).
#
# Replaces ad-hoc work that used to live in wsl-firstboot:
#   * home directory creation + skel copy
#   * recursive ownership of $HOME
#   * systemd-logind linger marker
#
# Native Fedora pattern:
#   * `D` (delete-then-create) ensures /var/home/mios exists with
#     correct perms even if a prior failed boot left it half-populated.
#   * `C` (copy-if-missing) seeds the skel content non-destructively.
#   * `Z` recursively normalizes ownership without re-copying.
#   * `f` (create-if-missing) lays down /var/lib/systemd/linger/mios,
#     which is the canonical loginctl-enable-linger marker that
#     systemd-logind reads at start. Bypasses the loginctl D-Bus call
#     that fails on WSL2 where logind itself is condition-skipped.

# Home directory + skel copy (one-shot at first boot).
d /var/home               0755 root root -
C /var/home/mios          0700 mios mios - /etc/skel
Z /var/home/mios          -    mios mios -

# Copy (NOT symlink) Bibata cursor + Geist fonts into the operator's
# xdg-data tree so flatpak sandboxes resolve them. Flatpak refuses to
# expose /usr/* paths -- "Path /usr is reserved by Flatpak" -- so a
# symlink under ~/.local/share/icons that POINTS at /usr/share/icons/
# is unreadable from inside a flatpak sandbox (the sandbox follows the
# symlink, hits /usr, gets EACCES, and the app falls back to the
# default cursor theme). Operator 2026-05-11 (twice): "bibata cursor
# is NOT global at all !!! still see broken cursor in epiphany and
# other Linux windows". Copy operations bring the actual files into
# xdg-data, which IS mapped into every flatpak sandbox.
#
# `C` = "Copy if missing" -- recursively seeds the directory from the
# source path on first boot; idempotent on subsequent boots. On image
# rebuilds (bootc switch), /var is reset, so this re-runs cleanly.
C /var/home/mios/.local/share/icons/Bibata-Modern-Classic 0755 mios mios - /usr/share/icons/Bibata-Modern-Classic
C /var/home/mios/.local/share/fonts/geist                 0755 mios mios - /usr/share/fonts/geist

# Per-user default cursor inheritance. Apps that consult ~/.icons/default
# before /usr/share/icons/default (or that ignore /usr/share entirely
# in a flatpak sandbox) see Bibata via this redirect. The actual
# index.theme is shipped under /etc/skel/.icons/default/ so the
# canonical `C /var/home/mios <- /etc/skel` line above seeds it on
# first boot. Mirrors /usr/share/icons/default/index.theme.

# systemd-logind linger marker. Empty file under
# /var/lib/systemd/linger/<username> = "this user gets a persistent
# user-systemd manager from boot". This is the marker logind reads
# at startup; we don't need loginctl (which is unavailable on WSL
# where logind is condition-gated off) to write it.
d /var/lib/systemd/linger 0755 root root -
f /var/lib/systemd/linger/mios 0644 root root -
