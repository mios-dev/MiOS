# /usr/lib/tmpfiles.d/mios-opencode-gateway.conf
# 'MiOS' opencode -> OpenAI /v1 gateway runtime directories.
#
# mios-opencode-gateway.service runs as mios-ai with ProtectSystem=strict, so
# its HOME + run cwd (the opencode scratch workdir) must pre-exist owned by
# mios-ai. Mirrors [ai].opencode_gateway_workdir in mios.toml.
d /var/lib/mios/opencode-gateway      0750 mios-ai mios-ai -
d /var/lib/mios/opencode-gateway/work 0750 mios-ai mios-ai -
# opencode config dir (gateway reads OPENCODE_CONFIG here). The vendored
# opencode.json SoT ships read-only at /usr/share/mios/opencode/opencode.json
# (Law 1 USR-OVER-ETC); automation/38-hermes-agent.sh PHASE 2 copies it here
# as the admin-override the gateway actually reads. This entry guarantees the
# dir + mios-ai ownership for ProtectSystem=strict on every boot.
d /etc/mios/opencode                  0750 mios-ai mios-ai -
