# /usr/lib/tmpfiles.d/mios-codemode.conf
# WS-2 Code Mode workspace. The agent's generated snippets are written here by
# mios-coderun-codemode, then bind-mounted into the rootless podman
# coderun-sandbox as /work (concepts/coderun-sandbox.md). Owned by the dedicated
# mios-codemode service uid/gid (828, declared in
# /usr/lib/sysusers.d/50-mios-services.conf) so the agent plane writes here
# without widening any other service's state dir. bootc-immutable code path;
# mutable scratch stays under /var. NO-MKDIR-IN-VAR (Law 2): declared here, never
# created at build time.
#
# This is the Code Mode session root; per-conversation subdirs (cm-<hash>/) are
# created at run time by the CLI under it. Mode 0700: only the agent plane (+ the
# UserNS=keep-id container mapping) reads/writes generated code.
d /var/lib/mios/codemode 0700 828 828 -
