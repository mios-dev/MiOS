# /usr/lib/tmpfiles.d/mios-wslg.conf
#
# Boot-time WSLg substrate wiring. The PRIOR revision used `L+` to
# force `/tmp/.X11-unix` as a SYMLINK pointing at `/mnt/wslg/.X11-unix`.
# That works for non-sandboxed apps but breaks flatpak bwrap:
#
#     bwrap: Can't mount tmpfs on /newroot/tmp/.X11-unix:
#     No such file or directory
#
# bwrap creates a new mount namespace and tries to `tmpfs` over
# `/tmp/.X11-unix`. It refuses to tmpfs onto a symlink (no kernel
# operation for that) and dies. Operator-flagged 2026-05-10: running
# `nautilus` (Nautilus.Devel flatpak from gnome-nightly) reproduces
# the bwrap error every time.
#
# Fix: create `/tmp/.X11-unix` as a real DIRECTORY (1777 like /tmp
# itself). `mios-wslg-permissions-fix.service` then bind-mounts the
# host's `/mnt/wslg/.X11-unix` onto it at boot so non-flatpak X11
# clients still find the WSLg X server socket. Bwrap can tmpfs over
# a directory or a bind mount without trouble.
#
# `d` (vs `D`): create-if-missing, don't recreate on every boot.
# This is intentional -- if the bind mount from the service is
# already in place, we don't want tmpfiles tearing it down.
#
# No-op on bare-metal / Hyper-V / QEMU MiOS hosts: the directory
# still gets created (harmlessly empty); the WSLg permissions-fix
# service is gated on `ConditionPathIsDirectory=/mnt/wslg/runtime-dir`
# so the bind mount only fires on WSLg substrates.

# /tmp/.X11-unix as a real sticky directory (1777, root:root).
d /tmp/.X11-unix 1777 root root - -
