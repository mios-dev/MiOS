# /usr/lib/tmpfiles.d/mios-ollama-cpu.conf
# HOME + state dir for the in-VM CPU light-lane Ollama instance
# (Quadlet at /usr/share/containers/systemd/mios-ollama-cpu.container).
# Owned by mios-ollama-cpu (uid 823, declared in
# /usr/lib/sysusers.d/50-mios-services.conf). Shares the model
# store at /var/lib/ollama with the CUDA mios-ollama instance --
# only this CPU instance's HOME dir lives here.
d /var/lib/ollama-cpu 0750 823 823 -
