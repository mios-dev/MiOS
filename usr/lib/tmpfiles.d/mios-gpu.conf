# MiOS v0.2.0 — GPU runtime directories. Declared per LAW 2 (NO-MKDIR-IN-VAR).
# Format: Type Path Mode UID GID Age Argument
d /run/mios                              0755 root root -
d /var/run/cdi                           0755 root root -
d /etc/cdi                               0755 root root -
d /var/lib/mios                          0755 root root -
d /var/lib/mios/gpu                      0755 root root -
# nvidia-container-toolkit reads /etc/nvidia-container-toolkit/cdi-refresh.env
# from a hard-coded path in its upstream systemd unit. Treat /etc/ as the
# upstream-contract surface; seed defaults via `f` (create-if-missing).
d /etc/nvidia-container-toolkit          0755 root root -
f /etc/nvidia-container-toolkit/cdi-refresh.env 0644 root root - CDI_OUTPUT_PATH=/var/run/cdi/nvidia.yaml\nNVIDIA_CTK_DEBUG=0
