# MiOS v0.1.4 - GPU runtime directories
# Format: Type Path Mode UID GID Age Argument
d /run/mios               0755 root root -
d /var/run/cdi               0755 root root -
d /var/lib/mios           0755 root root -
d /var/lib/mios/gpu       0755 root root -
d /etc/nvidia-container-toolkit 0755 root root -
# Ensure config env file for nvidia-cdi-refresh exists even if toolkit absent.
# `f` only creates if missing; does not overwrite.
f /etc/nvidia-container-toolkit/cdi-refresh.env 0644 root root - NVIDIA_CTK_DEBUG=0
