# 'MiOS' Forgejo Runner -- runtime state declarations.
# Required because /var paths cannot be created at OCI build time
# (Architectural Law 2: NO-MKDIR-IN-VAR). The runner runs as root
# (documented Privileged=true exception, see mios-forgejo-runner.container
# header), so ownership is root:root.

# Persistent runner state: registration record, workflow caches, job
# logs. The runner image's entrypoint persists /data/.runner here so
# subsequent starts skip re-registration.
d /srv/mios/forge-runner       0750 root root -

# Build-output sentinel directory. The Forgejo Runner workflow writes
# /var/lib/mios/forge-runner/last-build.txt after a successful
# `podman build`; mios-bootc-switch.path watches this exact path on
# the host side. The directory is shared between the runner container
# and the host (Volume= bind in the Quadlet) so the watcher fires
# regardless of which side wrote the file.
d /var/lib/mios/forge-runner   0755 root root -
