# /usr/lib/tmpfiles.d/mios-crawl4ai.conf
# 'MiOS' crawl engine -- runtime directories.
#
# Operator directive 2026-05-24: the unclecode/crawl4ai CONTAINER was
# scrapped. The crawl engine now runs as a venv FastAPI service
# (mios-crawl4ai.service) that drives the existing Chrome over CDP with a
# Camoufox stealth fallback. These dirs back THAT service, owned by the
# mios-crawl4ai user (uid 824, pinned in /usr/lib/sysusers.d/50-mios-services.conf).
#
# /var/lib/mios/crawl4ai     service state / WorkingDirectory
# /var/cache/mios/crawl4ai   XDG_CACHE_HOME -- camoufox's fetched patched
#                            Firefox (~150MB) + crawl4ai's on-disk cache.
#                            The mios-crawl4ai-setup script also fetches
#                            camoufox into here and chowns it 824:824.
d /var/lib/mios/crawl4ai    0750 mios-crawl4ai mios-crawl4ai -
d /var/cache/mios/crawl4ai  0750 mios-crawl4ai mios-crawl4ai -
