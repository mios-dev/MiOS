# /usr/lib/tmpfiles.d/mios-hermes.conf
# 'MiOS' Hermes-Agent runtime directories.

d /etc/mios/hermes              0750 mios-hermes mios-hermes -
d /var/lib/mios/hermes          0750 mios-hermes mios-hermes -
# Hermes writes cron jobs / sessions / scratch / memory under
# $HERMES_HOME. Without these pre-declarations, the first write
# from the gateway uid lands in a parent that doesn't exist yet
# (race vs. mkdir -p inside Hermes itself). Pre-creating with the
# canonical uid avoids the chronic "Permission denied:
# /var/lib/mios/hermes/cron" boot-after-reset symptom.
d /var/lib/mios/hermes/cron     0750 mios-hermes mios-hermes -
d /var/lib/mios/hermes/sessions 0750 mios-hermes mios-hermes -
d /var/lib/mios/hermes/scratch  0750 mios-hermes mios-hermes -
d /var/lib/mios/hermes/memory   0750 mios-hermes mios-hermes -
# Vendor config copy-if-absent. Once present in /etc, operator edits
# survive every subsequent boot. To restore vendor defaults: delete
# /etc/mios/hermes/config.yaml and restart systemd-tmpfiles-setup.
C /etc/mios/hermes/config.yaml 0640 mios-hermes mios-hermes - /usr/share/mios/hermes/config.yaml
