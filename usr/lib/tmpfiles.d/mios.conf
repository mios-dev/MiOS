# /usr/lib/tmpfiles.d/mios.conf
# Declares 'MiOS' state directories for systemd-tmpfiles. Created at boot.

d /var/lib/mios            0755 root      root      -  -
# /var/lib/mios/ai -- shared AI-state dir owned by mios-hermes
# (the live MiOS agent at /). Holds models, scratch, memory.
d /var/lib/mios/ai         0750 mios-ai mios-ai -  -
# /var/lib/mios/daemon -- the consolidated micro-LLM daemon's state dir
# (state.json + launch_failures.json). Owned by mios-ai (the daemon's User=
# after the agent-user consolidation); 0755 so the OWUI mios_sidecar Filter --
# a DIFFERENT uid -- can still traverse + read the world-readable state.json.
# Without this line the dir was created root:root by the pre-consolidation
# root-run daemon, then EPERM-crashed the mios-ai daemon's startup chmod +
# state writes ("Operation not permitted: '/var/lib/mios/daemon'", 2026-05-24).
d /var/lib/mios/daemon     0755 mios-ai mios-ai -  -
# /var/lib/mios/mcp -- mios-mcp.service (Agent Context / MCP) state dir
# (state.db). Owned by mios-ai (the service's User=). SAME fix as daemon
# above: pre-consolidation it was created mios:mios, so the mios-ai service
# EPERM-crashed on mcp-init.sh's chmod ("cannot change permissions of
# '/var/lib/mios/mcp': Operation not permitted", 33k restarts, 2026-05-27).
d /var/lib/mios/mcp        0750 mios-ai mios-ai -  -
# /var/lib/mios/ai/skills/episodic -- P5.7 SKILL.md write-back target. Each
# completed (polished + grounded) Q+A is rendered as an episodic SKILL.md file
# here alongside the SurrealDB knowledge row. The agent-pipe (User=mios-ai)
# writes; future OpenViking-style L0/L1/L2 indexer reads. World-readable
# directory but parent /var/lib/mios/ai is 0750 so traversal is mios-ai-only.
d /var/lib/mios/ai/skills           0750 mios-ai mios-ai -  -
d /var/lib/mios/ai/skills/episodic  0750 mios-ai mios-ai -  -
# /var/lib/mios/ai/coderun -- per-call scratch workspaces for the `coderun`
# verb's bubblewrap sandbox (mios-coderun). Each run makes + removes its own
# cr-<ts>-<rand> subdir; this just ensures the parent exists owned by the
# agent user (mios-ai) so the verb can create scratch dirs.
d /var/lib/mios/ai/coderun          0750 mios-ai mios-ai -  -
# /var/lib/mios/code-server -- dedicated workspace for the
# mios-code-server Quadlet. Owned by uid/gid 1000 (the container's
# upstream 'coder' user); on a deployed MiOS host, mios is uid 1000
# too so this is also the operator's effective home for the editor.
# On podman-machine-os dev-VM (mios auto-allocated to 992) the
# numeric owner stays 1000 so the container can write -- operator
# can symlink /var/home/mios/git into /var/lib/mios/code-server to
# project their host repos into the editor sidebar.
d /var/lib/mios/code-server 0755 1000 1000 -  -
d /var/lib/mios/cache      0755 root      root      -  -
d /var/lib/mios/memory     0755 root      root      -  -
d /var/lib/mios/memory/journal 0755 root  root      -  -
d /var/log/mios            0755 root      root      -  -
d /var/log/mios/gui        0755 mios      mios      -  -
d /var/log/mios/ai         0755 root      root      -  -
d /var/log/mios/ai/audit   0755 root      root      -  -
d /var/log/mios/mcp        0750 mios-ai mios-ai -  -
# Shared agent-env cache dir -- world-writable so the operator-uid
# AND the agent-uid (mios-agent-pipe) can both refresh inventory caches
# (windows-apps.cache, windows-games.cache). Mode 0777 (NOT 1777/sticky):
# both uids must atomically mv-REPLACE each other's cache files, but the
# sticky bit blocks a non-owner from renaming-over a file it doesn't own,
# so every cross-uid cache refresh failed with "mv ... Operation not
# permitted" and broke app launches / inventory (operator 2026-05-20).
# The cache is regenerable + non-sensitive; on this single-user host
# there is no other local uid for the sticky bit to protect against.
d /var/lib/mios/agent-env  0777 root      root      -  -
# OWUI bind-mounts these agent-output dirs :ro (for suggestions/context). They
# MUST exist at boot or the mios-open-webui container fails to start ("statfs
# /var/lib/mios/<dir>: no such file or directory" -> 965x crash-loop, observed
# on the fresh MiOS-DEV VM 2026-06-05). Owned by mios-ai (the producing services
# hermes-tail / delegation-prefilter / log-watcher / agent-nudger all run as
# mios-ai); 0755 so OWUI (uid 817) can read them through the read-only mount.
d /var/lib/mios/hermes-tail          0755 mios-ai mios-ai -  -
d /var/lib/mios/delegation-prefilter 0755 mios-ai mios-ai -  -
d /var/lib/mios/log-watcher          0755 mios-ai mios-ai -  -
d /var/lib/mios/agent-nudger         0755 mios-ai mios-ai -  -
# /var/lib/mios/qdrant -- vector database storage for the KB.
# chown'd to root because the container runs as uid 0 (LAW 6 exception).
d /var/lib/mios/qdrant     0755 root      root      -  -
d /srv/ai                  0755 root      root      -  -
d /srv/ai/models           0755 root      root      -  -
d /srv/ai/mcp              0755 root      root      -  -

# --- bootc linting compliance ---
# /var/home/mios is owned by mios-user.conf (C+Z lines that copy /etc/skel
# and chown). Keeping it here too caused a duplicate-line warning at boot.
d /var/lib/AccountsService 0775 root      root      -  -
d /var/lib/AccountsService/icons 0775 root root      -  -
d /var/lib/AccountsService/users 0700 root root      -  -

# /usr/bin/crictl -> k3s symlink is created by automation/13-ceph-k3s.sh
# at image-build time (immutable surface). The previous L line here
# pointed /var/usrlocal/bin/crictl at /usr/local/bin/k3s, which (because
# /usr/local is itself a symlink to /var/usrlocal on bootc/FCOS layouts)
# resolved to /var/usrlocal/bin/k3s -- a path that does not exist.

# Seed initial journal if missing
C /var/lib/mios/memory/journal/v1.jsonl - - - - /usr/share/mios/memory/v1.jsonl
