# /usr/lib/tmpfiles.d/mios.conf
# Declares MiOS state directories for systemd-tmpfiles. Created at boot.

d /var/lib/mios            0755 root      root      -  -
d /var/lib/mios/ai         0750 mios-ai   mios-ai   -  -
d /var/lib/mios/cache      0755 root      root      -  -
d /var/lib/mios/memory     0755 root      root      -  -
d /var/lib/mios/memory/journal 0755 root  root      -  -
d /var/log/mios            0755 root      root      -  -
d /srv/ai                  0755 root      root      -  -
d /srv/ai/models           0755 root      root      -  -
d /srv/ai/mcp              0755 root      root      -  -

# Seed initial journal if missing
C /var/lib/mios/memory/journal/v1.jsonl - - - - /usr/share/mios/memory/v1.jsonl
