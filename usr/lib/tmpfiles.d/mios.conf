# /usr/lib/tmpfiles.d/mios.conf
# Declare /var and /srv state directories required at runtime.
# These cannot be `mkdir`d in the Containerfile because /var is reset per the
# bootc immutability model -- they must be re-declared on every boot.

# State + logs
d /var/lib/mios            0755 root root -
d /var/lib/mios/artifacts  0755 root root -
d /var/lib/mios/snapshots  0755 root root -
d /var/log/mios            0755 root root -
d /var/log/mios/builds     0755 root root -

# Sovereign AI workload mount points (group-writable so non-root tooling can
# manage model weights without sudo)
d /srv/ai                  0775 root mios -
d /srv/ai/models           0775 root mios -
d /srv/ai/vectordb         0775 root mios -
d /srv/ai/prompts          0775 root mios -
