# --- web search (local SearXNG-backed; the web_search verb backend) ---
# Added 2026-05-21: the agent fabricated a weather/event report because no
# web tool existed -- mios-web-search closes that gap. MUST be on PATH so
# the agent-pipe dispatch + the daemon-agent supplement resolve it.
L+ /usr/local/bin/mios-web-search          - - - - /usr/libexec/mios/mios-web-search
L+ /usr/local/sbin/mios-web-search         - - - - /usr/libexec/mios/mios-web-search
# mios-web-extract: full-page fetch (the web_extract verb backend). MUST be on
# PATH so the dispatch resolves it (was unshimmed -> web_extract exited 127).
L+ /usr/local/bin/mios-web-extract         - - - - /usr/libexec/mios/mios-web-extract
L+ /usr/local/sbin/mios-web-extract        - - - - /usr/libexec/mios/mios-web-extract
# mios-crawl: JS-rendered page -> LLM-ready markdown (the `crawl` verb
# backend; POSTs to the local mios-crawl4ai.service loopback :11235, which
# drives the existing Chrome over CDP with a Camoufox stealth fallback).
# Distinct from web_extract (lightweight HTTP text fetch): crawl handles
# JS-rendered pages + returns structured markdown/links. MUST be on PATH so
# the agent-pipe dispatch resolves it (else `crawl` exits 127, same trap that
# bit web_extract). Added 2026-05-24; reworked to the venv service same day.
L+ /usr/local/bin/mios-crawl               - - - - /usr/libexec/mios/mios-crawl
L+ /usr/local/sbin/mios-crawl              - - - - /usr/libexec/mios/mios-crawl
# mios-crawl4ai-setup: one-shot installer for the crawl-engine venv (operator
# runs it; creates /usr/lib/mios/crawl4ai/.venv + crawl4ai core + camoufox).
# On PATH for operator convenience.
L+ /usr/local/bin/mios-crawl4ai-setup      - - - - /usr/libexec/mios/mios-crawl4ai-setup
L+ /usr/local/sbin/mios-crawl4ai-setup     - - - - /usr/libexec/mios/mios-crawl4ai-setup
# mios-discord-send: deterministic Discord post (discord_send verb backend).
# MUST be on PATH so the agent-pipe dispatch resolves it.
L+ /usr/local/bin/mios-discord-send        - - - - /usr/libexec/mios/mios-discord-send
L+ /usr/local/sbin/mios-discord-send       - - - - /usr/libexec/mios/mios-discord-send

