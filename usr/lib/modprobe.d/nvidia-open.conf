# AI-hint: Configures NVIDIA kernel module parameters to enable open-source driver support for Turing+ and Blackwell GPUs, while enabling kernel suspend notifiers and memory preservation for stable nvidia-drm functionality.
# 'MiOS' v0.2.4: Prefer NVIDIA open kernel modules (default for Turing+).
# Blackwell (RTX 50): open modules are the ONLY option.
options nvidia NVreg_OpenRmEnableUnsupportedGpus=1
# Use kernel suspend notifiers (595+) for internal video memory preservation.
options nvidia NVreg_UseKernelSuspendNotifiers=1
# Preserve video memory across suspend/hibernate. Required for nvidia-drm.
options nvidia NVreg_PreserveVideoMemoryAllocations=1
