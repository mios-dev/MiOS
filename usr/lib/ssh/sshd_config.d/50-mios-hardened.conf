# AI-hint: Hardens SSH daemon by disabling root login, password auth, and forwarding while enforcing public key authentication and strict session limits to secure remote access to the MiOS system.
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
MaxAuthTries 3
MaxSessions 5
ClientAliveInterval 300
ClientAliveCountMax 2
PermitEmptyPasswords no