# MiOS WSL2 configuration. Read by WSL2 from /etc/wsl.conf on every boot.
# Reference copy lives at /usr/lib/wsl.conf; wsl-init.service restores
# /etc/wsl.conf from that reference if drift is detected.
# Format kept compact: no blank lines between sections — older WSL parsers
# have rejected blank-line-separated configs ("Expected ' ' or '\n' in
# /etc/wsl.conf:N"). Single trailing newline. ASCII only. LF endings.
[boot]
systemd=true
[user]
default=mios
[interop]
enabled=true
appendWindowsPath=false
[automount]
enabled=true
options=metadata,umask=22,fmask=11
[network]
generateHosts=true
generateResolvConf=true
