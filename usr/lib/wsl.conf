# MiOS WSL2 configuration. Ignored on non-WSL boots.
[boot]
systemd=true
command="/usr/libexec/mios/wsl-firstboot"

[user]
default=mios

[interop]
enabled=true
appendWindowsPath=false

[automount]
enabled=true
options="metadata,umask=22,fmask=11"

[network]
generateHosts=true
generateResolvConf=true