[Partition]
Type=root
# Automatically grow to fill available space
# Minimum size 80G to ensure we can handle rechunked layers
SizeMinBytes=80G
# No max size (fill the disk)
SizeMaxBytes=infinity
# Ensure alignment for NVMe/SSD
PaddingMinBytes=1G
# We want to use the native filesystem specified at BIB build time (ext4)
Format=ext4
