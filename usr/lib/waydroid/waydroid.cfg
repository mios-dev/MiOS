# AI-hint: Configuration file for the Waydroid container defining OTA update endpoints, system image types (GAPPS), and hardware abstraction properties like gralloc and EGL drivers for Android compatibility.
[waydroid]
system_ota = https://ota.waydro.id/system
vendor_ota = https://ota.waydro.id/vendor
system_type = GAPPS

[properties]
ro.hardware.gralloc=default
ro.hardware.egl=swiftshader
