# AI-hint: Configures cloud-init parameters for MiOS, defining the default 'mios' user with full sudo privileges, shell access, and specific group memberships for hardware and virtualization.
preserve_hostname: false
ssh_pwauth: true
system_info:
  default_user:
    name: mios
    lock_passwd: false
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: wheel, libvirt, kvm, video, render
datasource_list: [NoCloud, None, Azure, GCE, Ec2, Openstack]
