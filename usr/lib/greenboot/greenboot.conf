# MiOS greenboot-rs configuration
# greenboot-rs >= v0.1.4 (Fedora 43+ default Rust rewrite)
# Upstream: https://github.com/fedora-iot/greenboot-rs

# Maximum failed boot attempts before triggering bootc rollback
GREENBOOT_MAX_BOOT_ATTEMPTS=3

# Enable watchdog integration for hardware watchdog timer support
GREENBOOT_WATCHDOG_CHECK_ENABLED=true

# Grace period (hours) after an OS upgrade before watchdog enforcement kicks in
# Gives time for first-boot services (role-apply, freeipa-enroll, etc.) to settle
GREENBOOT_WATCHDOG_GRACE_PERIOD=1
