# AI-hint: Defines default USBGuard authorization rules for the MiOS security subsystem, ensuring hubs and HID input devices (keyboards, mice, remote virtual KVM consoles) are allowed at boot while blocking hostile devices.
# Allow all USB Hubs (so physical and virtual ports function)
allow with-interface equals { 09:*:* }

# Allow all USB Human Interface Devices (HID: keyboards, mice, virtual console redirections)
allow with-interface equals { 03:*:* }

# Allow USB Mass Storage (so the MiOS-Cat installer USB drive and virtual KVM media redirection function)
allow with-interface equals { 08:*:* }

# Allow Smart Card interface (required for integrated smart card security keyboards)
allow with-interface equals { 0b:*:* }

# Allow Wireless Controllers (required for Bluetooth keyboard/mouse controllers)
allow with-interface equals { e0:*:* }

