# 'MiOS' override for the upstream cephadm package's sysusers.d drop-in.
#
# The cephadm RPM ships /usr/lib/sysusers.d/cephadm.conf with:
#     u cephadm - 'cephadm user for mgr/cephadm' /var/lib/cephadm /bin/bash
# Auto-allocated UID ('-') lands in the SYSTEM range (<UID_MIN/1000), where
# systemd-logind refuses to create /run/user/<uid>. Combined with /bin/bash
# that breaks SSH/cephadm-orchestrator login flows. Postcheck #8 enforces
# fixed UID >= 1000 for any login-shell user.
#
# Files in /etc/sysusers.d/ override files of the same basename in
# /usr/lib/sysusers.d/ (see systemd-sysusers.d(5) "if the same filename is
# present in multiple of these search paths, only the file in the highest
# priority path is used"). UID/GID 1100 is reserved for cephadm and sits in
# the regular-user range so logind builds the runtime dir.
g cephadm 1100
u cephadm 1100:1100 "cephadm user for mgr/cephadm" /var/lib/cephadm /bin/bash
