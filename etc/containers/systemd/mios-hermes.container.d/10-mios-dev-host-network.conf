[Container]
# Network=host workaround for the dev VM: hermes binds to the host's
# loopback directly so localhost references inside the container reach
# Ollama / SearXNG without container-name DNS. Bare-metal MiOS leaves
# this dropin OUT and uses the parent unit's ai-net bridge.
#
# WSL2 + mirrored networking incompatibility (operator-confirmed
# 2026-05-12): under networking_mode=mirrored the WSL VM's loopback IS
# the Windows host's loopback, so Network=host causes EADDRINUSE
# death-spirals (every Quadlet that auto-restarts loops because the
# Windows-side svchost mirror relay holds the port even after the
# WSL-side service crashes). Toggle off via mios.toml
# [wsl2.dev_vm].quadlet_network_mode = "bridge";
# automation/08-system-files-overlay.sh removes this dropin (and any
# *-host-network.conf peer) when bridge is selected, letting the
# parent unit's Network=mios.network + Network=ai-net.network apply.
# The parent's HERMES_BACKEND_BASE_URL=http://mios-ollama:11434
# already uses container-name DNS, so the bridge-mode path needs no
# further edits inside this dropin.
Network=
Network=host

# Clear the parent unit's PublishPort directive. Host-net mode makes
# PublishPort a no-op, and the parent uses a shell-style default-value
# expression that podman emits verbatim into --publish and fails to
# parse as an IP. Empty value resets the directive.
PublishPort=

Environment=PORT=8642
Environment=HERMES_BACKEND_BASE_URL=http://localhost:11434
Environment=HOME=/opt/data
Environment=UV_CACHE_DIR=/opt/data/.cache/uv
Environment=XDG_CACHE_HOME=/opt/data/.cache
WorkingDir=/opt/data
User=0
Group=0
