# MiOS KB local config — overrides for downstream consumers
# Day-0 defaults target the MiOS LocalAI endpoint at http://localhost:8080/v1
# (LAW 5: UNIFIED-AI-REDIRECTS). Override per environment.

[runtime]
# Default to MiOS's own LocalAI endpoint. Honors $MIOS_AI_ENDPOINT if set.
base_url    = "${MIOS_AI_ENDPOINT:-http://localhost:8080/v1}"
api_key_env = "MIOS_AI_KEY"   # empty key accepted by LocalAI
# Examples for other local OpenAI-API-compatible runtimes:
#   Ollama:          base_url = "http://localhost:11434/v1"
#   vLLM:            base_url = "http://localhost:8000/v1"
#   LM Studio:       base_url = "http://localhost:1234/v1"
#   llama.cpp:       base_url = "http://localhost:8080/v1"
#   LiteLLM proxy:   base_url = "http://localhost:4000/v1"

[models]
# Default models — honor $MIOS_AI_MODEL / $MIOS_AI_EMBED_MODEL / $MIOS_AI_GRADER.
# Defaults match canonical mios.toml [ai].model + [ai].embed_model.
chat            = "${MIOS_AI_MODEL:-qwen2.5-coder:7b}"
embedding       = "${MIOS_AI_EMBED_MODEL:-nomic-embed-text}"
embed_dims      = 768            # nomic-embed-text default; some local runtimes ignore `dimensions`
grader          = "${MIOS_AI_GRADER:-qwen2.5-coder:7b}"

[api_surface]
# Which OpenAI surfaces the runtime supports. Defaults reflect MiOS LocalAI.
# Set to true when targeting OpenAI/Azure cloud.
chat_completions = true
embeddings       = true
tools_function   = true
tools_strict     = false   # LocalAI accepts but does not enforce; flip true for cloud
responses_api    = false   # cloud-only
vector_stores    = false   # cloud-only
batch_api        = false   # cloud-only
evals_api        = false   # cloud-only — use the local-runner.py instead
fine_tuning      = false   # cloud-only — use axolotl/trl/llama-factory locally
mcp_tool         = false   # Responses-only

[chunking]
strategy            = "static"
max_chunk_size_tokens = 800       # OpenAI default; valid range 100..4096
chunk_overlap_tokens  = 200       # must be <= max/2
# Override per doc class:
#   PACKAGES.md (dense ref):  max=600, overlap=150
#   kargs.d / sysctl ref:     max=500, overlap=100

[vector_store]
name        = "mios-kb"
expires_after_days = 0            # 0 = no expiration (cloud)
local_backend = "qdrant"          # qdrant | pgvector | chroma | weaviate | milvus | faiss
local_url   = "http://localhost:6333"
collection  = "mios-kb"

[ingest]
attributes_required = ["doc_type", "mios_subsystem", "upstream_tech", "fhs_path"]

[mios]
# Pin to the MiOS upstream this KB was generated against.
upstream_repo = "https://github.com/mios-dev/MiOS"
upstream_ref  = "main"
kb_version    = "2026.05.02"
