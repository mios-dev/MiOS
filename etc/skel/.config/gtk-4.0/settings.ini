# AI-hint: Defines the default GTK4 visual configuration (dark Adwaita theme, Bibata cursor, and GeistMono font) for new user profiles in the MiOS environment.
# MiOS default GTK4 settings (shipped via /etc/skel/.config/gtk-4.0/)
# Sets the dark Adwaita theme + Bibata cursor as the user-level
# defaults for every new MiOS account. Operator-overridable per-user
# via GNOME Tweaks or by editing ~/.config/gtk-4.0/settings.ini.
[Settings]
gtk-theme-name=adw-gtk3-dark
gtk-icon-theme-name=Adwaita
gtk-cursor-theme-name=Bibata-Modern-Classic
gtk-cursor-theme-size=24
gtk-font-name=GeistMono Nerd Font Mono 11
